<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;height:100vh;width:100vw}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#eee;font-size:16px;background:#0a0a1a;display:flex;flex-direction:column}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1000;display:block}
:root{--accent:#7c3aed;--accent2:#a855f7;--gold:#f5c518;--bg2:rgba(20,20,50,0.85);--bg3:rgba(30,30,60,0.7);--border:rgba(100,80,220,0.25);--text:#e8e8ff;--muted:#888;--green:#22c55e;--red:#ef4444}
body.theme-creator{--accent:#7c3aed;--accent2:#00d4ff;--gold:#f5c518}
body.theme-god{--accent:#b8860b;--accent2:#ffd700;--gold:#ffd700}
.app-container{display:flex;width:100%;height:100vh;position:relative;z-index:1;justify-content:center;overflow:hidden}
.main-content{width:100%;max-width:720px;padding:12px 16px;display:flex;flex-direction:column;padding-bottom:70px;height:100%}
.profile-row,.tabs,.tab-content,.announce-block,.thought-block,.chat-header-bar{flex-shrink:0}
.profile-row{display:flex;align-items:center;gap:14px;margin-bottom:12px;padding:8px 0}
.badge{font-size:12px;font-weight:bold;padding:4px 10px;border-radius:12px;display:inline-block;letter-spacing:.5px}
.badge-creator{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.badge-god{background:linear-gradient(135deg,#FFD700,#FF4500);color:#fff}
.badge-manager{background:#2d6a4f;color:#95d5b2}
.name-creator{background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-god{background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-manager{color:#eee;font-weight:bold}
.card,.stat-card,.pinned,.announce-block,.thought-block{background:var(--bg2);padding:14px;border-radius:14px;margin:6px 0;backdrop-filter:blur(10px);border:1px solid var(--border);overflow:visible}
input,select,textarea{width:100%;padding:12px 14px;font-size:15px;margin:6px 0;border-radius:12px;border:1px solid #444;background:rgba(15,15,30,0.8);color:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
button{border:none;font-weight:bold;cursor:pointer;border-radius:12px;transition:filter .2s}
button:hover{filter:brightness(1.1)}
.btn-green{background:#4CAF50;color:#fff;padding:12px;font-size:15px;margin:4px 0;width:100%}
.btn-blue{background:#2196F3;color:#fff;padding:12px;font-size:15px;margin:4px 0;width:100%}
.btn-red{background:#e94560;color:#fff;padding:12px;font-size:15px;margin:4px 0;width:100%}
.btn-gray{background:#444;color:#fff;padding:12px;font-size:15px;margin:4px 0;width:100%}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;padding:12px;font-size:15px;margin:4px 0;width:100%}
.btn-purple{background:#9C27B0;color:#fff;padding:12px;font-size:15px;margin:4px 0;width:100%}
.btn-orange{background:#FF9800;color:#fff;padding:12px;font-size:15px;margin:4px 0;width:100%}
.btn-cyan{background:#00BCD4;color:#fff;padding:12px;font-size:15px;margin:4px 0;width:100%}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px;width:auto}
button:disabled{opacity:.5;cursor:default}
.tabs{display:flex;gap:6px;margin:10px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{width:44px;height:44px;display:flex;align-items:center;gap:.5rem;overflow:hidden;border-radius:999px;transition:width .3s,background .3s;background:rgba(255,255,255,.08);color:#ccc;border:1px solid transparent;cursor:pointer;padding:0 12px;font-size:13px;white-space:nowrap;flex-shrink:0}
.tabs button:hover{width:110px;background:rgba(255,255,255,.15);color:#fff}
.tabs button.active{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;width:110px;box-shadow:0 4px 12px rgba(138,43,226,.3)}
.tabs button .menu-icon{font-size:16px;flex-shrink:0}
.tabs button .menu-label{opacity:0;max-width:0;transform:translateX(-6px);transition:all .2s}
.tabs button:hover .menu-label,.tabs button.active .menu-label{opacity:1;max-width:80px;transform:translateX(0)}
.tab-content{display:none;width:100%;flex-shrink:0}
.tab-content.active-tab{display:block}
.chat-section{margin:8px 0 0;display:flex;flex-direction:column;flex:1;min-height:0}
.chat-header-bar{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);margin-bottom:6px;font-size:14px}
.chat-header-bar:hover{background:var(--bg3)}
.chat-icon{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--accent));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.chat-label{flex:1;font-weight:bold;background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.chat-arrow{color:#aaa;font-size:12px;transition:transform .3s}
.chat-arrow.open{transform:rotate(180deg)}
.chat-badge{background:#e94560;color:#fff;border-radius:10px;font-size:11px;padding:2px 6px;font-weight:bold}
.chat-back-btn{background:0 0;border:1px solid var(--border);color:#ccc;padding:4px 10px;border-radius:8px;font-size:12px;cursor:pointer;display:none}
#chat{flex:1;overflow-y:auto;padding:10px;border-radius:14px;background:rgba(15,15,30,.6);font-size:13px;border:1px solid var(--border);transition:padding .3s,flex .3s;margin-bottom:0;scrollbar-width:thin;scrollbar-color:rgba(138,43,226,.5) transparent}
#chat.hidden{flex:0;padding:0!important;margin-bottom:0!important;overflow:hidden;opacity:0;border:none;min-height:0}
#chat::-webkit-scrollbar{width:6px}
#chat::-webkit-scrollbar-thumb{background:rgba(138,43,226,.5);border-radius:4px}
.chat-bubble-group{margin:2px 0;display:flex;flex-direction:column;position:relative;max-width:100%}
.chat-bubble-group.mine{align-items:flex-end}
.chat-bubble-group.other{align-items:flex-start}
.chat-bubble{background:rgba(30,30,50,.9);padding:8px 12px;border-radius:14px;margin:1px 0;display:inline-block;max-width:82%;word-break:break-word;border:1px solid rgba(255,255,255,.05);position:relative}
.chat-bubble.mine{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3)}
.chat-msg-creator{background:linear-gradient(135deg,rgba(245,197,24,.15),rgba(138,43,226,.2));border:1px solid rgba(138,43,226,.4);padding:8px 12px;border-radius:14px;margin:1px 0;display:inline-block;max-width:82%;position:relative}
.chat-msg-god{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,69,0,.2));border:1px solid rgba(255,215,0,.4);padding:8px 12px;border-radius:14px;margin:1px 0;display:inline-block;max-width:82%;position:relative}
.chat-msg-creator .author{background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.chat-msg-god .author{background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.msg-menu-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.5);color:#ccc;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;z-index:3}
.chat-bubble:hover .msg-menu-btn,.chat-msg-creator:hover .msg-menu-btn,.chat-msg-god:hover .msg-menu-btn{opacity:1}
.msg-menu-btn:hover{background:rgba(138,43,226,.7);color:#fff}
.msg-dropdown{position:absolute;top:28px;right:0;background:rgba(15,15,30,.98);border-radius:12px;padding:4px 6px;display:none;gap:4px;z-index:10;border:1px solid var(--border);box-shadow:0 6px 20px rgba(0,0,0,.8)}
.msg-dropdown.show{display:flex}
.msg-dropdown button{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);color:#fff}
.msg-dropdown button:hover{transform:scale(1.1);background:rgba(255,255,255,.1)}
#chat .chat-img{max-width:220px;max-height:160px;border-radius:10px;margin:5px 0;cursor:pointer;object-fit:cover}
#chat .thumb{width:75px;height:75px;object-fit:cover;border-radius:8px;cursor:pointer;margin:3px;display:inline-block}
#chat .photo-pack{display:flex;gap:4px;flex-wrap:wrap;margin:5px 0}
.like-indicator{font-size:11px;background:rgba(0,0,0,.5);border-radius:10px;padding:2px 7px;display:none;margin-top:3px}
.like-indicator.has-likes{display:inline-block}
.photo-preview{display:flex;gap:4px;flex-wrap:wrap}
.photo-preview img{width:50px;height:50px;object-fit:cover;border-radius:8px}
#photoViewer{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;z-index:10000}
#photoViewer img{max-width:95%;max-height:90%;border-radius:12px}
.chat-input-bar{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:720px;background:rgba(10,10,26,.95);backdrop-filter:blur(15px);padding:8px 16px 16px;display:flex;gap:8px;align-items:center;z-index:100;border-top:1px solid var(--border)}
.input-wrapper{position:relative;flex:1;display:flex}
.sticker-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:0 0;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:5px}
.sticker-toggle:hover{filter:brightness(1.2)}
.sticker-panel{position:absolute;bottom:55px;right:0;width:300px;height:350px;background:rgba(15,15,30,.98);border:1px solid var(--border);border-radius:16px;display:none;flex-direction:column;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,.8);backdrop-filter:blur(20px);overflow:hidden}
.sticker-panel.show{display:flex;animation:fadeIn .2s}
.sticker-content{flex:1;overflow-y:auto;padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;scrollbar-width:none}
.sticker-tabs{display:flex;background:rgba(22,33,62,.9);padding:5px;gap:5px;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border)}
.st-tab{width:36px;height:36px;border-radius:8px;border:none;background:0 0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.6;transition:.2s;flex-shrink:0}
.st-tab.active,.st-tab:hover{opacity:1;background:rgba(138,43,226,.3)}
.st-tab img{width:24px;height:24px;object-fit:contain}
.st-item{width:70px;height:70px;cursor:pointer;transition:transform .1s;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.02)}
.st-item:hover{transform:scale(1.1);background:rgba(255,255,255,.08)}
.st-item img{max-width:100%;max-height:100%;object-fit:contain}
.emoji-item{width:42px;height:42px;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s}
.emoji-item:hover{transform:scale(1.2)}
.chat-sticker{max-width:140px;max-height:140px;background:0 0;object-fit:contain;display:block;margin:4px 0;border:none}
.pack-list-item{background:rgba(0,0,0,.3);padding:10px;border-radius:8px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.pack-icon{width:40px;height:40px;object-fit:contain;border-radius:6px}
.user-cb-list{max-height:150px;overflow-y:auto;background:rgba(0,0,0,.2);padding:8px;border-radius:8px;margin:5px 0;border:1px solid #444}
.user-cb-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:14px}
.user-cb-item input{width:auto;margin:0}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;pointer-events:none;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:12px 20px;border-radius:12px;background:rgba(20,20,35,.95);border:1px solid var(--accent);color:#fff;font-size:14px;font-weight:bold;box-shadow:0 5px 20px rgba(0,0,0,.6);transform:translateY(-20px);opacity:0;transition:all .3s;text-align:center;backdrop-filter:blur(5px)}
.toast-msg.error{border-color:#ff1744}
.toast-msg.show{transform:translateY(0);opacity:1}
#toastDivine{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:9999;transition:all .5s cubic-bezier(.34,1.56,.64,1);pointer-events:none;opacity:0}
#toastDivine.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
#toastDivine .scroll-content{max-height:0;overflow:hidden;transition:max-height .6s ease-in-out}
#toastDivine .scroll-content.open{max-height:300px}
#toastDivine .divine-paper{background:linear-gradient(135deg,#fdf6e3,#f5e6ca);border-left:3px solid #d4a574;border-right:3px solid #d4a574;padding:16px 24px;border-radius:4px;box-shadow:0 10px 40px rgba(0,0,0,.6),0 0 30px rgba(245,158,11,.15)}
#toastDivine .scroll-roll{height:8px;background:linear-gradient(to right,#b8860b,#daa520,#b8860b);border-radius:4px;box-shadow:0 2px 10px rgba(184,134,11,.4)}
#toastCosmic{position:fixed;bottom:30px;right:30px;z-index:9999;transform:translateY(100px);opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:340px}
#toastCosmic.show{transform:translateY(0);opacity:1;pointer-events:auto}
#toastCosmic .cosmic-box{background:rgba(10,10,30,.95);border:1px solid rgba(99,102,241,.4);border-radius:12px;padding:16px 20px;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,.6),0 0 30px rgba(99,102,241,.1);position:relative}
#toastCosmic .scanline{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.3),transparent);animation:scanMove 2s linear infinite}
@keyframes scanMove{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
.avatar-carousel{width:110px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;position:fixed;top:0;right:-130px;height:100vh;padding:50px 0 20px;z-index:1000;backdrop-filter:blur(15px);transition:right .3s cubic-bezier(.16,1,.3,1);box-shadow:-10px 0 30px rgba(0,0,0,.7)}
.avatar-carousel.open{right:0}
.avatar-carousel-inner{display:flex;flex-direction:column;align-items:center;width:100%;gap:12px;overflow-y:auto;height:100%;padding:10px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.avatar-carousel-inner::-webkit-scrollbar{display:none}
.sidebar-close-btn{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.sidebar-close-btn:hover{background:#e94560}
.btn-sidebar-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);width:40px;height:60px;background:rgba(138,43,226,.7);border:1px solid rgba(255,255,255,.2);border-right:none;border-radius:12px 0 0 12px;color:#fff;font-size:18px;cursor:pointer;z-index:999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.btn-sidebar-toggle:hover{background:rgba(138,43,226,1);width:45px}
.avatar-item{width:56px;height:56px;border-radius:50%;cursor:pointer;flex-shrink:0;position:relative;transition:transform .2s}
.avatar-item:hover{transform:scale(1.1)}
.avatar-item img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;border:2px solid rgba(138,43,226,.3)}
.avatar-item .av-placeholder{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#222,#444);display:flex;align-items:center;justify-content:center;font-size:18px;color:#ccc;font-weight:bold;border:2px solid rgba(138,43,226,.3)}
.avatar-item.active{box-shadow:0 0 15px rgba(138,43,226,.8)}
.avatar-item.active img,.avatar-item.active .av-placeholder{border-color:var(--gold)}
.avatar-item .online-dot{position:absolute;bottom:0;right:0;width:12px;height:12px;background:#4CAF50;border-radius:50%;border:2px solid #111;box-shadow:0 0 8px rgba(76,175,80,.8);z-index:2}
.mini-profile{position:fixed;right:120px;top:50%;transform:translateY(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px 16px 16px;width:250px;z-index:1100;display:none;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,.8)}
.mini-profile.show{display:block;animation:slideIn .2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-50%) translateX(20px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.mp-close-btn{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.1);border:none;color:#ccc;width:24px;height:24px;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10}
.mp-close-btn:hover{background:#e94560;color:#fff}
.mini-profile .mp-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto;display:block;border:2px solid var(--accent)}
.mini-profile .mp-placeholder{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#444,#555);display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc;margin:0 auto}
.mini-profile .mp-name{text-align:center;font-weight:bold;font-size:16px;margin-top:8px;color:var(--text)}
.mini-profile .mp-status{text-align:center;font-size:12px;padding:4px 10px;border-radius:10px;display:inline-block;margin:4px auto;width:fit-content;background:rgba(138,43,226,.2);border:1px solid rgba(138,43,226,.4);color:#fff}
.mini-profile .mp-punkt{text-align:center;font-size:12px;color:var(--muted)}
.mini-profile .mp-calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:10px;margin-top:8px}
.mini-profile .mp-calendar div{padding:4px;border-radius:3px;background:rgba(255,255,255,.05)}
.mini-profile .mp-calendar .mp-shift{background:#4CAF50;color:#fff;font-weight:bold}
.mini-profile .mp-btn{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:none;cursor:pointer;font-weight:bold;font-size:13px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:12px;background:rgba(22,33,62,.5);border-radius:10px;padding:6px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.calendar div{padding:6px;border-radius:4px;font-size:12px;overflow:hidden;text-overflow:ellipsis}
.calendar .shift-day{background:#4CAF50;color:#fff;font-weight:bold;cursor:pointer}
.calendar .today{border:2px solid #2196F3}
.calendar .header{font-weight:bold;background:rgba(51,51,51,.7)}
.worker-row{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--border);gap:4px;flex-wrap:wrap}
.worker-row button{width:auto;padding:6px 10px;font-size:11px}
.worker-row .creator-row{background:rgba(245,197,24,.15);border-left:3px solid var(--gold)}
.creator-badge-sm{font-size:10px;background:var(--gold);color:#000;padding:2px 6px;border-radius:8px;margin-left:4px}
.shift-edit-row{display:flex;gap:4px;align-items:center;margin:4px 0;flex-wrap:wrap}
.shift-edit-row input{flex:1;padding:8px;font-size:13px;min-width:40px}
.shift-edit-row button{width:auto;padding:8px 12px;font-size:12px}
.punish-row{display:flex;justify-content:space-between;align-items:center;padding:6px;font-size:13px;border-bottom:1px solid var(--border)}
.punish-row button{width:auto;padding:4px 8px;font-size:10px}
.zp-result{background:rgba(34,197,94,.1);padding:12px;border-radius:8px;margin-top:8px;font-size:14px;border:1px solid rgba(34,197,94,.3);white-space:pre-line}
.status-badge{font-size:14px;font-weight:bold;padding:4px 12px;border-radius:12px;display:inline-block;margin:4px 0}
.progress-bar{height:6px;background:#333;border-radius:3px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
.progress-text{font-size:11px;color:var(--muted)}
.punkt-form-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:12px 14px;background:var(--bg3);border-radius:12px;border:1px solid var(--border);transition:background .2s}
.punkt-form-toggle:hover{background:var(--bg2)}
.punkt-form-toggle .arrow{transition:transform .3s}
.punkt-form-toggle .arrow.open{transform:rotate(180deg)}
.punkt-form-body{display:none;margin-top:12px}
.punkt-form-body.open{display:block}
.punkt-list-wrap{max-height:300px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.punkt-list-wrap::-webkit-scrollbar{width:4px}
.punkt-list-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.avatar-preview-wrap .preview-container canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%}

.avatar-preview-wrap .preview-container #previewFrameCanvas{z-index:2;pointer-events:none}
.style-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0}
.style-btn{padding:8px 6px;border-radius:10px;border:2px solid #444;background:rgba(255,255,255,.05);color:#ccc;font-size:11px;font-weight:600;text-align:center;cursor:pointer;transition:all .2s}
.style-btn:hover{border-color:var(--accent);background:rgba(255,255,255,.08)}
.style-btn.active{border-color:var(--accent);background:rgba(138,43,226,.2);color:#fff}
.style-btn .emoji{font-size:20px;display:block;margin-bottom:2px}
.setting-slider{display:flex;align-items:center;gap:12px;margin:6px 0}
.setting-slider label{font-size:13px;color:var(--muted);min-width:80px}
.setting-slider input[type=range]{flex:1;margin:0;padding:0;accent-color:var(--accent)}
.setting-slider .value{font-size:13px;color:#fff;min-width:40px;text-align:right}
.setting-color{display:flex;align-items:center;gap:12px;margin:6px 0}
.setting-color label{font-size:13px;color:var(--muted);min-width:80px}
.setting-color input[type=color]{width:40px;height:40px;border:2px solid var(--border);border-radius:8px;padding:2px;background:0 0;cursor:pointer}
.setting-color .hex{font-size:12px;color:var(--muted);font-family:monospace}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.1);border-radius:50%;border-top-color:var(--accent);animation:spin .6s linear infinite}

#login{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;height:100vh;max-width:450px;margin:0 auto;position:relative;z-index:1}
#login form{max-width:320px;width:100%;display:flex;flex-direction:column;align-items:center}

#login .btn-gold{width:100%;margin-top:10px;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;font-weight:bold;font-size:16px;border:none;cursor:pointer}
@media(max-width:600px){

.settings-card{padding:16px;margin:10px}

$('#loginBtn').addEventListener('click',login);

async function login(){
var name=$('#loginName').value.trim(),pass=$('#loginPass').value.trim();
if(!name||!pass){toast('❌ Введите имя и пароль',true);return}
$('#loginBtn').disabled=true;$('#loginLoading').style.display='block';
try{
var cfg=await DB.ref('config').once('value');var c=cfg.val()||{};
var ch=c.creatorHash||'f5e9b69ce10f94f87e393a6a8d557762e8b0a6b7a97bd26f1ba4576f0b59ed06';
var gh=c.godHash||'f8fc0b22985fd85d725e36258c96fdd02c080c35b97877c4752e46d6b2613a2e';
var ih=await sha256(pass);
if(!ih){$('#loginBtn').disabled=false;$('#loginLoading').style.display='none';return}
if(name==='Костя'&&ih===ch){var s=await DB.ref('users/Костя').once('value');App.user=s.exists()?s.val():{name:'Костя'};App.user.role='creator';localStorage.setItem('ozon_session',JSON.stringify({name:'Костя',role:'creator',key:'Костя'}));finish();return}
if(name==='Игорь'&&ih===gh){var s2=await DB.ref('users/Игорь').once('value');App.user=s2.exists()?s2.val():{name:'Игорь'};App.user.role='god';localStorage.setItem('ozon_session',JSON.stringify({name:'Игорь',role:'god',key:'Игорь'}));finish();return}
var us=await DB.ref('users').orderByChild('name').equalTo(name).once('value');
if(us.exists()){var ud=null,uk=null;us.forEach(function(c){ud=c.val();uk=c.key});if(ud.password&&ud.password===pass){App.user=ud;App.user.key=uk;App.user.role=ud.role||'manager';localStorage.setItem('ozon_session',JSON.stringify({name:name,role:App.user.role,key:uk}));finish();return}}
toast('❌ Неверный пароль',true);
}catch(e){toast('❌ Ошибка: '+e.message,true)}
finally{$('#loginBtn').disabled=false;$('#loginLoading').style.display='none'}
}

var saved=localStorage.getItem('ozon_session');
if(saved){try{var ss=JSON.parse(saved);DB.ref('users/'+ss.key).once('value').then(function(s){if(s.exists()){App.user=s.val();App.user.key=ss.key;App.user.role=ss.role||'manager';finish()}else{localStorage.removeItem('ozon_session')}}).catch(function(){})}catch(e){}}

function getAvatarSettings(u){if(u==='Костя'||u==='Игорь'){return{style:App.avatarSettings.style,speed:App.avatarSettings.speed,size:App.avatarSettings.size,glow:App.avatarSettings.glow,count:App.avatarSettings.count,color1:App.avatarSettings.color1,color2:App.avatarSettings.color2,isAnimated:true}}else{return{ringColor:App.avatarSettings.ringColor,ringThickness:App.avatarSettings.ringThickness,isAnimated:false}}}
function drawAvatar(canvas,ctx,settings,img,w,h){var width=w||canvas.width,height=h||canvas.height;ctx.clearRect(0,0,width,height);
if(img){ctx.save();ctx.beginPath();ctx.arc(width/2,height/2,width/2-2,0,Math.PI*2);ctx.closePath();ctx.clip();var ratio=Math.max(width/img.width,height/img.height);var dw=img.width*ratio,dh=img.height*ratio;ctx.drawImage(img,(width-dw)/2,(height-dh)/2,dw,dh);ctx.restore()}else{var g=ctx.createRadialGradient(width/2,height/2,5,width/2,height/2,width/2);g.addColorStop(0,'#1e1b4b');g.addColorStop(1,'#0f172a');ctx.fillStyle=g;ctx.beginPath();ctx.arc(width/2,height/2,width/2-2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#6366f1';ctx.font=(width*.3)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',width/2,height/2)}
if(!settings.isAnimated){var thick=settings.ringThickness==='thin'?2:(settings.ringThickness==='thick'?6:4);ctx.strokeStyle=settings.ringColor||'#7c3aed';ctx.lineWidth=thick;ctx.shadowColor=settings.ringColor||'#7c3aed';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(width/2,height/2,width/2-2,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0}}
function updateAvatars(){var c=$('#profileAvatarCanvas');if(c){var ctx=c.getContext('2d');drawAvatar(c,ctx,getAvatarSettings(App.user.name),App.avatarImageData,76,76)}buildCarousel()}
function updateSettingsUI(){if(!App.user)return;var adv=App.user.role==='creator'||App.user.role==='god';$('#settingsAvatarAdvanced').style.display=adv?'block':'none';$('#settingsAvatarSimple').style.display=adv?'none':'block';

function renderCalendar(){var m=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];$('#calTitle').textContent='📅 Календарь — '+m[App.calMonth]+' '+App.calYear+' г.';

function loadHistory(){DB.ref('payments').orderByChild('user').equalTo(App.user.name).once('value').then(function(s){var a=[];s.forEach(function(c){a.push(c.val())});a.sort(function(x,y){return y.timestamp-x.timestamp});$('#historyContent').innerHTML=a.length?a.map(function(x){return'<div class="stat-card" style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;"><div><div class="payment-amount" style="font-size:18px;font-weight:800;color:var(--green);">'+x.total+' ₽</div><div class="payment-date" style="font-size:11px;color:var(--muted);">'+new Date(x.dateFrom).toLocaleDateString('ru-RU')+' – '+new Date(x.dateTo).toLocaleDateString('ru-RU')+'</div></div><div style="font-size:12px;background:rgba(34,197,94,.15);color:var(--green);padding:4px 8px;border-radius:8px;">Оплачено</div></div>'}).join(''):'<p class="empty-state" style="text-align:center;padding:24px;color:var(--muted);font-size:14px;">Нет выплат</p>'}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}

// ====== NOTIFY ======
function renderNotify(p){p.innerHTML='<div class="section-title" style="font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;">🔔 Уведомления</div><div id="notifyContent">Загрузка...</div><button class="btn-red mt-8" id="clearNotifsBtn">🗑 Очистить</button>';$('#clearNotifsBtn').addEventListener('click',clearNotifs);loadNotifs()}
function loadNotifs(){DB.ref('notifications').orderByChild('user').equalTo(App.user.name).once('value').then(function(s){var a=[];s.forEach(function(c){a.push(c.val())});a.sort(function(x,y){return y.timestamp-x.timestamp});$('#notifyContent').innerHTML=a.length?a.map(function(x){return'<div class="notif-item" style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:8px;border-left:3px solid var(--accent);"><div class="notif-text" style="font-size:14px;">'+esc(x.text)+'</div><div class="notif-time" style="font-size:11px;color:var(--muted);margin-top:4px;">'+new Date(x.timestamp).toLocaleString('ru-RU')+'</div></div>'}).join(''):'<p class="empty-state" style="text-align:center;padding:24px;color:var(--muted);font-size:14px;">Нет уведомлений</p>'}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}
function clearNotifs(){DB.ref('notifications').orderByChild('user').equalTo(App.user.name).once('value').then(function(s){var ps=[];s.forEach(function(c){ps.push(DB.ref('notifications/'+c.key).remove())});return Promise.all(ps)}).then(function(){toast('✅ Уведомления очищены');loadNotifs()}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}

// ====== BOARD ======
function renderBoard(p){p.innerHTML='<div class="section-title" style="font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;">🏆 Доска почёта</div><div id="boardContent">Загрузка...</div>';loadBoard()}
function loadBoard(){DB.ref('shifts').once('value').then(function(s){var st={};s.forEach(function(c){var x=c.val();if(!st[x.user])st[x.user]={hours:0,tovar:0};st[x.user].hours+=x.hours||0;st[x.user].tovar+=x.tovar||0});var arr=[];for(var n in st)arr.push({name:n,hours:st[n].hours,tovar:st[n].tovar});arr.sort(function(a,b){return b.hours-a.hours});var hh='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';hh+='<div class="lb-item" style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:12px;margin-bottom:6px;"><span style="width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;">'+m+'</span> '+esc(arr[i].name)+' — <b>'+arr[i].hours.toFixed(1)+'ч</b></div>'}arr.sort(function(a,b){return b.tovar-a.tovar});var ht='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';ht+='<div class="lb-item" style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:12px;margin-bottom:6px;"><span style="width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;">'+m+'</span> '+esc(arr[i].name)+' — <b>'+arr[i].tovar+' шт</b></div>'}var best=arr.length?'<div class="lb-item" style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:12px;margin-bottom:6px;"><span style="width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;background:linear-gradient(135deg,#f5c518,#ff6b00);color:#fff;">🌟</span> '+esc(arr[0].name)+' — '+arr[0].hours.toFixed(1)+'ч / '+arr[0].tovar+' шт</div>':'Нет данных';$('#boardContent').innerHTML='<div class="card" style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;backdrop-filter:blur(8px);"><div class="card-title" style="font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;">⏱ Топ по часам</div>'+ (hh||'<div class="muted" style="color:var(--muted);">Нет данных</div>') +'</div><div class="card" style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;backdrop-filter:blur(8px);"><div class="card-title" style="font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;">📦 Топ по товарам</div>'+ (ht||'<div class="muted" style="color:var(--muted);">Нет данных</div>') +'</div><div class="card" style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;backdrop-filter:blur(8px);"><div class="card-title" style="font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;">🌟 Работник месяца</div>'+best+'</div>'}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}

// ====== POWER ======
function renderPower(p){p.innerHTML='<div class="section-title" style="font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;">⚡ Сила создателя</div><div class="creator-thought-box" style="background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(0,212,255,.1));border:1px solid rgba(124,58,237,.4);border-radius:14px;padding:14px;margin-bottom:12px;"><div style="font-size:12px;color:var(--muted);margin-bottom:6px;">🌌 Отправить мысль создателя</div><div style="display:flex;gap:8px;"><input type="text" id="creatorThoughtInput" placeholder="Ваша мысль..." style="flex:1;padding:9px 12px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;"><button class="btn-primary" id="thoughtSendCreatorBtn" style="padding:9px 14px;border-radius:12px;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;">✉</button></div></div><div class="power-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><button class="power-btn" id="powerCallGodBtn" style="padding:14px;border-radius:14px;font-size:13px;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--text);display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s;"><span style="font-size:24px;">📢</span>Вызвать бога</button><button class="power-btn" id="powerClownBtn" style="padding:14px;border-radius:14px;font-size:13px;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--text);display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s;"><span style="font-size:24px;">🤡</span>Клоун дня</button><button class="power-btn" id="powerMonkeyBtn" style="padding:14px;border-radius:14px;font-size:13px;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--text);display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s;"><span style="font-size:24px;">🐒</span>Обезьяна 24ч</button><button class="power-btn" id="powerAnnounceBtn" style="padding:14px;border-radius:14px;font-size:13px;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--text);display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s;"><span style="font-size:24px;">📣</span>Объявление</button></div>';
$('#thoughtSendCreatorBtn').addEventListener('click',function(){var t=$('#creatorThoughtInput').value.trim();if(!t){toast('❌ Введите мысль',true);return}DB.ref('creatorThought').set({text:t,timestamp:Date.now(),expiry:Date.now()+86400000}).then(function(){$('#creatorThoughtInput').value='';cosmic(t);toast('🌌 Мысль отправлена!')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})});
$('#powerCallGodBtn').addEventListener('click',function(){DB.ref('announce').push({text:'📢 Создатель вызывает Игоря!',timestamp:Date.now(),expiry:Date.now()+3600000}).then(function(){toast('📢 Бог вызван!')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})});
$('#powerClownBtn').addEventListener('click',function(){var n=prompt('Имя клоуна дня:');if(!n)return;DB.ref('announce').push({text:'🤡 Клоун дня — '+n+'! Аплодисменты 👏',timestamp:Date.now(),expiry:Date.now()+86400000}).then(function(){toast('🤡 Назначен!')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})});
$('#powerMonkeyBtn').addEventListener('click',function(){var n=prompt('Кого превратить в обезьяну?');if(!n)return;DB.ref('users/'+n).once('value').then(function(s){if(!s.exists()){toast('❌ Пользователь не найден',true);return}var o=s.val().avatar;return DB.ref('users/'+n+'/avatar').set('https://raw.githubusercontent.com/painofkili/ozon/main/monkey.png').then(function(){return DB.ref('chat').push({user:(App.user.role==='god'?'👑 ':'🌌 ')+App.user.name,text:'🐒 '+n+' теперь обезьяна на 24 часа!',timestamp:Date.now()})}).then(function(){setTimeout(function(){DB.ref('users/'+n+'/avatar').set(o).catch(function(){})},86400000);toast('🐒 Превращение завершено!')})}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})});
$('#powerAnnounceBtn').addEventListener('click',function(){var t=prompt('Текст объявления:');if(!t)return;DB.ref('announce').push({text:t,timestamp:Date.now(),expiry:Date.now()+7*86400000}).then(function(){toast('📣 Объявление отправлено!')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})})}

// ====== ANNOUNCE ======
function renderAnnounce(p){p.innerHTML='<div class="section-title" style="font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;">📜 Объявления</div><div class="card" style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;backdrop-filter:blur(8px);"><div class="card-title" style="font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;">➕ Новое объявление</div><textarea id="announceText" placeholder="Текст объявления..." style="width:100%;padding:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;resize:none;height:80px;"></textarea><div style="display:flex;gap:8px;align-items:center;margin-top:8px;"><select id="announceExpiryType" style="flex:1;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;"><option value="forever">Навсегда</option><option value="hours">Часы</option><option value="days">Дни</option></select><input id="announceExpiryValue" type="number" placeholder="Кол-во" value="24" style="flex:1;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;"></div><button class="btn-primary mt-8" id="addAnnounceBtn" style="padding:12px;border-radius:14px;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:100%;">📜 Опубликовать</button></div><div id="announceList">Загрузка...</div>';$('#addAnnounceBtn').addEventListener('click',addAnnounce);loadAnnounces()}
function loadAnnounces(){var el=$('#announceList');if(!el)return;DB.ref('announce').once('value').then(function(s){if(!s.exists()){el.innerHTML='<div class="empty-state" style="text-align:center;padding:24px;color:var(--muted);font-size:14px;">📭 Нет объявлений</div>';return}var items=[];s.forEach(function(c){var a=c.val();if(!a.expiry||Date.now()<a.expiry)items.push({id:c.key,data:a})});items.sort(function(a,b){return b.data.timestamp-a.data.timestamp});if(!items.length){el.innerHTML='<div class="empty-state" style="text-align:center;padding:24px;color:var(--muted);font-size:14px;">📭 Нет объявлений</div>';return}var canDel=App.user.role==='god';el.innerHTML=items.map(function(item){return'<div class="announce-card" style="background:rgba(200,150,0,.12);border:1px solid rgba(200,150,0,.4);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 0 20px rgba(200,150,0,.1);"><div style="font-size:14px;line-height:1.6;color:#ffd700;">📜 '+esc(item.data.text)+'</div><div class="announce-meta" style="font-size:11px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;"><span>'+fmt(item.data.timestamp)+'</span>'+(canDel?'<button class="delAnnounceBtn" data-id="'+item.id+'" style="background:none;color:var(--red);font-size:12px;border:none;cursor:pointer;">🗑 Удалить</button>':'')+'</div></div>'}).join('');$$('.delAnnounceBtn').forEach(function(b){b.addEventListener('click',function(){var id=this.dataset.id;DB.ref('announce/'+id).remove().then(function(){loadAnnounces();toast('🗑 Удалено')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})})})}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}
function addAnnounce(){var t=$('#announceText').value.trim();if(!t){toast('❌ Введите текст',true);return}var type=$('#announceExpiryType').value,val=parseInt($('#announceExpiryValue').value)||24,exp=null;if(type==='hours')exp=Date.now()+val*3600000;else if(type==='days')exp=Date.now()+val*86400000;DB.ref('announce').push({text:t,timestamp:Date.now(),expiry:exp}).then(function(){$('#announceText').value='';loadAnnounces();divine(t);toast('📜 Послание свыше!')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}

// ====== PUNKTS ======
function renderPunkts(p){p.innerHTML='<div class="section-title" style="font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;">📍 Пункты выдачи</div><div class="card" style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;backdrop-filter:blur(8px);"><div class="punkt-form-toggle" id="punktFormToggle" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:12px 14px;background:var(--bg3);border-radius:12px;border:1px solid var(--border);"><span style="font-weight:600;">➕ Добавить пункт</span><span class="arrow" id="punktFormArrow">▼</span></div><div class="punkt-form-body" id="punktFormBody"><div class="field" style="margin-bottom:12px;"><label style="display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;">ID пункта (например 49)</label><input type="text" id="pAddId" placeholder="49" style="width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;"></div><div class="field" style="margin-bottom:12px;"><label style="display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;">Название</label><input type="text" id="pAddName" placeholder="ПВЗ Центр" style="width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;"></div><div class="field" style="margin-bottom:12px;"><label style="display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;">Ставка ₽/ч</label><input type="number" id="pAddRate" placeholder="150" min="0" style="width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;"></div><button class="btn-primary" id="addPunktBtn" style="padding:12px;border-radius:14px;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:100%;">➕ Добавить</button></div></div><div class="punkt-list-wrap"><div id="punktsList">Загрузка...</div></div>';
$('#punktFormToggle').addEventListener('click',function(){var b=$('#punktFormBody'),a=$('#punktFormArrow');b.classList.toggle('open');a.classList.toggle('open')});$('#addPunktBtn').addEventListener('click',addPunkt);loadPunkts()}
function loadPunkts(){var el=$('#punktsList');if(!el)return;DB.ref('punkts').once('value').then(function(s){if(!s.exists()){el.innerHTML='<div class="empty-state" style="text-align:center;padding:24px;color:var(--muted);font-size:14px;">📍 Нет пунктов</div>';return}var items=[];s.forEach(function(c){items.push({id:c.key,data:c.val()})});el.innerHTML=items.map(function(item){return'<div class="card" style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;backdrop-filter:blur(8px);"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:15px;font-weight:700;">📍 '+esc(item.data.name||item.id)+'</div><div class="muted" style="font-size:13px;color:var(--muted);">Ставка: '+(item.data.rate||0)+'₽/ч</div></div><div style="display:flex;gap:6px;"><button class="btn-dark btn-sm editPunktBtn" data-id="'+item.id+'" data-rate="'+(item.data.rate||0)+'" style="padding:8px 14px;font-size:13px;border-radius:10px;width:auto;background:rgba(255,255,255,.08);color:var(--text);">✏️</button><button class="btn-danger btn-sm delPunktBtn" data-id="'+item.id+'" style="padding:8px 14px;font-size:13px;border-radius:10px;width:auto;background:var(--red);color:#fff;">🗑</button></div></div></div>'}).join('');$$('.editPunktBtn').forEach(function(b){b.addEventListener('click',function(){var id=this.dataset.id,cur=parseFloat(this.dataset.rate),r=prompt('Новая ставка ₽/ч:',cur);if(r===null)return;DB.ref('punkts/'+id+'/rate').set(parseFloat(r)||0).then(function(){loadPunkts();toast('✅ Ставка обновлена')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})})});$$('.delPunktBtn').forEach(function(b){b.addEventListener('click',function(){var id=this.dataset.id;if(!confirm('Удалить пункт?'))return;DB.ref('punkts/'+id).remove().then(function(){loadPunkts();toast('🗑 Удалён')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})})})}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}
function addPunkt(){var id=$('#pAddId').value.trim(),name=$('#pAddName').value.trim()||'ПВЗ '+id,rate=parseFloat($('#pAddRate').value)||0;if(!id){toast('❌ Введите ID пункта',true);return}DB.ref('punkts/'+id).set({name:name,rate:rate}).then(function(){loadPunkts();$('#pAddId').value='';$('#pAddName').value='';$('#pAddRate').value='';toast('✅ Пункт добавлен')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}

:pointer;">✕</button>':'<button class="btn-gold openPremiumBtn" data-name="'+esc(item.data.name)+'" style="width:auto;padding:6px 10px;font-size:11px;background:var(--gold);color:#000;border:none;border-radius:10px;cursor:pointer;">🎁</button><button class="btn-purple openPunishBtn" data-name="'+esc(item.data.name)+'" style="width:auto;padding:6px 10px;font-size:11px;background:#9C27B0;color:#fff;border:none;border-radius:10px;cursor:pointer;">⚠️</button><button class="btn-red deleteWorkerBtn" data-key="'+item.key+'" data-name="'+esc(item.data.name)+'" style="width:auto;padding:6px 10px;font-size:11px;background:var(--red);color:#fff;border:none;border-radius:10px;cursor:pointer;">✕</button>')+'</span></div>'}).join('');

// ====== PREMIUM & PUNISH (объединены) ======
function openPremiumPanel(user){App.currentPremiumUser=user;openRewardPanel('premium',user)}
function openPunishPanel(user){if(user==='Костя'){toast('🌌 Создатель — вне иерархии!');return}App.currentPunish=user;openRewardPanel('punish',user)}

function openRewardPanel(type,user){

var backBtnId=isPremium?'premiumBackBtn':'punishBackBtn';

var notifyRef=isPremium?DB.ref('premiums'):DB.ref('punishes');

var labels=isPremium?PREMIUM_TEXTS:PUNISH_TEXTS;

var reasonHtml=isPremium?'':'<input id="punishReason" placeholder="Причина" style="flex:2;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;">';

$('#tabContentContainer').innerHTML=h;

$('#'+addBtnId).addEventListener('click',function(){
var am=parseInt($('#'+amountId).value);
var r=isPremium?'':$('#punishReason').value.trim();
if(!am||isNaN(am)){toast('❌ Введи сумму!',true);return}
if(!isPremium&&!r){toast('❌ Введи причину!',true);return}
var st=getGodStatus(App.godRating);
var texts=labels[st.name]||[(isPremium?'+{sum}₽':'-{sum}₽')];
var msg=randomText(texts,am);
var obj={user:isPremium?App.currentPremiumUser:App.currentPunish,amount:am,timestamp:Date.now()};
if(!isPremium)obj.reason=r;
dataRef.push(obj).then(function(){
return DB.ref('notifications').push({user:isPremium?App.currentPremiumUser:App.currentPunish,text:msg,timestamp:Date.now()});
}).then(function(){
App.godRating+=godDelta;if(App.godRating<0)App.godRating=0;updateGodUI();
$('#'+amountId).value='';if(!isPremium)$('#punishReason').value='';
loadRewards(type,listId);
toast((isPremium?'✅ Премия':'💀 Штраф')+' '+am+'₽ для '+user);
}).catch(function(e){toast('❌ Ошибка: '+e.message,true)});
});

$('#'+backBtnId).addEventListener('click',function(){renderTabs();var a=document.querySelector('#tabsContainer .active');if(a)renderTab(a.dataset.tab)});

}

function loadRewards(type,listId){
var user=type==='premium'?App.currentPremiumUser:App.currentPunish;
if(!user)return;
var ref=type==='premium'?DB.ref('premiums'):DB.ref('punishes');
ref.orderByChild('user').equalTo(user).on('value',function(s){
var el=$('#'+listId);if(!el)return;var items=[];s.forEach(function(c){items.push({key:c.key,data:c.val()})});
el.innerHTML=items.length?items.map(function(item){return'<div class="punish-row" style="display:flex;justify-content:space-between;align-items:center;padding:6px;font-size:13px;border-bottom:1px solid var(--border);"><span>'+item.data.amount+' ₽'+(type==='punish'?' — '+esc(item.data.reason):'')+'</span><button class="delRewardBtn" data-id="'+item.key+'" data-type="'+type+'" style="width:auto;padding:4px 8px;font-size:10px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;">✕</button></div>'}).join(''):'<p style="color:var(--muted);font-size:13px;">Нет '+(type==='premium'?'премий':'штрафов')+'</p>';

}

gin-bottom:4px;font-size:13px;font-weight:600;"></div><div class="calendar" id="calcCalendar" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:12px;background:rgba(22,33,62,.5);border-radius:10px;padding:6px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;"></div><div id="shiftDetail" style="margin-top:8px;"></div></div></div>';loadCalcUsers();$('#addShiftSalaryBtn').addEventListener('click',addShiftSalary);$('#calcZPBtn').addEventListener('click',calcZP);$('#markPaidBtn').addEventListener('click',markPaid)}
function loadCalcUsers(){DB.ref('users').once('value').then(function(s){var sel=$('#calcUser');sel.innerHTML='<option value="">— Выбери —</option>';s.forEach(function(c){var u=c.val();if(u.name&&u.name!=='Костя'&&u.name!=='Игорь')sel.innerHTML+='<option value="'+esc(u.name)+'">'+esc(u.name)+'</option>'});sel.addEventListener('change',function(){var u=this.value,b=$('#calcBlock');b.style.display=u?'block':'none';if(u){var n=new Date(),f=new Date(n);f.setDate(n.getDate()-14);$('#calcFrom').value=f.toISOString().split('T')[0];$('#calcTo').value=n.toISOString().split('T')[0];$('#zpResult').style.display='none';loadShiftsCalc(u)}})}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}
function loadShiftsCalc(user){DB.ref('shifts').orderByChild('user').equalTo(user).once('value').then(function(s){App.allShifts=[];s.forEach(function(c){var x=c.val();x._id=c.key;App.allShifts.push(x)});App.allShifts.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp)});renderCalendarCalc()}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}
function renderCalendarCalc(){var n=new Date(),y=n.getFullYear(),m=n.getMonth(),dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,0).getDay();$('#calHeader').innerHTML='<b>'+n.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})+'</b>';var days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'],h='';for(var i=0;i<7;i++)h+='<div class="header" style="font-weight:bold;background:rgba(51,51,51,.7);padding:6px;border-radius:4px;">'+days[i]+'</div>';for(var i=0;i<fd;i++)h+='<div style="padding:6px;border-radius:4px;"></div>';var sd={};App.allShifts.forEach(function(s){sd[s.date]=s});var ts=n.toLocaleDateString('ru-RU');for(var d=1;d<=dim;d++){var ds=new Date(y,m,d).toLocaleDateString('ru-RU'),cl='';if(sd[ds])cl='shift-day';if(ds===ts)cl+=' today';h+='<div class="'+cl+'" data-date="'+ds+'" style="padding:6px;border-radius:4px;cursor:pointer;'+(cl.indexOf('shift-day')>=0?'background:#4CAF50;color:#fff;font-weight:bold;':'')+(cl.indexOf('today')>=0?'border:2px solid #2196F3;':'')+'">'+d+'</div>'}document.getElementById('calcCalendar').innerHTML=h;$$('#calcCalendar .shift-day, #calcCalendar .today').forEach(function(el){if(el.dataset.date){el.addEventListener('click',function(){showShiftDetail(this.dataset.date)})}})}
function showShiftDetail(dateStr){var shifts=App.allShifts.filter(function(s){return s.date===dateStr}),h='<b>'+dateStr+'</b><br>';shifts.forEach(function(s){h+='<div class="shift-edit-row" style="display:flex;gap:4px;align-items:center;margin:4px 0;flex-wrap:wrap;"><input id="ed_'+s._id+'_tf" value="'+esc(s.timeFrom)+'" style="flex:1;padding:8px;font-size:13px;min-width:40px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--text);">–<input id="ed_'+s._id+'_tt" value="'+esc(s.timeTo)+'" style="flex:1;padding:8px;font-size:13px;min-width:40px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--text);">Товаров: <input id="ed_'+s._id+'_tv" type="number" value="'+s.tovar+'" style="flex:1;padding:8px;font-size:13px;min-width:60px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--text);"><button class="editShiftCalcBtn" data-id="'+s._id+'" style="width:auto;padding:8px 12px;font-size:12px;background:#2196F3;color:#fff;border:none;border-radius:8px;cursor:pointer;">💾</button><button class="delShiftCalcBtn" data-id="'+s._id+'" style="width:auto;padding:8px 12px;font-size:12px;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;">✕</button></div>'});$('#shiftDetail').innerHTML=h;$$('.editShiftCalcBtn').forEach(function(b){b.addEventListener('click',function(){var id=this.dataset.id,tf=$('#ed_'+id+'_tf').value,tt=$('#ed_'+id+'_tt').value,tv=parseInt($('#ed_'+id+'_tv').value)||0,hr=parseInt(tt)-parseInt(tf);if(isNaN(hr)){toast('❌ Неверный формат времени',true);return}DB.ref('shifts/'+id).update({timeFrom:tf,timeTo:tt,hours:hr,tovar:tv}).then(function(){toast('✅ Обновлено');loadShiftsCalc($('#calcUser').value)}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})})});$$('.delShiftCalcBtn').forEach(function(b){b.addEventListener('click',function(){if(!confirm('Удалить смену?'))return;DB.ref('shifts/'+this.dataset.id).remove().then(function(){loadShiftsCalc($('#calcUser').value)}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})})})}
function addShiftSalary(){var u=$('#calcUser').value;if(!u){toast('❌ Выбери сотрудника!',true);return}var d=prompt('Дата (ДД.ММ.ГГГГ):',new Date().toLocaleDateString('ru-RU'));if(!d)return;var tf=prompt('Время начала (ч):','9'),tt=prompt('Время окончания (ч):','21'),tv=parseInt(prompt('Товаров:','0'))||0;if(!d||!tf||!tt)return;var p=d.split('.'),dt=new Date(p[2],p[1]-1,p[0]);if(isNaN(dt)){toast('❌ Неверный формат даты!',true);return}DB.ref('shifts/'+u+'_'+Date.now()).set({user:u,punkt:'49',date:d,timeFrom:tf,timeTo:tt,hours:parseInt(tt)-parseInt(tf),tovar:tv,paid:false,timestamp:dt.toISOString()}).then(function(){toast('✅ Смена добавлена!');loadShiftsCalc(u)}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}
function calcZP(){var u=$('#calcUser').value,from=new Date($('#calcFrom').value),to=new Date($('#calcTo').value);to.setHours(23,59,59);if(!u||isNaN(from)||isNaN(to)){toast('❌ Заполни период!',true);return}DB.ref('punkts').once('value').then(function(pk){var rates={};pk.forEach(function(c){rates[c.key]=c.val().rate||0});return DB.ref('users/'+u).once('value').then(function(us){var bonus=us.exists()?us.val().bonus||0:0;return DB.ref('punishes').orderByChild('user').equalTo(u).once('value').then(function(pn){var totalPunish=0;pn.forEach(function(c){var p=c.val();if(new Date(p.timestamp)>=from&&new Date(p.timestamp)<=to)totalPunish+=p.amount||0});return DB.ref('premiums').orderByChild('user').equalTo(u).once('value').then(function(pr){var totalPremium=0;pr.forEach(function(c){var p=c.val();if(new Date(p.timestamp)>=from&&new Date(p.timestamp)<=to)totalPremium+=p.amount||0});var shifts=App.allShifts.filter(function(s){var t=new Date(s.timestamp);return t>=from&&t<=to&&!s.paid}),th=0,tt=0,tz=0;shifts.forEach(function(s){var h=s.hours||0,tv=s.tovar||0;th+=h;tt+=tv;tz+=h*(rates[s.punkt]||0)+tv+bonus});tz+=totalPremium;var res=$('#zpResult');res.style.display='block';res.innerHTML='📊 <b>'+esc(u)+'</b>\n'+from.toLocaleDateString('ru-RU')+' – '+to.toLocaleDateString('ru-RU')+'\n\nЧасов: '+th+'\nТоваров: '+tt+'\nЗП: '+(tz-totalPremium)+' ₽\nПремии: +'+totalPremium+' ₽\nШтрафы: -'+totalPunish+' ₽\n<b>Итого: '+(tz-totalPunish)+' ₽</b>';App.lastCalc={user:u,from:from.toISOString(),to:to.toISOString(),shifts:shifts.map(function(s){return s._id}),total:tz-totalPunish}})})})})}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}
function markPaid(){if(!App.lastCalc||!App.lastCalc.shifts||!App.lastCalc.shifts.length){toast('❌ Сначала нажми "Посчитать"!',true);return}if(!confirm('Оплачено?\n'+App.lastCalc.total+' ₽'))return;DB.ref('payments').push({user:App.lastCalc.user,dateFrom:App.lastCalc.from,dateTo:App.lastCalc.to,total:App.lastCalc.total,timestamp:Date.now()}).then(function(){var ps=[];App.lastCalc.shifts.forEach(function(id){ps.push(DB.ref('shifts/'+id+'/paid').set(true))});return Promise.all(ps)}).then(function(){toast('✅ Оплачено '+App.lastCalc.total+'₽');$('#zpResult').style.display='none';App.lastCalc=null}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}

function loadPunktsSettings(){DB.ref('punkts').once('value').then(function(s){var sel=$('#setPunkt');sel.innerHTML='<option value="">Не менять</option>';s.forEach(function(c){sel.innerHTML+='<option value="'+esc(c.key)+'">'+esc(c.key)+'</option>'})}).catch(function(){})}
function saveSettings(){var nn=$('#setName').value.trim(),np=$('#setPass').value.trim(),npu=$('#setPunkt').value,nvk=$('#setVk').value.trim(),ok=App.user.name,up={};if(nn&&nn!==App.user.name){up['users/'+nn]={name:nn,punkt:npu||App.user.punkt,password:App.user.password,bonus:0,avatar:App.user.avatar||'',vkId:nvk||App.user.vkId||''};if(np)up['users/'+nn+'/password']=np;up['users/'+ok]=null;App.user.name=nn;if(npu)App.user.punkt=npu;if(nvk)App.user.vkId=nvk}else{var uu={name:App.user.name,punkt:App.user.punkt,avatar:App.user.avatar||'',vkId:App.user.vkId||''};if(np)uu.password=np;if(nvk)uu.vkId=nvk;if(npu)uu.punkt=npu;up['users/'+ok]=uu;if(npu)App.user.punkt=npu;if(nvk)App.user.vkId=nvk}if(Object.keys(up).length===0){closeSettings();return}DB.ref().update(up).then(function(){if(np)App.user.password=np;if(nvk)App.user.vkId=nvk;localStorage.setItem('ozon_session',JSON.stringify({name:App.user.name,role:App.user.role,key:App.user.key||ok}));updateProfile();closeSettings();buildCarousel();toast('✅ Настройки сохранены')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}

// ====== STICKERS ======
function toggleStickerPanel(e){if(e)e.stopPropagation();var p=$('#stickerPanel');if(p.style.display==='flex')p.style.display='none';else{p.style.display='flex';renderStickerUI()}}
function getAccessiblePacks(){if(!App.user)return[];var a=[];for(var id in App.globalStickerPacks){var p=App.globalStickerPacks[id];if(p.creator===App.user.name||App.user.role==='creator'||App.user.role==='god'||(p.allowed_users&&p.allowed_users[App.user.name]))a.push({id:id,pack:p})}return a}
function renderStickerUI(){var tc=$('#stickerTabs'),cc=$('#stickerContent');if(!tc||!cc)return;var packs=getAccessiblePacks(),th='<button class="st-tab '+(App.currentStickerTab==='emoji'?'active':'')+'" data-tab="emoji" style="width:36px;height:36px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.6;transition:.2s;flex-shrink:0;">😀</button>';packs.forEach(function(p){th+='<button class="st-tab '+(App.currentStickerTab===p.id?'active':'')+'" data-tab="'+p.id+'" style="width:36px;height:36px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.6;transition:.2s;flex-shrink:0;"><img src="'+esc(p.pack.icon||'')+'" style="width:24px;height:24px;object-fit:contain;"></button>'});tc.innerHTML=th;$$('.st-tab').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();App.currentStickerTab=this.dataset.tab;renderStickerUI()})});var ch='';if(App.currentStickerTab==='emoji'){BASE_EMOJIS.forEach(function(e){ch+='<div class="emoji-item" data-emoji="'+e+'" style="width:42px;height:42px;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;">'+e+'</div>'})}else{var sp=packs.find(function(p){return p.id===App.currentStickerTab});if(sp&&sp.pack.stickers){for(var sid in sp.pack.stickers){var st=sp.pack.stickers[sid];ch+='<div class="st-item" data-img="'+esc(st.img)+'" style="width:70px;height:70px;cursor:pointer;transition:transform .1s;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.02);"><img src="'+esc(st.img)+'" style="max-width:100%;max-height:100%;object-fit:contain;" title="'+esc(st.emoji)+'"></div>'}}else{ch+='<div style="color:#aaa;text-align:center;width:100%;margin-top:20px;">Нет стикеров</div>'}}cc.innerHTML=ch;$$('.emoji-item').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();var em=this.dataset.emoji,el=$('#chatMsgInput');el.value+=em;el.focus()})});$$('.st-item').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();var img=this.dataset.img;if(!App.user)return;var ref=App.privateChatWith?getPrivRef():DB.ref('chat');ref.push({user:(App.user.role==='god'?'👑 ':'🌌 ')+App.user.name,text:'',sticker:img,timestamp:Date.now(),role:App.user.role,likes:{}}).then(function(){$('#stickerPanel').style.display='none'}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})})})}
function openStickerManager(){$('#settingsPanel').style.display='none';$('#stickerManagerCard').style.display='block';renderStickerManagerList()}
function closeStickerManager(){$('#stickerManagerCard').style.display='none';$('#settingsPanel').style.display='flex'}
function renderStickerManagerList(){var c=$('#smPackList');if(!c)return;var packs=getAccessiblePacks();if(!packs.length){c.innerHTML='<p style="color:#aaa;text-align:center;">У вас пока нет стикерпаков.</p>';return}var h='';packs.forEach(function(p){var cnt=p.pack.stickers?Object.keys(p.pack.stickers).length:0;h+='<div class="pack-list-item" style="background:rgba(0,0,0,.3);padding:10px;border-radius:8px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;"><img class="pack-icon" src="'+esc(p.pack.icon)+'" style="width:40px;height:40px;object-fit:contain;border-radius:6px;"><div style="flex:1;"><b>'+esc(p.pack.name)+'</b><br><small style="color:#aaa;">'+cnt+' стикеров</small></div><button class="btn-blue" data-id="'+p.id+'" style="width:auto;padding:8px;border-radius:10px;font-size:13px;background:#2196F3;color:#fff;border:none;cursor:pointer;">✏️ Редакт.</button></div>'});c.innerHTML=h;$$('.pack-list-item .btn-blue').forEach(function(b){b.addEventListener('click',function(){openPackEditor(this.dataset.id)})})}
function createNewPack(){var n=$('#newPackName').value.trim(),f=$('#newPackIcon');if(!n||!f.files[0]){toast('Введите название и выберите иконку (PNG)!',true);return}var r=new FileReader();r.onload=function(e){DB.ref('sticker_packs').push({name:n,creator:App.user.name,icon:e.target.result,allowed_users:{},timestamp:Date.now()}).then(function(){$('#newPackName').value='';f.value='';toast('✅ Пак создан!');renderStickerManagerList()}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})};r.readAsDataURL(f.files[0])}
function openPackEditor(id){App.activePackIdForEdit=id;$('#stickerManagerCard').style.display='none';$('#packEditorCard').style.display='block';var sel=$('#peNewStickerEmoji');sel.innerHTML='';BASE_EMOJIS.forEach(function(e){sel.innerHTML+='<option value="'+e+'">'+e+'</option>'});renderPackEditor()}
function closePackEditor(){App.activePackIdForEdit=null;$('#packEditorCard').style.display='none';$('#stickerManagerCard').style.display='block'}
function renderPackEditor(){if(!App.activePackIdForEdit)return;var pack=App.globalStickerPacks[App.activePackIdForEdit];if(!pack)return;$('#peTitle').innerText='Редактируем: '+pack.name;var ul=$('#peUserList'),h='';for(var un in App.allUserData){if(un===App.user.name)continue;var allowed=pack.allowed_users&&pack.allowed_users[un];h+='<div class="user-cb-item"><input type="checkbox" id="cb_'+un+'" '+(allowed?'checked':'')+' data-user="'+esc(un)+'"><label for="cb_'+un+'">'+esc(un)+'</label></div>'}ul.innerHTML=h;$$('#peUserList input[type="checkbox"]').forEach(function(cb){cb.addEventListener('change',function(){var user=this.dataset.user;if(this.checked){DB.ref('sticker_packs/'+App.activePackIdForEdit+'/allowed_users/'+user).set(true).catch(function(){})}else{DB.ref('sticker_packs/'+App.activePackIdForEdit+'/allowed_users/'+user).remove().catch(function(){})}})});var sl=$('#peStickersList'),hs='';if(pack.stickers){for(var sid in pack.stickers){var st=pack.stickers[sid];hs+='<div style="position:relative;width:60px;height:60px;background:rgba(255,255,255,.05);border-radius:8px;display:flex;align-items:center;justify-content:center;"><img src="'+esc(st.img)+'" style="max-width:100%;max-height:100%;object-fit:contain;"><div style="position:absolute;bottom:-5px;right:-5px;background:#000;border-radius:50%;font-size:12px;border:1px solid #444;width:20px;height:20px;text-align:center;">'+esc(st.emoji)+'</div></div>'}}else{hs='<small style="color:#aaa;">Пока пусто.</small>'}sl.innerHTML=hs}
function uploadStickerToPack(){if(!App.activePackIdForEdit)return;var f=$('#peNewStickerImg'),emoji=$('#peNewStickerEmoji').value;if(!f.files[0]){toast('Выберите PNG файл стикера!',true);return}var r=new FileReader();r.onload=function(e){DB.ref('sticker_packs/'+App.activePackIdForEdit+'/stickers').push({img:e.target.result,emoji:emoji,timestamp:Date.now()}).then(function(){f.value='';toast('✅ Стикер добавлен!');renderPackEditor()}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})};r.readAsDataURL(f.files[0])}

// ====== THOUGHT MODAL ======
function openThoughtModal(){$('#thoughtModal').style.display='flex'}
function closeThoughtModal(){$('#thoughtModal').style.display='none';$('#thoughtText').value=''}
function toggleExpiryInput(){var t=$('#thoughtExpiryType').value;$('#thoughtExpiryValue').style.display=t==='forever'?'none':'block'}
function sendThought(){var t=$('#thoughtText').value.trim();if(!t){toast('❌ Введите мысль',true);return}var type=$('#thoughtExpiryType').value,val=parseInt($('#thoughtExpiryValue').value)||24,exp=null;if(type==='hours')exp=Date.now()+val*3600000;else if(type==='days')exp=Date.now()+val*86400000;DB.ref('creatorThought').set({text:t,expiry:exp,timestamp:Date.now()}).then(function(){$('#thoughtText').value='';closeThoughtModal();cosmic(t);toast('💭 Мысль отправлена!')}).catch(function(e){toast('❌ Ошибка: '+e.message,true)})}

// ====== FIREBASE LISTENERS ======
function setupListeners(){
DB.ref('godSettings').on('value',function(s){App.godData=s.exists()?s.val():null;if(App.user)buildCarousel()});
DB.ref('users').on('value',function(s){App.allUsers={};App.allUserData={};s.forEach(function(c){App.allUsers[c.key]=c.val().avatar||'';App.allUserData[c.key]=c.val()});if(App.user)buildCarousel()});
DB.ref('activeShifts').on('value',function(s){App.activeShifts={};s.forEach(function(c){if(c.val()&&c.val().active)App.activeShifts[c.key]=true});if(App.user)buildCarousel()});
DB.ref('shifts').on('value',function(s){App.allMyShifts=[];s.forEach(function(c){var x=c.val();x._id=c.key;App.allMyShifts.push(x)})});
DB.ref('sticker_packs').on('value',function(s){App.globalStickerPacks=s.val()||{};if(App.user)renderStickerUI()});
DB.ref('chat').limitToLast(1).on('child_added',function(s){if(App.chatOpened)return;var m=s.val();if(!m||!App.user)return;if(m.timestamp<=App.lastChatTimestamp)return;var isMine=m.user==='🌌 '+App.user.name||m.user==='👑 '+App.user.name||m.user===App.user.name||m.user==='📢 '+App.user.name;if(isMine)return;if(App.notifiedKeys[s.key])return;App.notifiedKeys[s.key]=true;App.lastChatTimestamp=Math.max(App.lastChatTimestamp,m.timestamp||0);App.unreadCount++;updateBadge();if('Notification' in window&&Notification.permission==='granted'){try{new Notification('💬 Чат',{body:(m.user||'?').replace('🌌 ','').replace('👑 ','').replace('📢 ','')+': '+(m.text||(m.sticker?'📦 Стикер':'📷 Фото')),icon:'https://raw.githubusercontent.com/painofkili/ozon/main/на%20смену.png'})}catch(e){}}})
}

// ====== LOGOUT ======
function logout(){if(!confirm('Выйти из аккаунта?'))return;if(App.chatListener){App.chatListener.off();App.chatListener=null}DB.ref('godSettings').off();DB.ref('users').off();DB.ref('activeShifts').off();DB.ref('shifts').off();DB.ref('sticker_packs').off();DB.ref('chat').off();App.user=null;App.chatOpened=false;if(App.shiftTimer)clearInterval(App.shiftTimer);localStorage.removeItem('ozon_session');$('#app').style.display='none';$('#login').style.display='flex';document.body.className=''}

// ====== DOM EVENTS ======
document.addEventListener('DOMContentLoaded',function(){
$('#chatHeader').addEventListener('click',toggleChat);
$('#chatBackBtn').addEventListener('click',function(e){e.stopPropagation();switchGlobal()});
$('#chatMsgInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendMsg()}});
$('#sendMsgBtn').addEventListener('click',sendMsg);
$('#chatPhotoBtn').addEventListener('click',function(){$('#chatPhotoInput').click()});
$('#chatPhotoInput').addEventListener('change',sendPhoto);
$('#stickerToggleBtn').addEventListener('click',toggleStickerPanel);
document.addEventListener('click',function(e){var sp=$('#stickerPanel');if(sp&&sp.style.display==='flex'&&!e.target.closest('#stickerPanel')&&!e.target.closest('.sticker-toggle'))sp.style.display='none'});
$('#sidebarToggleBtn').addEventListener('click',toggleSidebar);
$('#sidebarCloseBtn').addEventListener('click',toggleSidebar);
$('#mpCloseBtn').addEventListener('click',closeMini);
$('#mpChatBtn').addEventListener('click',openPrivateChat);
document.addEventListener('click',function(e){var mp=$('#miniProfile');if(mp&&mp.classList.contains('show')&&!e.target.closest('#miniProfile')&&!e.target.closest('.avatar-item')&&!e.target.closest('.avatar-mini')&&!e.target.closest('.author')&&!e.target.closest('#sidebarToggleBtn'))closeMini()});
$('#settingsBtn').addEventListener('click',openSettings);
$('#settingsCloseBtn').addEventListener('click',closeSettings);
$('#settingsSaveBtn').addEventListener('click',saveSettings);
$('#settingsLogoutBtn').addEventListener('click',function(){closeSettings();setTimeout(logout,100)});
$$('.settings-tab').forEach(function(b){b.addEventListener('click',function(){switchSettingsTab(this.dataset.tab,this)})});
$('#setAvatarFile').addEventListener('change',handleAvatarUpload);
$('#avatarSaveBtn').addEventListener('click',saveAvatar);
$('#avatarCloseBtn').addEventListener('click',closeSettings);
$$('.style-btn').forEach(function(b){b.addEventListener('click',function(){var s=this.dataset.style;App.avatarSettings.style=s;$$('.style-btn').forEach(function(x){x.classList.remove('active')});this.classList.add('active');updatePreview()})});
['speed','size','glow','count'].forEach(function(p){var el=$('#set'+p.charAt(0).toUpperCase()+p.slice(1));if(!el)return;el.addEventListener('input',function(){var v=parseFloat(this.value);App.avatarSettings[p]=v;var valEl=$('#set'+p.charAt(0).toUpperCase()+p.slice(1)+'Val');if(valEl){if(p==='speed'||p==='size')valEl.textContent=v.toFixed(1)+'x';else if(p==='glow')valEl.textContent=v+'px';else valEl.textContent=v}updatePreview()})});
$('#setColor1').addEventListener('input',function(){App.avatarSettings.color1=this.value;$('#setColor1Val').textContent=this.value;updatePreview()});
$('#setColor2').addEventListener('input',function(){App.avatarSettings.color2=this.value;$('#setColor2Val').textContent=this.value;updatePreview()});
$('#setRingColor').addEventListener('input',function(){App.avatarSettings.ringColor=this.value;$('#setRingColorVal').textContent=this.value;updatePreview()});
$('#setRingThickness').addEventListener('change',function(){App.avatarSettings.ringThickness=this.value;updatePreview()});
$('#createPackBtn').addEventListener('click',createNewPack);
$('#closeStickerManagerBtn').addEventListener('click',closeStickerManager);
$('#closePackEditorBtn').addEventListener('click',closePackEditor);
$('#uploadStickerBtn').addEventListener('click',uploadStickerToPack);
$('#thoughtCloseBtn').addEventListener('click',closeThoughtModal);
$('#thoughtSendBtn').addEventListener('click',sendThought);
$('#thoughtExpiryType').addEventListener('change',toggleExpiryInput);
});

setupListeners();
if('Notification' in window && Notification.permission==='default')Notification.requestPermission();

})();
</script>
</body>
