<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow: hidden; height: 100vh; width: 100vw; }
body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; color: #eee; font-size: 16px; background: #0a0a1a; display: flex; flex-direction: column; }

/* ====== WEBGL ФОН ====== */
#bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1000; display: block; }

/* ====== ТЕМЫ ====== */
body.theme-creator { --accent: #7c3aed; --accent2: #00d4ff; --gold: #f5c518; }
body.theme-god { --accent: #b8860b; --accent2: #ffd700; --gold: #ffd700; }
body.theme-manager { --accent: #7c3aed; --accent2: #a855f7; --gold: #f5c518; }
:root { --bg2: rgba(20,20,50,0.85); --bg3: rgba(30,30,60,0.7); --border: rgba(100,80,220,0.25); --text: #e8e8ff; --muted: #888; --green: #22c55e; --red: #ef4444; }

.app-container { display: flex; width: 100%; height: 100vh; position: relative; z-index: 1; justify-content: center; overflow: hidden; }
.main-content { width: 100%; max-width: 680px; padding: 12px 16px; display: flex; flex-direction: column; padding-bottom: 70px; height: 100%; }
.profile-row, .tabs, .tab-content, .chat-header-bar { flex-shrink: 0; }

.profile-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; padding: 8px 0; }
.creator-badge { font-size: 12px; font-weight: bold; padding: 4px 10px; border-radius: 12px; background: linear-gradient(135deg, var(--gold), var(--accent)); color: #fff; display: inline-block; }
.god-badge { background: linear-gradient(135deg, #FFD700, #FF4500); }
.manager-badge { background: #2d6a4f; color: #95d5b2; }
.creator-name { background: linear-gradient(135deg, var(--gold), var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
.god-name { background: linear-gradient(135deg, #FFD700, #FF8C00, #FF4500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
.manager-name { color: #eee; font-weight: bold; }

.tab-content { display: none; width: 100%; flex-shrink: 0; }
.tab-content.active-tab { display: block; }

.card, .stat-card { background: var(--bg2); padding: 14px; border-radius: 14px; margin: 6px 0; backdrop-filter: blur(10px); border: 1px solid var(--border); overflow: visible; }
input, select, textarea { width: 100%; padding: 12px 14px; font-size: 15px; margin: 6px 0; border-radius: 12px; border: 1px solid #444; background: rgba(15,15,30,0.8); color: #fff; outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
button { border: none; font-weight: bold; cursor: pointer; border-radius: 12px; transition: filter 0.2s; }
button:hover { filter: brightness(1.1); }

.btn-green { background: #4CAF50; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-red { background: #e94560; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-gray { background: #444; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--accent)); color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 10px; width: auto; }

.tabs { display: flex; gap: 6px; margin: 10px 0; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tabs button { width: 44px; height: 44px; display: flex; align-items: center; gap: 0.5rem; overflow: hidden; border-radius: 999px; transition: width .3s ease, background .3s ease; background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid transparent; cursor: pointer; padding: 0 12px; font-size: 13px; white-space: nowrap; flex-shrink: 0; }
.tabs button:hover { width: 110px; background: rgba(255,255,255,0.15); color: #fff; }
.tabs button.active { background: linear-gradient(135deg, var(--gold), var(--accent)); color: #fff; width: 110px; box-shadow: 0 4px 12px rgba(138,43,226,0.3); border-color: rgba(255,255,255,0.2); }
.tabs button .menu-icon { font-size: 16px; flex-shrink: 0; }
.tabs button .menu-label { opacity: 0; max-width: 0; transform: translateX(-6px); transition: all 0.2s ease; }
.tabs button:hover .menu-label, .tabs button.active .menu-label { opacity: 1; max-width: 80px; transform: translateX(0); }

/* ====== ЧАТ ====== */
.chat-section { margin: 8px 0 0 0; display: flex; flex-direction: column; flex: 1; min-height: 0; }
.chat-header-bar { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 14px; background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 6px; font-size: 14px; transition: background 0.2s; }
.chat-header-bar:hover { background: var(--bg3); }
.chat-icon { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; box-shadow: 0 0 10px rgba(138,43,226,0.4); }
.chat-label { flex: 1; font-weight: bold; background: linear-gradient(135deg, var(--gold), var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.chat-arrow { color: #aaa; font-size: 12px; transition: transform 0.3s; }
.chat-arrow.open { transform: rotate(180deg); }
.chat-badge { background: #e94560; color: #fff; border-radius: 10px; font-size: 11px; padding: 2px 6px; font-weight: bold; }
.chat-back-btn { background: none; border: 1px solid var(--border); color: #ccc; padding: 4px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; display: none; }

#chat { flex: 1; overflow-y: auto; padding: 10px; border-radius: 14px; background: rgba(15,15,30,0.6); font-size: 13px; border: 1px solid var(--border); transition: padding 0.3s ease, flex 0.3s ease; margin-bottom: 0; scrollbar-width: thin; scrollbar-color: rgba(138,43,226,0.5) transparent; }
#chat.hidden { flex: 0; padding: 0 !important; margin-bottom: 0 !important; overflow: hidden; opacity: 0; border: none; min-height: 0; }
#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-thumb { background: rgba(138,43,226,0.5); border-radius: 4px; }

.chat-bubble-group { margin: 2px 0; display: flex; flex-direction: column; max-width: 100%; }
.chat-bubble-group.mine { align-items: flex-end; }
.chat-bubble-group.other { align-items: flex-start; }
.chat-bubble { background: rgba(30,30,50,0.9); padding: 8px 12px; border-radius: 14px; margin: 1px 0; display: inline-block; max-width: 82%; word-break: break-word; border: 1px solid rgba(255,255,255,0.05); position: relative; }
.chat-bubble.mine { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); }
.chat-msg-creator { background: linear-gradient(135deg, rgba(245,197,24,0.15), rgba(138,43,226,0.2)); border: 1px solid rgba(138,43,226,0.4); padding: 8px 12px; border-radius: 14px; margin: 1px 0; display: inline-block; max-width: 82%; position: relative; }
.chat-msg-god { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,69,0,0.2)); border: 1px solid rgba(255,215,0,0.4); padding: 8px 12px; border-radius: 14px; margin: 1px 0; display: inline-block; max-width: 82%; position: relative; }
.chat-msg-creator .author, .chat-msg-god .author { font-weight: bold; }
.chat-msg-creator .author { background: linear-gradient(135deg, var(--gold), var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.chat-msg-god .author { background: linear-gradient(135deg, #FFD700, #FF8C00, #FF4500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.msg-menu-btn { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.5); color: #ccc; border: none; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 3; }
.chat-bubble:hover .msg-menu-btn { opacity: 1; }
.msg-menu-btn:hover { background: rgba(138,43,226,0.7); color: #fff; }
.msg-dropdown { position: absolute; top: 28px; right: 0; background: rgba(15,15,30,0.98); border-radius: 12px; padding: 4px 6px; display: none; gap: 4px; z-index: 10; border: 1px solid var(--border); box-shadow: 0 6px 20px rgba(0,0,0,0.8); }
.msg-dropdown.show { display: flex; }
.msg-dropdown button { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.06); color: #fff; }
.msg-dropdown button:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); }
#chat .chat-img { max-width: 220px; max-height: 160px; border-radius: 10px; margin: 5px 0; cursor: pointer; object-fit: cover; }
#chat .thumb { width: 75px; height: 75px; object-fit: cover; border-radius: 8px; cursor: pointer; margin: 3px; display: inline-block; }
#chat .photo-pack { display: flex; gap: 4px; flex-wrap: wrap; margin: 5px 0; }
.like-indicator { font-size: 11px; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 2px 7px; display: none; margin-top: 3px; }
.like-indicator.has-likes { display: inline-block; }

.avatar-mini { width: 28px !important; height: 28px !important; border-radius: 50%; object-fit: cover; margin-right: 6px; vertical-align: middle; cursor: pointer; flex-shrink: 0; }
.avatar-mini-creator { border: 2px solid var(--accent); }
.avatar-mini-god { border: 2px solid #FFD700; }

.toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; pointer-events: none; display: flex; flex-direction: column; gap: 8px; }
.toast-msg { padding: 12px 20px; border-radius: 12px; background: rgba(20,20,35,0.95); border: 1px solid var(--accent); color: #fff; font-size: 14px; font-weight: bold; box-shadow: 0 5px 20px rgba(0,0,0,0.6); transform: translateY(-20px); opacity: 0; transition: all 0.3s; text-align: center; backdrop-filter: blur(5px); }
.toast-msg.error { border-color: #ff1744; }
.toast-msg.show { transform: translateY(0); opacity: 1; }

.chat-input-bar { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 680px; background: rgba(10,10,26,0.95); backdrop-filter: blur(15px); padding: 8px 16px 16px 16px; display: flex; gap: 8px; align-items: center; z-index: 100; border-top: 1px solid var(--border); }

.chat-input-row { display: flex; align-items: center; gap: 8px; padding: 4px 8px 4px 0; background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); flex: 1; }
.chat-input { flex: 1; padding: 10px 14px; border-radius: 20px; background: transparent; border: none; color: var(--text); font-size: 14px; outline: none; min-height: 36px; }
.chat-emoji-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.06); font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: none; color: var(--muted); cursor: pointer; transition: background 0.2s; }
.chat-emoji-btn:hover { background: rgba(255,255,255,0.12); }
.chat-send { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: none; cursor: pointer; transition: filter 0.2s; }
.chat-send:hover { filter: brightness(1.1); }

.sticker-picker { display: none; flex-wrap: wrap; gap: 6px; padding: 8px; border-top: 1px solid var(--border); max-height: 120px; overflow-y: auto; background: var(--bg2); border-radius: 0 0 12px 12px; }
.sticker-picker.open { display: flex; }
.sticker-opt { font-size: 28px; cursor: pointer; padding: 4px; border-radius: 8px; transition: transform 0.15s; }
.sticker-opt:hover { transform: scale(1.2); }

/* ====== САЙДБАР ====== */
.avatar-carousel { width: 110px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; position: fixed; top: 0; right: -130px; height: 100vh; padding: 50px 0 20px 0; z-index: 1000; backdrop-filter: blur(15px); transition: right 0.3s; box-shadow: -10px 0 30px rgba(0,0,0,0.7); }
.avatar-carousel.open { right: 0; }
.avatar-carousel-inner { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; overflow-y: auto; height: 100%; padding: 10px 0; scrollbar-width: none; }
.avatar-carousel-inner::-webkit-scrollbar { display: none; }

.sidebar-close-btn { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.sidebar-close-btn:hover { background: #e94560; }
.btn-sidebar-toggle { position: fixed; right: 0; top: 50%; transform: translateY(-50%); width: 40px; height: 60px; background: rgba(138,43,226,0.7); border: 1px solid rgba(255,255,255,0.2); border-right: none; border-radius: 12px 0 0 12px; color: white; font-size: 18px; cursor: pointer; z-index: 999; display: flex; align-items: center; justify-content: center; box-shadow: -4px 0 15px rgba(138,43,226,0.3); transition: all 0.2s; backdrop-filter: blur(5px); }
.btn-sidebar-toggle:hover { background: rgba(138,43,226,1); width: 45px; }

.avatar-item { width: 56px; height: 56px; border-radius: 50%; cursor: pointer; flex-shrink: 0; position: relative; transition: transform 0.2s; }
.avatar-item:hover { transform: scale(1.1); }
.avatar-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; border: 2px solid rgba(138,43,226,0.3); }
.avatar-item .av-placeholder { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #222, #444); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #ccc; font-weight: bold; border: 2px solid rgba(138,43,226,0.3); }
.avatar-item.active { box-shadow: 0 0 15px rgba(138,43,226,0.8); }
.avatar-item.active img, .avatar-item.active .av-placeholder { border-color: var(--gold); }
.avatar-item .online-dot { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background: #4CAF50; border-radius: 50%; border: 2px solid #111; box-shadow: 0 0 8px rgba(76,175,80,0.8); z-index: 2; }

.mini-profile { position: fixed; right: 120px; top: 50%; transform: translateY(-50%); background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 20px 16px 16px 16px; width: 250px; z-index: 1100; display: none; backdrop-filter: blur(20px); box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
.mini-profile.show { display: block; animation: slideIn 0.2s ease-out; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-50%) translateX(20px); } to { opacity: 1; transform: translateY(-50%) translateX(0); } }
.mp-close-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.1); border: none; color: #ccc; width: 24px; height: 24px; border-radius: 50%; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 10; }
.mp-close-btn:hover { background: #e94560; color: white; }
.mini-profile .mp-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin: 0 auto; display: block; border: 2px solid var(--accent); }
.mini-profile .mp-placeholder { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #444, #555); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #ccc; margin: 0 auto; }
.mini-profile .mp-name { text-align: center; font-weight: bold; font-size: 16px; margin-top: 8px; color: var(--text); }
.mini-profile .mp-status { text-align: center; font-size: 12px; padding: 4px 10px; border-radius: 10px; display: inline-block; margin: 4px auto; width: fit-content; background: rgba(138,43,226,0.2); border: 1px solid rgba(138,43,226,0.4); color: #fff; }
.mini-profile .mp-punkt { text-align: center; font-size: 12px; color: var(--muted); }
.mini-profile .mp-calendar { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; text-align: center; font-size: 10px; margin-top: 8px; }
.mini-profile .mp-calendar div { padding: 4px; border-radius: 3px; background: rgba(255,255,255,0.05); }
.mini-profile .mp-calendar .mp-shift { background: #4CAF50; color: #fff; font-weight: bold; }
.mini-profile .mp-btn { width: 100%; padding: 10px; margin-top: 8px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; }

.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 12px; background: rgba(22,33,62,0.5); border-radius: 10px; padding: 6px; border: 1px solid var(--border); margin-bottom: 8px; overflow: hidden; }
.calendar div { padding: 6px; border-radius: 4px; font-size: 12px; overflow: hidden; text-overflow: ellipsis; }
.calendar .shift-day { background: #4CAF50; color: #fff; font-weight: bold; cursor: pointer; }
.calendar .today { border: 2px solid #2196F3; }
.calendar .header { font-weight: bold; background: rgba(51,51,51,0.7); }

#photoViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 10000; }
#photoViewer img { max-width: 95%; max-height: 90%; border-radius: 12px; }

@media (max-width: 600px) {
  .mini-profile { right: 10px; left: 10px; width: calc(100% - 20px); top: auto; bottom: 80px; transform: none; }
  .mini-profile.show { animation: slideUpMobile 0.2s ease-out; }
  @keyframes slideUpMobile { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .btn-sidebar-toggle { width: 36px; height: 50px; font-size: 15px; }
  .chat-input-bar { max-width: 100%; }
  .calendar div { font-size: 10px; padding: 4px; }
  .calendar { gap: 1px; padding: 4px; }
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="toastContainer" class="toast-container"></div>
<div id="photoViewer" onclick="this.style.display='none'"><img id="photoViewerImg" src=""></div>

<!-- ====== ЛОГИН ====== -->
<div id="login" style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;height:100vh;max-width:450px;margin:0 auto;position:relative;z-index:1;">
  <h3 style="text-align:center;margin-bottom:12px;"><span style="font-size:20px;">📦 Вход в систему</span></h3>
  <form onsubmit="return false;" style="max-width:320px;width:100%;display:flex;flex-direction:column;align-items:center;">
    <input id="loginName" type="text" placeholder="Ваше имя" style="width:100%;margin-bottom:8px;" autocomplete="off">
    <input id="loginPass" type="password" placeholder="Пароль" style="width:100%;" autocomplete="off">
    <button class="btn-gold" onclick="loginUser()" style="width:100%;margin-top:10px;" type="button">🔑 Войти</button>
  </form>
</div>

<!-- ====== ОСНОВНОЕ ПРИЛОЖЕНИЕ ====== -->
<div id="app" class="app-container" style="display:none;">
  <button class="btn-sidebar-toggle" onclick="toggleSidebar()">👥</button>
  <div class="main-content" id="mainContent">
    <div class="profile-row">
      <div class="avatar-wrapper" id="avatarWrapper" style="position:relative;width:76px;height:76px;">
        <canvas id="profileAvatarCanvas" width="76" height="76" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:1;"></canvas>
        <canvas id="profileFrameCanvas" width="76" height="76" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:2;pointer-events:none;"></canvas>
      </div>
      <div style="flex:1;">
        <b id="creatorNameWrapper" class="creator-name" style="font-size:18px;"><span id="uname"></span></b> 
        <span id="roleBadge" class="creator-badge">🌌 Создатель</span><br>
        <span style="font-size:12px;color:#aaa;">📍 Пункт <span id="upunkt"></span></span>
      </div>
      <button class="btn-gray" onclick="openSettings()" style="width:auto;padding:8px 14px;font-size:13px;">⚙️</button>
    </div>
    
    <div class="tabs" id="tabsContainer"></div>
    <div id="tabContentContainer"></div>
    
    <div class="chat-section">
      <div class="chat-header-bar" onclick="toggleChat()">
        <div class="chat-icon">💬</div>
        <span class="chat-label" id="chatLabel">Общий чат</span>
        <span id="chatBadge" class="chat-badge" style="display:none;">0</span>
        <button class="chat-back-btn" id="chatBackBtn" onclick="event.stopPropagation();switchToGlobalChat()">↩ Назад</button>
        <span id="chatArrow" class="chat-arrow open">▼</span>
      </div>
      <div id="chat"></div>
    </div>
  </div>
  
  <div class="chat-input-bar" id="chatInputBar">
    <div class="chat-input-row">
      <button class="chat-emoji-btn" onclick="toggleStickerPicker()">😊</button>
      <input class="chat-input" id="chatMsgInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendMsg();}">
      <button class="chat-send" onclick="sendMsg()">➤</button>
    </div>
  </div>
  
  <div class="sticker-picker" id="stickerPicker">
    <div class="sticker-opt" onclick="sendSticker('😊')">😊</div>
    <div class="sticker-opt" onclick="sendSticker('😉')">😉</div>
    <div class="sticker-opt" onclick="sendSticker('😘')">😘</div>
    <div class="sticker-opt" onclick="sendSticker('❤️')">❤️</div>
    <div class="sticker-opt" onclick="sendSticker('🤘')">🤘</div>
    <div class="sticker-opt" onclick="sendSticker('😓')">😓</div>
    <div class="sticker-opt" onclick="sendSticker('💀')">💀</div>
    <div class="sticker-opt" onclick="sendSticker('💪')">💪</div>
    <div class="sticker-opt" onclick="sendSticker('😂')">😂</div>
    <div class="sticker-opt" onclick="sendSticker('🤣')">🤣</div>

    gl_FragColor = vec4(finalColor, 1.0);

  function compileShader(type, src) { var s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; }

function drawAvatar(canvas, imgData, isCreator, isGod) {
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  if (imgData) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(w/2, h/2, w/2 - 2, 0, Math.PI*2);
    ctx.closePath();
    ctx.clip();
    var ratio = Math.max(w / imgData.width, h / imgData.height);
    var dw = imgData.width * ratio, dh = imgData.height * ratio;
    ctx.drawImage(imgData, (w - dw)/2, (h - dh)/2, dw, dh);
    ctx.restore();
  } else {
    var grad = ctx.createRadialGradient(w/2, h/2, 5, w/2, h/2, w/2);
    grad.addColorStop(0, '#1e1b4b'); grad.addColorStop(1, '#0f172a');
    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(w/2, h/2, w/2 - 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6366f1'; ctx.font = (w * 0.3) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', w/2, h/2);
  }
  // Рамка
  if (isCreator) {
    ctx.strokeStyle = '#7c3aed'; ctx.lineWidth = 3; ctx.shadowColor = '#7c3aed'; ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(w/2, h/2, w/2 - 2, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
  } else if (isGod) {
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(w/2, h/2, w/2 - 2, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
  } else {
    ctx.strokeStyle = '#4CAF50'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(w/2, h/2, w/2 - 2, 0, Math.PI*2); ctx.stroke();
  }
}

function switchTab(id) {
  var activeBtn = document.getElementById('tab_' + id);
  var panel = document.getElementById('panel_' + id);

    activeBtn.classList.remove('active');
    if (panel) panel.classList.remove('active-tab');
    return;
  }
  document.querySelectorAll('#tabsContainer button').forEach(function(btn) { btn.classList.remove('active'); });
  if (activeBtn) activeBtn.classList.add('active');
  document.querySelectorAll('#tabContentContainer .tab-content').forEach(function(p) { p.classList.remove('active-tab'); });
  if (panel) { panel.classList.add('active-tab'); renderTabContent(id); }
}

function renderTabContent(id) {
  var panel = document.getElementById('panel_' + id);

    case 'shift': renderShiftTab(panel); break;

            var day = d.getDate();
            if (!shifts[day]) shifts[day] = {count:0,hours:0,tovar:0};
            shifts[day].count++; shifts[day].hours += s.hours || 0; shifts[day].tovar += s.tovar || 0;
          }
        }
      });
    }
    var totalShifts = 0, totalHours = 0, totalTovar = 0;
    for (var key in shifts) { totalShifts += shifts[key].count; totalHours += shifts[key].hours; totalTovar += shifts[key].tovar; }
    document.getElementById('statShifts').textContent = totalShifts;
    document.getElementById('statHours').textContent = totalHours.toFixed(1);
    document.getElementById('statTovar').textContent = totalTovar;
    var firstDay = new Date(calYear, calMonth, 1).getDay();
    var offset = (firstDay + 6) % 7;
    var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    var today = new Date();
    var grid = document.getElementById('calGrid');
    var days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    grid.innerHTML = days.map(function(d) { return '<div class="cal-day-name" style="text-align:center;font-size:10px;color:var(--muted);padding:4px 0;font-weight:600;">'+d+'</div>'; }).join('');
    for (var i = 0; i < offset; i++) grid.innerHTML += '<div class="cal-day empty" style="opacity:0;"></div>';
    for (var d = 1; d <= daysInMonth; d++) {
      var isToday = today.getDate() === d && today.getMonth() === calMonth && today.getFullYear() === calYear;
      var hasShift = !!shifts[d];
      grid.innerHTML += '<div class="cal-day ' + (isToday ? 'today' : '') + ' ' + (hasShift ? 'has-shift' : '') + '" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;transition:all .15s;' + (isToday ? 'border:1.5px solid var(--accent);color:var(--accent);font-weight:700;' : '') + (hasShift ? 'background:rgba(34,197,94,0.2);color:var(--green);font-weight:700;' : '') + '">' + d + '</div>';
    }
  });
}

function changeCalMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }

}

function toggleChat() {
  var chat = document.getElementById('chat');
  var arrow = document.getElementById('chatArrow');
  if (chat.classList.contains('hidden')) {
    chat.classList.remove('hidden'); chatOpened = true; arrow.classList.add('open');
    lastChatTimestamp = Date.now(); unreadCount = 0; updateChatBadge();
    setTimeout(function() { chat.scrollTop = chat.scrollHeight; }, 100);
  } else {
    chat.classList.add('hidden'); chatOpened = false; arrow.classList.remove('open');
  }
}

function updateChatBadge() {
  var b = document.getElementById('chatBadge');
  if (unreadCount > 0) { b.style.display = 'inline'; b.textContent = unreadCount; }
  else { b.style.display = 'none'; }
}

function loadChat() {
  var chatEl = document.getElementById('chat');
  var wasAtBottom = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 60;
  var ref = privateChatWith ? getPrivateChatRef() : db.ref('chat');
  ref.limitToLast(50).on('value', function(s) {
    var groups = {}, order = [];
    s.forEach(function(c) {
      var m = c.val(), curUser = m.user || '';
      if (!groups[curUser]) { groups[curUser] = []; order.push(curUser); }
      groups[curUser].push({ key: c.key, msg: m, isCreator: m.user && m.user.indexOf('🌌') === 0, isGod: m.user && m.user.indexOf('👑') === 0 || m.role === 'god' });
    });
    var h = '', isAdmin = _user && (_user.role === 'creator' || _user.role === 'god');
    for (var u = 0; u < order.length; u++) {
      var curUser = order[u], msgs = groups[curUser], firstMsg = msgs[0];
      var isCreatorMsg = firstMsg.isCreator, isGodMsg = firstMsg.isGod;
      var isMine = _user && (curUser === '🌌 ' + _user.name || curUser === '👑 ' + _user.name || curUser === _user.name);
      var alignClass = isMine ? 'mine' : 'other';
      h += '<div class="chat-bubble-group ' + alignClass + '">';
      var m0 = msgs[0].msg, sn = (m0.user || '').replace('📢 ','').replace('🌌 ','').replace('👑 ','');
      var msgClass = isGodMsg ? 'chat-msg-god' : (isCreatorMsg ? 'chat-msg-creator' : 'chat-bubble' + (isMine ? ' mine' : ''));
      var canDelete = isAdmin || isMine;
      var pinBtn = isAdmin ? '<button class="btn-pin" onclick="event.stopPropagation();pinMsg(\'' + firstMsg.key + '\')">📌</button>' : '';
      var delBtn = canDelete ? '<button class="btn-del" onclick="event.stopPropagation();delChatMsg(\'' + firstMsg.key + '\')">✕</button>' : '';
      h += '<div class="' + msgClass + '">';
      h += '<button class="msg-menu-btn" onclick="event.stopPropagation();toggleMsgDropdown(event,\'' + firstMsg.key + '\')">⋮</button>';
      h += '<div class="msg-dropdown" data-dropdown="' + firstMsg.key + '"><button class="btn-like" onclick="event.stopPropagation();likeMsg(\'' + firstMsg.key + '\')">❤️</button>' + pinBtn + delBtn + '</div>';
      h += '<b class="' + (isGodMsg || isCreatorMsg ? 'author' : '') + '" onclick="selectProfile(\'' + sn + '\')">' + sn + '</b> ';
      h += m0.text || '';
      if (m0.photo) h += '<br><img class="chat-img" src="' + m0.photo + '" onclick="event.stopPropagation();viewPhoto(\'' + m0.photo + '\')">';
      h += '</div>';
      for (var j = 1; j < msgs.length; j++) {
        var m = msgs[j].msg;
        var subPin = isAdmin ? '<button class="btn-pin" onclick="event.stopPropagation();pinMsg(\'' + msgs[j].key + '\')">📌</button>' : '';
        var subDel = canDelete ? '<button class="btn-del" onclick="event.stopPropagation();delChatMsg(\'' + msgs[j].key + '\')">✕</button>' : '';
        h += '<div class="' + msgClass + '">';
        h += '<button class="msg-menu-btn" onclick="event.stopPropagation();toggleMsgDropdown(event,\'' + msgs[j].key + '\')">⋮</button>';
        h += '<div class="msg-dropdown" data-dropdown="' + msgs[j].key + '"><button class="btn-like" onclick="event.stopPropagation();likeMsg(\'' + msgs[j].key + '\')">❤️</button>' + subPin + subDel + '</div>';
        h += m.text || '';
        if (m.photo) h += '<br><img class="chat-img" src="' + m.photo + '" onclick="event.stopPropagation();viewPhoto(\'' + m.photo + '\')">';
        h += '</div>';
      }
      var likes = firstMsg.msg.likes || {};
      var likeCount = Object.keys(likes).length;
      if (likeCount > 0) {
        var myKey = _user.name, isLiked = !!likes[myKey];
        var likeIcon = isLiked ? (likes[myKey] === 'god' ? '👑' : likes[myKey] === 'creator' ? '🌌' : '❤️') : '❤️';
        h += '<div class="like-indicator has-likes">' + likeIcon + ' ' + likeCount + '</div>';
      }
      h += '</div>';
    }
    chatEl.innerHTML = h;
    if (wasAtBottom || document.activeElement === document.getElementById('chatMsgInput')) chatEl.scrollTop = chatEl.scrollHeight;
  });
}

function toggleMsgDropdown(e, key) {
  e.stopPropagation();
  if (openDropdown) openDropdown.classList.remove('show');
  var dd = document.querySelector('[data-dropdown="' + key + '"]');
  if (!dd) return;
  if (dd === openDropdown) { dd.classList.remove('show'); openDropdown = null; return; }
  dd.classList.add('show'); openDropdown = dd;
}

function likeMsg(key) {
  if (!_user) return;
  var ref = privateChatWith ? getPrivateChatRef().child(key + '/likes') : db.ref('chat/' + key + '/likes');
  ref.once('value', function(s) {
    var likes = s.val() || {};
    var myKey = _user.name;
    var likeType = _user.role === 'god' ? 'god' : (_user.role === 'creator' ? 'creator' : 'user');
    if (likes[myKey]) delete likes[myKey];
    else likes[myKey] = likeType;
    ref.set(likes);
  });
  if (openDropdown) { openDropdown.classList.remove('show'); openDropdown = null; }
}

function viewPhoto(url) {
  document.getElementById('photoViewerImg').src = url;
  document.getElementById('photoViewer').style.display = 'flex';
}

function delChatMsg(key) {
  if (openDropdown) { openDropdown.classList.remove('show'); openDropdown = null; }
  var ref = privateChatWith ? getPrivateChatRef().child(key) : db.ref('chat/' + key);
  if (_user && (_user.role === 'creator' || _user.role === 'god')) { ref.remove(); return; }
  ref.once('value', function(s) {
    var m = s.val();
    if (m && m.user && (m.user.indexOf('🌌') === 0 || m.user.indexOf('👑') === 0)) {
      showToast('🚫 Сообщение Создателя/Бога нельзя удалить!', true);
      return;
    }
    ref.remove();
  });
}

function pinMsg(key) {
  if (openDropdown) { openDropdown.classList.remove('show'); openDropdown = null; }
  db.ref('chat/' + key).once('value', function(s) {
    if (s.exists()) { db.ref('pinned').set(s.val()); showToast('📌 Закреплено!'); }
  });
}

function sendMsg() {
  var input = document.getElementById('chatMsgInput');
  var t = input.value.trim();
  if (!t || !_user) return;
  var mentions = t.match(/@(\S+)/g);
  if (mentions) {
    db.ref('users').once('value', function(snap) {
      var vkIds = {};
      snap.forEach(function(c){ vkIds[c.val().name] = c.val().vkId || ''; });
      for (var i = 0; i < mentions.length; i++) {
        var name = mentions[i].replace('@', '');
        var vkId = vkIds[name];
        if (vkId) sendVkNotify(vkId, '📢 Упоминание в чате Ozon:\n' + t);
      }
    });
  }
  var ref = privateChatWith ? getPrivateChatRef() : db.ref('chat');
  ref.push({ user: (_user.role === 'god' ? '👑 ' : '🌌 ') + _user.name, text: t, timestamp: Date.now(), role: _user.role, likes: {} });
  input.value = '';
}

function getPrivateChatRef() {

// ====== САЙДБАР ======
function toggleSidebar() {
  document.getElementById('avatarCarousel').classList.toggle('open');
}

function buildCarousel() {
  var carouselUsers = [];
  var shown = {};
  for (var name in allUserData) {
    if (shown[name]) continue;
    if (name === 'Костя' && _user && _user.role === 'creator') continue;
    shown[name] = true; carouselUsers.push(name);
  }
  if (godData && godData.name && !shown[godData.name]) {
    shown[godData.name] = true; carouselUsers.push(godData.name);
    if (!allUserData[godData.name]) allUserData[godData.name] = { name: godData.name, avatar: godData.avatar || '', punkt: '', vkId: godData.vkId || '' };
  }
  carouselUsers.sort();
  var carouselInner = document.getElementById('carouselInner');
  if (!carouselInner) return;
  var h = '';
  for (var i = 0; i < carouselUsers.length; i++) {
    var name = carouselUsers[i], d = allUserData[name] || {}, av = d.avatar || '';
    var isOnline = !!activeShifts[name];
    if (name === godData?.name) isOnline = false;
    var isActive = (selectedProfile === name);
    h += '<div class="avatar-item' + (isActive ? ' active' : '') + (isOnline ? ' online' : '') + '" data-user="' + name.replace(/"/g,'&quot;') + '" onclick="selectProfile(\'' + name.replace(/'/g,"\\'") + '\')">';
    if (av) { h += '<img src="' + av + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'; h += '<div class="av-placeholder" style="display:none;">' + name.charAt(0).toUpperCase() + '</div>'; }
    else { h += '<div class="av-placeholder">' + name.charAt(0).toUpperCase() + '</div>'; }
    if (isOnline) h += '<div class="online-dot"></div>';
    h += '</div>';
  }
  carouselInner.innerHTML = h;
}

function selectProfile(name) {
  if (!name || name === _user.name) return;
  selectedProfile = name;
  var items = document.querySelectorAll('#carouselInner .avatar-item');
  items.forEach(function(item) {
    if (item.getAttribute('data-user') === name) item.classList.add('active');
    else item.classList.remove('active');
  });
  showMiniProfile(name);
}

function showMiniProfile(name) {
  var d = allUserData[name];
  if (!d) return;
  var mp = document.getElementById('miniProfile');
  var avc = document.getElementById('mpAvatarContainer');
  var isGod = (name === godData?.name);
  if (d.avatar) {
    avc.innerHTML = '<img class="mp-avatar ' + (isGod ? 'avatar-god' : '') + '" src="' + d.avatar + '" style="position:relative;z-index:10;width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto;display:block;" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="mp-placeholder" style="display:none;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#444,#555);display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc;margin:0 auto;">' + name.charAt(0).toUpperCase() + '</div>';
  } else {
    avc.innerHTML = '<div class="mp-placeholder" style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#444,#555);display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc;margin:0 auto;">' + name.charAt(0).toUpperCase() + '</div>';
  }
  document.getElementById('mpName').textContent = name;
  if (isGod) {
    document.getElementById('mpStatus').textContent = '👑 Начальник';
    document.getElementById('mpPunkt').textContent = '🔴 Не на смене';
    document.getElementById('mpCalendar').innerHTML = '';
  } else {
    var sc = 0;
    allMyShifts.forEach(function(s){ if (s.user === name) sc++; });
    var st = ['📦 Штрих','🚚 ПВЗюк','🏭 Пунктовой','🚀 Озонавт','👑 Озоний'][sc >= 21 ? 4 : sc >= 13 ? 3 : sc >= 8 ? 2 : sc >= 4 ? 1 : 0];
    document.getElementById('mpStatus').textContent = st;
    var isOnline = !!activeShifts[name];
    document.getElementById('mpPunkt').textContent = isOnline ? '🟢 На смене (Пункт ' + (d.punkt || '?') + ')' : '🔴 Выходной';
    var now = new Date(), calH = '', startD = new Date(now.getTime() - 13 * 86400000);
    for (var i = 0; i < 14; i++) {
      var dd = new Date(startD.getTime() + i * 86400000);
      var ds = dd.toLocaleDateString('ru-RU');
      var isShift = false;
      allMyShifts.forEach(function(s){ if (s.user === name && s.date === ds) isShift = true; });
      calH += '<div class="' + (isShift ? 'mp-shift' : '') + '">' + dd.getDate() + '</div>';
    }
    document.getElementById('mpCalendar').innerHTML = calH;
  }
  document.getElementById('mpChatBtn').style.display = 'block';
  mp.classList.add('show');
}

function closeMiniProfile() {
  var mp = document.getElementById('miniProfile');
  if (mp) mp.classList.remove('show');
}

// ====== НАСТРОЙКИ ======
function openSettings() {
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('avatarCarousel').style.display = 'none';
  document.getElementById('settingsPanel').style.display = 'flex';
  document.getElementById('setVk').value = _user.vkId || '';
  loadPunktsForSettings();
}

function closeSettings() {
  document.getElementById('settingsPanel').style.display = 'none';
  document.getElementById('mainContent').style.display = 'flex';
  document.getElementById('avatarCarousel').style.display = 'flex';
}

function loadPunktsForSettings() {
  db.ref('punkts').once('value', function(snap) {
    var s = document.getElementById('setPunkt');
    s.innerHTML = '<option value="">Не менять</option>';
    snap.forEach(function(c) { s.innerHTML += '<option value="' + c.key + '">' + c.key + '</option>'; });
  });
}

function saveSettings() {
  var nn = document.getElementById('setName').value.trim();
  var np = document.getElementById('setPass').value.trim();
  var npu = document.getElementById('setPunkt').value;
  var nvk = document.getElementById('setVk').value.trim();
  var ok = _user.name, up = {};
  if (nn && nn !== _user.name) {
    up['users/' + nn] = { name: nn, punkt: npu || _user.punkt, password: _user.password, bonus: 0, avatar: _user.avatar || '', vkId: nvk || _user.vkId || '' };
    if (np) up['users/' + nn + '/password'] = np;
    up['users/' + ok] = null;
    _user.name = nn; if (npu) _user.punkt = npu; if (nvk) _user.vkId = nvk;
  } else {
    var uu = { name: _user.name, punkt: _user.punkt, avatar: _user.avatar || '', vkId: _user.vkId || '' };
    if (np) uu.password = np; if (nvk) uu.vkId = nvk; if (npu) uu.punkt = npu;
    up['users/' + ok] = uu; if (npu) _user.punkt = npu; if (nvk) _user.vkId = nvk;
  }
  if (Object.keys(up).length === 0) { closeSettings(); return; }
  db.ref().update(up, function(err) {
    if (err) { showToast('❌ Ошибка сохранения', true); return; }
    if (np) _user.password = np; if (nvk) _user.vkId = nvk;
    localStorage.setItem('creator_user', JSON.stringify(_user));
    updateProfileUI(); closeSettings(); buildCarousel();
    showToast('✅ Настройки сохранены');
  });
}

// ====== СЛУШАТЕЛИ ======
db.ref('godSettings').on('value', function(s) {
  godData = s.exists() ? s.val() : null;
  if (_user) buildCarousel();
});

db.ref('users').on('value', function(s) {
  allUsers = {}; allUserData = {};
  s.forEach(function(c) {
    allUsers[c.key] = c.val().avatar || '';
    allUserData[c.key] = c.val();
  });
  if (_user) buildCarousel();
});

db.ref('activeShifts').on('value', function(s) {
  activeShifts = {};
  s.forEach(function(c) {
    if (c.val() && c.val().active) activeShifts[c.key] = true;
  });
  if (_user) buildCarousel();
});

db.ref('shifts').on('value', function(s) {
  allMyShifts = [];
  s.forEach(function(c) {
    var x = c.val();
    x._id = c.key;
    allMyShifts.push(x);
  });
});

db.ref('chat').limitToLast(1).on('child_added', function(s) {
  if (chatOpened) return;
  var m = s.val();
  if (!m || !_user) return;
  if (m.timestamp <= lastChatTimestamp) return;
  var isMine = m.user === '🌌 ' + _user.name || m.user === '👑 ' + _user.name || m.user === _user.name;
  if (isMine) return;
  lastChatTimestamp = Math.max(lastChatTimestamp, m.timestamp || 0);
  unreadCount++;
  updateChatBadge();
});

// ====== ВЫХОД ======
function logout() {
  _user = null;
  chatOpened = false;
  localStorage.removeItem('creator_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.body.className = '';
  if (window.shiftTimer) clearInterval(window.shiftTimer);
}

// ====== ЗАПУСК ======
console.log('🚀 Ozon Hub запущен!');
</script>
