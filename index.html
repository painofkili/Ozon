<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;height:100%;width:100%;position:fixed;top:0;left:0;background:#0a0a1a}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#eee;font-size:16px;display:flex;flex-direction:column}
:root{--accent:#7c3aed;--accent2:#a855f7;--gold:#f5c518;--bg2:rgba(20,20,50,0.85);--bg3:rgba(30,30,60,0.7);--border:rgba(100,80,220,0.25);--text:#e8e8ff;--muted:#888;--green:#22c55e;--red:#ef4444}
body.theme-creator{--accent:#7c3aed;--accent2:#00d4ff;--gold:#f5c518}
body.theme-god{--accent:#b8860b;--accent2:#ffd700;--gold:#ffd700}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px);padding:16px;margin:6px 0}
input,select,textarea{width:100%;padding:12px 14px;font-size:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,25,0.6);color:#fff;outline:none;transition:0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,0.15)}
button{border:none;font-weight:bold;cursor:pointer;border-radius:12px;transition:all .2s;padding:12px 16px;font-size:15px}
button:hover{transform:scale(1.02);filter:brightness(1.1)}
button:active{transform:scale(0.95)}
.btn-green{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;width:100%}
.btn-red{background:linear-gradient(135deg,#e94560,#c62828);color:#fff;width:100%}
.btn-gray{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1);width:100%}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;width:100%}
.btn-blue{background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff;width:100%}
.btn-purple{background:#9C27B0;color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;width:auto}
.btn-off{background:rgba(100,100,100,0.3);color:#aaa;border:1px solid rgba(255,255,255,0.1);width:100%}
.btn-off.active{border-color:var(--red);color:#fff;background:rgba(239,68,68,0.2)}
.app-container{display:flex;width:100%;height:100%;position:relative;z-index:1;overflow:hidden}
.main-content{width:100%;max-width:100%;padding:12px 16px;display:flex;flex-direction:column;height:100%;gap:6px;transition:0.3s}
.profile-card{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px);flex-shrink:0;cursor:pointer;transition:0.2s}
.profile-card:hover{background:rgba(40,40,70,0.9)}
.badge{font-size:12px;font-weight:bold;padding:4px 12px;border-radius:20px;display:inline-block}
.badge-creator{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.badge-god{background:linear-gradient(135deg,#FFD700,#FF4500);color:#fff}
.badge-manager{background:#2d6a4f;color:#95d5b2}
.name-creator{background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-god{background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-manager{color:#eee;font-weight:bold}
.tabs{display:flex;gap:6px;margin:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tabs button{height:44px;display:flex;align-items:center;gap:8px;border-radius:99px;background:rgba(255,255,255,0.06);color:#aaa;border:1px solid transparent;padding:0 16px;font-size:13px;white-space:nowrap;flex-shrink:0;transition:0.3s;min-width:44px;overflow:hidden}
.tabs button .tab-label{opacity:0;max-width:0;transition:all 0.3s}
.tabs button:hover .tab-label,.tabs button.active .tab-label{opacity:1;max-width:80px}
.tabs button.active{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;box-shadow:0 4px 15px rgba(138,43,226,0.3)}
.tab-content{display:none;width:100%;flex-shrink:0;animation:fadeIn 0.3s ease}
.tab-content.active-tab{display:block}
.chat-section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;margin:0;transition:0.3s cubic-bezier(0.25, 0.8, 0.25, 1)}
.chat-header-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);cursor:pointer;flex-shrink:0}
.chat-header-bar:hover{background:rgba(0,0,0,0.3)}
#chat{flex:1;overflow-y:auto;padding:10px 14px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;background:transparent;display:flex;flex-direction:column;gap:2px;transition:opacity 0.2s}
.chat-bubble-group{display:flex;flex-direction:column;max-width:90%;position:relative;margin:4px 0;animation:fadeIn 0.15s ease}
.chat-bubble-group.mine{align-self:flex-end;align-items:flex-end}
.chat-bubble-group.other{align-self:flex-start;align-items:flex-start}
.chat-bubble-group .msg-author{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:8px;padding:0 4px}
.chat-bubble-group .msg-author span{font-size:13px;font-weight:700}
.chat-static-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0;background:var(--bg3)}
.chat-static-avatar.canvas-avatar{background:transparent;border:none;overflow:visible;width:36px;height:36px;min-width:36px;min-height:36px}
.text-ava{display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);font-weight:bold;font-size:16px;color:#fff}
.chat-bubble{background:rgba(255,255,255,0.04);padding:8px 14px;word-break:break-word;line-height:1.4;font-size:14px;position:relative;border-radius:12px;transition:0.1s}

/* 🔥 НОВЫЕ ПРИКОЛЬНЫЕ РАМКИ ДЛЯ ПУЗЫРЕЙ */
.chat-bubble.mine{
    background:rgba(124, 58, 237, 0.15);
    border: 1px solid transparent;
    background-clip: padding-box;
    position: relative;
}
/* Рамка для своих сообщений (Фиолетово-розовый градиент) */
.chat-bubble.mine::before {
    content: '';
    position: absolute; inset: -2px;
    border-radius: 14px; 
    padding: 2px;
    background: linear-gradient(135deg, #7c3aed, #db2777);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

.chat-bubble.other{
    background:rgba(59, 130, 246, 0.1);
    border: 1px solid transparent;
    background-clip: padding-box;
    position: relative;
}
/* Рамка для чужих сообщений (Сине-голубой градиент) */
.chat-bubble.other::before {
    content: '';
    position: absolute; inset: -2px;
    border-radius: 14px; 
    padding: 2px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

.chat-bubble.creator{
    border: 1px solid transparent;
    background: rgba(245,197,24,0.08);
    background-clip: padding-box;
    position: relative;
}
/* Рамка для Создателя/Бога (Золотая) */
.chat-bubble.creator::before {
    content: '';
    position: absolute; inset: -2px;
    border-radius: 14px; 
    padding: 2px;
    background: linear-gradient(135deg, var(--gold), #f59e0b, var(--gold));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

.chat-bubble.clickable:active{transform:scale(0.98);opacity:0.8}
.chat-img{max-width:200px;max-height:150px;border-radius:8px;margin-top:4px;cursor:pointer;object-fit:cover}
.chat-sticker{max-width:120px;max-height:120px;object-fit:contain;margin:2px 0}
.chat-input-wrapper{position:relative;width:100%;margin-top:auto;flex-shrink:0;transition:0.3s cubic-bezier(0.25, 0.8, 0.25, 1);opacity:1;transform:translateY(0)}
.chat-input-bar{width:100%;background:var(--bg2);backdrop-filter:blur(16px);padding:8px 12px;display:flex;gap:8px;align-items:center;z-index:100;border-top:1px solid var(--border);border-radius:16px}
.input-wrapper{position:relative;flex:1;display:flex;align-items:center;background:rgba(0,0,0,0.3);border-radius:20px;border:1px solid rgba(255,255,255,0.05)}
.input-wrapper input{background:transparent;border:none;padding:10px 40px 10px 16px;font-size:15px;width:100%}
.sticker-toggle{position:absolute;right:8px;background:transparent;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:0}
#sendMsgBtn,#chatPhotoBtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);color:#aaa}
#sendMsgBtn{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;border:none}

.avatar-carousel{width:110px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:-130px;height:100%;padding:50px 0 20px;z-index:1000;backdrop-filter:blur(20px);transition:right 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:-10px 0 30px rgba(0,0,0,0.5)}
.avatar-carousel.open{right:0}
.avatar-carousel-inner{display:flex;flex-direction:column;align-items:center;width:100%;gap:12px;overflow-y:auto;height:100%;padding:10px 0;scrollbar-width:none;padding-bottom:30px}
.avatar-carousel-inner::-webkit-scrollbar{display:none}
.sidebar-close-btn{position:absolute;top:15px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#eee;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;z-index:10;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
.sidebar-close-btn:hover{background:#e94560;color:#fff;border-color:#e94560;transform:translateX(-50%) scale(1.1)}
.avatar-item{width:56px;height:56px;border-radius:50%;cursor:pointer;position:relative;transition:0.2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.avatar-item:hover{transform:scale(1.05)}
.avatar-item .avatar-canvas{width:56px;height:56px;border-radius:50%;display:block;border:2px solid transparent;flex-shrink:0}
.avatar-item.active .avatar-canvas{border-color:var(--gold);box-shadow:0 0 15px rgba(245,197,24,0.3)}
.avatar-item .online-dot{position:absolute;bottom:4px;right:4px;width:12px;height:12px;background:#4CAF50;border-radius:50%;border:2px solid #111;z-index:2}
.btn-sidebar-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);width:36px;height:50px;background:var(--bg2);border:1px solid var(--border);border-right:none;border-radius:14px 0 0 14px;color:#fff;font-size:14px;cursor:pointer;z-index:999;backdrop-filter:blur(8px)}

.mini-profile{position:fixed;right:130px;top:50%;transform:translateY(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:240px;z-index:1100;display:none;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,0.6)}
.mini-profile.show{display:block;animation:slideIn 0.2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-50%) translateX(20px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
@keyframes slideUpModal{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mini-profile .mp-close{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.05);border:none;color:#aaa;width:28px;height:28px;border-radius:50%;font-size:12px;cursor:pointer}
.mini-profile .mp-close:hover{background:#e94560;color:#fff}
.mini-profile .mp-avatar-canvas{width:64px;height:64px;border-radius:50%;border:2px solid var(--accent);display:block;margin:0 auto;cursor:pointer}

#stickerPanel{position:absolute;bottom:calc(100% + 8px);right:0;width:300px;height:340px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;display:none;flex-direction:column;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.6);backdrop-filter:blur(20px);overflow:hidden}
#stickerPanel.open{display:flex}
#stickerContent{flex:1;overflow-y:auto;padding:12px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
.emoji-item{width:40px;height:40px;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:10px;transition:0.15s}
.emoji-item:hover{background:rgba(255,255,255,0.1);transform:scale(1.1)}
.st-item{width:60px;height:60px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.02);transition:0.15s}
.st-item:hover{background:rgba(255,255,255,0.08);transform:scale(1.05)}
.st-item img{max-width:100%;max-height:100%;object-fit:contain}
.sticker-tabs{display:flex;background:rgba(0,0,0,0.3);padding:6px;gap:4px;overflow-x:auto;border-top:1px solid var(--border);scrollbar-width:none}
.sticker-tabs::-webkit-scrollbar{display:none}
.st-tab{width:32px;height:32px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0.6;transition:0.2s;flex-shrink:0}
.st-tab.active,.st-tab:hover{opacity:1;background:rgba(124,58,237,0.2)}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;pointer-events:none;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:12px 20px;border-radius:16px;background:var(--bg2);border:1px solid var(--accent);color:#fff;font-size:14px;box-shadow:0 5px 20px rgba(0,0,0,0.6);transform:translateY(-20px);opacity:0;transition:all 0.3s;text-align:center;backdrop-filter:blur(10px)}
.toast-msg.error{border-color:var(--red)}
.toast-msg.show{transform:translateY(0);opacity:1}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:12px;background:rgba(22,33,62,0.4);border-radius:10px;padding:6px;border:1px solid var(--border)}
.calendar div{padding:6px;border-radius:4px}
.calendar .shift-day{background:#4CAF50;color:#fff;font-weight:bold;cursor:pointer}
.calendar .today{border:2px solid #2196F3}
.calendar .header{font-weight:bold;background:rgba(51,51,51,0.7)}
.worker-row{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--border);gap:6px;flex-wrap:wrap}
.worker-row button{width:auto;padding:4px 10px;font-size:11px}
.zp-result{background:rgba(34,197,94,0.1);padding:12px;border-radius:8px;margin-top:8px;font-size:14px;border:1px solid rgba(34,197,94,0.3);white-space:pre-line}
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:20px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;backdrop-filter:blur(20px)}
#settingsPanel{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px}
.settings-tab{flex:1;padding:8px;border-radius:10px;font-size:13px;background:transparent;color:var(--muted);border:none;cursor:pointer;transition:0.2s}
.settings-tab.active{background:var(--accent);color:#fff}
.style-btn{padding:8px 6px;border-radius:10px;border:2px solid #444;background:rgba(0,0,0,0.3);color:#ccc;font-size:11px;cursor:pointer;transition:0.2s;width:100%}
.style-btn.active{border-color:var(--accent);background:rgba(124,58,237,0.2);color:#fff}
.style-btn.premium{border-color:#FFD700;background:rgba(255,215,0,0.05)}
.style-btn.off-btn{border-color:var(--red);background:rgba(239,68,68,0.1);color:#f87171}
.style-btn.off-btn.active{border-color:var(--red);background:rgba(239,68,68,0.3);color:#fff}

.avatar-wrap{position:relative;width:76px;height:76px;flex-shrink:0;border-radius:50%}
#mainAvatarCanvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:130px;height:130px;pointer-events:none;z-index:2}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media(min-width:1024px){
  .app-container{flex-direction:row;align-items:stretch;justify-content:center;gap:16px;padding:12px}
  .left-column{width:380px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow-y:auto;height:100%}
  .right-column{flex:1;display:flex;flex-direction:column;gap:6px;height:100%;min-width:0;overflow:hidden}
  .right-column .chat-section{flex:1}
  .right-column .chat-input-wrapper{flex-shrink:0}
  .main-content{flex-direction:row;padding:0;gap:16px;max-width:100%}
  #tabContentContainer{flex:1;overflow-y:auto}
}

@media(max-width:1023px){
  .main-content{flex-direction:column;padding:8px;height:100%;}
  .left-column{flex:0 0 42%; display:flex;flex-direction:column;margin-bottom:4px; transition:0.3s cubic-bezier(0.25, 0.8, 0.25, 1);}
  .main-content.tabs-collapsed .left-column { flex: 0 0 auto; min-height:0; }
  .main-content.chat-collapsed .left-column { flex: 1 1 100%; margin-bottom:0; max-height:none; }
  .right-column{flex:1 1 0%;display:flex;flex-direction:column;min-height:0; transition:0.3s cubic-bezier(0.25, 0.8, 0.25, 1);}
  .main-content.chat-collapsed .right-column { flex: 0 0 54px; min-height: 54px; }
  .main-content.chat-collapsed .chat-section { flex: 0 0 54px; height: 54px; }
  .main-content.chat-collapsed #chat { opacity: 0; pointer-events: none; }
  .main-content.chat-collapsed .chat-input-wrapper { opacity: 0; pointer-events: none; transform: translateY(100%); position: absolute; bottom: 0; }
  #tabContentContainer{flex:1;overflow-y:auto;}
  .chat-input-wrapper{position:relative;width:100%;max-width:100%;z-index:100;flex-shrink:0;}
  .chat-input-bar{border-radius:16px;padding:6px 8px;}
  .mini-profile{right:10px;width:210px}
  .avatar-carousel{width:80px}
  .avatar-item{width:46px;height:46px}
  .avatar-item .avatar-canvas{width:46px;height:46px}
}
</style>
</head>
<body>
<div id="toastContainer" class="toast-container"></div>

<div id="msgActionModal" style="display:none; position:fixed; inset:0; z-index:12000; background:rgba(0,0,0,0.6); align-items:flex-end; justify-content:center; backdrop-filter:blur(5px);" onclick="closeMsgActions()">
  <div style="background:var(--bg2); width:100%; max-width:500px; border-radius:24px 24px 0 0; padding:24px; display:flex; flex-direction:column; gap:12px; animation: slideUpModal 0.25s cubic-bezier(0.16, 1, 0.3, 1); border-top:1px solid var(--border);" onclick="event.stopPropagation()">
      <h4 style="text-align:center; color:var(--muted); margin-bottom:8px;">Действия с сообщением</h4>
      <button class="btn-gold" id="btnPinMsg" style="display:none; padding:14px;">📌 Закрепить</button>
      <button class="btn-red" id="btnDelMsg" style="display:none; padding:14px;">🗑️ Удалить</button>
      <button class="btn-gray" onclick="closeMsgActions()" style="padding:14px; margin-top:8px;">Отмена</button>
  </div>
</div>

<div id="avatarPreviewModal" style="display:none;position:fixed;inset:0;z-index:11000;background:rgba(0,0,0,0.85);backdrop-filter:blur(15px);align-items:center;justify-content:center;flex-direction:column;">
  <button id="closeAvatarPreview" style="position:absolute;top:max(30px, env(safe-area-inset-top));right:30px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;transition:0.2s;z-index:12000;display:flex;align-items:center;justify-content:center;">✕</button>
  <canvas id="previewAvatarCanvas" width="600" height="600" style="width:100%;max-width:400px;height:auto;"></canvas>
  <img id="previewFullImage" style="display:none;max-width:90vw;max-height:75vh;border-radius:12px;border:2px solid var(--accent);object-fit:contain;box-shadow:0 10px 40px rgba(0,0,0,0.5);">
  <div id="previewAvatarName" style="margin-top:10px;font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></div>
  <button id="toggleFullImgBtn" class="btn-gray" style="margin-top:16px;max-width:250px;padding:12px;">Показать оригинал</button>
</div>

<div id="customModal" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;">
  <div class="card" style="max-width:350px;width:100%;display:flex;flex-direction:column;gap:12px;">

<script>
(function() {
  'use strict';

  // =========================================================================
  // 🎨 БЛОК АНИМАЦИЙ И РЕНДЕРА АВАТАРОК (ФИНАЛЬНАЯ ВЕРСИЯ)
  // =========================================================================
  
  const ANIMATIONS = [
    { id:'off', label:'Без анимации', premium:false },
    { id:'rgb-ring', label:'Кольцо', premium:false },
    { id:'rgb-rainbow', label:'Радуга 🌈', premium:false },
    { id:'neon-pulse', label:'Пульс 💓', premium:false },
    { id:'running-gradient', label:'Градиент 💫', premium:false },
    { id:'glitch', label:'Глитч 📺', premium:true }, 
    { id:'symbiote', label:'Симбиот 🦠', premium:true },       
    { id:'runes', label:'Руны 📜', premium:true },        
    { id:'pulsar', label:'Квазар 🌟', premium:true },     
    { id:'frost', label:'Фрост ❄️', premium:true }, 
    { id:'singularity', label:'Сингуля 🕳️', premium:true }, 
    { id:'quantum-realm', label:'Квант 🌌', premium:true },       
    { id:'dragon-aura', label:'Дракон 🐉', premium:true },        
    { id:'supernova', label:'Сверхнов 💥', premium:true },     
    { id:'sacred-geometry', label:'Геометрия 💠', premium:true }, 
    { id:'void-vortex', label:'ЧернДыра 🌌', premium:true },
    { id:'infinity-shield', label:'Щит 🛡️', premium:true },
    { id:'cyber-grid', label:'Сканер 🤖', premium:true },
    { id:'golden-dust', label:'Пыль ✨', premium:true },
    { id:'aurora', label:'Сияние 🌌', premium:true },
    { id:'electro-storm', label:'Шторм ⚡', premium:true },
    { id:'comet', label:'Комета ⭐', premium:true },
    { id:'double-orbit', label:'Орбита 🪐', premium:true },
    { id:'matrix', label:'Матрица 🧪', premium:true },
    { id:'fire', label:'Огонь 🔥', premium:true },
    { id:'sparks', label:'Искры ⚡', premium:true },
    { id:'god-rays', label:'Нимб 👼', premium:true },
  ];

  const avatarTimers = new Map();
  let animationLoopRunning = false;
  let animationFrameId = null;

  // Главная функция рендера (единый размер для всех, без сплющивания)
  function renderPremiumAvatar(canvas, settings, imgObj, userName, tick = 0) {
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;

    const dpr = window.devicePixelRatio || 1;
    const displaySize = Math.min(rect.width, rect.height);
    const targetSize = Math.floor(displaySize * dpr);

    if (canvas.width !== targetSize || canvas.height !== targetSize) {
      canvas.width = targetSize;
      canvas.height = targetSize;
    }

    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    const size = targetSize;
    const cx = size / 2;
    const cy = size / 2;
    const avatarRadius = (size / 2) * 0.85; // Сама картинка
    const fRadius = (size / 2) * 0.95; // Кольцо (всегда 95% от размера холста)

    ctx.clearRect(0, 0, size, size);

    const color1 = settings?.color1 || '#6366f1';
    const color2 = settings?.color2 || '#a855f7';
    const style = settings?.style || 'off';
    const glow = parseInt(settings?.glow) || 20;
    const speed = parseFloat(settings?.speed) || 1;

    let state;
    if (!avatarTimers.has(canvas)) {
      avatarTimers.set(canvas, { tick: 0, pulse: 1, dir: 1, particles: [] });
    }
    state = avatarTimers.get(canvas);
    if (tick === 0) state.tick = 0;
    else state.tick += 0.04 * speed;

    const opts = { ctx, cx, cy, fRadius, avatarRadius, state, speed, color1, color2, glow };

    // Фон (Back)
    const backEffect = EFFECTS[style]?.back || null;
    if (backEffect) { ctx.shadowBlur = 0; backEffect(opts); }

    // Сама аватарка
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, avatarRadius, 0, Math.PI * 2); ctx.clip();
    if (imgObj && imgObj.complete && imgObj.naturalWidth > 0) {
      try {
        const ratio = Math.max((avatarRadius * 2) / imgObj.naturalWidth, (avatarRadius * 2) / imgObj.naturalHeight);
        const dw = imgObj.naturalWidth * ratio; const dh = imgObj.naturalHeight * ratio;
        ctx.drawImage(imgObj, cx - dw / 2, cy - dh / 2, dw, dh);
      } catch (_) { drawFallback(ctx, cx, cy, avatarRadius, userName); }
    } else { drawFallback(ctx, cx, cy, avatarRadius, userName); }
    ctx.restore();

    // Фронт (Кольцо и анимации)
    const frontEffect = EFFECTS[style]?.front || null;
    if (frontEffect) {
      ctx.shadowBlur = glow; ctx.shadowColor = color1;
      frontEffect(opts);
    } else {
      ctx.strokeStyle = settings?.ringColor || color1;
      const t = settings?.ringThickness;
      ctx.lineWidth = t === 'thick' ? size * 0.045 : t === 'thin' ? size * 0.015 : size * 0.025;
      ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(cx, cy, fRadius, 0, Math.PI * 2); ctx.stroke();
    }
  }

  function drawFallback(ctx, cx, cy, radius, userName) {
    ctx.fillStyle = '#1e1b4b'; ctx.fill();
    ctx.fillStyle = '#6366f1';
    const fontSize = radius * 0.9;
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const letter = (userName || '?').charAt(0).toUpperCase();
    ctx.fillText(letter, cx, cy + (fontSize * 0.1));
  }

  const EFFECTS = {
    fire: {
      back(opts) {
        const { ctx, cx, cy, fRadius } = opts;
        ctx.shadowBlur = 20; ctx.shadowColor = '#ff3300';
        ctx.strokeStyle = '#ff3300'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(cx, cy, fRadius, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0;
      },
      front(opts) {
        const { ctx, cx, cy, fRadius, state, speed } = opts;
        if (!state.fireParticles) state.fireParticles = [];
        if (state.fireParticles.length < 180) {
          const angle = Math.random() * Math.PI * 2;
          const radius = fRadius + Math.random() * 15;
          state.fireParticles.push({
            x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius,
            vx: (Math.random() - 0.5) * 2, vy: -Math.random() * 4 - 1.5,
            life: 0.8 + Math.random() * 0.4, maxLife: 0.8 + Math.random() * 0.4,
            size: 8 + Math.random() * 18, r: 255, g: 150 + Math.floor(Math.random() * 105), b: 20 + Math.floor(Math.random() * 40),
          });
        }
        ctx.globalCompositeOperation = 'lighter';
        state.fireParticles.forEach((p) => {
          p.x += p.vx + Math.sin(p.life * 20 + p.x * 0.01) * 0.8;
          p.y += p.vy; p.vy -= 0.05 * speed; p.life -= 0.015 * speed;
          const lifeRatio = Math.max(0, p.life / p.maxLife);
          const size = p.size * (0.3 + 0.7 * lifeRatio);
          const r = p.r; const g = Math.floor(p.g * lifeRatio * 0.9); const b = Math.floor(p.b * lifeRatio * 0.7);
          ctx.fillStyle = `rgb(${r}, ${Math.floor(g)}, ${Math.floor(b)})`;
          ctx.globalAlpha = Math.max(0, lifeRatio * 0.9);
          const angle = Math.atan2(p.vy, p.vx) + Math.PI / 2;
          const len = size * (0.5 + 0.5 * lifeRatio);
          const w = size * 0.4 * (0.3 + 0.7 * lifeRatio);
          const x1 = p.x - Math.cos(angle) * len * 0.3, y1 = p.y - Math.sin(angle) * len * 0.3;
          const x2 = p.x + Math.cos(angle) * len * 0.7, y2 = p.y + Math.sin(angle) * len * 0.7;
          const cpx1 = p.x - Math.sin(angle) * w, cpy1 = p.y + Math.cos(angle) * w;
          const cpx2 = p.x + Math.sin(angle) * w, cpy2 = p.y - Math.cos(angle) * w;
          ctx.beginPath(); ctx.moveTo(x1, y1);
          ctx.quadraticCurveTo(cpx1, cpy1, x2, y2);
          ctx.quadraticCurveTo(cpx2, cpy2, x1, y1); ctx.fill();
        });
        ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
        state.fireParticles = state.fireParticles.filter((p) => p.life > 0);
      },
    },
    'electro-storm': {
      front(opts) {
        const { ctx, cx, cy, fRadius, state, speed, color1, color2, glow } = opts;
        ctx.shadowBlur = glow; ctx.shadowColor = color1; ctx.strokeStyle = color2; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, fRadius, 0, Math.PI * 2); ctx.stroke();
        if (!state.lightningBolt || Math.random() > 0.92) {
          state.lightningBolt = generateLightning(cx, cy, fRadius, 8, 20);
          state.lightningLife = 8 + Math.random() * 6;
        }
        if (state.lightningBolt && state.lightningLife > 0) {
          ctx.shadowBlur = 25; ctx.shadowColor = '#00e5ff'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.5;
          const points = state.lightningBolt;
          ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
          ctx.stroke();
          if (state.lightningLife > 3) {
            ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 1.2; ctx.shadowBlur = 15; ctx.shadowColor = '#00e5ff';
            ctx.beginPath(); const offset = 3 + Math.random() * 4;
            ctx.moveTo(points[0].x + (Math.random() - 0.5) * offset, points[0].y + (Math.random() - 0.5) * offset);
            for (let i = 1; i < points.length; i++) {
              const ox = (Math.random() - 0.5) * 2, oy = (Math.random() - 0.5) * 2;
              ctx.lineTo(points[i].x + ox, points[i].y + oy);
            }
            ctx.stroke();
          }
          state.lightningLife -= 0.5 * speed;
        }
        ctx.shadowBlur = 0;
      },
    },
    'cyber-grid': {
      front(opts) {
        const { ctx, cx, cy, fRadius, state, speed, color1, color2, glow } = opts;
        ctx.shadowBlur = glow; ctx.shadowColor = color1; ctx.strokeStyle = color2; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, fRadius, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0; ctx.strokeStyle = color1; ctx.lineWidth = 1.5;
        for (let i = 0; i < 36; i++) {
          const angle = (i / 36) * Math.PI * 2; const len = i % 3 === 0 ? 10 : 5;
          const r1 = fRadius - 2, r2 = fRadius - 2 - len;
          ctx.beginPath(); ctx.moveTo(cx + Math.cos(angle) * r1, cy + Math.sin(angle) * r1);
          ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2); ctx.stroke();
        }
        const angle = state.tick * 1.2; const grad = ctx.createConicGradient(angle, cx, cy);
        const fade = 0.6 + 0.4 * Math.sin(state.tick * 2);
        grad.addColorStop(0, `rgba(0, 255, 200, ${fade})`); grad.addColorStop(0.05, `rgba(0, 255, 200, ${fade * 0.6})`); grad.addColorStop(0.15, `rgba(0, 255, 200, ${fade * 0.2})`); grad.addColorStop(0.3, 'rgba(0, 255, 200, 0)');
        ctx.shadowBlur = 20; ctx.shadowColor = '#00ffc8'; ctx.lineWidth = 4; ctx.strokeStyle = grad;
        ctx.beginPath(); ctx.arc(cx, cy, fRadius + 4, angle - 0.4, angle + 0.1); ctx.stroke();
        ctx.shadowBlur = 15; ctx.fillStyle = '#00ffc8'; ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 8; ctx.strokeStyle = 'rgba(0, 255, 200, 0.5)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(angle) * (fRadius + 6), cy + Math.sin(angle) * (fRadius + 6)); ctx.stroke();
        ctx.shadowBlur = 0;
      },
    },
    symbiote: {
      back(opts) {
        const { ctx, cx, cy, fRadius, color1 } = opts;
        ctx.shadowBlur = 30; ctx.shadowColor = color1; ctx.fillStyle = color1; ctx.globalAlpha = 0.15;
        ctx.beginPath(); ctx.arc(cx, cy, fRadius + 20, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      },
      front(opts) {
        const { ctx, cx, cy, fRadius, state, speed, color1, color2 } = opts;
        ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, fRadius, 0, Math.PI * 2); ctx.clip();
        const tentacles = 8; const baseLength = fRadius * 0.85;
        ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor = color2;
        for (let i = 0; i < tentacles; i++) {
          const baseAngle = (i / tentacles) * Math.PI * 2; const waveOffset = state.tick * 1.5 + i * 0.8;
          const pulseLen = 1 + 0.2 * Math.sin(state.tick * 1.2 + i * 1.1); const len = baseLength * pulseLen;
          const startWidth = 7 + 2 * Math.sin(state.tick * 0.7 + i); const endWidth = 1 + Math.sin(state.tick * 0.9 + i * 1.3) * 0.5 + 1;
          const segments = 16; const points = [];
          for (let j = 0; j <= segments; j++) {
            const t = j / segments; const angle = baseAngle + t * 0.6 * Math.sin(waveOffset + t * 4); const r = fRadius + t * len;
            const x = cx + Math.cos(angle) * r; const y = cy + Math.sin(angle) * r; const shake = 0.8 + 0.4 * Math.sin(state.tick * 3 + i * 2 + j * 0.7);
            points.push({ x: x + (Math.random() - 0.5) * shake * 0.5, y: y + (Math.random() - 0.5) * shake * 0.5, t });
          }
          const grad = ctx.createLinearGradient(points[0].x, points[0].y, points[points.length - 1].x, points[points.length - 1].y);
          const hue = (i / tentacles) * 360 + state.tick * 20;
          grad.addColorStop(0, color1); grad.addColorStop(0.5, color2); grad.addColorStop(1, `hsl(${hue % 360}, 80%, 60%)`);
          ctx.strokeStyle = grad; ctx.lineWidth = startWidth;
          ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
          for (let j = 1; j < points.length; j++) {
            const cp1x = points[j - 1].x + (points[j].x - points[j - 1].x) * 0.3; const cp1y = points[j - 1].y + (points[j].y - points[j - 1].y) * 0.3;
            const cp2x = points[j].x - (points[j].x - points[j - 1].x) * 0.3; const cp2y = points[j].y - (points[j].y - points[j - 1].y) * 0.3;
            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, points[j].x, points[j].y);

  function generateLightning(cx, cy, radius, segments, spread) {
    const points = [];
    const startAngle = Math.random() * Math.PI * 2; const endAngle = startAngle + (Math.random() - 0.5) * Math.PI * 0.8;
    for (let i = 0; i <= segments; i++) {
      const t = i / segments; const angle = startAngle + (endAngle - startAngle) * t;
      const r = radius + (Math.random() - 0.5) * spread * (1 - t * 0.3);
      points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
    }
    const branches = 2 + Math.floor(Math.random() * 3);
    for (let b = 0; b < branches; b++) {
      const idx = 2 + Math.floor(Math.random() * (segments - 2));
      const base = points[idx];
      const angle = Math.atan2(base.y - cy, base.x - cx) + (Math.random() - 0.5) * 1.2;
      const len = 10 + Math.random() * 30; const subPoints = 3 + Math.floor(Math.random() * 4);
      for (let j = 0; j <= subPoints; j++) {
        const t = j / subPoints;
        points.push({ x: base.x + Math.cos(angle + t * 0.5) * len * t, y: base.y + Math.sin(angle + t * 0.5) * len * t });
      }
    }
    return points;
  }

  // 🌟 ИЗМЕНЕНИЕ: Убрана группировка сообщений в пузыри, каждое сообщение отдельное.
  function renderChatMessages() {
    const snap = window.chatSnapCache;
    if (!snap) return;
    App.messagesCache = {};
    const msgs=[]; snap.forEach(c=>{if(c.val())msgs.push({key:c.key,msg:c.val()});});
    msgs.sort((a,b)=>a.msg.timestamp-b.msg.timestamp);
    let html='';
    
    const renderContent = (m) => {
      let c = ''; if(m.text)c+=esc(m.text);
      if(m.photo)c+=`<br><img class="chat-img" src="${esc(m.thumb||m.photo)}" onclick="event.stopPropagation();window.open('${esc(m.photo)}','_blank')">`;
      if(m.sticker)c+=`<img class="chat-sticker" src="${esc(m.sticker)}">`;
      if(m.photos?.length){c+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">';m.photos.forEach(p=>{const tb=typeof p==='object'?esc(p.thumb):esc(p),fl=typeof p==='object'?esc(p.full):esc(p);c+=`<img class="chat-img" src="${tb}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="event.stopPropagation();window.open('${fl}','_blank')">`;});c+='</div>';}
      return c;
    };
    
    for(let i=0;i<msgs.length;i++){
      const it=msgs[i],m=it.msg;
      const un=cleanName(m.user);
      App.messagesCache[it.key] = m;
      const isM = m.uid ? m.uid === App.user.uid : (App.user&&(m.user==='🌌 '+App.user.name||m.user==='👑 '+App.user.name||m.user===App.user.name));
      const isC = m.user?.startsWith('🌌') || (m.role === 'creator');
      const isG = m.user?.startsWith('👑') || (m.role === 'god');

      let auid = m.uid || null;
      if (!auid) {
        if(isM) auid = App.user.uid;
        else { for(const uid in App.allUserData){ if(cleanName(App.allUserData[uid].name).toLowerCase() === un.toLowerCase()){ auid=uid; break; } } }
      }
      const safeUid = auid ? esc(auid) : '';
      const cleanUnForJs = un.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      
      const avaHtml = `<canvas data-uid="${safeUid}" data-name="${cleanUnForJs}" class="chat-static-avatar canvas-avatar" width="120" height="120" style="width:36px;height:36px;min-width:36px;min-height:36px;" onclick="event.stopPropagation();window.openAvatarPreview('${safeUid}','${cleanUnForJs}')"></canvas>`;
      
      const ns=(isC||isG)?'background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;':'';
      let h=`<div class="chat-bubble-group ${isM?'mine':'other'}"><div class="msg-author" style="${isM?'flex-direction:row-reverse;':''}">${avaHtml}<span style="${ns}">${esc(un)}</span></div>`;
      
      let cls='chat-bubble clickable';
      if(isM) cls+=' mine';
      else if(isC || isG) cls+=' creator';
      else cls+=' other';
      
      const canDelete = isM || App.isCreator || (App.isGod && !isC);
      const canPin = App.isCreator || App.isGod;
      const clickAttr = (canDelete || canPin) ? `onclick="window.openMsgActions('${esc(it.key)}', ${canPin}, ${canDelete})"` : '';
      h+=`<div class="${cls}" ${clickAttr}>${renderContent(m)}</div>`;
      
      h+='</div>';
      html += h;
    }
    
    const ce=$('#chat');
    if(!ce) return;
    const was=ce.scrollHeight-ce.scrollTop-ce.clientHeight<60;
    ce.innerHTML=html;
    document.querySelectorAll('canvas.chat-static-avatar').forEach((c) => {
         const uid = c.dataset.uid; const userData = App.allUserData[uid];
         if(userData) renderPremiumAvatar(c, userData.avatarSettings || {}, userData.imgObj || null, userData.name || '?', 0);
    });
    if(was||document.activeElement===$('#chatMsgInput'))ce.scrollTop=ce.scrollHeight;
  }

    $('#setGlow').addEventListener('input',function(){App.avatarSettings.glow=parseInt(this.value);$('#setGlowVal').textContent=App.avatarSettings.glow+'px';});
    $('#setColor1').addEventListener('input',function(){App.avatarSettings.color1=this.value;});$('#setColor2').addEventListener('input',function(){App.avatarSettings.color2=this.value;});
    $('#setRingColor').addEventListener('input',function(){App.avatarSettings.ringColor=this.value;});$('#setRingThickness').addEventListener('change',function(){App.avatarSettings.ringThickness=this.value;});
    loadPunktsForRegister();
    AUTH.onAuthStateChanged(async user=>{if(user&&!App.user){const snap=await DB.ref('users/'+user.uid).once('value');if(snap.exists()){App.user=snap.val();App.user.uid=user.uid;if(App.user.avatar){App.user.imgObj=new Image();App.user.imgObj.crossOrigin='Anonymous';App.user.imgObj.src=App.user.avatar;}finishLogin();}}});
    window.addEventListener('beforeunload',()=>{if(App.user)DB.ref('presence/'+App.user.uid).set({online:false,ts:Date.now()});});
  }
  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
