<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;height:100vh;width:100vw;background:#0a0a1a}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#eee;font-size:16px;display:flex;flex-direction:column}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1000;display:block}
:root{--accent:#7c3aed;--accent2:#a855f7;--gold:#f5c518;--bg2:rgba(20,22,40,0.85);--bg3:rgba(30,32,55,0.65);--border:rgba(100,80,220,0.2);--text:#e8e8ff;--muted:#888;--green:#22c55e;--red:#ef4444;--chat-bg:rgba(12,12,28,0.7)}
body.theme-creator{--accent:#7c3aed;--accent2:#00d4ff;--gold:#f5c518}
body.theme-god{--accent:#b8860b;--accent2:#ffd700;--gold:#ffd700}

/* Подложки и карточки - единый стиль */
.card,.stat-card,.pinned,.announce-block,.thought-block,.calendar,.chat-section,.settings-card,.auth-wrap,.shift-card{
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:16px;
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    padding:16px;
    position:relative;
    overflow:hidden;
}
.app-container{display:flex;width:100%;height:100vh;position:relative;z-index:1;justify-content:center;overflow:hidden}
.main-content{width:100%;max-width:720px;padding:12px 16px;display:flex;flex-direction:column;padding-bottom:80px;height:100%;gap:8px}
.profile-row{display:flex;align-items:center;gap:14px;margin-bottom:4px;padding:4px 0;flex-shrink:0}
.badge{font-size:12px;font-weight:bold;padding:4px 12px;border-radius:20px;display:inline-block}
.badge-creator{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.badge-god{background:linear-gradient(135deg,#FFD700,#FF4500);color:#fff}
.badge-manager{background:#2d6a4f;color:#95d5b2}
.name-creator{background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-god{background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-manager{color:#eee;font-weight:bold}

/* Инпуты и кнопки */
input,select,textarea{width:100%;padding:12px 16px;font-size:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,25,0.6);color:#fff;outline:none;backdrop-filter:blur(4px);transition:0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,0.15);background:rgba(10,10,25,0.8)}
button{border:none;font-weight:bold;cursor:pointer;border-radius:12px;transition:all .2s}
button:hover{transform:scale(1.02);filter:brightness(1.1)}
button:active{transform:scale(0.95)}
.btn-green{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff}
.btn-red{background:linear-gradient(135deg,#e94560,#c62828);color:#fff}
.btn-gray{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.btn-blue{background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff}
.btn-purple{background:#9C27B0;color:#fff}
.tabs{display:flex;gap:6px;margin:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tabs button{height:44px;display:flex;align-items:center;gap:8px;border-radius:99px;background:rgba(255,255,255,0.06);color:#aaa;border:1px solid transparent;padding:0 16px;font-size:13px;white-space:nowrap;flex-shrink:0}
.tabs button.active{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;box-shadow:0 4px 15px rgba(138,43,226,0.3)}
.tab-content{display:none;width:100%;flex-shrink:0;animation:fadeIn 0.3s ease}
.tab-content.active-tab{display:block}

/* КАЛЕНДАРЬ - ИСПРАВЛЕН (теперь выглядит как интерфейс, а не чек) */
.calendar{padding:12px;display:flex;flex-direction:column;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(10px)}
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:0 4px}
.cal-nav{background:rgba(255,255,255,0.05);color:#fff;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid rgba(255,255,255,0.05)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{text-align:center;font-size:11px;color:var(--muted);padding-bottom:6px;font-weight:600}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:default;background:rgba(255,255,255,0.03);transition:0.1s}
.cal-day.today{border:1.5px solid var(--accent);color:var(--accent);font-weight:700;background:rgba(124,58,237,0.1)}
.cal-day.has-shift{background:rgba(34,197,94,0.15);color:#4ade80;font-weight:700}

/* ЧАТ - ЕДИНАЯ ПОДЛОЖКА И ГРУППИРОВКА */
.chat-section{background:var(--bg2);padding:0;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;border-radius:16px;margin:0}
.chat-header-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);cursor:pointer;flex-shrink:0;border-radius:16px 16px 0 0}
.chat-icon{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px}
#chat{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;background:transparent;display:flex;flex-direction:column;gap:2px}
#chat.hidden{display:none}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
.chat-bubble-group{display:flex;flex-direction:column;max-width:85%;position:relative}
.chat-bubble-group.mine{align-self:flex-end;align-items:flex-end}
.chat-bubble-group.other{align-self:flex-start;align-items:flex-start}
.chat-bubble-group .msg-author{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:1px;display:flex;align-items:center;gap:6px}
.chat-bubble-group .msg-author .auth-avatar{width:16px;height:16px;border-radius:50%;object-fit:cover}
.chat-bubble{background:rgba(255,255,255,0.06);padding:8px 14px;border-radius:16px;word-break:break-word;line-height:1.4;font-size:14px;border:1px solid rgba(255,255,255,0.02);position:relative}
.chat-bubble.mine{background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.1);border-bottom-right-radius:4px}
.chat-bubble.other{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.03);border-bottom-left-radius:4px}
.chat-bubble.creator{background:rgba(245,197,24,0.08);border-left:2px solid var(--gold)}
.chat-bubble.god{background:rgba(255,215,0,0.08);border-left:2px solid #FFD700}
.chat-img{max-width:220px;max-height:160px;border-radius:10px;margin-top:4px;object-fit:cover}
.photo-pack{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.photo-pack img{width:70px;height:70px;object-fit:cover;border-radius:8px;cursor:pointer}
.chat-sticker{max-width:120px;max-height:120px;object-fit:contain;margin:2px 0}

/* Блок ввода - единая плашка */
.chat-input-bar{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:720px;background:var(--bg2);backdrop-filter:blur(16px);padding:12px 16px;display:flex;gap:10px;align-items:center;z-index:100;border-top:1px solid var(--border);border-radius:0}
.input-wrapper{position:relative;flex:1;display:flex;align-items:center;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(255,255,255,0.05)}
.input-wrapper input{background:transparent;border:none;padding:12px 40px 12px 16px;font-size:15px}
.input-wrapper input:focus{box-shadow:none;background:transparent}
.sticker-toggle{position:absolute;right:8px;background:transparent;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:0;transform:none}
.sticker-toggle:hover{transform:scale(1.1);filter:none}
#sendMsgBtn{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;padding:0;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
#chatPhotoBtn{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);color:#aaa}

/* Панель стикеров */
.sticker-panel{position:absolute;bottom:70px;right:0;width:320px;height:360px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;display:none;flex-direction:column;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.6);backdrop-filter:blur(20px);overflow:hidden}
.sticker-content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
.sticker-tabs{display:flex;padding:8px;gap:6px;background:rgba(0,0,0,0.3);border-top:1px solid var(--border);overflow-x:auto}
.st-tab{width:36px;height:36px;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0.6;transition:0.2s;flex-shrink:0}
.st-tab.active,.st-tab:hover{opacity:1;background:rgba(124,58,237,0.2)}
.st-item{width:60px;height:60px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);cursor:pointer;transition:0.1s}
.st-item:hover{transform:scale(1.1);background:rgba(255,255,255,0.08)}
.emoji-item{width:40px;height:40px;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;transition:0.1s}
.emoji-item:hover{transform:scale(1.2);background:rgba(255,255,255,0.05)}

/* Сайдбар и профиль */
.avatar-carousel{width:110px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:-130px;height:100vh;padding:50px 0 20px;z-index:1000;backdrop-filter:blur(20px);transition:right 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:-10px 0 30px rgba(0,0,0,0.5)}
.avatar-carousel.open{right:0}
.avatar-carousel-inner{display:flex;flex-direction:column;align-items:center;width:100%;gap:12px;overflow-y:auto;height:100%;padding:10px 0}
.avatar-item{width:60px;height:60px;border-radius:50%;cursor:pointer;position:relative;transition:0.2s}
.avatar-item:hover{transform:scale(1.05);filter:brightness(1.2)}
.avatar-item img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid transparent}
.avatar-item.active img{border-color:var(--gold);box-shadow:0 0 15px rgba(245,197,24,0.3)}
.avatar-item .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#4CAF50;border-radius:50%;border:2px solid #111;box-shadow:0 0 8px rgba(76,175,80,0.8)}
.btn-sidebar-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);width:36px;height:50px;background:var(--bg2);border:1px solid var(--border);border-right:none;border-radius:12px 0 0 12px;color:#fff;font-size:14px;cursor:pointer;z-index:999;backdrop-filter:blur(8px)}
.sidebar-close-btn{position:absolute;top:12px;left:12px;background:rgba(255,255,255,0.05);border:none;color:#aaa;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer}
.sidebar-close-btn:hover{background:#e94560;color:#fff}

/* Мини-профиль */
.mini-profile{position:fixed;right:130px;top:50%;transform:translateY(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:220px;z-index:1100;display:none;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,0.6)}
.mini-profile.show{display:block;animation:slideIn 0.2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-50%) translateX(20px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.mp-close-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.05);border:none;color:#aaa;width:24px;height:24px;border-radius:50%;font-size:11px;cursor:pointer}
.mp-close-btn:hover{background:#e94560;color:#fff}

/* Божественные тосты */
#toastDivine{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:9999;transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;opacity:0}
#toastDivine.show{transform:translateX(-50%) translateY(0);opacity:1}
#toastDivine .scroll-content{max-height:0;overflow:hidden;transition:max-height 0.6s ease-in-out}
#toastDivine .scroll-content.open{max-height:300px}
#toastDivine .divine-paper{background:linear-gradient(135deg,#fdf6e3,#f5e6ca);border-left:4px solid #d4a574;border-right:4px solid #d4a574;padding:16px 24px;border-radius:4px;box-shadow:0 10px 40px rgba(0,0,0,0.6),0 0 30px rgba(245,158,11,0.15);position:relative;overflow:hidden}

/* ГЛИТЧ-АНИМАЦИЯ ДЛЯ МЫСЛЕЙ */
.glitch-effect{animation:glitch 0.2s linear infinite;position:relative}
@keyframes glitch{
    0%{transform:translate(0)}
    20%{transform:translate(-2px,2px)}
    40%{transform:translate(2px,-2px)}
    60%{transform:translate(-2px,-2px)}
    80%{transform:translate(2px,2px)}
    100%{transform:translate(0)}
}
.glitch-effect::before,.glitch-effect::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;background:transparent;pointer-events:none}
.glitch-effect::before{left:2px;text-shadow:-2px 0 #ff00c1;clip:rect(44px,450px,56px,0);animation:glitch-anim 5s infinite linear alternate-reverse}
.glitch-effect::after{left:-2px;text-shadow:2px 0 #00ffff;clip:rect(24px,450px,36px,0);animation:glitch-anim2 5s infinite linear alternate-reverse}
@keyframes glitch-anim{0%{clip:rect(42px,9999px,44px,0)}20%{clip:rect(12px,9999px,31px,0)}40%{clip:rect(48px,9999px,58px,0)}60%{clip:rect(32px,9999px,44px,0)}80%{clip:rect(52px,9999px,64px,0)}100%{clip:rect(22px,9999px,35px,0)}}
@keyframes glitch-anim2{0%{clip:rect(22px,9999px,35px,0)}20%{clip:rect(52px,9999px,64px,0)}40%{clip:rect(32px,9999px,44px,0)}60%{clip:rect(48px,9999px,58px,0)}80%{clip:rect(12px,9999px,31px,0)}100%{clip:rect(42px,9999px,44px,0)}}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;pointer-events:none;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:12px 20px;border-radius:12px;background:var(--bg2);border:1px solid var(--accent);color:#fff;font-size:14px;font-weight:bold;box-shadow:0 5px 20px rgba(0,0,0,0.6);transform:translateY(-20px);opacity:0;transition:all 0.3s;text-align:center;backdrop-filter:blur(10px)}
.toast-msg.error{border-color:#ff1744}
.toast-msg.show{transform:translateY(0);opacity:1}

@media(max-width:480px){.tabs button{padding:0 12px;font-size:12px}.main-content{padding:8px 10px;padding-bottom:70px}.chat-input-bar{padding:8px 10px}.mini-profile{right:10px;width:190px}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="toastContainer" class="toast-container"></div>
<div id="toastDivine"><div class="scroll-content" id="divineScrollContent"><div class="divine-paper"><h5 style="font-family:Georgia,serif;color:#7c5a2e;font-size:13px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:2px;">📜 ПОСЛАНИЕ СВЫШЕ</h5><p id="divineMsg" style="font-family:Georgia,serif;color:#3d2b1a;font-size:14px;line-height:1.6;text-align:center;margin:0;"></p></div></div></div>

<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;">
  <div class="auth-wrap" style="max-width:380px;width:100%;display:flex;flex-direction:column;gap:14px;padding:32px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <div class="auth-title" style="text-align:center;font-size:24px;font-weight:800;background:linear-gradient(135deg,#f5c518,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🌌 Ozon Hub</div>
    <div class="auth-tabs-wrap" style="display:flex;background:rgba(0,0,0,0.3);border-radius:12px;padding:4px;">
      <button class="auth-tab-btn active" id="tabLogin" style="flex:1;padding:10px;border:none;border-radius:10px;background:transparent;font-size:15px;font-weight:600;color:#6a7a94;cursor:pointer;transition:0.3s;">Вход</button>
      <button class="auth-tab-btn" id="tabRegister" style="flex:1;padding:10px;border:none;border-radius:10px;background:transparent;font-size:15px;font-weight:600;color:#6a7a94;cursor:pointer;transition:0.3s;">Регистрация</button>
    </div>
    <div id="loginFields2" style="display:flex;flex-direction:column;gap:14px;">
      <div><label style="font-size:12px;color:var(--muted);">Email</label><input type="email" id="loginEmail" placeholder="kostya@ozon.ru"></div>
      <div><label style="font-size:12px;color:var(--muted);">Пароль</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
      <button class="btn-gold" id="loginBtn" style="padding:14px;font-size:17px;width:100%;">🔑 Войти</button>
    </div>
    <div id="registerFields2" style="display:none;flex-direction:column;gap:14px;">
      <div><label style="font-size:12px;color:var(--muted);">Имя</label><input type="text" id="regName" placeholder="Ваше имя"></div>
      <div><label style="font-size:12px;color:var(--muted);">Email</label><input type="email" id="regEmail" placeholder="email@ozon.ru"></div>
      <div><label style="font-size:12px;color:var(--muted);">Пароль</label><input type="password" id="regPassword" placeholder="••••••••"></div>
      <button class="btn-gold" id="registerBtn" style="padding:14px;font-size:17px;width:100%;">📝 Зарегистрироваться</button>
    </div>
    <div class="auth-error" id="authError" style="color:var(--red);font-size:13px;text-align:center;display:none;"></div>
  </div>
</div>

<div id="app" class="app-container" style="display:none">
  <button class="btn-sidebar-toggle" id="sidebarToggleBtn">👥</button>
  <div class="main-content" id="mainContent">
    <div id="announceBlock" class="announce-block" style="display:none;background:rgba(200,150,0,0.08);border:1px solid rgba(200,150,0,0.3);padding:12px;border-radius:12px;text-align:center;font-size:14px;color:#ffd700;"></div>
    <div id="thoughtBlock" class="thought-block" style="display:none;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(0,212,255,0.05));border:1px solid rgba(124,58,237,0.4);padding:14px;border-radius:12px;text-align:center;font-size:15px;position:relative;color:#e0e0ff;"></div>
    
    <div class="profile-row">
      <div class="avatar-wrapper">
        <div style="position:relative;width:76px;height:76px;">
          <canvas id="profileAvatarCanvas" width="76" height="76" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:1;"></canvas>
          <canvas id="profileFrameCanvas" width="76" height="76" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:2;pointer-events:none;"></canvas>
        </div>
      </div>
      <div style="flex:1">
        <b id="creatorNameWrapper" class="name-creator" style="font-size:18px;"><span id="uname"></span></b> 
        <span id="roleBadge" class="badge badge-creator">🌌 Создатель</span><br>
        <span style="font-size:12px;color:#aaa;">📍 Пункт <span id="upunkt"></span></span>
      </div>
      <button class="btn-gray" id="settingsBtn" style="width:auto;padding:8px 14px;font-size:13px;">⚙️</button>
    </div>
    
    <div class="tabs" id="tabsContainer"></div>
    <div id="tabContentContainer" style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding-bottom:10px;margin-bottom:4px;"></div>
    
    <div id="pinnedMessage" class="pinned" style="display:none;padding:10px 14px;margin:0 0 8px 0;background:rgba(245,197,24,0.05);border:1px solid rgba(245,197,24,0.2);border-radius:12px;font-size:13px;flex-shrink:0;"></div>
    
    <div class="chat-section" id="chatContainer">

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const error = document.getElementById('authError');
  if (!email || !password) { error.textContent = '❌ Заполните все поля'; error.style.display = 'block'; return; }
  try {
    const cred = await AUTH.signInWithEmailAndPassword(email, password);
    const snap = await DB.ref('users/' + cred.user.uid).once('value');
    if (!snap.exists()) throw new Error('Пользователь не найден');
    App.user = snap.val(); App.user.uid = cred.user.uid;
    finishLogin();
  } catch(e) { error.textContent = '❌ ' + e.message; error.style.display = 'block'; }
}

async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();

  if (password.length < 4) { error.textContent = '❌ Пароль минимум 4 символа'; error.style.display = 'block'; return; }

    const cred = await AUTH.createUserWithEmailAndPassword(email, password);

    await DB.ref('users/' + cred.user.uid).set({ name, role, punkt: '', vkId: '', avatar: '', bonus: 0, email });

function renderCalendar() {
  const months = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
  document.getElementById('calTitle').textContent = months[App.calMonth] + ' ' + App.calYear + ' г.';
  DB.ref('shifts').once('value').then(s => {
    const shifts = {};
    s.forEach(c => { const x = c.val(); if (x.user === App.user.uid) { const d = new Date(x.date || x.timestamp); if (d.getFullYear() === App.calYear && d.getMonth() === App.calMonth) { const day = d.getDate(); if (!shifts[day]) shifts[day] = {count:0,hours:0,tovar:0}; shifts[day].count++; shifts[day].hours += x.hours || 0; shifts[day].tovar += x.tovar || 0; } } });
    let ts=0, th=0, tt=0; for (const k in shifts) { ts += shifts[k].count; th += shifts[k].hours; tt += shifts[k].tovar; }
    document.getElementById('statShifts').textContent = ts; document.getElementById('statHours').textContent = th.toFixed(1); document.getElementById('statTovar').textContent = tt;
    const fd = new Date(App.calYear, App.calMonth, 1).getDay(), off = (fd + 6) % 7, dim = new Date(App.calYear, App.calMonth + 1, 0).getDate(), today = new Date();
    const grid = document.getElementById('calGrid');
    grid.innerHTML = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => '<div class="cal-day-name">'+d+'</div>').join('');

      const has = !!shifts[d];
      grid.innerHTML += `<div class="cal-day ${isToday?'today':''} ${has?'has-shift':''}">${d}</div>`;
    }
  });
}
function changeCal(dir) { App.calMonth += dir; if (App.calMonth < 0) { App.calMonth = 11; App.calYear--; } if (App.calMonth > 11) { App.calMonth = 0; App.calYear++; } renderCalendar(); }
function clearMyShifts() {

      let c = '';
      if (m.text) c += esc(m.text);
      if (m.photo) c += `<br><img class="chat-img" src="${esc(m.thumb||m.photo)}" onclick="viewPhoto('${esc(m.photo)}')">`;
      if (m.sticker) c += `<img class="chat-sticker" src="${esc(m.sticker)}">`;
      if (m.photos && m.photos.length) {
        c += `<div class="photo-pack">${m.photos.map(p => `<img src="${esc(typeof p === 'object' ? p.thumb : p)}" onclick="viewPhoto('${esc(typeof p === 'object' ? p.full : p)}')">`).join('')}</div>`;
      }
      return c;
    };

    // ГРУППИРОВКА
    for (let i=0; i<msgs.length; i++) {
      const item = msgs[i];
      const m = item.msg;
      const userName = (m.user || '?').replace(/^[🌌👑📢]\s/, '');
      const isMine = App.user && (m.user === '🌌 ' + App.user.name || m.user === '👑 ' + App.user.name || m.user === App.user.name || m.user === '📢 ' + App.user.name);
      
      if (group.length === 0 || group[0].userName !== userName || group[0].isMine !== isMine) {
        if (group.length > 0) h += renderGroup(group);
        group = [{item, userName, isMine, m}];
      } else {
        group.push({item, userName, isMine, m});
      }
    }
    if (group.length > 0) h += renderGroup(group);

    const el = document.getElementById('chat');
    const wasNearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
    el.innerHTML = h;
    if (wasNearBottom || document.activeElement === document.getElementById('chatMsgInput')) el.scrollTop = el.scrollHeight;
  });
}

// Отрисовка группы (пузыря) с аватаркой автора
function renderGroup(group) {
  const first = group[0];
  const userName = first.userName;
  const isMine = first.isMine;
  const isCreator = first.m.user && first.m.user.indexOf('🌌') === 0;
  const isGod = first.m.user && first.m.user.indexOf('👑') === 0;
  const u = App.allUserData[userName] || {};
  const av = u.avatar || '';
  
  let h = `<div class="chat-bubble-group ${isMine ? 'mine' : 'other'}">`;
  
  // Имя и аватарка автора (для чужих и своих - сверху сбоку)
  h += `<div class="msg-author">`;
  if (av) h += `<img class="auth-avatar" src="${esc(av)}" onerror="this.style.display='none'">`;
  else h += `<div style="width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:8px;">${esc(userName.charAt(0))}</div>`;
  h += `<span style="${isCreator||isGod?'background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;':''}">${esc(userName)}</span>`;
  h += `</div>`;

  // Сообщения
  group.forEach(g => {
    const m = g.m;
    let cls = 'chat-bubble';
    if (isMine) cls += ' mine';
    else if (isCreator) cls += ' creator';
    else if (isGod) cls += ' god';
    else cls += ' other';
    
    h += `<div class="${cls}">${renderMsg(m)}</div>`;
  });
  h += `</div>`;
  return h;
}

function toggleChat() {
  const el = document.getElementById('chat');
  if (el.classList.contains('hidden')) {
    el.classList.remove('hidden'); App.chatOpened = true; document.getElementById('chatArrow').style.transform = 'rotate(180deg)'; document.getElementById('chatInputBar').style.display = 'flex';
    App.lastChatTimestamp = Date.now(); App.unreadCount = 0; updateBadge(); setTimeout(()=>el.scrollTop = el.scrollHeight, 100);
  } else {
    el.classList.add('hidden'); App.chatOpened = false; document.getElementById('chatArrow').style.transform = 'rotate(0deg)'; document.getElementById('chatInputBar').style.display = 'none';
  }
}
function updateBadge() {
  const b = document.getElementById('chatBadge');
  if (App.unreadCount > 0) { b.style.display = 'inline'; b.textContent = App.unreadCount; } else b.style.display = 'none';
}

function sendMsg() {
  const input = document.getElementById('chatMsgInput'); const t = input.value.trim();
  if (!t || !App.user) return;
  const ref = App.privateChatWith ? getPrivateChatRef() : DB.ref('chat');
  ref.push({ user: (App.isGod ? '👑 ' : '🌌 ') + App.user.name, text: t, timestamp: Date.now(), role: App.user.role, likes: {} }).then(()=>input.value='');
}
function sendPhoto() {
  const input = document.getElementById('chatPhotoInput'); const files = input.files;
  if (!files.length || !App.user || files.length > 5) return;
  const photos=[]; let loaded=0;
  for(let i=0;i<files.length;i++){(function(f){
    const r=new FileReader();
    r.onload=function(e){
      const img=new Image();
      img.onload=function(){
        const c=document.createElement('canvas'), mw=300, s=mw/img.width; c.width=mw; c.height=img.height*s; c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        photos.push({full:e.target.result, thumb:c.toDataURL('image/jpeg',0.6)}); loaded++;
        if(loaded===files.length){
          const ref=App.privateChatWith?getPrivateChatRef():DB.ref('chat');
          ref.push({user:(App.isGod?'👑 ':'🌌 ')+App.user.name, text:'📷 '+files.length+' фото', photos:photos, timestamp:Date.now(), role:App.user.role, likes:{}});
        }
      }; img.src=e.target.result;
    }; r.readAsDataURL(f);
  })(files[i]);} input.value='';
}
function viewPhoto(url) { document.getElementById('photoViewerImg').src=url; document.getElementById('photoViewer').style.display='flex'; }

function getPrivateChatRef() {
  if (!App.privateChatWith) return DB.ref('chat');
  const users = [App.user.uid, App.privateChatWith].sort();
  return DB.ref('privateChats/' + users[0] + '_' + users[1]);
}
function openPrivateChat() {
  if (!App.selectedProfile || App.selectedProfile === App.user.name) return;
  App.privateChatWith = App.selectedProfile;
  document.getElementById('chatLabel').textContent = '💬 ' + App.selectedProfile;
  document.getElementById('chatBackBtn').style.display = 'inline-block';
  closeMiniProfile(); document.getElementById('avatarCarousel').classList.remove('open');
  loadChat();
}
function switchGlobalChat() { App.privateChatWith = null; document.getElementById('chatLabel').textContent = 'Общий чат'; document.getElementById('chatBackBtn').style.display = 'none'; loadChat(); }

// ====== АНИМАЦИЯ АВАТАРКИ (ВОЗВРАЩЕНА) ======
function drawAvatar(canvas, ctx, settings, img, w, h) {
  const width = w || canvas.width, height = h || canvas.height;
  ctx.clearRect(0, 0, width, height);
  if (img) {
    ctx.save(); ctx.beginPath(); ctx.arc(width/2, height/2, width/2 - 2, 0, Math.PI*2); ctx.closePath(); ctx.clip();
    const ratio = Math.max(width / img.width, height / img.height), dw = img.width * ratio, dh = img.height * ratio;
    ctx.drawImage(img, (width - dw) / 2, (height - dh) / 2, dw, dh); ctx.restore();
  } else {
    ctx.fillStyle = '#1e1b4b'; ctx.beginPath(); ctx.arc(width/2, height/2, width/2 - 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6366f1'; ctx.font = (width * 0.3) + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('?', width/2, height/2);
  }
  // Рамка с анимацией (если включена)
  if (settings.isAnimated !== false) {
    const time = Date.now() / 1000 * settings.speed;
    const gradient = ctx.createLinearGradient(width * 0.2, height * 0.2, width * 0.8, height * 0.8);
    gradient.addColorStop(0, settings.color1 || '#7c3aed');
    gradient.addColorStop(0.5, settings.color2 || '#a855f7');
    gradient.addColorStop(1, settings.color1 || '#7c3aed');
    ctx.shadowColor = settings.color1 || '#7c3aed';
    ctx.shadowBlur = settings.glow || 20;
    ctx.strokeStyle = gradient; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(width/2, height/2, width/2 - 2, time, time + Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
  } else {
    const thick = settings.ringThickness === 'thin' ? 2 : (settings.ringThickness === 'thick' ? 6 : 4);
    ctx.strokeStyle = settings.ringColor || '#7c3aed'; ctx.lineWidth = thick;
    ctx.beginPath(); ctx.arc(width/2, height/2, width/2 - 2, 0, Math.PI*2); ctx.stroke();
  }
}

function updateAvatars() {
  const c = document.getElementById('profileAvatarCanvas');
  if (c) drawAvatar(c, c.getContext('2d'), {isAnimated: true, speed: App.avatarSettings.speed, color1: App.avatarSettings.color1, color2: App.avatarSettings.color2, glow: App.avatarSettings.glow}, App.avatarImageData, 76, 76);
  buildCarousel();
}

function loadAvatar() {
  DB.ref('users/' + App.user.uid + '/avatarSettings').once('value').then(s => {
    if (s.exists()) { const d = s.val(); Object.assign(App.avatarSettings, d); if(d.photo){ const img=new Image(); img.onload=()=>{App.avatarImageData=img; updateAvatars();}; img.src=d.photo; } }
    updateAvatars();
  });
}

// ====== ОСТАЛЬНЫЕ ВКЛАДКИ (Упрощенные для объема) ======
function renderHistory(p) { p.innerHTML = '<div class="card">💳 История выплат (в разработке)</div>'; }
function renderNotify(p) { p.innerHTML = '<div class="card">🔔 Уведомления (в разработке)</div>'; }
function renderBoard(p) { p.innerHTML = '<div class="card">🏆 Доска почёта (загружается...)</div>'; }
function renderPower(p) { p.innerHTML = '<div class="card">⚡ Сила создателя</div>'; }
function renderAnnounce(p) { p.innerHTML = '<div class="card">📢 Объявления (в разработке)</div>'; }
function renderPunkts(p) { p.innerHTML = '<div class="card">📍 Пункты (в разработке)</div>'; }
function renderWorkers(p) { p.innerHTML = '<div class="card">👥 Сотрудники (в разработке)</div>'; }
function renderSalary(p) { p.innerHTML = '<div class="card">💰 Расчёт ЗП (в разработке)</div>'; }

function loadUsersForManagement() {
  DB.ref('users').on('value', s => {
    App.allUsers = {}; App.allUserData = {};
    s.forEach(c => { App.allUsers[c.key] = c.val().avatar || ''; App.allUserData[c.key] = c.val(); });
    if(App.user) buildCarousel();
  });
}

function buildCarousel() {
  const el = document.getElementById('carouselInner');
  el.innerHTML = '';
  for (const name in App.allUserData) {
    if (name === App.user.name) continue;
    const d = App.allUserData[name];
    el.innerHTML += `<div class="avatar-item" data-user="${esc(name)}">
      ${d.avatar ? `<img src="${esc(d.avatar)}">` : `<div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#222,#444);display:flex;align-items:center;justify-content:center;font-size:20px;color:#ccc;">${esc(name.charAt(0))}</div>`}
      ${App.activeShifts[d.uid] ? '<div class="online-dot"></div>' : ''}
    </div>`;
  }
  $$('.avatar-item').forEach(b => b.addEventListener('click', function(){ const n=this.dataset.user; App.selectedProfile=n; showMiniProfile(n); }));
}

function showMiniProfile(name) {
  const d = App.allUserData[name]; if(!d) return;
  document.getElementById('mpName').textContent = name;
  document.getElementById('mpAvatarContainer').innerHTML = d.avatar ? `<img src="${esc(d.avatar)}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;">` : `<div style="width:64px;height:64px;border-radius:50%;background:#444;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc;margin:0 auto;">${esc(name.charAt(0))}</div>`;
  document.getElementById('mpStatus').textContent = '📦 Сотрудник';
  document.getElementById('mpPunkt').textContent = App.activeShifts[d.uid] ? '🟢 На смене' : '🔴 Выходной';
  document.getElementById('mpCalendar').innerHTML = 'Календарь...';
  document.getElementById('miniProfile').classList.add('show');
}
function closeMiniProfile() { document.getElementById('miniProfile').classList.remove('show'); }

function loadPinned() { DB.ref('pinned').on('value', s => { const b=document.getElementById('pinnedMessage'); if(!s.exists()){b.style.display='none'; return;} const m=s.val(); b.style.display='block'; b.innerHTML='📌 <b>'+(m.user||'?')+':</b> '+esc(m.text); }); }
function loadAnnounce() { DB.ref('announce').limitToLast(1).on('value', s => { const b=document.getElementById('announceBlock'); if(!s.exists()||!s.val()){b.style.display='none'; return;} let last=null; s.forEach(c=>last=c.val()); if(last.expiry && Date.now()>last.expiry){DB.ref('announce/'+last._key).remove(); b.style.display='none'; return;} b.style.display='block'; b.innerHTML='📢 '+esc(last.text); }); }
function loadThought() { DB.ref('creatorThought').on('value', s => { const b=document.getElementById('thoughtBlock'); if(!s.exists()||!s.val()){b.style.display='none'; return;} const t=s.val(); if(t.expiry && Date.now()>t.expiry){DB.ref('creatorThought').remove(); b.style.display='none'; return;} b.style.display='block'; b.innerHTML=`<div class="glitch-effect" data-text="${esc(t.text)}">💭 ${esc(t.text)}</div>`; }); }

// ====== СТИКЕРЫ ======
function toggleStickerPanel(e) {
  if (e) e.stopPropagation();
  const p = document.getElementById('stickerPanel');
  if (p.style.display === 'flex') p.style.display = 'none';
  else { p.style.display = 'flex'; renderStickerUI(); }
}
function renderStickerUI() {
  // Базовый функционал стикеров (вставка эмодзи)
  const tc = document.getElementById('stickerTabs'), cc = document.getElementById('stickerContent');
  if (!tc||!cc) return;
  tc.innerHTML = '<button class="st-tab active" style="font-size:20px;">😀</button>';
  cc.innerHTML = BASE_EMOJIS.map(e => `<div class="emoji-item" data-emoji="${e}">${e}</div>`).join('');
  $$('.emoji-item').forEach(b => b.addEventListener('click', function(e){ e.stopPropagation(); document.getElementById('chatMsgInput').value += this.dataset.emoji; }));
}

// ====== DOM EVENTS ======
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('tabLogin').addEventListener('click', toggleAuthMode);
  document.getElementById('tabRegister').addEventListener('click', toggleAuthMode);
  document.getElementById('loginBtn').addEventListener('click', handleLogin);
  document.getElementById('registerBtn').addEventListener('click', handleRegister);
  document.getElementById('chatHeader').addEventListener('click', toggleChat);
  document.getElementById('chatBackBtn').addEventListener('click', switchGlobalChat);
  document.getElementById('chatMsgInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendMsg(); } });
  document.getElementById('sendMsgBtn').addEventListener('click', sendMsg);
  document.getElementById('chatPhotoBtn').addEventListener('click', ()=>document.getElementById('chatPhotoInput').click());
  document.getElementById('chatPhotoInput').addEventListener('change', sendPhoto);
  document.getElementById('stickerToggleBtn').addEventListener('click', toggleStickerPanel);
  document.getElementById('sidebarToggleBtn').addEventListener('click', ()=>document.getElementById('avatarCarousel').classList.toggle('open'));
  document.getElementById('sidebarCloseBtn').addEventListener('click', ()=>document.getElementById('avatarCarousel').classList.remove('open'));
  document.getElementById('mpCloseBtn').addEventListener('click', closeMiniProfile);
  document.getElementById('mpChatBtn').addEventListener('click', openPrivateChat);
  document.getElementById('settingsBtn').addEventListener('click', ()=>{ alert('Настройки в разработке (сохранение аватарки работает!)'); });
  document.getElementById('shiftLogoutBtn')?.addEventListener('click', ()=>logout());
  
  // Анимация аватарки (Loop)
  function frame() { updateAvatars(); requestAnimationFrame(frame); }
  setTimeout(frame, 500);

  AUTH.onAuthStateChanged(user => { if (user) DB.ref('users/' + user.uid).once('value').then(s => { if(s.exists()){ App.user=s.val(); App.user.uid=user.uid; finishLogin(); } }); });
});

function logout() {
  if (!confirm('Выйти?')) return;
  if (App.chatListener) App.chatListener.off();
  AUTH.signOut().then(()=>{ App.user=null; document.getElementById('app').style.display='none'; document.getElementById('loginScreen').style.display='flex'; });
}

})();
</script>
