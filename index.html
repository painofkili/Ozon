<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ozon Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; background: #1a1a2e url('bg.jpg') center/cover fixed; color: #eee; padding: 0; max-width: 100%; margin: 0 auto; font-size: 16px; }
body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,26,46,0.75); z-index: -1; }
.app-container { display: flex; width: 100%; min-height: 100vh; }
.main-content { flex: 1; padding: 10px 15px; overflow-y: auto; height: 100vh; overflow-x: visible; }
.avatar-carousel { width: 85px; min-width: 85px; background: rgba(22,33,62,0.9); border-left: 1px solid rgba(138,43,226,0.3); display: flex; align-items: center; justify-content: center; overflow: visible; max-height: 100vh; position: relative; perspective: 500px; padding: 20px 5px; }
.avatar-carousel-inner { display: flex; flex-direction: column; align-items: center; transform-style: preserve-3d; padding: 0; }
.avatar-item { width: 46px; height: 46px; min-height: 46px; border-radius: 50%; margin: 5px 0; cursor: pointer; flex-shrink: 0; position: relative; transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s ease, box-shadow 0.3s ease; }
.avatar-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
.avatar-item .av-placeholder { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #444, #555); display: flex; align-items: center; justify-content: center; font-size: 16px; color: #ccc; font-weight: bold; }
.avatar-item.active .av-placeholder { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; }
.avatar-item.active { box-shadow: 0 0 30px rgba(138,43,226,0.9), 0 0 60px rgba(138,43,226,0.4); }
.avatar-item .online-dot { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; background: #4CAF50; border-radius: 50%; border: 2px solid #1a1a2e; }
.mini-profile { position: fixed; right: 100px; top: 50%; transform: translateY(-50%); background: rgba(22,33,62,0.97); border: 1px solid rgba(138,43,226,0.5); border-radius: 14px; padding: 14px; width: 250px; z-index: 100; display: none; backdrop-filter: blur(15px); box-shadow: 0 8px 30px rgba(0,0,0,0.6); }
.mini-profile.show { display: block; animation: slideIn 0.2s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-50%) translateX(15px); } to { opacity: 1; transform: translateY(-50%) translateX(0); } }
.mini-profile .mp-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; margin: 0 auto; display: block; }
.mini-profile .mp-placeholder { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #444, #555); display: flex; align-items: center; justify-content: center; font-size: 20px; color: #ccc; margin: 0 auto; }
.mini-profile .mp-name { text-align: center; font-weight: bold; font-size: 15px; margin-top: 6px; }
.mini-profile .mp-status { text-align: center; font-size: 11px; padding: 3px 8px; border-radius: 10px; display: inline-block; margin: 3px auto; width: fit-content; background: #444; }
.mini-profile .mp-punkt { text-align: center; font-size: 11px; color: #aaa; }
.mini-profile .mp-calendar { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; text-align: center; font-size: 9px; margin-top: 6px; }
.mini-profile .mp-calendar div { padding: 3px; border-radius: 2px; }
.mini-profile .mp-calendar .mp-shift { background: #4CAF50; color: #fff; }
.mini-profile .mp-btn { width: 100%; padding: 8px; margin-top: 6px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; }
.card { background: rgba(22,33,62,0.85); padding: 14px; border-radius: 14px; margin: 6px 0; backdrop-filter: blur(10px); border: 1px solid rgba(138,43,226,0.2); overflow: visible; }
input, select, textarea { width: 100%; padding: 12px; font-size: 15px; margin: 3px 0; border-radius: 10px; border: 1px solid #444; background: rgba(26,26,46,0.8); color: #fff; }
button { border: none; font-weight: bold; cursor: pointer; border-radius: 10px; transition: all 0.2s; }
.btn-green { background: #4CAF50; color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
.btn-blue { background: #2196F3; color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
.btn-red { background: #e94560; color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
.btn-gray { background: #555; color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
.btn-gold { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
button:disabled { opacity: 0.5; cursor: default; }
.avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; cursor: pointer; }
.avatar-creator { border: 3px solid transparent; background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF, #f5c518); background-size: 400% 400%; animation: galaxyGlow 3s infinite; box-shadow: 0 0 30px rgba(138, 43, 226, 0.7), 0 0 60px rgba(0, 191, 255, 0.3); }
@keyframes galaxyGlow { 0% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(138, 43, 226, 0.7), 0 0 60px rgba(0, 191, 255, 0.3); } 50% { background-position: 100% 50%; box-shadow: 0 0 50px rgba(245, 197, 24, 0.9), 0 0 80px rgba(138, 43, 226, 0.6); } 100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(138, 43, 226, 0.7), 0 0 60px rgba(0, 191, 255, 0.3); } }
.avatar-mini { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; margin-right: 4px; vertical-align: middle; }
.avatar-mini-creator { border: 2px solid #8B00FF; box-shadow: 0 0 10px rgba(138, 43, 226, 0.5); }
.profile-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; overflow: visible; padding: 5px 0; }
.creator-badge { font-size: 12px; font-weight: bold; padding: 3px 10px; border-radius: 12px; background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; animation: galaxyGlow 3s infinite; display: inline-block; }
.creator-name { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
.tabs { display: flex; gap: 4px; margin: 10px 0; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tabs button { width: 42px; height: 42px; display: flex; align-items: center; gap: 0.5rem; overflow: hidden; border-radius: 999px; transition: width .35s cubic-bezier(.22, 1, .36, 1), background .3s ease; background: #333; color: #aaa; border: none; cursor: pointer; padding: 0 10px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
.tabs button:hover { width: 110px; background: rgba(255,255,255,0.12); color: #fff; }
.tabs button.active { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; width: 110px; }
.tabs button .menu-icon { font-size: 17px; flex-shrink: 0; }
.tabs button .menu-label { opacity: 0; max-width: 0; transform: translateX(-6px); transition: opacity .2s ease, max-width .35s ease, transform .3s ease; }
.tabs button:hover .menu-label, .tabs button.active .menu-label { opacity: 1; max-width: 75px; transform: translateX(0); }
.chat-section { margin: 8px 0; }
.chat-header-bar { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 12px 16px; background: rgba(22,33,62,0.85); border-radius: 14px; border: 1px solid rgba(138,43,226,0.3); backdrop-filter: blur(10px); transition: all 0.3s; font-size: 15px; }
.chat-header-bar .chat-icon { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #f5c518, #8B00FF); display: flex; align-items: center; justify-content: center; font-size: 17px; animation: galaxyGlow 3s infinite; flex-shrink: 0; }
.chat-header-bar .chat-label { flex: 1; font-weight: bold; font-size: 15px; background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.chat-header-bar .chat-arrow { color: #aaa; font-size: 13px; transition: transform 0.3s; }
.chat-header-bar .chat-arrow.open { transform: rotate(180deg); }
.chat-header-bar .chat-badge { background: #e94560; color: #fff; border-radius: 50%; min-width: 22px; height: 22px; font-size: 11px; text-align: center; line-height: 22px; padding: 0 5px; }
.chat-back-btn { background: none; border: 1px solid rgba(138,43,226,0.4); color: #aaa; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; display: none; }
#chat { overflow-y: auto; overflow-x: visible; padding: 8px; border-radius: 12px; margin: 4px 0; background: rgba(22,33,62,0.75); font-size: 13px; transition: max-height 0.4s ease, padding 0.4s ease, margin 0.4s ease; max-height: 280px; border: 1px solid rgba(138,43,226,0.15); }
#chat.hidden { max-height: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important; margin-top: 0 !important; margin-bottom: 0 !important; overflow: hidden; opacity: 0; border: none; }
.chat-bubble-group { margin: 5px 0; display: flex; flex-direction: column; position: relative; overflow: visible; }
.chat-bubble-group.mine { align-items: flex-end; }
.chat-bubble-group.other { align-items: flex-start; }
.chat-bubble { background: rgba(30,30,55,0.9); padding: 7px 11px; border-radius: 14px; margin: 2px 0; display: inline-block; max-width: 82%; font-size: 13px; word-break: break-word; border: 1px solid rgba(255,255,255,0.06); position: relative; }
.chat-bubble.mine { background: rgba(76,175,80,0.25); border: 1px solid rgba(76,175,80,0.3); }
.chat-msg-creator { background: linear-gradient(135deg, rgba(245,197,24,0.2), rgba(138,43,226,0.25)); border: 1px solid rgba(138,43,226,0.5); padding: 8px 12px; border-radius: 12px; margin: 2px 0; animation: creatorBubblePulse 2.5s infinite alternate; display: inline-block; max-width: 82%; position: relative; }
@keyframes creatorBubblePulse { 0% { box-shadow: 0 0 10px rgba(138,43,226,0.3); } 100% { box-shadow: 0 0 20px rgba(245,197,24,0.4); } }
.chat-msg-creator .author { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
#chat .chat-img { max-width: 220px; max-height: 160px; border-radius: 10px; margin: 5px 0; cursor: pointer; object-fit: cover; }
#chat .thumb { width: 75px; height: 75px; object-fit: cover; border-radius: 8px; cursor: pointer; margin: 3px; display: inline-block; }
#chat .photo-pack { display: flex; gap: 4px; flex-wrap: wrap; margin: 5px 0; }
.msg-menu-btn { position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.5); color: #ccc; border: none; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 2; padding: 0; }
.chat-bubble:hover .msg-menu-btn, .chat-msg-creator:hover .msg-menu-btn { opacity: 1; }
.msg-menu-btn:hover { background: rgba(138,43,226,0.7); color: #fff; }
.msg-dropdown { position: absolute; top: 28px; right: 0; background: rgba(30,30,55,0.98); border-radius: 14px; padding: 6px 8px; display: none; gap: 5px; z-index: 10; border: 1px solid rgba(138,43,226,0.5); white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.msg-dropdown.show { display: flex; }
.msg-dropdown button { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; font-size: 16px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); color: #fff; }
.msg-dropdown button:hover { transform: scale(1.15); }
.msg-dropdown .btn-like { color: #ff6b81; }
.msg-dropdown .btn-like.liked { background: rgba(233,69,96,0.5); }
.msg-dropdown .btn-pin { color: #f5c518; }
.msg-dropdown .btn-del { color: #ff4444; }
.like-indicator { font-size: 11px; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 2px 6px; display: none; margin-top: 2px; }
.like-indicator.has-likes { display: inline-block; }
.pinned { background: rgba(138,43,226,0.2); border: 1px solid rgba(138,43,226,0.4); padding: 10px 14px; margin: 5px 0; border-radius: 12px; font-size: 13px; overflow: visible; }
.announce-block { background: linear-gradient(135deg, rgba(255,249,196,0.15), rgba(255,224,130,0.1)); border: 1px solid rgba(245,197,24,0.4); color: #FFE082; padding: 12px; border-radius: 14px; margin-bottom: 6px; font-size: 13px; text-align: center; position: relative; }
.announce-del { position: absolute; top: 6px; right: 8px; background: #e94560; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; line-height: 20px; text-align: center; cursor: pointer; border: none; padding: 0; }
.thought-block { background: linear-gradient(135deg, rgba(138,43,226,0.3), rgba(0,191,255,0.2), rgba(245,197,24,0.2)); background-size: 400% 400%; animation: galaxyGlow 3s infinite; color: #fff; padding: 12px; border-radius: 14px; margin-bottom: 6px; font-size: 14px; text-align: center; border: 1px solid rgba(138,43,226,0.5); position: relative; }
.thought-block .thought-text { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; font-size: 15px; }
.thought-del { position: absolute; top: 6px; right: 8px; background: #e94560; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; line-height: 20px; text-align: center; cursor: pointer; border: none; padding: 0; }
.photo-preview { display: flex; gap: 4px; flex-wrap: wrap; }
.photo-preview img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
#photoViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
#photoViewer img { max-width: 95%; max-height: 90%; border-radius: 12px; }
.stat-card { background: rgba(22,33,62,0.75); padding: 12px 14px; border-radius: 12px; margin: 5px 0; font-size: 14px; border: 1px solid rgba(138,43,226,0.15); overflow: visible; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 12px; background: rgba(22,33,62,0.5); border-radius: 10px; padding: 6px; border: 1px solid rgba(138,43,226,0.15); }
.calendar div { padding: 6px; border-radius: 4px; }
.calendar .shift-day { background: #4CAF50; color: #fff; font-weight: bold; }
.calendar .today { border: 2px solid #2196F3; }
.calendar .header { font-weight: bold; background: rgba(51,51,51,0.7); }
label { font-size: 12px; color: #aaa; display: block; margin-top: 4px; }
.notify-item { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; background: rgba(22,33,62,0.6); border-radius: 10px; margin: 5px 0; overflow: visible; }
.creator-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.creator-actions button { flex: 1; min-width: 90px; font-size: 12px; padding: 10px; }
.hall-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
.hall-medal { font-size: 22px; width: 30px; text-align: center; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 999; }
.modal-card { background: rgba(22,33,62,0.95); padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid rgba(138,43,226,0.3); }
.expiry-row { display: flex; gap: 8px; align-items: center; }
.expiry-row select, .expiry-row input { flex: 1; padding: 10px; font-size: 14px; }
.section-title { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; text-align: center; margin-bottom: 8px; }
.announce-expiry, .thought-expiry { font-size: 10px; color: #aaa; margin-top: 4px; }
@media (max-width: 500px) { .avatar-carousel { width: 55px; min-width: 55px; padding: 10px 2px; } .avatar-item { width: 38px; height: 38px; min-height: 38px; } .mini-profile { right: 60px; width: 200px; } }
@media (min-width: 800px) { .main-content { max-width: 600px; margin: 0 auto; } }
@media (min-width: 1200px) { .main-content { max-width: 700px; } }
.god-name { color: #f5c518; font-weight: bold; text-shadow: 0 0 10px rgba(245,197,24,0.5); }
.god-badge { font-size: 12px; font-weight: bold; padding: 3px 10px; border-radius: 12px; background: #f5c518; color: #000; display: inline-block; }
.avatar-god { border: 3px solid #f5c518; box-shadow: 0 0 20px rgba(245,197,24,0.8), 0 0 40px rgba(245,197,24,0.4); animation: godGlow 1.5s infinite alternate; }
@keyframes godGlow { 0% { box-shadow: 0 0 20px rgba(245,197,24,0.8), 0 0 40px rgba(245,197,24,0.4); } 100% { box-shadow: 0 0 35px rgba(245,197,24,1), 0 0 60px rgba(255,140,0,0.6); } }
</style>
</head>
<body>
<div id="photoViewer" onclick="this.style.display='none'"><img id="photoViewerImg" src=""></div>

<div id="login" style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;min-height:100vh;max-width:450px;margin:0 auto">
  <h3 class="section-title" style="font-size:20px">Вход в Ozon Hub</h3>
  <input id="loginName" type="text" placeholder="Имя" autocomplete="off" style="max-width:320px">
  <input id="loginPass" type="password" placeholder="Пароль" style="max-width:320px">
  <button class="btn-gold" onclick="doLogin()" style="max-width:320px">Войти</button>
  <button class="btn-blue" onclick="showRegister()" style="max-width:320px;margin-top:4px">Регистрация</button>
  <div id="loginMsg" style="color:red;text-align:center;margin-top:6px"></div>
</div>

<div id="regCard" style="display:none;flex-direction:column;justify-content:center;align-items:center;padding:20px;min-height:100vh;max-width:450px;margin:0 auto">
  <h3 class="section-title" style="font-size:20px">Регистрация</h3>
  <input id="regName" type="text" placeholder="Имя" style="max-width:320px">
  <input id="regPunkt" type="text" placeholder="Номер пункта" style="max-width:320px">
  <input id="regPass" type="password" placeholder="Пароль" style="max-width:320px">
  <label style="max-width:320px">Аватар</label>
  <input id="regAvatar" type="file" accept="image/*" onchange="previewRegAvatar()" style="max-width:320px">
  <div id="regAvPrev" style="text-align:center;margin:4px 0"></div>
  <button class="btn-green" onclick="registerUser()" style="max-width:320px">Зарегистрироваться</button>
  <button class="btn-gray" onclick="showLogin()" style="max-width:320px">Назад</button>
</div>

<div id="app" class="app-container" style="display:none">
  <div class="main-content" id="mainContent">
    <div id="announceBlock" class="announce-block" style="display:none"></div>
    <div id="thoughtBlock" class="thought-block" style="display:none"></div>
    <div class="profile-row" id="profRow"></div>
    <div class="tabs" id="tabsNav"></div>
    <div id="tabContent"></div>
    <div id="pinnedMessage" class="pinned" style="display:none"></div>
    <div class="chat-section">
      <div class="chat-header-bar" onclick="toggleChat()"><div class="chat-icon">💬</div><span class="chat-label" id="chatLabel">Общий чат</span><span id="chatBadge" class="chat-badge" style="display:none">0</span><button class="chat-back-btn" id="chatBackBtn" onclick="event.stopPropagation();switchToGlobalChat()">↩ Общий</button><span id="chatArrow" class="chat-arrow open">▼</span></div>
      <div id="chat"></div>
    </div>
    <div style="display:flex;gap:4px"><input id="chatMsgInput" placeholder="Сообщение..." style="flex:1"><button class="btn-gray" onclick="document.getElementById('chatPhoto').click()" style="width:auto;padding:14px">📎</button><input id="chatPhoto" type="file" accept="image/*" multiple onchange="sendPhoto()" style="display:none"><button class="btn-gold" onclick="sendMsg()" style="width:auto;padding:14px 18px">➤</button></div>
  </div>
  <div class="avatar-carousel" id="avatarCarousel"></div>
  <div class="mini-profile" id="miniProfile">
    <div id="mpAvatarContainer"></div>
    <div class="mp-name" id="mpName"></div>
    <div style="text-align:center"><span class="mp-status" id="mpStatus"></span></div>
    <div class="mp-punkt" id="mpPunkt"></div>
    <div class="mp-calendar" id="mpCalendar"></div>
    <button class="btn-gold mp-btn" id="mpChatBtn" onclick="openPrivateChat()">💬 Личный чат</button>
  </div>
</div>

<div id="settingsCard" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;overflow-y:auto;z-index:200;padding:10px">
  <div class="card" style="max-width:450px;margin:0 auto"><h3 class="section-title">⚙️ Настройки</h3>
    <input id="newName" placeholder="Новое имя"><input id="newPass" type="password" placeholder="Новый пароль">
    <select id="newPunkt"></select><input id="newVkId" placeholder="ВК ID (цифры)">
    <label>Аватарка</label><input id="newAvatar" type="file" accept="image/*" onchange="previewNewAvatar()">
    <div id="newAvatarPreview" style="text-align:center;margin:4px 0"></div>
    <label>Размер чата</label><select id="chatSize"><option value="200">Маленький</option><option value="280" selected>Средний</option><option value="380">Большой</option></select>
    <label>Шрифт чата</label><select id="chatFont"><option value="12">Мелкий</option><option value="13" selected>Средний</option><option value="15">Крупный</option></select>
    <button class="btn-green" onclick="saveSettings()">💾 Сохранить</button><button class="btn-gray" onclick="closeSettings()">↩ Назад</button>
  </div>
</div>

function loadHistory(){if(!_user)return;db.ref('payments').orderByChild('user').equalTo(_user.name).once('value',function(s){var a=[];s.forEach(function(c){a.push(c.val())});a.sort(function(x,y){return y.timestamp-x.timestamp});document.getElementById('tabContent').innerHTML=a.length?a.map(function(x){return'<div class="stat-card">📅 '+new Date(x.dateFrom).toLocaleDateString('ru-RU')+' – '+new Date(x.dateTo).toLocaleDateString('ru-RU')+'<br><b>'+x.total+' ₽</b><br><small>'+new Date(x.timestamp).toLocaleString('ru-RU')+'</small></div>'}).join(''):'<p>Нет выплат</p>'})}
function clearMyShifts(){db.ref('shifts').orderByChild('user').equalTo(_user.name).once('value',function(s){s.forEach(function(c){db.ref('shifts/'+c.key).remove()})});alert('✅')}
function loadHall(){db.ref('shifts').once('value',function(snap){var users={};snap.forEach(function(c){var s=c.val();if(!users[s.user])users[s.user]={hours:0,tovar:0};users[s.user].hours+=s.hours||0;users[s.user].tovar+=s.tovar||0});var arr=[];for(var n in users)arr.push({name:n,hours:users[n].hours,tovar:users[n].tovar});arr.sort(function(a,b){return b.hours-a.hours});var h='<h4 class="section-title">🏆 Доска почёта</h4>';var hh='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';hh+='<div class="hall-item"><span class="hall-medal">'+m+'</span> '+arr[i].name+' — <b>'+arr[i].hours+'ч</b></div>'}h+='<div class="stat-card"><b>⏱ Топ по часам</b>'+hh+'</div>';arr.sort(function(a,b){return b.tovar-a.tovar});var ht='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';ht+='<div class="hall-item"><span class="hall-medal">'+m+'</span> '+arr[i].name+' — <b>'+arr[i].tovar+' шт</b></div>'}h+='<div class="stat-card"><b>📦 Топ по товарам</b>'+ht+'</div>';arr.sort(function(a,b){return(b.hours+b.tovar)-(a.hours+a.tovar)});h+='<div class="stat-card"><b>🌟 Работник месяца</b><div class="hall-item"><span class="hall-medal">🌟</span> '+(arr[0]?.name||'—')+' — '+(arr[0]?.hours||0)+'ч / '+(arr[0]?.tovar||0)+' шт</div></div>';db.ref('punishes').once('value',function(ps){var pusers={};ps.forEach(function(c){var p=c.val();if(!pusers[p.user])pusers[p.user]=0;pusers[p.user]+=p.amount||0});var parr=[];for(var n in pusers)parr.push({name:n,amount:pusers[n]});parr.sort(function(a,b){return b.amount-a.amount});h+='<div class="stat-card"><b>💀 Штрафник месяца</b><div class="hall-item"><span class="hall-medal">💀</span> '+(parr[0]?.name||'—')+' — <b>'+(parr[0]?.amount||0)+' ₽</b></div></div>';db.ref('premiums').once('value',function(prs){var prusers={};prs.forEach(function(c){var p=c.val();if(!prusers[p.user])prusers[p.user]=0;prusers[p.user]+=p.amount||0});var prarr=[];for(var n in prusers)prarr.push({name:n,amount:prusers[n]});prarr.sort(function(a,b){return b.amount-a.amount});h+='<div class="stat-card"><b>🎁 Любимчик бога</b><div class="hall-item"><span class="hall-medal">🎁</span> '+(prarr[0]?.name||'—')+' — <b>'+(prarr[0]?.amount||0)+' ₽</b></div></div>';document.getElementById('tabContent').innerHTML=h})})})}
function openSettings(){document.getElementById('mainContent').style.display='none';document.getElementById('avatarCarousel').style.display='none';document.getElementById('settingsCard').style.display='block';document.getElementById('newVkId').value=_user.vkId||'';document.getElementById('chatSize').value=localStorage.getItem('chatSize')||'280';document.getElementById('chatFont').value=localStorage.getItem('chatFont')||'13';loadPunkts(function(p){var s=document.getElementById('newPunkt');s.innerHTML='<option value="">Не менять</option>';for(var i=0;i<p.length;i++){s.innerHTML+='<option value="'+p[i]+'">'+p[i]+'</option>'}})}
function closeSettings(){document.getElementById('settingsCard').style.display='none';document.getElementById('mainContent').style.display='block';document.getElementById('avatarCarousel').style.display='flex'}
function saveSettings(){var nn=document.getElementById('newName').value.trim(),np=document.getElementById('newPass').value.trim(),npu=document.getElementById('newPunkt').value,nvk=document.getElementById('newVkId').value.trim(),ok=_user.name,up={};var cs=document.getElementById('chatSize').value,cf=document.getElementById('chatFont').value;localStorage.setItem('chatSize',cs);localStorage.setItem('chatFont',cf);document.getElementById('chat').style.maxHeight=cs+'px';document.getElementById('chat').style.fontSize=cf+'px';if(nn&&nn!==_user.name){up['users/'+nn]={name:nn,punkt:npu||_user.punkt,password:_user.password,bonus:0,avatar:newAvatarData||_user.avatar||'',vkId:nvk||_user.vkId||''};if(np)up['users/'+nn+'/password']=np;up['users/'+ok]=null;_user.name=nn;if(npu)_user.punkt=npu;if(nvk)_user.vkId=nvk}else{var uu={name:_user.name,punkt:_user.punkt,avatar:_user.avatar||'',vkId:_user.vkId||''};if(np)uu.password=np;if(newAvatarData)uu.avatar=newAvatarData;if(nvk)uu.vkId=nvk;if(npu)uu.punkt=npu;up['users/'+ok]=uu;if(npu)_user.punkt=npu;if(nvk)_user.vkId=nvk}if(_user.role==='god'){if(newAvatarData){db.ref('godSettings/avatar').set(newAvatarData);_user.avatar=newAvatarData}if(nn)db.ref('godSettings/name').set(nn);if(np)db.ref('godPassword').set(np);if(nvk)db.ref('godSettings/vkId').set(nvk)}if(Object.keys(up).length===0&&_user.role!=='god'){closeSettings();return}db.ref().update(up,function(err){if(err){alert('Ошибка');return}if(np&&_user.role!=='god')_user.password=np;if(newAvatarData)_user.avatar=newAvatarData;else if(!_user.avatar&&uu)_user.avatar=uu.avatar||'';if(nvk)_user.vkId=nvk;localStorage.setItem('ozon_user',JSON.stringify(_user));updateProfileUI();closeSettings();buildCarousel();alert('✅')})}
function previewNewAvatar(){var f=document.getElementById('newAvatar').files[0];if(!f)return;var r=new FileReader();r.onload=function(e){newAvatarData=e.target.result;document.getElementById('newAvatarPreview').innerHTML='<img class="avatar" src="'+newAvatarData+'">'};r.readAsDataURL(f)}
function loadPunkts(cb){db.ref('punkts').once('value',function(s){var p=[];s.forEach(function(c){p.push(c.key)});if(cb)cb(p)})}
function openThoughtModal(){document.getElementById('thoughtModal').style.display='flex'}
function closeThoughtModal(){document.getElementById('thoughtModal').style.display='none';document.getElementById('thoughtText').value=''}
function toggleExpiryInput(p){document.getElementById(p+'ExpiryValue').style.display=document.getElementById(p+'ExpiryType').value==='forever'?'none':'block'}
function sendThought(){var text=document.getElementById('thoughtText').value.trim();if(!text)return;var type=document.getElementById('thoughtExpiryType').value,val=parseInt(document.getElementById('thoughtExpiryValue').value)||24,expiry=null;if(type==='hours')expiry=Date.now()+val*3600000;else if(type==='days')expiry=Date.now()+val*86400000;db.ref('creatorThought').set({text:text,expiry:expiry,timestamp:Date.now()});document.getElementById('thoughtText').value='';closeThoughtModal();alert('💭 Мысль отправлена!')}
function loadThought(){db.ref('creatorThought').on('value',function(s){var b=document.getElementById('thoughtBlock');if(!s.exists()){b.style.display='none';return}var t=s.val();if(t.expiry&&Date.now()>t.expiry){db.ref('creatorThought').remove();b.style.display='none';return}b.style.display='block';var expText=t.expiry?'Исчезнет: '+new Date(t.expiry).toLocaleString('ru-RU'):'Навсегда';b.innerHTML='<div class="thought-text">💭 '+t.text+'</div><div class="thought-expiry">'+expText+'</div><button class="thought-del" onclick="delThought()">✕</button>'})}
function delThought(){db.ref('creatorThought').remove()}
function loadAnnounce(){db.ref('announce').limitToLast(1).on('value',function(s){var b=document.getElementById('announceBlock');if(!s.exists()){b.style.display='none';return}var last=null;s.forEach(function(c){last=c.val();last._key=c.key});if(last.expiry&&Date.now()>last.expiry){db.ref('announce/'+last._key).remove();b.style.display='none';return}b.style.display='block';var expText=last.expiry?'Актуально до: '+new Date(last.expiry).toLocaleString('ru-RU'):'Бессрочно';b.innerHTML='<b>📢 '+last.text+'</b><br><small class="announce-expiry">'+expText+' • '+new Date(last.timestamp).toLocaleString('ru-RU')+'</small>'})}
function logout(){_user=null;onShift=!1;chatOpened=!1;localStorage.removeItem('ozon_user');document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex'}
</script>
</body>
