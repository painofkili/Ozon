<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;height:100vh;width:100vw}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#eee;font-size:16px;background:#0a0a1a;display:flex;flex-direction:column}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1000;display:block}
:root{--accent:#7c3aed;--accent2:#a855f7;--gold:#f5c518;--bg2:rgba(20,20,50,0.85);--bg3:rgba(30,30,60,0.7);--border:rgba(100,80,220,0.25);--text:#e8e8ff;--muted:#888;--green:#22c55e;--red:#ef4444}
body.theme-creator{--accent:#7c3aed;--accent2:#00d4ff;--gold:#f5c518}
body.theme-god{--accent:#b8860b;--accent2:#ffd700;--gold:#ffd700}
.card,.stat-card,.pinned,.announce-block,.thought-block,.calendar,.chat-section,.settings-card,.auth-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.3);padding:16px;position:relative;overflow:hidden}
.app-container{display:flex;width:100%;height:100vh;position:relative;z-index:1;justify-content:center;overflow:hidden}
.main-content{width:100%;max-width:720px;padding:12px 16px;display:flex;flex-direction:column;padding-bottom:80px;height:100%;gap:8px}
.profile-row{display:flex;align-items:center;gap:14px;margin-bottom:4px;padding:4px 0;flex-shrink:0}
.badge{font-size:12px;font-weight:bold;padding:4px 12px;border-radius:20px;display:inline-block}
.badge-creator{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.badge-god{background:linear-gradient(135deg,#FFD700,#FF4500);color:#fff}
.badge-manager{background:#2d6a4f;color:#95d5b2}
.name-creator{background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-god{background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-manager{color:#eee;font-weight:bold}
input,select,textarea{width:100%;padding:12px 16px;font-size:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,25,0.6);color:#fff;outline:none;backdrop-filter:blur(4px);transition:0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,0.15);background:rgba(10,10,25,0.8)}
button{border:none;font-weight:bold;cursor:pointer;border-radius:12px;transition:all .2s}
button:hover{transform:scale(1.02);filter:brightness(1.1)}button:active{transform:scale(0.95)}
.btn-green{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;padding:12px;font-size:15px;width:100%}
.btn-red{background:linear-gradient(135deg,#e94560,#c62828);color:#fff;padding:12px;font-size:15px;width:100%}
.btn-gray{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1);padding:12px;font-size:15px;width:100%}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;padding:12px;font-size:15px;width:100%}
.btn-blue{background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff;padding:12px;font-size:15px;width:100%}
.btn-purple{background:#9C27B0;color:#fff;padding:12px;font-size:15px;width:100%}
.tabs{display:flex;gap:6px;margin:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tabs button{height:44px;display:flex;align-items:center;gap:8px;border-radius:99px;background:rgba(255,255,255,0.06);color:#aaa;border:1px solid transparent;padding:0 16px;font-size:13px;white-space:nowrap;flex-shrink:0}
.tabs button.active{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;box-shadow:0 4px 15px rgba(138,43,226,0.3)}
.tab-content{display:none;width:100%;flex-shrink:0;animation:fadeIn 0.3s ease}
.tab-content.active-tab{display:block}
.chat-section{background:var(--bg2);padding:0;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;border-radius:16px;margin:0}
.chat-header-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);cursor:pointer;flex-shrink:0;border-radius:16px 16px 0 0}
#chat{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;background:transparent;display:flex;flex-direction:column;gap:2px}
#chat.hidden{display:none}
.chat-bubble-group{display:flex;flex-direction:column;max-width:85%;position:relative}
.chat-bubble-group.mine{align-self:flex-end;align-items:flex-end}
.chat-bubble-group.other{align-self:flex-start;align-items:flex-start}
.chat-bubble-group .msg-author{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:1px;display:flex;align-items:center;gap:6px}
.chat-bubble-group .msg-author .auth-avatar{width:16px;height:16px;border-radius:50%;object-fit:cover}
.chat-bubble{background:rgba(255,255,255,0.06);padding:8px 14px;border-radius:16px;word-break:break-word;line-height:1.4;font-size:14px;border:1px solid rgba(255,255,255,0.02);position:relative}
.chat-bubble.mine{background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.1);border-bottom-right-radius:4px}
.chat-bubble.other{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.03);border-bottom-left-radius:4px}
.chat-bubble.creator{background:rgba(245,197,24,0.08);border-left:2px solid var(--gold)}
.chat-bubble.god{background:rgba(255,215,0,0.08);border-left:2px solid #FFD700}
.chat-img{max-width:220px;max-height:160px;border-radius:10px;margin-top:4px;object-fit:cover}
.photo-pack{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.photo-pack img{width:70px;height:70px;object-fit:cover;border-radius:8px;cursor:pointer}
.chat-sticker{max-width:120px;max-height:120px;object-fit:contain;margin:2px 0}
.chat-input-bar{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:720px;background:var(--bg2);backdrop-filter:blur(16px);padding:12px 16px;display:flex;gap:10px;align-items:center;z-index:100;border-top:1px solid var(--border);border-radius:0}
.input-wrapper{position:relative;flex:1;display:flex;align-items:center;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(255,255,255,0.05)}
.input-wrapper input{background:transparent;border:none;padding:12px 40px 12px 16px;font-size:15px}
.sticker-toggle{position:absolute;right:8px;background:transparent;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:0}
#sendMsgBtn,#chatPhotoBtn{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);color:#aaa}
#sendMsgBtn{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.sticker-panel{position:absolute;bottom:70px;right:0;width:320px;height:360px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;display:none;flex-direction:column;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.6);backdrop-filter:blur(20px);overflow:hidden}
.sticker-content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
.sticker-tabs{display:flex;padding:8px;gap:6px;background:rgba(0,0,0,0.3);border-top:1px solid var(--border);overflow-x:auto}
.st-tab{width:36px;height:36px;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0.6;transition:0.2s;flex-shrink:0}
.st-tab.active,.st-tab:hover{opacity:1;background:rgba(124,58,237,0.2)}
.st-item{width:60px;height:60px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);cursor:pointer;transition:0.1s}
.st-item:hover{transform:scale(1.1);background:rgba(255,255,255,0.08)}
.emoji-item{width:40px;height:40px;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;transition:0.1s}
.emoji-item:hover{transform:scale(1.2);background:rgba(255,255,255,0.05)}
.avatar-carousel{width:110px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:-130px;height:100vh;padding:50px 0 20px;z-index:1000;backdrop-filter:blur(20px);transition:right 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:-10px 0 30px rgba(0,0,0,0.5)}
.avatar-carousel.open{right:0}
.avatar-carousel-inner{display:flex;flex-direction:column;align-items:center;width:100%;gap:12px;overflow-y:auto;height:100%;padding:10px 0}
.avatar-item{width:60px;height:60px;border-radius:50%;cursor:pointer;position:relative;transition:0.2s}
.avatar-item:hover{transform:scale(1.05)}.avatar-item img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid transparent}
.avatar-item.active img{border-color:var(--gold);box-shadow:0 0 15px rgba(245,197,24,0.3)}
.avatar-item .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#4CAF50;border-radius:50%;border:2px solid #111}
.btn-sidebar-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);width:36px;height:50px;background:var(--bg2);border:1px solid var(--border);border-right:none;border-radius:12px 0 0 12px;color:#fff;font-size:14px;cursor:pointer;z-index:999}
.sidebar-close-btn{position:absolute;top:12px;left:12px;background:rgba(255,255,255,0.05);border:none;color:#aaa;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer}
.sidebar-close-btn:hover{background:#e94560;color:#fff}
.mini-profile{position:fixed;right:130px;top:50%;transform:translateY(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:220px;z-index:1100;display:none;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,0.6)}
.mini-profile.show{display:block;animation:slideIn 0.2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-50%) translateX(20px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
#toastDivine{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:9999;transition:all 0.5s;pointer-events:none;opacity:0}
#toastDivine.show{transform:translateX(-50%) translateY(0);opacity:1}
#toastDivine .divine-paper{background:linear-gradient(135deg,#fdf6e3,#f5e6ca);border:3px solid #d4a574;padding:16px 24px;border-radius:4px;box-shadow:0 10px 40px rgba(0,0,0,0.6)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;pointer-events:none;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:12px 20px;border-radius:12px;background:var(--bg2);border:1px solid var(--accent);color:#fff;font-size:14px;box-shadow:0 5px 20px rgba(0,0,0,0.6);transform:translateY(-20px);opacity:0;transition:all 0.3s;text-align:center;backdrop-filter:blur(10px)}
.toast-msg.show{transform:translateY(0);opacity:1}
@media(max-width:600px){.main-content{padding:8px;padding-bottom:70px}.chat-input-bar{padding:8px}.mini-profile{right:10px;width:190px}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="toastContainer" class="toast-container"></div>
<div id="toastDivine"><div class="divine-paper"><p id="divineMsg" style="font-family:Georgia,serif;color:#3d2b1a;font-size:14px;text-align:center;"></p></div></div>

<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;">
  <div class="auth-wrap" style="max-width:380px;width:100%;display:flex;flex-direction:column;gap:14px;padding:32px;">
    <div style="text-align:center;font-size:24px;font-weight:800;background:linear-gradient(135deg,#f5c518,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🌌 Ozon Hub</div>
    <div style="display:flex;background:rgba(0,0,0,0.3);border-radius:12px;padding:4px;">
      <button class="auth-tab-btn active" id="tabLogin" style="flex:1;padding:10px;border:none;border-radius:10px;background:transparent;font-size:15px;font-weight:600;color:#fff;">Вход</button>
      <button class="auth-tab-btn" id="tabRegister" style="flex:1;padding:10px;border:none;border-radius:10px;background:transparent;font-size:15px;font-weight:600;color:#6a7a94;">Регистрация</button>
    </div>
    <div id="loginFields2" style="display:flex;flex-direction:column;gap:14px;">
      <input type="email" id="loginEmail" placeholder="Email" style="width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(10,10,25,0.6);color:#fff;font-size:15px;">
      <input type="password" id="loginPassword" placeholder="Пароль" style="width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(10,10,25,0.6);color:#fff;font-size:15px;">
      <button class="btn-gold" id="loginBtn" style="padding:14px;font-size:16px;">🔑 Войти</button>
    </div>
    <div id="registerFields2" style="display:none;flex-direction:column;gap:14px;">
      <input type="text" id="regName" placeholder="Имя" style="width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(10,10,25,0.6);color:#fff;font-size:15px;">
      <input type="email" id="regEmail" placeholder="Email" style="width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(10,10,25,0.6);color:#fff;font-size:15px;">
      <input type="password" id="regPassword" placeholder="Пароль" style="width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(10,10,25,0.6);color:#fff;font-size:15px;">
      <button class="btn-gold" id="registerBtn" style="padding:14px;font-size:16px;">📝 Зарегистрироваться</button>
    </div>
    <div id="authError" style="color:var(--red);font-size:13px;text-align:center;display:none;"></div>
  </div>
</div>

<div id="app" class="app-container" style="display:none">
  <button class="btn-sidebar-toggle" id="sidebarToggleBtn">👥</button>
  <div class="main-content" id="mainContent">
    <div id="announceBlock" class="announce-block" style="display:none;background:rgba(200,150,0,0.08);border:1px solid rgba(200,150,0,0.3);padding:12px;border-radius:12px;text-align:center;font-size:14px;color:#ffd700;"></div>
    <div id="thoughtBlock" class="thought-block" style="display:none;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(0,212,255,0.05));border:1px solid rgba(124,58,237,0.4);padding:14px;border-radius:12px;text-align:center;font-size:15px;color:#e0e0ff;"></div>
    <div class="profile-row">
      <div style="position:relative;width:76px;height:76px;">
        <canvas id="profileAvatarCanvas" width="76" height="76" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:1;"></canvas>
        <canvas id="profileFrameCanvas" width="76" height="76" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:2;pointer-events:none;"></canvas>
      </div>
      <div style="flex:1">
        <b id="creatorNameWrapper" class="name-creator" style="font-size:18px;"><span id="uname"></span></b> 
        <span id="roleBadge" class="badge badge-creator">🌌 Создатель</span><br>
        <span style="font-size:12px;color:#aaa;">📍 Пункт <span id="upunkt"></span></span>
      </div>
      <button class="btn-gray" id="settingsBtn" style="width:auto;padding:8px 14px;font-size:13px;">⚙️</button>
    </div>
    <div class="tabs" id="tabsContainer"></div>
    <div id="tabContentContainer" style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding-bottom:10px;"></div>
    <div id="pinnedMessage" class="pinned" style="display:none;padding:10px 14px;background:rgba(245,197,24,0.05);border:1px solid rgba(245,197,24,0.2);border-radius:12px;font-size:13px;"></div>
    <div class="chat-section">
      <div class="chat-header-bar" id="chatHeader">
        <span style="font-size:18px;">💬</span>
        <span id="chatLabel" style="flex:1;font-weight:bold;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Общий чат</span>
        <span id="chatBadge" style="display:none;background:var(--red);color:#fff;border-radius:10px;font-size:11px;padding:2px 6px;font-weight:bold;">0</span>
        <button class="btn-gray" id="chatBackBtn" style="display:none;width:auto;padding:4px 10px;font-size:12px;">↩ Назад</button>
      </div>
      <div id="chat"></div>
    </div>
  </div>
  <div class="chat-input-bar" id="chatInputBar">
    <div class="input-wrapper">
      <input id="chatMsgInput" placeholder="Сообщение...">
      <button class="sticker-toggle" id="stickerToggleBtn">😀</button>
      <div id="stickerPanel" class="sticker-panel">
        <div class="sticker-content" id="stickerContent"></div>
        <div class="sticker-tabs" id="stickerTabs"></div>
      </div>
    </div>
    <button id="chatPhotoBtn">📎</button>
    <input id="chatPhotoInput" type="file" accept="image/*" multiple style="display:none;">
    <button id="sendMsgBtn">➤</button>
  </div>
  <div class="avatar-carousel" id="avatarCarousel">
    <button class="sidebar-close-btn" id="sidebarCloseBtn">✕</button>
    <div class="avatar-carousel-inner" id="carouselInner"></div>
  </div>
  <div class="mini-profile" id="miniProfile">
    <button class="btn-gray" id="mpCloseBtn" style="position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;font-size:11px;padding:0;">✕</button>
    <div id="mpAvatarContainer" style="width:64px;height:64px;margin:0 auto;"></div>
    <div id="mpName" style="text-align:center;font-weight:bold;font-size:16px;margin-top:8px;"></div>
    <div id="mpStatus" style="text-align:center;font-size:12px;margin:4px 0;"></div>
    <div id="mpPunkt" style="text-align:center;font-size:12px;color:var(--muted);"></div>
    <button class="btn-gold" id="mpChatBtn" style="width:100%;padding:10px;margin-top:12px;font-size:13px;">💬 Личный чат</button>
  </div>
</div>

async function login(){const e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPassword').value.trim(),err=document.getElementById('authError');if(!e||!p){err.textContent='❌ Заполните все поля';err.style.display='block';return}try{const cred=await AUTH.signInWithEmailAndPassword(e,p);const snap=await DB.ref('users/'+cred.user.uid).once('value');if(!snap.exists())throw new Error('Пользователь не найден');App.user=snap.val();App.user.uid=cred.user.uid;finish()}catch(ex){err.textContent='❌ '+ex.message;err.style.display='block'}}

function renderStats(p){const n=new Date();App.calYear=n.getFullYear();App.calMonth=n.getMonth();p.innerHTML=`<div class="calendar"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><button class="btn-gray" id="calPrev" style="width:auto;padding:6px 12px;">◀</button><div id="calTitle" style="font-size:14px;font-weight:700;"></div><button class="btn-gray" id="calNext" style="width:auto;padding:6px 12px;">▶</button></div><div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;"></div></div><div class="card" style="margin-top:12px;"><div>📅 Смен: <b id="statShifts">0</b></div><div>⏱ Часов: <b id="statHours">0</b></div><div>📦 Товаров: <b id="statTovar">0</b></div></div><button class="btn-red" id="clearShiftsBtn" style="width:100%;padding:12px;margin-top:10px;">🗑 Очистить мои смены</button>`;document.getElementById('calPrev').addEventListener('click',()=>changeCal(-1));document.getElementById('calNext').addEventListener('click',()=>changeCal(1));document.getElementById('clearShiftsBtn').addEventListener('click',clearShifts);renderCal()}
function renderCal(){const months=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];document.getElementById('calTitle').textContent=months[App.calMonth]+' '+App.calYear+' г.';DB.ref('shifts').once('value').then(s=>{const shifts={};s.forEach(c=>{const x=c.val();if(x.user===App.user.uid){const d=new Date(x.date||x.timestamp);if(d.getFullYear()===App.calYear&&d.getMonth()===App.calMonth){const day=d.getDate();if(!shifts[day])shifts[day]={count:0,hours:0,tovar:0};shifts[day].count++;shifts[day].hours+=x.hours||0;shifts[day].tovar+=x.tovar||0}}});let ts=0,th=0,tt=0;for(const k in shifts){ts+=shifts[k].count;th+=shifts[k].hours;tt+=shifts[k].tovar}document.getElementById('statShifts').textContent=ts;document.getElementById('statHours').textContent=th.toFixed(1);document.getElementById('statTovar').textContent=tt;const fd=new Date(App.calYear,App.calMonth,1).getDay(),off=(fd+6)%7,dim=new Date(App.calYear,App.calMonth+1,0).getDate(),today=new Date(),grid=document.getElementById('calGrid');grid.innerHTML=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>'<div style="text-align:center;font-size:11px;color:var(--muted);padding-bottom:6px;">'+d+'</div>').join('');for(let i=0;i<off;i++)grid.innerHTML+='<div></div>';for(let d=1;d<=dim;d++){const isToday=today.getDate()===d&&today.getMonth()===App.calMonth&&today.getFullYear()===App.calYear,has=!!shifts[d];grid.innerHTML+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;${isToday?'border:2px solid var(--accent);color:var(--accent);font-weight:700;background:rgba(124,58,237,0.1);':''}${has?'background:rgba(34,197,94,0.15);color:#4ade80;font-weight:700;':''}">${d}</div>`}})}
function changeCal(dir){App.calMonth+=dir;if(App.calMonth<0){App.calMonth=11;App.calYear--}if(App.calMonth>11){App.calMonth=0;App.calYear++}renderCal()}
function clearShifts(){if(!confirm('Очистить все смены?'))return;DB.ref('shifts').orderByChild('user').equalTo(App.user.uid).once('value').then(s=>{const ps=[];s.forEach(c=>ps.push(DB.ref('shifts/'+c.key).remove()));return Promise.all(ps)}).then(()=>{toast('✅ Очищено');renderCal()})}

function loadChat(){const ref=App.privateChatWith?getPrivRef():DB.ref('chat');if(App.chatListener){App.chatListener.off();App.chatListener=null}App.chatListener=ref.limitToLast(50);App.chatListener.on('value',s=>{const msgs=[];s.forEach(c=>{const m=c.val();if(m)msgs.push({key:c.key,msg:m})});let h='',group=[];const renderMsg=m=>{let c='';if(m.text)c+=esc(m.text);if(m.photo)c+=`<br><img class="chat-img" src="${esc(m.thumb||m.photo)}">`;if(m.sticker)c+=`<img class="chat-sticker" src="${esc(m.sticker)}">`;if(m.photos&&m.photos.length){c+='<div class="photo-pack">';m.photos.forEach(p=>{c+=`<img src="${esc(typeof p==='object'?p.thumb:p)}">`});c+='</div>'}return c};for(let i=0;i<msgs.length;i++){const item=msgs[i],m=item.msg,userName=(m.user||'?').replace(/^[🌌👑📢]\s/,''),isMine=App.user&&(m.user==='🌌 '+App.user.name||m.user==='👑 '+App.user.name||m.user===App.user.name);if(group.length===0||group[0].userName!==userName||group[0].isMine!==isMine){if(group.length>0)h+=renderGroup(group,renderMsg);group=[{item,userName,isMine,m}]}else{group.push({item,userName,isMine,m})}}if(group.length>0)h+=renderGroup(group,renderMsg);const el=document.getElementById('chat'),was=el.scrollHeight-el.scrollTop-el.clientHeight<60;el.innerHTML=h;if(was||document.activeElement===document.getElementById('chatMsgInput'))el.scrollTop=el.scrollHeight})}
function renderGroup(group,renderMsg){const first=group[0],userName=first.userName,isMine=first.isMine,isCreator=first.m.user&&first.m.user.indexOf('🌌')===0,isGod=first.m.user&&first.m.user.indexOf('👑')===0,u=App.allUserData[userName]||{},av=u.avatar||'';let h=`<div class="chat-bubble-group ${isMine?'mine':'other'}"><div class="msg-author">`;if(av)h+=`<img class="auth-avatar" src="${esc(av)}" onerror="this.style.display='none'">`;else h+=`<div style="width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:8px;">${esc(userName.charAt(0))}</div>`;h+=`<span style="${isCreator||isGod?'background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;':''}">${esc(userName)}</span></div>`;group.forEach(g=>{const m=g.m;let cls='chat-bubble';if(isMine)cls+=' mine';else if(isCreator)cls+=' creator';else if(isGod)cls+=' god';else cls+=' other';h+=`<div class="${cls}">${renderMsg(m)}</div>`});h+='</div>';return h}

function sendPhoto(){const input=document.getElementById('chatPhotoInput'),files=input.files;if(!files.length||!App.user||files.length>5)return;const photos=[];let loaded=0;for(let i=0;i<files.length;i++){(function(f){const r=new FileReader();r.onload=function(e){const img=new Image();img.onload=function(){const c=document.createElement('canvas'),mw=300,s=mw/img.width;c.width=mw;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);photos.push({full:e.target.result,thumb:c.toDataURL('image/jpeg',0.6)});loaded++;if(loaded===files.length){const ref=App.privateChatWith?getPrivRef():DB.ref('chat');ref.push({user:(App.isGod?'👑 ':'🌌 ')+App.user.name,text:'📷 '+files.length+' фото',photos,timestamp:Date.now(),role:App.user.role,likes:{}})}};img.src=e.target.result};r.readAsDataURL(f)})(files[i])}input.value=''}

function toggleSidebar(){document.getElementById('avatarCarousel').classList.toggle('open')}
function buildCarousel(){const el=document.getElementById('carouselInner');if(!el)return;el.innerHTML='';const added=new Set();for(const uid in App.allUserData){if(uid===App.user.uid)continue;const d=App.allUserData[uid];if(added.has(d.name))continue;added.add(d.name);const on=!!App.activeShifts[uid];el.innerHTML+=`<div class="avatar-item${App.selectedProfile===uid?' active':''}" data-uid="${uid}">${d.avatar?`<img src="${esc(d.avatar)}">`:`<div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#222,#444);display:flex;align-items:center;justify-content:center;font-size:20px;color:#ccc;">${esc(d.name.charAt(0))}</div>`}${on?'<div class="online-dot"></div>':''}</div>`}$$('#carouselInner .avatar-item').forEach(b=>b.addEventListener('click',function(){const uid=this.dataset.uid;App.selectedProfile=uid;$$('#carouselInner .avatar-item').forEach(x=>x.classList.toggle('active',x.dataset.uid===uid));showMini(uid)}))}
function showMini(uid){const d=App.allUserData[uid];if(!d)return;document.getElementById('mpName').textContent=d.name;document.getElementById('mpAvatarContainer').innerHTML=d.avatar?`<img src="${esc(d.avatar)}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;">`:`<div style="width:64px;height:64px;border-radius:50%;background:#444;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc;margin:0 auto;">${esc(d.name.charAt(0))}</div>`;document.getElementById('mpStatus').textContent=d.role==='god'?'👑 Начальник':(d.role==='creator'?'🌌 Создатель':'📦 Сотрудник');document.getElementById('mpPunkt').textContent=App.activeShifts[uid]?'🟢 На смене':'🔴 Выходной';document.getElementById('miniProfile').classList.add('show')}
function closeMini(){document.getElementById('miniProfile').classList.remove('show')}
function toggleStickers(e){if(e)e.stopPropagation();const p=document.getElementById('stickerPanel');if(p.style.display==='flex')p.style.display='none';else{p.style.display='flex';renderStickers()}}
function renderStickers(){const cc=document.getElementById('stickerContent');if(!cc)return;cc.innerHTML=BASE_EMOJIS.map(e=>`<div class="emoji-item" data-emoji="${e}">${e}</div>`).join('');$$('.emoji-item').forEach(b=>b.addEventListener('click',function(e){e.stopPropagation();document.getElementById('chatMsgInput').value+=this.dataset.emoji;document.getElementById('chatMsgInput').focus()}))}
function drawAvatar(canvas,ctx,settings,img,w,h){const width=w||canvas.width,height=h||canvas.height;ctx.clearRect(0,0,width,height);if(img){ctx.save();ctx.beginPath();ctx.arc(width/2,height/2,width/2-2,0,Math.PI*2);ctx.closePath();ctx.clip();const ratio=Math.max(width/img.width,height/img.height),dw=img.width*ratio,dh=img.height*ratio;ctx.drawImage(img,(width-dw)/2,(height-dh)/2,dw,dh);ctx.restore()}else{ctx.fillStyle='#1e1b4b';ctx.beginPath();ctx.arc(width/2,height/2,width/2-2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#6366f1';ctx.font=(width*0.3)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',width/2,height/2)}if(settings.isAnimated!==false){const time=Date.now()/1000*settings.speed,gradient=ctx.createLinearGradient(width*0.2,height*0.2,width*0.8,height*0.8);gradient.addColorStop(0,settings.color1||'#7c3aed');gradient.addColorStop(0.5,settings.color2||'#a855f7');gradient.addColorStop(1,settings.color1||'#7c3aed');ctx.shadowColor=settings.color1||'#7c3aed';ctx.shadowBlur=settings.glow||20;ctx.strokeStyle=gradient;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(width/2,height/2,width/2-2,time,time+Math.PI*2);ctx.stroke();ctx.shadowBlur=0}else{const thick=settings.ringThickness==='thin'?2:(settings.ringThickness==='thick'?6:4);ctx.strokeStyle=settings.ringColor||'#7c3aed';ctx.lineWidth=thick;ctx.beginPath();ctx.arc(width/2,height/2,width/2-2,0,Math.PI*2);ctx.stroke()}}
function updateAvatar(){const c=document.getElementById('profileAvatarCanvas');if(c)drawAvatar(c,c.getContext('2d'),{isAnimated:true,speed:App.avatarSettings.speed,color1:App.avatarSettings.color1,color2:App.avatarSettings.color2,glow:App.avatarSettings.glow},App.avatarImageData,76,76)}
function loadAvatar(){DB.ref('users/'+App.user.uid+'/avatarSettings').once('value').then(s=>{if(s.exists()){const d=s.val();Object.assign(App.avatarSettings,d);if(d.photo){const img=new Image();img.onload=()=>{App.avatarImageData=img;updateAvatar()};img.src=d.photo}}updateAvatar()})}
(function frame(){if(App.user)updateAvatar();requestAnimationFrame(frame)})();
function renderHistory(p){p.innerHTML='<div class="card">💳 История выплат</div>'}
function renderNotify(p){p.innerHTML='<div class="card">🔔 Уведомления</div>'}
function renderBoard(p){p.innerHTML='<div class="card">🏆 Доска почёта</div>'}
function renderAnnounce(p){p.innerHTML='<div class="card">📢 Объявления</div>'}
function renderPunkts(p){p.innerHTML='<div class="card">📍 Пункты</div>'}
function renderWorkers(p){p.innerHTML='<div class="card">👥 Сотрудники</div>'}
function renderSalary(p){p.innerHTML='<div class="card">💰 Расчёт ЗП</div>'}
function loadPinned(){DB.ref('pinned').on('value',s=>{const b=document.getElementById('pinnedMessage');if(!s.exists()){b.style.display='none';return}const m=s.val();b.style.display='block';b.innerHTML='📌 <b>'+(m.user||'?')+':</b> '+esc(m.text)})}
function loadAnnounce(){DB.ref('announce').limitToLast(1).on('value',s=>{const b=document.getElementById('announceBlock');if(!s.exists()){b.style.display='none';return}let last=null;s.forEach(c=>{last=c.val();last._key=c.key});if(last.expiry&&Date.now()>last.expiry){DB.ref('announce/'+last._key).remove();b.style.display='none';return}b.style.display='block';b.innerHTML='📢 '+esc(last.text)})}
function loadThought(){DB.ref('creatorThought').on('value',s=>{const b=document.getElementById('thoughtBlock');if(!s.exists()){b.style.display='none';return}const t=s.val();if(t.expiry&&Date.now()>t.expiry){DB.ref('creatorThought').remove();b.style.display='none';return}b.style.display='block';b.innerHTML='💭 '+esc(t.text)})}
function setupListeners(){DB.ref('users').on('value',s=>{App.allUsers={};App.allUserData={};s.forEach(c=>{App.allUsers[c.key]=c.val().avatar||'';App.allUserData[c.key]=c.val()});if(App.user)buildCarousel()});DB.ref('activeShifts').on('value',s=>{App.activeShifts={};s.forEach(c=>{if(c.val()&&c.val().active)App.activeShifts[c.key]=true});if(App.user)buildCarousel()});DB.ref('shifts').on('value',s=>{App.allShifts=[];s.forEach(c=>{const x=c.val();x._id=c.key;App.allShifts.push(x)})});DB.ref('chat').limitToLast(1).on('child_added',s=>{if(App.chatOpened)return;const m=s.val();if(!m||!App.user)return;if(m.timestamp<=App.lastChatTimestamp)return;const isMine=m.user==='🌌 '+App.user.name||m.user==='👑 '+App.user.name||m.user===App.user.name;if(isMine)return;if(App.notifiedKeys[s.key])return;App.notifiedKeys[s.key]=true;App.lastChatTimestamp=Math.max(App.lastChatTimestamp,m.timestamp||0);App.unreadCount++;updateBadge()})}
function logout(){if(!confirm('Выйти?'))return;if(App.chatListener){App.chatListener.off();App.chatListener=null}if(App.shiftTimer)clearInterval(App.shiftTimer);AUTH.signOut().then(()=>{App.user=null;App.chatOpened=false;document.getElementById('app').style.display='none';document.getElementById('loginScreen').style.display='flex';document.body.className=''})}
document.addEventListener('DOMContentLoaded',()=>{
document.getElementById('tabLogin').addEventListener('click',toggleAuth);
document.getElementById('tabRegister').addEventListener('click',toggleAuth);
document.getElementById('loginBtn').addEventListener('click',login);
document.getElementById('registerBtn').addEventListener('click',register);
document.getElementById('loginPassword').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
document.getElementById('chatHeader').addEventListener('click',toggleChat);
document.getElementById('chatBackBtn').addEventListener('click',switchGlobal);
document.getElementById('chatMsgInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendMsg()}});
document.getElementById('sendMsgBtn').addEventListener('click',sendMsg);
document.getElementById('chatPhotoBtn').addEventListener('click',()=>document.getElementById('chatPhotoInput').click());
document.getElementById('chatPhotoInput').addEventListener('change',sendPhoto);
document.getElementById('stickerToggleBtn').addEventListener('click',toggleStickers);
document.addEventListener('click',e=>{const sp=document.getElementById('stickerPanel');if(sp&&sp.style.display==='flex'&&!e.target.closest('#stickerPanel')&&!e.target.closest('.sticker-toggle'))sp.style.display='none'});
document.getElementById('sidebarToggleBtn').addEventListener('click',toggleSidebar);
document.getElementById('sidebarCloseBtn').addEventListener('click',()=>document.getElementById('avatarCarousel').classList.remove('open'));
document.getElementById('mpCloseBtn').addEventListener('click',closeMini);
document.getElementById('mpChatBtn').addEventListener('click',openPriv);
document.addEventListener('click',e=>{const mp=document.getElementById('miniProfile');if(mp&&mp.classList.contains('show')&&!e.target.closest('#miniProfile')&&!e.target.closest('.avatar-item')&&!e.target.closest('#sidebarToggleBtn'))closeMini()});
document.getElementById('settingsBtn').addEventListener('click',()=>{toast('⚙️ Настройки в разработке')});
AUTH.onAuthStateChanged(user=>{if(user)DB.ref('users/'+user.uid).once('value').then(s=>{if(s.exists()){App.user=s.val();App.user.uid=user.uid;finish()}})});
});
setupListeners();
})();
</script>
</body>
</html>
