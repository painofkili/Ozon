<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozon Бог</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; background: #1a1a2e url('https://raw.githubusercontent.com/painofkili/ozon/main/bg.jpg') center/cover fixed; color: #eee; padding: 10px; max-width: 450px; margin: 0 auto; font-size: 16px; }
body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,26,46,0.75); z-index: -1; }
.card { background: rgba(22,33,62,0.85); padding: 16px; border-radius: 14px; margin: 8px 0; backdrop-filter: blur(10px); }
input, button, select, textarea { width: 100%; padding: 14px; font-size: 16px; margin: 4px 0; border-radius: 10px; border: 1px solid #444; background: #1a1a2e; color: #fff; }
button { border: none; font-weight: bold; cursor: pointer; }
.btn-green { background: #4CAF50; } .btn-blue { background: #2196F3; } .btn-red { background: #e94560; } .btn-gray { background: #555; } .btn-purple { background: #9C27B0; } .btn-orange { background: #FF9800; } .btn-cyan { background: #00BCD4; } .btn-gold { background: #f5c518; color: #000; }
.tabs { display: flex; gap: 4px; margin: 10px 0; }
.tabs button { flex: 1; padding: 12px; background: #333; font-size: 13px; color: #aaa; }
.tabs button.active { background: #4CAF50; color: #fff; }
.worker-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #333; gap: 4px; flex-wrap: wrap; }
.worker-row button { width: auto; padding: 6px 10px; font-size: 11px; }
.zp-result { background: #1a3a1a; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 14px; white-space: pre-line; }
.punish-row { display: flex; justify-content: space-between; align-items: center; padding: 6px; font-size: 13px; border-bottom: 1px solid #333; }
.punish-row button { width: auto; padding: 4px 8px; font-size: 10px; }
#chat { max-height: 200px; overflow-y: auto; padding: 8px; border-radius: 8px; margin: 8px 0; background: rgba(0,0,0,0.3); font-size: 13px; }
#chat p { margin: 2px 0; position: relative; }
#chat .del-msg { position: absolute; top: 0; right: 0; background: #e94560; color: #fff; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; line-height: 16px; text-align: center; cursor: pointer; display: none; }
#chat p:hover .del-msg { display: block; }
.avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; }
.status-badge { font-size: 14px; font-weight: bold; padding: 4px 12px; border-radius: 12px; display: inline-block; margin: 4px 0; }
.progress-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.progress-text { font-size: 11px; color: #aaa; }
</style>
</head>
