<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Озон Создатель | Панель управления</title>
    <style>
        /* Общие стили */
        body { margin: 0; font-family: sans-serif; transition: 0.3s; padding: 20px; }
        
        /* Киберпанк */
        .theme-cyberpunk { background: #1a1a2e; color: #00d2ff; }
        .theme-cyberpunk .creator-panel { background: #16213e; border: 1px solid #00d2ff; }
        
        /* Минимализм */
        .theme-minimal { background: #ffffff; color: #333; }
        .theme-minimal .creator-panel { background: #f4f4f4; border: 1px solid #ddd; }

        .creator-panel { padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; }
        
        #sticker-upload-area { margin-top: 20px; padding: 20px; border: 2px dashed #ff00ff; }
    </style>
</head>
<body class="theme-cyberpunk" id="app">

    <header>
        <h1>Панель Создателя</h1>
        <button id="theme-toggle" class="btn">Сменить тему</button>
    </header>

    <div class="creator-panel">
        <h2>Инструменты управления</h2>
        <p>Здесь будут расширенные настройки для тебя.</p>
    </div>

    <div id="sticker-upload-area" class="creator-panel">
        <h3>Мои стикер-паки</h3>
        <input type="file" id="sticker-input" accept="image/png">
        <button id="upload-btn" class="btn">Загрузить стикер</button>
        <div id="sticker-list"></div>
    </div>

    <script>
        const app = document.getElementById('app');
        const toggleBtn = document.getElementById('theme-toggle');

        // Управление темой
        const savedTheme = localStorage.getItem('theme') || 'theme-cyberpunk';
        app.className = savedTheme;

        toggleBtn.addEventListener('click', () => {
            const newTheme = app.className === 'theme-cyberpunk' ? 'theme-minimal' : 'theme-cyberpunk';
            app.className = newTheme;
            localStorage.setItem('theme', newTheme);
        });

        // Заглушка для логики загрузки стикеров
        document.getElementById('upload-btn').addEventListener('click', () => {
            alert("Функция загрузки стикеров активна! (Скоро привяжем к БД)");
        });
    </script>
</body>
</html>
