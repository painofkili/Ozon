<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;height:100dvh;width:100vw;background:#0a0a1a}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#eee;font-size:16px;display:flex;flex-direction:column}
:root{--accent:#7c3aed;--accent2:#a855f7;--gold:#f5c518;--bg2:rgba(20,20,50,0.85);--bg3:rgba(30,30,60,0.7);--border:rgba(100,80,220,0.25);--text:#e8e8ff;--muted:#888;--green:#22c55e;--red:#ef4444}
body.theme-creator{--accent:#7c3aed;--accent2:#00d4ff;--gold:#f5c518}
body.theme-god{--accent:#b8860b;--accent2:#ffd700;--gold:#ffd700}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px);padding:16px;margin:6px 0}
input,select,textarea{width:100%;padding:12px 14px;font-size:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,25,0.6);color:#fff;outline:none;transition:0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,0.15)}
button{border:none;font-weight:bold;cursor:pointer;border-radius:12px;transition:all .2s;padding:12px 16px;font-size:15px}
button:hover{transform:scale(1.02);filter:brightness(1.1)}
button:active{transform:scale(0.95)}
.btn-green{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;width:100%}
.btn-red{background:linear-gradient(135deg,#e94560,#c62828);color:#fff;width:100%}
.btn-gray{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1);width:100%}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;width:100%}
.btn-blue{background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff;width:100%}
.btn-purple{background:#9C27B0;color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;width:auto}
.app-container{display:flex;width:100%;height:100dvh;position:relative;z-index:1;overflow:hidden}
.main-content{width:100%;max-width:100%;padding:12px 16px;display:flex;flex-direction:column;height:100%;gap:6px}
.profile-card{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px);flex-shrink:0;cursor:pointer;transition:0.2s}
.profile-card:hover{background:rgba(40,40,70,0.9)}
.badge{font-size:12px;font-weight:bold;padding:4px 12px;border-radius:20px;display:inline-block}
.badge-creator{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.badge-god{background:linear-gradient(135deg,#FFD700,#FF4500);color:#fff}
.badge-manager{background:#2d6a4f;color:#95d5b2}
.name-creator{background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-god{background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-manager{color:#eee;font-weight:bold}
.tabs{display:flex;gap:6px;margin:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tabs button{height:44px;display:flex;align-items:center;gap:8px;border-radius:99px;background:rgba(255,255,255,0.06);color:#aaa;border:1px solid transparent;padding:0 16px;font-size:13px;white-space:nowrap;flex-shrink:0;transition:0.3s;min-width:44px;overflow:hidden}
.tabs button .tab-label{opacity:0;max-width:0;transition:all 0.3s}
.tabs button:hover .tab-label,.tabs button.active .tab-label{opacity:1;max-width:80px}
.tabs button.active{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;box-shadow:0 4px 15px rgba(138,43,226,0.3)}
.tab-content{display:none;width:100%;flex-shrink:0;animation:fadeIn 0.3s ease}
.tab-content.active-tab{display:block}
.chat-section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;margin:0;transition:0.3s}
.chat-header-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);cursor:pointer;flex-shrink:0}
.chat-header-bar:hover{background:rgba(0,0,0,0.3)}
#chat{flex:1;overflow-y:auto;padding:10px 14px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;background:transparent;display:flex;flex-direction:column;gap:2px}
#chat.hidden{display:none !important}
.chat-bubble-group{display:flex;flex-direction:column;max-width:85%;position:relative;margin:2px 0}
.chat-bubble-group.mine{align-self:flex-end;align-items:flex-end}
.chat-bubble-group.other{align-self:flex-start;align-items:flex-start}
.chat-bubble-group .msg-author{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px;display:flex;align-items:center;gap:6px;padding:0 4px}
.chat-static-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0;border:1px solid rgba(255,255,255,0.1)}
.text-ava{display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);font-weight:bold;font-size:12px;color:#fff}
.chat-bubble{background:rgba(255,255,255,0.04);padding:8px 14px;word-break:break-word;line-height:1.4;font-size:14px;border:1px solid rgba(255,255,255,0.03);position:relative;border-radius:12px;transition:0.1s}
.chat-bubble.mine{background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.1)}
.chat-bubble.creator{border-left:2px solid var(--gold);background:rgba(245,197,24,0.06)}
.chat-bubble.god{border-left:2px solid #FFD700;background:rgba(255,215,0,0.06)}
.chat-bubble.clickable:active{transform:scale(0.98);opacity:0.8}
.chat-img{max-width:200px;max-height:150px;border-radius:8px;margin-top:4px;cursor:pointer;object-fit:cover}
.chat-sticker{max-width:120px;max-height:120px;object-fit:contain;margin:2px 0}
.chat-input-wrapper{position:relative;width:100%;margin-top:auto;flex-shrink:0}
.chat-input-bar{width:100%;background:var(--bg2);backdrop-filter:blur(16px);padding:8px 12px;display:flex;gap:8px;align-items:center;z-index:100;border-top:1px solid var(--border);border-radius:16px}
.input-wrapper{position:relative;flex:1;display:flex;align-items:center;background:rgba(0,0,0,0.3);border-radius:20px;border:1px solid rgba(255,255,255,0.05)}
.input-wrapper input{background:transparent;border:none;padding:10px 40px 10px 16px;font-size:15px;width:100%}
.sticker-toggle{position:absolute;right:8px;background:transparent;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:0}
#sendMsgBtn,#chatPhotoBtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);color:#aaa}
#sendMsgBtn{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;border:none}

.avatar-carousel{width:110px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:-130px;height:100dvh;padding:50px 0 20px;z-index:1000;backdrop-filter:blur(20px);transition:right 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:-10px 0 30px rgba(0,0,0,0.5)}
.avatar-carousel.open{right:0}
.avatar-carousel-inner{display:flex;flex-direction:column;align-items:center;width:100%;gap:12px;overflow-y:auto;height:100%;padding:10px 0;scrollbar-width:none;padding-bottom:30px}
.avatar-carousel-inner::-webkit-scrollbar{display:none}
.sidebar-close-btn{position:absolute;top:15px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#eee;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;z-index:10;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
.sidebar-close-btn:hover{background:#e94560;color:#fff;border-color:#e94560;transform:translateX(-50%) scale(1.1)}
.avatar-item{width:56px;height:56px;border-radius:50%;cursor:pointer;position:relative;transition:0.2s;flex-shrink:0}
.avatar-item:hover{transform:scale(1.05)}
.avatar-item img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid transparent}
.avatar-item.active img{border-color:var(--gold);box-shadow:0 0 15px rgba(245,197,24,0.3)}
.avatar-item .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#4CAF50;border-radius:50%;border:2px solid #111}
.btn-sidebar-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);width:36px;height:50px;background:var(--bg2);border:1px solid var(--border);border-right:none;border-radius:14px 0 0 14px;color:#fff;font-size:14px;cursor:pointer;z-index:999;backdrop-filter:blur(8px)}

.mini-profile{position:fixed;right:130px;top:50%;transform:translateY(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:240px;z-index:1100;display:none;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,0.6)}
.mini-profile.show{display:block;animation:slideIn 0.2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-50%) translateX(20px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
@keyframes slideUpModal{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mini-profile .mp-close{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.05);border:none;color:#aaa;width:28px;height:28px;border-radius:50%;font-size:12px;cursor:pointer}
.mini-profile .mp-close:hover{background:#e94560;color:#fff}

#stickerPanel{position:absolute;bottom:calc(100% + 8px);right:0;width:300px;height:340px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;display:none;flex-direction:column;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.6);backdrop-filter:blur(20px);overflow:hidden}
#stickerPanel.open{display:flex}
#stickerContent{flex:1;overflow-y:auto;padding:12px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
.emoji-item{width:40px;height:40px;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:10px;transition:0.15s}
.emoji-item:hover{background:rgba(255,255,255,0.1);transform:scale(1.1)}
.st-item{width:60px;height:60px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.02);transition:0.15s}
.st-item:hover{background:rgba(255,255,255,0.08);transform:scale(1.05)}
.st-item img{max-width:100%;max-height:100%;object-fit:contain}
.sticker-tabs{display:flex;background:rgba(0,0,0,0.3);padding:6px;gap:4px;overflow-x:auto;border-top:1px solid var(--border);scrollbar-width:none}
.sticker-tabs::-webkit-scrollbar{display:none}
.st-tab{width:32px;height:32px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0.6;transition:0.2s;flex-shrink:0}
.st-tab.active,.st-tab:hover{opacity:1;background:rgba(124,58,237,0.2)}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;pointer-events:none;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:12px 20px;border-radius:16px;background:var(--bg2);border:1px solid var(--accent);color:#fff;font-size:14px;box-shadow:0 5px 20px rgba(0,0,0,0.6);transform:translateY(-20px);opacity:0;transition:all 0.3s;text-align:center;backdrop-filter:blur(10px)}
.toast-msg.error{border-color:var(--red)}
.toast-msg.show{transform:translateY(0);opacity:1}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:12px;background:rgba(22,33,62,0.4);border-radius:10px;padding:6px;border:1px solid var(--border)}
.calendar div{padding:6px;border-radius:4px}
.calendar .shift-day{background:#4CAF50;color:#fff;font-weight:bold;cursor:pointer}
.calendar .today{border:2px solid #2196F3}
.calendar .header{font-weight:bold;background:rgba(51,51,51,0.7)}
.worker-row{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--border);gap:6px;flex-wrap:wrap}
.worker-row button{width:auto;padding:4px 10px;font-size:11px}
.zp-result{background:rgba(34,197,94,0.1);padding:12px;border-radius:8px;margin-top:8px;font-size:14px;border:1px solid rgba(34,197,94,0.3);white-space:pre-line}
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:20px;max-width:500px;width:100%;max-height:90dvh;overflow-y:auto;backdrop-filter:blur(20px)}
#settingsPanel{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px}
.settings-tab{flex:1;padding:8px;border-radius:10px;font-size:13px;background:transparent;color:var(--muted);border:none;cursor:pointer;transition:0.2s}
.settings-tab.active{background:var(--accent);color:#fff}
.style-btn{padding:8px 6px;border-radius:10px;border:2px solid #444;background:rgba(0,0,0,0.3);color:#ccc;font-size:11px;cursor:pointer;transition:0.2s;width:100%}
.style-btn.active{border-color:var(--accent);background:rgba(124,58,237,0.2);color:#fff}
.style-btn.premium{border-color:#FFD700;background:rgba(255,215,0,0.05)}

.avatar-wrap{position:relative;width:76px;height:76px;flex-shrink:0;border-radius:50%}
#mainAvatarCanvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:130px;height:130px;pointer-events:none;z-index:2}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media(min-width:1024px){
  .app-container{flex-direction:row;align-items:stretch;justify-content:center;gap:16px;padding:12px}
  .left-column{width:380px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow-y:auto;height:100%}
  .right-column{flex:1;display:flex;flex-direction:column;gap:6px;height:100%;min-width:0;overflow:hidden}
  .right-column .chat-section{flex:1}
  .right-column .chat-input-wrapper{flex-shrink:0}
  .main-content{flex-direction:row;padding:0;gap:16px;max-width:100%}
  #tabContentContainer{flex:1;overflow-y:auto}
}

@media(max-width:1023px){
  .main-content{flex-direction:column;padding:8px;height:100dvh;}
  
  .left-column{flex:0 0 42dvh; display:flex;flex-direction:column;margin-bottom:4px; transition:0.3s;}
  .main-content.chat-collapsed .left-column { flex:1 1 0%; min-height:0; margin-bottom:0; max-height:none; }
  
  .right-column{flex:1 1 0%;display:flex;flex-direction:column;min-height:0; transition:0.3s;}
  .main-content.chat-collapsed .right-column { flex:0 0 auto; min-height:auto; }
  
  #tabContentContainer{flex:1;overflow-y:auto;}
  
  .chat-input-wrapper{position:relative;width:100%;max-width:100%;z-index:100;flex-shrink:0;}
  .chat-input-bar{border-radius:16px;padding:6px 8px;}
  
  .mini-profile{right:10px;width:210px}
  .avatar-carousel{width:80px}
  .avatar-item{width:46px;height:46px}
}
</style>
</head>
<body>
<div id="toastContainer" class="toast-container"></div>

<!-- Модалка с действиями над сообщением -->
<div id="msgActionModal" style="display:none; position:fixed; inset:0; z-index:12000; background:rgba(0,0,0,0.6); align-items:flex-end; justify-content:center; backdrop-filter:blur(5px);" onclick="closeMsgActions()">
  <div style="background:var(--bg2); width:100%; max-width:500px; border-radius:24px 24px 0 0; padding:24px; display:flex; flex-direction:column; gap:12px; animation: slideUpModal 0.25s cubic-bezier(0.16, 1, 0.3, 1); border-top:1px solid var(--border);" onclick="event.stopPropagation()">
      <h4 style="text-align:center; color:var(--muted); margin-bottom:8px;">Действия с сообщением</h4>
      <button class="btn-gold" id="btnPinMsg" style="display:none; padding:14px;">📌 Закрепить</button>
      <button class="btn-red" id="btnDelMsg" style="display:none; padding:14px;">🗑️ Удалить</button>
      <button class="btn-gray" onclick="closeMsgActions()" style="padding:14px; margin-top:8px;">Отмена</button>
  </div>
</div>

<div id="avatarPreviewModal" style="display:none;position:fixed;inset:0;z-index:11000;background:rgba(0,0,0,0.85);backdrop-filter:blur(15px);align-items:center;justify-content:center;flex-direction:column;">
  <button id="closeAvatarPreview" style="position:absolute;top:max(30px, env(safe-area-inset-top));right:30px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;transition:0.2s;z-index:12000;display:flex;align-items:center;justify-content:center;">✕</button>
  <canvas id="previewAvatarCanvas" width="600" height="600" style="width:100%;max-width:400px;height:auto;"></canvas>
  <img id="previewFullImage" style="display:none;max-width:90vw;max-height:75vh;border-radius:12px;border:2px solid var(--accent);object-fit:contain;box-shadow:0 10px 40px rgba(0,0,0,0.5);">
  <div id="previewAvatarName" style="margin-top:10px;font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></div>
  <button id="toggleFullImgBtn" class="btn-gray" style="margin-top:16px;max-width:250px;padding:12px;">Показать оригинал</button>
</div>

<div id="customModal" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;">
  <div class="card" style="max-width:350px;width:100%;display:flex;flex-direction:column;gap:12px;">
    <div id="modalMessage" style="font-size:16px;text-align:center;font-weight:bold;"></div>
    <input id="modalInput" type="text" style="display:none;margin-top:8px;">
    <div style="display:flex;gap:8px;margin-top:10px;">
      <button id="modalCancelBtn" class="btn-gray">Отмена</button>
      <button id="modalConfirmBtn" class="btn-green">ОК</button>
    </div>
  </div>
</div>

<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;height:100dvh;padding:20px;">
  <div style="max-width:380px;width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:14px;">
    <div style="text-align:center;font-size:24px;font-weight:800;background:linear-gradient(135deg,#f5c518,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Ozon Hub</div>
    <div style="display:flex;background:rgba(0,0,0,0.3);border-radius:12px;padding:4px;">
      <button id="tabLogin" style="flex:1;padding:10px;border:none;border-radius:10px;background:#7c3aed;font-size:15px;font-weight:600;color:#fff;">Вход</button>
      <button id="tabRegister" style="flex:1;padding:10px;border:none;border-radius:10px;background:transparent;font-size:15px;font-weight:600;color:#6a7a94;">Регистрация</button>
    </div>
    <div id="loginFields" style="display:flex;flex-direction:column;gap:12px;">
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
      <input id="loginPass" type="password" placeholder="Пароль" autocomplete="current-password">
      <button class="btn-gold" id="loginBtn">Войти</button>
      <button class="btn-gray" id="resetPassBtn" style="width:100%;padding:10px;font-size:13px;background:transparent;border:1px solid var(--border);">Забыли пароль?</button>
    </div>
    <div id="registerFields" style="display:none;flex-direction:column;gap:12px;">
      <input id="regName" placeholder="Имя" autocomplete="name">
      <input id="regEmail" type="email" placeholder="Email" autocomplete="email">
      <input id="regPass" type="password" placeholder="Пароль (мин. 4 символа)" autocomplete="new-password">
      <select id="regPunkt"><option value="">Выберите пункт</option></select>
      <button class="btn-gold" id="registerBtn">Зарегистрироваться</button>
    </div>
    <div id="authError" style="color:var(--red);font-size:13px;text-align:center;display:none;"></div>
  </div>
</div>

<div id="app" class="app-container" style="display:none">
  <button class="btn-sidebar-toggle" id="sidebarToggleBtn">👥</button>
  
  <div class="main-content" id="mainContent">
    <div class="left-column" id="leftColumn">
      <div id="announceBlock" style="display:none;background:rgba(200,150,0,0.1);border:1px solid rgba(200,150,0,0.3);padding:12px 16px;border-radius:16px;text-align:center;font-size:14px;color:#ffd700;margin-bottom:4px;"></div>
      
      <div class="profile-card" id="mainProfileCard">
        <div class="avatar-wrap">
          <canvas id="mainAvatarCanvas" width="600" height="600"></canvas>
        </div>
        <div style="flex:1">
          <b id="creatorNameWrapper" class="name-creator" style="font-size:18px;"><span id="uname"></span></b>

  // ============ AVATAR RENDER ENGINE ============
  function renderPremiumAvatar(canvas, settings, avatarImg, fallbackName) {
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const trueW = canvas.width, trueH = canvas.height;
    const baseSize = 300, w = baseSize, h = baseSize, cx = w/2, cy = h/2;
    const avatarRadius = 82, fRadius = avatarRadius + 4;
    if(!avatarTimers.has(canvas)) avatarTimers.set(canvas, {tick:0, pulse:1, dir:1, particles:[]});
    const state = avatarTimers.get(canvas);
    const speed = parseFloat(settings?.speed) || 1;
    state.tick += 0.04 * speed;
    state.pulse += 0.02 * state.dir * speed;
    if(state.pulse >= 1.2) state.dir = -1;
    if(state.pulse <= 0.8) state.dir = 1;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,trueW,trueH);
    ctx.save();
    ctx.scale(trueW/baseSize, trueH/baseSize);
    const color1 = settings?.color1 || '#6366f1', color2 = settings?.color2 || '#a855f7';
    const style = settings?.style || 'rgb-ring';
    const glow = parseInt(settings?.glow) || 20;

    const drawEffects = (layer) => {
      ctx.shadowBlur = layer === 'front' ? glow : 0;
      ctx.shadowColor = color1;
      if(style === 'double-orbit') {
        const oRX = avatarRadius + 38, oRY = avatarRadius * 0.35;
        const a1 = state.tick, a2 = -state.tick * 1.3, a3 = state.tick * 0.8;
        const drawOrbit = (rot, col, pAngle, isFront) => {
          ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot);
          ctx.beginPath();
          ctx.ellipse(0,0,oRX,oRY,0, isFront?0:Math.PI, isFront?Math.PI:Math.PI*2);
          ctx.strokeStyle = col; ctx.globalAlpha = isFront?0.9:0.2; ctx.lineWidth = isFront?3:1.5; ctx.stroke();
          const nA = ((pAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
          const pFront = nA < Math.PI;
          if((isFront && pFront) || (!isFront && !pFront)) {
            let px = Math.cos(nA)*oRX, py = Math.sin(nA)*oRY;
            ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 15; ctx.globalAlpha = 1;
            ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
            ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI*2); ctx.fill();
          }
          ctx.restore();
        };
        if(layer === 'back') { drawOrbit(0,color1,a1,false); drawOrbit(Math.PI/3,color2,a2,false); drawOrbit(-Math.PI/3,'#00d4ff',a3,false); }
        else { drawOrbit(0,color1,a1,true); drawOrbit(Math.PI/3,color2,a2,true); drawOrbit(-Math.PI/3,'#00d4ff',a3,true); }
      } else if(style === 'god-rays' && layer === 'back') {
        ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
        const drawWing = (isLeft) => {
          ctx.save(); ctx.translate(cx+(isLeft?-avatarRadius+5:avatarRadius-5), cy); ctx.scale(isLeft?-1:1,1); ctx.rotate(Math.sin(state.tick*2)*0.08);
          ctx.beginPath(); ctx.moveTo(0,15);
          ctx.bezierCurveTo(15,-15,30,-35,60,-25);
          ctx.quadraticCurveTo(50,-10,70,-5); ctx.quadraticCurveTo(55,5,65,15);
          ctx.quadraticCurveTo(45,15,50,30); ctx.quadraticCurveTo(30,25,30,40);
          ctx.quadraticCurveTo(15,25,0,15);
          ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill();
          ctx.strokeStyle = 'rgba(255,215,0,0.6)'; ctx.lineWidth = 1; ctx.stroke();
          ctx.restore();
        };
        drawWing(true); drawWing(false);
        ctx.beginPath(); const haloY = cy-avatarRadius-15+Math.sin(state.tick*3)*5;
        ctx.ellipse(cx, haloY, 32, 9, 0, 0, Math.PI*2);
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 4; ctx.stroke();
        ctx.shadowBlur = 0;
      } else if(style === 'matrix') {
        if(layer === 'back') { ctx.strokeStyle='#00ff41'; ctx.lineWidth=4; ctx.shadowBlur=15; ctx.shadowColor='#00ff41'; ctx.beginPath(); ctx.arc(cx,cy,fRadius,0,Math.PI*2); ctx.stroke(); }
        if(layer === 'front') {
          if(!state.matrixRain) { state.matrixRain = []; for(let i=0;i<30;i++) state.matrixRain.push({x:cx-avatarRadius+Math.random()*avatarRadius*2, y:cy-avatarRadius-Math.random()*200, speed:1.5+Math.random()*2, char:Math.floor(Math.random()*10).toString()}); }
          ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.shadowBlur = 8; ctx.shadowColor = '#00ff41';
          state.matrixRain.forEach(p => {
            p.y += p.speed * speed;
            if(Math.random()>0.9) p.char = Math.floor(Math.random()*10).toString();
            if(p.y > cy+avatarRadius+20) { p.y = cy-avatarRadius-50-Math.random()*100; p.x = cx-avatarRadius+Math.random()*avatarRadius*2; }
            const dist = Math.sqrt(Math.pow(p.x-cx,2)+Math.pow(p.y-cy,2));
            ctx.fillStyle = dist < avatarRadius ? '#ffffff' : '#00ff41';
            ctx.globalAlpha = Math.max(0, 1-(dist-avatarRadius)/30);
            if(ctx.globalAlpha>0) ctx.fillText(p.char, p.x, p.y);
          });
          ctx.globalAlpha = 1;
        }
      } else if(style === 'fire') {
        if(layer === 'back') { ctx.shadowBlur=20; ctx.shadowColor='#ff3300'; ctx.strokeStyle='#ff3300'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx,cy,fRadius,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0; }
        if(layer === 'front' || layer === 'back') {
          if(!state.fireParticles) state.fireParticles = [];
          if(state.fireParticles.length < 150) { const sA = Math.random()*Math.PI*2; state.fireParticles.push({x:cx+Math.cos(sA)*avatarRadius, y:cy+Math.sin(sA)*avatarRadius, vx:(Math.random()-0.5)*1.5, vy:-Math.random()*3-1, life:1, maxLife:1, size:15+Math.random()*15, color:Math.random()>0.5?'#ff3300':(Math.random()>0.5?'#ff7700':'#ffcc00'), isFront:Math.random()>0.5}); }
          ctx.globalCompositeOperation = 'lighter';
          state.fireParticles.forEach(p => { if((layer==='front'&&p.isFront)||(layer==='back'&&!p.isFront)) { p.x+=p.vx+Math.sin(p.life*10)*0.5; p.y+=p.vy; p.life-=0.02*speed; const sc = p.life/p.maxLife; ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,p.life); ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.size*sc),0,Math.PI*2); ctx.fill(); } });
          ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
          if(layer==='front') state.fireParticles = state.fireParticles.filter(p => p.life>0);
        }
      } else if(style === 'sparks' && layer === 'front') {
        ctx.shadowColor = color1;
        if(state.particles.length < 50) state.particles.push({angle:Math.random()*Math.PI*2, speed:0.5+Math.random()*2, life:1, size:2+Math.random()*3, distance:avatarRadius+Math.random()*10});
        state.particles = state.particles.filter(p => p.life>0);
        state.particles.forEach(p => { p.angle+=p.speed*0.02; p.distance+=p.speed*0.5; p.life-=0.015; const x=cx+Math.cos(p.angle)*p.distance, y=cy+Math.sin(p.angle)*p.distance; ctx.fillStyle=p.life>0.5?color1:color2; ctx.globalAlpha=p.life; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(x,y,p.size,0,Math.PI*2); ctx.fill(); });
        ctx.globalAlpha = 1;
      } else if(layer === 'front') {
        if(style==='rgb-ring') { ctx.strokeStyle=color1; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(cx,cy,fRadius,state.tick%(Math.PI*2),(state.tick%(Math.PI*2))+Math.PI*1.5); ctx.stroke(); ctx.strokeStyle=color2; ctx.beginPath(); ctx.arc(cx,cy,fRadius,(state.tick%(Math.PI*2))+Math.PI,(state.tick%(Math.PI*2))+Math.PI*2); ctx.stroke(); }
        else if(style==='rgb-rainbow') { for(let i=0;i<12;i++) { const hue=((state.tick*50+i*30)%360); ctx.strokeStyle=`hsl(${hue},100%,60%)`; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(cx,cy,fRadius+Math.sin(state.tick*2+i)*3,i*Math.PI/6,(i+1)*Math.PI/6); ctx.stroke(); } }
        else if(style==='neon-pulse') { const pR=fRadius+Math.sin(state.tick*3)*6; ctx.strokeStyle=color1; ctx.lineWidth=8*state.pulse; ctx.globalAlpha=0.6; ctx.beginPath(); ctx.arc(cx,cy,pR,0,Math.PI*2); ctx.stroke(); ctx.strokeStyle=color2; ctx.lineWidth=4; ctx.globalAlpha=1; ctx.beginPath(); ctx.arc(cx,cy,pR,0,Math.PI*2); ctx.stroke(); }
        else if(style==='running-gradient') { const grad=ctx.createConicGradient(state.tick%(Math.PI*2),cx,cy); grad.addColorStop(0,color1); grad.addColorStop(0.3,'#ffffff'); grad.addColorStop(0.5,color2); grad.addColorStop(0.7,'#ffffff'); grad.addColorStop(1,color1); ctx.strokeStyle=grad; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(cx,cy,fRadius,0,Math.PI*2); ctx.stroke(); }
        else if(style==='comet') { for(let i=0;i<3;i++) { const angle=state.tick*2+i*Math.PI*2/3; const tailLen=30; for(let j=tailLen;j>=0;j--) { const tA=angle-j*0.03; const x=cx+Math.cos(tA)*fRadius, y=cy+Math.sin(tA)*fRadius; const size=6*(1-j/tailLen); ctx.fillStyle=j===0?'#fff':color1; ctx.globalAlpha=1-(j/tailLen); ctx.shadowBlur=j===0?20:0; ctx.shadowColor=color2; ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.fill(); } } ctx.globalAlpha=1; }
        else if(!['double-orbit','god-rays','matrix','fire','sparks'].includes(style)) { ctx.strokeStyle=settings?.ringColor||color1; const t=settings?.ringThickness; ctx.lineWidth=t==='thick'?8:t==='thin'?2:4; ctx.beginPath(); ctx.arc(cx,cy,fRadius,0,Math.PI*2); ctx.stroke(); }
      }
    };

    drawEffects('back');
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, avatarRadius, 0, Math.PI*2); ctx.clip();
    if(avatarImg && avatarImg !== 'loading') { const ratio = Math.max((avatarRadius*2)/avatarImg.width, (avatarRadius*2)/avatarImg.height); const dw = avatarImg.width*ratio, dh = avatarImg.height*ratio; ctx.drawImage(avatarImg, cx-dw/2, cy-dh/2, dw, dh); }
    else { 
      ctx.fillStyle = '#1e1b4b'; ctx.fill(); ctx.fillStyle = '#6366f1'; ctx.font = `bold ${avatarRadius}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
      const fn = cleanName(fallbackName) || '?';
      const firstLetter = Array.from(fn)[0] ? Array.from(fn)[0].toUpperCase() : '?';
      ctx.fillText(firstLetter, cx, cy+Math.floor(avatarRadius/6)); 
    }
    ctx.restore();

    drawEffects('front');

  async function login() {
    const e = $('#loginEmail').value.trim(), p = $('#loginPass').value.trim(), err = $('#authError');
    if(!e||!p) { err.textContent='Заполните все поля'; err.style.display='block'; return; }
    try {
      const cred = await AUTH.signInWithEmailAndPassword(e, p);
      const snap = await DB.ref('users/'+cred.user.uid).once('value');
      if(!snap.exists()) { err.textContent='Пользователь не найден'; err.style.display='block'; return; }
      App.user = snap.val(); App.user.uid = cred.user.uid;
      finishLogin();
    } catch(ex) { err.textContent=ex.message; err.style.display='block'; }
  }

  async function register() {
    const n = $('#regName').value.trim(), e = $('#regEmail').value.trim(), p = $('#regPass').value.trim(), punkt = $('#regPunkt').value, err = $('#authError');
    if(!n||!e||!p||!punkt) { err.textContent='Заполните все поля'; err.style.display='block'; return; }
    if(p.length<4) { err.textContent='Пароль минимум 4 символа'; err.style.display='block'; return; }
    if(!isValidEmail(e)) { err.textContent='Некорректный email'; err.style.display='block'; return; }
    try {
      const cred = await AUTH.createUserWithEmailAndPassword(e, p);
      await DB.ref('users/'+cred.user.uid).set({name:n, email:e, role:'manager', punkt, avatar:'', bonus:0});
      App.user = {name:n, email:e, role:'manager', punkt, avatar:'', bonus:0, uid:cred.user.uid};
      finishLogin();
    } catch(ex) { err.textContent=ex.message; err.style.display='block'; }
  }

    const e = $('#loginEmail').value.trim();
    if(!e) { toast('Введите email', true); return; }

    catch(ex) { toast(ex.message, true); }

  // ============ STATS ============
  function renderStats(p) {
    const n = new Date(); App.calYear = n.getFullYear(); App.calMonth = n.getMonth();
    p.innerHTML = `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><button class="btn-gray" id="calPrev" style="width:auto;padding:6px 12px;">◀</button><div id="calTitle" style="font-size:14px;font-weight:700;"></div><button class="btn-gray" id="calNext" style="width:auto;padding:6px 12px;">▶</button></div><div id="calGrid" class="calendar"></div></div><div class="card"><div>Смен: <b id="statShifts">0</b></div><div>Часов: <b id="statHours">0</b></div><div>Товаров: <b id="statTovar">0</b></div></div><button class="btn-red" id="clearShiftsBtn" style="width:100%;padding:12px;margin-top:10px;">Очистить мои смены</button>`;

  function renderCalendar() {
    const m = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
    $('#calTitle').textContent = m[App.calMonth]+' '+App.calYear;
    DB.ref('shifts').once('value').then(s => {
      const sh = {}; let ts=0,th=0,tt=0;
      s.forEach(c => { 
        const x = c.val(); 
        if(x.user===App.user.uid || x.user_name===App.user.name || x.user===App.user.name) { 
          const d = x.timestamp ? new Date(x.timestamp) : new Date(); 
          if(!isNaN(d.getTime()) && d.getFullYear()===App.calYear && d.getMonth()===App.calMonth) { 
            const day = d.getDate(); 
            if(!sh[day]) sh[day]={count:0,hours:0,tovar:0}; 
            sh[day].count++; sh[day].hours+=x.hours||0; sh[day].tovar+=x.tovar||0; 
          } 
        } 
      });
      for(const k in sh) { ts+=sh[k].count; th+=sh[k].hours; tt+=sh[k].tovar; }
      $('#statShifts').textContent=ts; $('#statHours').textContent=th.toFixed(1); $('#statTovar').textContent=tt;
      const fd=new Date(App.calYear,App.calMonth,1).getDay(),off=(fd+6)%7,dim=new Date(App.calYear,App.calMonth+1,0).getDate(),today=new Date(),grid=$('#calGrid');
      let h = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="header">${d}</div>`).join('');
      for(let i=0;i<off;i++) h+='<div></div>';
      for(let d=1;d<=dim;d++) { const isT=today.getDate()===d&&today.getMonth()===App.calMonth&&today.getFullYear()===App.calYear,has=!!sh[d]; h+=`<div class="${isT?'today ':''}${has?'shift-day':''}">${d}</div>`; }
      grid.innerHTML = h;
    });
  }

  function renderSalary(p) {
    p.innerHTML = '<div class="card"><h4>💰 Расчёт ЗП</h4><select id="salUser" style="margin-bottom:12px;"><option value="">— Выберите сотрудника —</option></select><div style="display:flex;gap:8px;"><input type="date" id="salFrom" style="flex:1;"><input type="date" id="salTo" style="flex:1;"></div><button class="btn-green" id="salCalcBtn" style="margin-top:8px;">🧮 Посчитать</button><button class="btn-blue" id="salPayBtn" style="margin-top:4px;">✅ Оплатить</button><div id="salResult" style="margin-top:12px;"></div></div>';
    let lastCalc = null;
    DB.ref('users').once('value').then(s => { const sel=$('#salUser'); s.forEach(c=>{const u=c.val();if(u.uid!==App.user.uid)sel.innerHTML+=`<option value="${c.key}">${esc(cleanName(u.name))}</option>`;}); });
    $('#salCalcBtn').addEventListener('click', async () => {
      const uid=$('#salUser').value, from=$('#salFrom').value, to=$('#salTo').value;
      if(!uid||!from||!to){toast('Заполните все поля',true);return;}
      try {
        const us=await DB.ref('users/'+uid).once('value'), ud=us.val(), pid=ud.punkt||'';
        let rate=0; const ps=await DB.ref('punkts').once('value'); ps.forEach(c=>{if(c.key===pid)rate=c.val().rate||0;}); if(!rate)rate=150;
        let th=0,tt=0,ids=[]; const ss=await DB.ref('shifts').orderByChild('user').equalTo(uid).once('value');
        ss.forEach(c=>{const s=c.val();if(s.date>=from&&s.date<=to){th+=s.hours||0;tt+=s.tovar||0;ids.push(c.key);}});
        let prem=0,pun=0; const fTs=new Date(from).getTime(),tTs=new Date(to).getTime();
        const pr=await DB.ref('premiums').orderByChild('user').equalTo(uid).once('value'); pr.forEach(c=>{const p=c.val();if(p.timestamp>=fTs&&p.timestamp<=tTs)prem+=p.amount||0;});
        const pu=await DB.ref('punishes').orderByChild('user').equalTo(uid).once('value'); pu.forEach(c=>{const p=c.val();if(p.timestamp>=fTs&&p.timestamp<=tTs)pun+=p.amount||0;});
        const base=Math.round(th*rate), total=Math.max(0,base+prem-pun);
        $('#salResult').innerHTML = `<div class="zp-result">Смен: ${ids.length}, часов: ${th.toFixed(1)}, товаров: ${tt}<br>База: ${base}₽, премии: +${prem}₽, штрафы: -${pun}₽<br><b>Итого: ${total}₽</b></div>`;
        lastCalc = {uid,from,to,total,shiftIds:ids};
      } catch(ex) { toast('Ошибка расчёта: '+ex.message, true); }
    });
    $('#salPayBtn').addEventListener('click', async function() {
      if(!lastCalc){toast('Сначала посчитайте!',true);return;}
      if(!await customConfirm(`Оплатить ${lastCalc.total}₽ сотруднику?`)) return;
      DB.ref('payments').push({user:lastCalc.uid,total:lastCalc.total,dateFrom:lastCalc.from,dateTo:lastCalc.to,timestamp:Date.now()});
      const proms = lastCalc.shiftIds.map(id => DB.ref('shifts/'+id+'/paid').set(true));
      Promise.all(proms).then(()=>{toast(`✅ Оплачено ${lastCalc.total}₽`);lastCalc=null;$('#salResult').innerHTML='';});
    });
  }

  window.pinMessage = async function() {

      const key = window.activeMsgKey;

      const m = App.messagesCache[key];
      if(!m) return;

      if(m.photo || m.photos) text = text ? text + ' [Фото]' : '[Фото]';

          user: cleanName(m.user),

          timestamp: Date.now()
      }).then(() => toast('📌 Сообщение закреплено'));

    if(!window.activeMsgKey) return;

    if(!await customConfirm('Удалить сообщение?')) return;
    const ref = App.privateChatWith ? (()=>{const u=[App.user.uid,App.privateChatWith].sort();return DB.ref('privateChats/'+u[0]+'_'+u[1]);})() : DB.ref('chat');

  function loadChat() {
    if(App.chatListener){App.chatListener.off();App.chatListener=null;}
    const ref = App.privateChatWith ? (()=>{const u=[App.user.uid,App.privateChatWith].sort();return DB.ref('privateChats/'+u[0]+'_'+u[1]);})() : DB.ref('chat');
    App.chatListener = ref.limitToLast(50);
    App.chatListener.on('value', snap => {
      App.messagesCache = {};
      const msgs=[]; snap.forEach(c=>{if(c.val())msgs.push({key:c.key,msg:c.val()});});
      msgs.sort((a,b)=>a.msg.timestamp-b.msg.timestamp);
      let html='',group=[];
      const renderContent = (m) => {
        let c = ''; if(m.text)c+=esc(m.text);
        if(m.photo)c+=`<br><img class="chat-img" src="${esc(m.thumb||m.photo)}" onclick="event.stopPropagation();window.open('${esc(m.photo)}','_blank')">`;
        if(m.sticker)c+=`<img class="chat-sticker" src="${esc(m.sticker)}">`;
        if(m.photos?.length){c+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">';m.photos.forEach(p=>{const tb=typeof p==='object'?esc(p.thumb):esc(p),fl=typeof p==='object'?esc(p.full):esc(p);c+=`<img class="chat-img" src="${tb}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="event.stopPropagation();window.open('${fl}','_blank')">`;});c+='</div>';}
        return c;
      };
      
      const renderGroup = (g) => {
        const f=g[0], isMine=f.isMine, isC=f.m.user?.startsWith('🌌'), isG=f.m.user?.startsWith('👑');
        const un = cleanName(f.userName);
        let auid = f.m.uid || null;
        if (!auid) {
          if(isMine) auid = App.user.uid;
          else { for(const uid in App.allUserData){ if(cleanName(App.allUserData[uid].name)===un){auid=uid;break;} } }
        }
        
        const safeUid = auid ? esc(auid) : '';
        const uData = auid ? App.allUserData[auid] : null;
        let avaImg = (auid === App.user.uid) ? App.user.avatar : (uData ? uData.avatar : null);
        if (typeof avaImg === 'string' && avaImg.trim() === '') avaImg = null;

        const firstLetter = Array.from(un)[0] ? Array.from(un)[0].toUpperCase() : '?';
        const errorFallback = `this.onerror=null; this.outerHTML='<div class=\\'chat-static-avatar text-ava\\' onclick=\\'event.stopPropagation();window.openAvatarPreview(\\&quot;${safeUid}\\&quot;, \\&quot;${esc(un)}\\&quot;)\\'>${esc(firstLetter)}</div>'`;

        const avaHtml = (avaImg)
            ? `<img src="${esc(avaImg)}" class="chat-static-avatar" onerror="${errorFallback}" onclick="event.stopPropagation();window.openAvatarPreview('${safeUid}','${esc(un)}')">`
            : `<div class="chat-static-avatar text-ava" onclick="event.stopPropagation();window.openAvatarPreview('${safeUid}','${esc(un)}')">${esc(firstLetter)}</div>`;
        
        const ns=(isC||isG)?'background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;':'';
        let h=`<div class="chat-bubble-group ${isMine?'mine':'other'}"><div class="msg-author" style="${isMine?'flex-direction:row-reverse;':''}">${avaHtml}<span style="${ns}">${esc(un)}</span></div>`;
        
        g.forEach(g2=>{
          const m=g2.m;
          let cls='chat-bubble clickable';
          if(isMine)cls+=' mine';else if(isC)cls+=' creator';else if(isG)cls+=' god';
          
          const canDelete = isMine || App.isCreator || (App.isGod && !isC);
          const canPin = App.isCreator || App.isGod;
          
          const clickAttr = (canDelete || canPin) ? `onclick="window.openMsgActions('${esc(g2.item.key)}', ${canPin}, ${canDelete})"` : '';
          h+=`<div class="${cls}" ${clickAttr}>${renderContent(m)}</div>`;
        });
        h+='</div>'; return h;
      };
      
      for(let i=0;i<msgs.length;i++){
        const it=msgs[i],m=it.msg;
        const un=cleanName(m.user);
        App.messagesCache[it.key] = m;
        const isM = m.uid ? m.uid === App.user.uid : (App.user&&(m.user==='🌌 '+App.user.name||m.user==='👑 '+App.user.name||m.user===App.user.name));
        
        if(group.length===0||cleanName(group[0].userName)!==un||group[0].isMine!==isM){
          if(group.length)html+=renderGroup(group);
          group=[{item:it,userName:m.user,isMine:isM,m}];
        } else group.push({item:it,userName:m.user,isMine:isM,m});
      }
      if(group.length)html+=renderGroup(group);
      const ce=$('#chat'),was=ce.scrollHeight-ce.scrollTop-ce.clientHeight<60;
      ce.innerHTML=html;
      if(was||document.activeElement===$('#chatMsgInput'))ce.scrollTop=ce.scrollHeight;
    });
  }
  
  function sendMessage() {
    const inp=$('#chatMsgInput'),t=inp.value.trim();if(!t||!App.user)return;
    const ref=App.privateChatWith?(()=>{const u=[App.user.uid,App.privateChatWith].sort();return DB.ref('privateChats/'+u[0]+'_'+u[1]);})():DB.ref('chat');
    const p=App.isGod?'👑 ':(App.isCreator?'🌌 ':'');
    ref.push({uid:App.user.uid, user:p+App.user.name, text:t, timestamp:Date.now(), role:App.user.role, likes:{}}).then(()=>{inp.value='';inp.focus();});

  function sendPhoto() {
    const inp=$('#chatPhotoInput'),files=inp.files;if(!files.length||!App.user)return;
    const photos=[],cnt=Math.min(files.length,5);
    for(let i=0;i<cnt;i++){(function(f){const r=new FileReader();r.onload=function(e){const img=new Image();img.onload=function(){const c=document.createElement('canvas'),mw=300,s=mw/img.width;c.width=mw;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);photos.push({full:e.target.result,thumb:c.toDataURL('image/jpeg',0.6)});if(photos.length===cnt){const ref=App.privateChatWith?(()=>{const u=[App.user.uid,App.privateChatWith].sort();return DB.ref('privateChats/'+u[0]+'_'+u[1]);})():DB.ref('chat');const p=App.isGod?'👑 ':(App.isCreator?'🌌 ':'');ref.push({uid:App.user.uid, user:p+App.user.name,text:`📷 ${cnt} фото`,photos,timestamp:Date.now(),role:App.user.role,likes:{}});}};img.src=e.target.result;};r.readAsDataURL(f);})(files[i]);}
    inp.value='';
  }

    t.innerHTML='<button class="st-tab active" data-tab="emoji">😀</button>';
    DB.ref('sticker_packs').once('value').then(s=>{if(s.exists()){s.forEach(ch=>{const pk=ch.val();const au=pk.allowed_users||{};if(pk.creator===App.user.uid||App.isCreator||App.isGod||au[App.user.uid])t.innerHTML+=`<button class="st-tab" data-tab="${ch.key}">📦</button>`;});}
    t.querySelectorAll('.st-tab').forEach(b=>b.addEventListener('click',function(ev){ev.stopPropagation();const tid=this.dataset.tab;t.querySelectorAll('.st-tab').forEach(x=>x.classList.remove('active'));this.classList.add('active');if(tid==='emoji'){c.innerHTML=BASE_EMOJIS.map(e=>`<div class="emoji-item" data-emoji="${e}">${e}</div>`).join('');c.querySelectorAll('.emoji-item').forEach(el=>el.addEventListener('click',function(ev2){ev2.stopPropagation();$('#chatMsgInput').value+=this.dataset.emoji;$('#chatMsgInput').focus();}));}else{DB.ref('sticker_packs/'+tid).once('value').then(ps=>{const pk=ps.val();if(pk&&pk.stickers){c.innerHTML='';for(const sid in pk.stickers){const st=pk.stickers[sid];c.innerHTML+=`<div class="st-item" onclick="event.stopPropagation();window.sendSticker('${esc(st.img)}')"><img src="${esc(st.img)}"></div>`;}}else c.innerHTML='<p style="color:var(--muted);font-size:13px;padding:12px;">Нет стикеров</p>';});}}));});
  }
  window.sendSticker = function(img){if(!App.user)return;const ref=App.privateChatWith?(()=>{const u=[App.user.uid,App.privateChatWith].sort();return DB.ref('privateChats/'+u[0]+'_'+u[1]);})():DB.ref('chat');const p=App.isGod?'👑 ':(App.isCreator?'🌌 ':'');ref.push({uid:App.user.uid, user:p+App.user.name,text:'',sticker:img,timestamp:Date.now(),role:App.user.role,likes:{}});$('#stickerPanel').classList.remove('open');};

  // ============ SIDEBAR ============
  function toggleSidebar(){$('#avatarCarousel').classList.toggle('open');}
  function buildCarousel() {
    const el=$('#carouselInner');if(!el)return;el.innerHTML='';const added=new Set();
    for(const uid in App.allUserData){if(uid===App.user.uid)continue;const d=App.allUserData[uid];const safeName=cleanName(d.name);if(added.has(safeName))continue;added.add(safeName);
      const online = App.presenceData[uid]?.online || !!App.activeShifts[uid];
      const isActive=App.selectedProfile===uid;
      const firstL = Array.from(safeName)[0] ? Array.from(safeName)[0].toUpperCase() : '?';
      el.innerHTML+=`<div class="avatar-item${isActive?' active':''}" data-uid="${uid}">${d.avatar?`<img src="${esc(d.avatar)}" onerror="this.style.display='none'">`:`<div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#222,#444);display:flex;align-items:center;justify-content:center;font-size:18px;color:#ccc;">${esc(firstL)}</div>`}${online?'<div class="online-dot"></div>':''}</div>`;}
    el.querySelectorAll('.avatar-item').forEach(item=>item.addEventListener('click',function(){const uid=this.dataset.uid;App.selectedProfile=uid;el.querySelectorAll('.avatar-item').forEach(x=>x.classList.toggle('active',x.dataset.uid===uid));showMiniProfile(uid);}));
  }

  function renderMiniCalendar(uid, container) {
      const now = new Date();
      const calYear = now.getFullYear();
      const calMonth = now.getMonth();
      DB.ref('shifts').orderByChild('user').equalTo(uid).once('value').then(s => {
          const shifts = {};
          s.forEach(c => {
              const x = c.val();
              const d = x.timestamp ? new Date(x.timestamp) : new Date();
              if (!isNaN(d.getTime()) && d.getFullYear() === calYear && d.getMonth() === calMonth) {
                  shifts[d.getDate()] = true;
              }
          });

          const dim = new Date(calYear, calMonth + 1, 0).getDate();
          const today = new Date().getDate();
          let h = `<div style="font-size:11px;text-align:center;margin-bottom:6px;font-weight:600;color:var(--muted)">Смены в этом месяце</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;justify-items:center;">`;
          for(let d = 1; d <= dim; d++) {
              const has = shifts[d];
              const isT = (today === d && calYear === now.getFullYear() && calMonth === now.getMonth());
              let bg = has ? '#4CAF50' : 'rgba(255,255,255,0.05)';
              let col = has ? '#fff' : '#aaa';
              let border = isT ? '1px solid #2196F3' : '1px solid transparent';
              h += `<div style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;border-radius:4px;background:${bg};color:${col};border:${border};">${d}</div>`;
          }
          h += `</div>`;
          container.innerHTML = h;
      });
  }

  function showMiniProfile(uid){
    const d=App.allUserData[uid];if(!d)return;
    const cleanUName = cleanName(d.name);
    $('#mpName').textContent=cleanUName;
    const firstL = Array.from(cleanUName)[0] ? Array.from(cleanUName)[0].toUpperCase() : '?';
    $('#mpAvatarContainer').innerHTML=`<div style="position:relative;width:64px;height:64px;">${d.avatar?`<img src="${esc(d.avatar)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid var(--accent);">`:`<div style="width:100%;height:100%;border-radius:50%;background:#444;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc;">${esc(firstL)}</div>`}</div>`;
    
    const rm={god:'Начальник',creator:'Создатель',manager:'Сотрудник'};
    $('#mpStatus').textContent=rm[d.role]||'Сотрудник';
    
    if(d.role === 'god' || d.role === 'creator') {
        $('#mpPunkt').textContent = App.presenceData[uid]?.online ? '🟢 Онлайн' : '🔴 Оффлайн';
        $('#mpPunkt').style.color = App.presenceData[uid]?.online ? '#4CAF50' : 'var(--muted)';
    } else {
        $('#mpPunkt').textContent = App.activeShifts[uid] ? '🟢 На смене' : '🔴 Выходной';
        $('#mpPunkt').style.color = App.activeShifts[uid] ? '#4CAF50' : 'var(--muted)';
    }

    const mpCal = $('#mpCalendarContainer');
    if (d.role !== 'god' && d.role !== 'creator') {
        mpCal.style.display = 'block';
        mpCal.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--muted);">Загрузка...</div>';
        renderMiniCalendar(uid, mpCal);
    } else {
        mpCal.style.display = 'none';
    }
    
    $('#miniProfile').classList.add('show');
  }
  function closeMiniProfile(){$('#miniProfile').classList.remove('show');App.selectedProfile=null;}

  // ============ AVATAR SETTINGS ============
  function loadAvatarSettings(){DB.ref('users/'+App.user.uid+'/avatarSettings').once('value').then(s=>{if(s.exists())Object.assign(App.avatarSettings,s.val());if(!App.avatarAnimId)updateAllFrames();});}
  function buildAnimationGrid(){const g=$('#animationGrid');if(!g)return;let h='';ANIMATIONS.forEach(a=>{const ia=App.avatarSettings.style===a.id,cu=!a.premium||App.isCreator||App.isGod;h+=`<button class="style-btn ${ia?'active':''} ${a.premium?'premium':''}" data-style="${a.id}" ${!cu?'disabled':''}>${a.label}${a.premium?' 👑':''}</button>`;});g.innerHTML=h;g.querySelectorAll('.style-btn').forEach(b=>b.addEventListener('click',function(){if(this.disabled)return;App.avatarSettings.style=this.dataset.style;g.querySelectorAll('.style-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');}));}

  // ============ SETTINGS ============
  function openSettings(){$('#mainContent').style.display='none';$('#avatarCarousel').style.display='none';$('#settingsPanel').style.display='flex';$('#setName').value='';loadPunktsForSettings();updateSettingsUI();buildAnimationGrid();}
  function closeSettings(){$('#settingsPanel').style.display='none';$('#mainContent').style.display='flex';$('#avatarCarousel').style.display='flex';}
  function loadPunktsForSettings(){DB.ref('punkts').once('value').then(s=>{const sel=$('#setPunkt');sel.innerHTML='<option value="">Не менять</option>';s.forEach(c=>{sel.innerHTML+=`<option value="${esc(c.key)}">${esc(c.key)}</option>`;});});}
  function updateSettingsUI(){const ha=App.isCreator||App.isGod;document.getElementById('avatarAdvanced').style.display=ha?'block':'none';document.getElementById('avatarSimple').style.display=ha?'none':'block';document.getElementById('punktSettingsRow').style.display=App.isGod?'none':'block';$('#setSpeed').value=App.avatarSettings.speed;$('#setSpeedVal').textContent=App.avatarSettings.speed+'x';$('#setGlow').value=App.avatarSettings.glow;$('#setGlowVal').textContent=App.avatarSettings.glow+'px';$('#setColor1').value=App.avatarSettings.color1;$('#setColor2').value=App.avatarSettings.color2;$('#setRingColor').value=App.avatarSettings.ringColor;$('#setRingThickness').value=App.avatarSettings.ringThickness;}
  function saveSettings(){const nn=$('#setName').value.trim(),np=$('#setPunkt').value,up={};if(nn)up.name=nn;if(np&&!App.isGod)up.punkt=np;if(Object.keys(up).length){DB.ref('users/'+App.user.uid).update(up).then(()=>{if(nn)App.user.name=nn;if(np&&!App.isGod)App.user.punkt=np;updateUI();toast('Настройки сохранены');});}closeSettings();}
  
  function saveAvatar(){
    const s={style:App.avatarSettings.style,speed:App.avatarSettings.speed,glow:App.avatarSettings.glow,color1:App.avatarSettings.color1,color2:App.avatarSettings.color2,ringColor:App.avatarSettings.ringColor,ringThickness:App.avatarSettings.ringThickness};
    const pi=getCachedImage(App.user.avatar);
    if(pi&&pi!=='loading'){
      const c = document.createElement('canvas');
      c.width = 600; 
      c.height = 600;
      const ctx = c.getContext('2d');
      const ratio = Math.max(600/pi.width, 600/pi.height);
      const dw = pi.width * ratio, dh = pi.height * ratio;
      ctx.drawImage(pi, (600 - dw) / 2, (600 - dh) / 2, dw, dh);
      s.photo = c.toDataURL('image/jpeg', 0.95);
    }
    const up={avatarSettings:s};
    if(s.photo)up.avatar=s.photo;
    DB.ref('users/'+App.user.uid).update(up).then(()=>{if(s.photo)App.user.avatar=s.photo;App.avatarSettings=s;toast('Аватар сохранён');closeSettings();});
  }

  // ============ PINNED & ANNOUNCE ============
  function loadPinned(){
    DB.ref('pinned').on('value',s=>{
      const el=$('#pinnedMessage');
      if(!s.exists()){el.style.display='none';return;}
      const d=s.val();
      el.style.display='block';
      let unpinBtn = (App.isCreator || App.isGod) ? `<button onclick="DB.ref('pinned').remove()" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px;">✕</button>` : '';
      el.innerHTML=`<div style="padding-right:20px;">📌 <b>${esc(cleanName(d.user))}:</b> ${esc(d.text)}</div>${unpinBtn}`;
      el.style.position = 'relative';
    });
  }

  function loadAnnounce(){DB.ref('announce').limitToLast(1).on('value',s=>{const el=$('#announceBlock');if(!s.exists()){el.style.display='none';return;}let last=null;s.forEach(c=>{last=c.val();last._key=c.key;});if(last.expiry&&Date.now()>last.expiry){DB.ref('announce/'+last._key).remove();el.style.display='none';return;}el.style.display='block';el.innerHTML=`${esc(last.text)}<br><small style="color:var(--muted);">${new Date(last.timestamp).toLocaleString('ru-RU')}</small>`;if(App.isCreator||App.isGod){const db=document.createElement('button');db.textContent='✕';db.style.cssText='position:absolute;right:8px;top:8px;background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;';db.addEventListener('click',()=>DB.ref('announce/'+last._key).remove());el.appendChild(db);}});}

  // ============ DB LISTENERS ============
  function setupDatabaseListeners(){
    attachDbListener(DB.ref('users'),'value',s=>{App.allUserData={};s.forEach(c=>{App.allUserData[c.key]=c.val();});buildCarousel();});
    attachDbListener(DB.ref('activeShifts'),'value',s=>{App.activeShifts={};s.forEach(c=>{if(c.val()&&c.val().active)App.activeShifts[c.key]=true;});buildCarousel();});
    attachDbListener(DB.ref('presence'),'value',s=>{App.presenceData={};s.forEach(c=>{App.presenceData[c.key]=c.val();});buildCarousel();});
    attachDbListener(DB.ref('chat').limitToLast(1),'child_added',s=>{if(App.chatOpened)return;const m=s.val();if(!m||!App.user)return;if(m.timestamp<=App.lastChatTimestamp)return;const isM = m.uid ? m.uid === App.user.uid : (App.user && (m.user==='🌌 '+App.user.name||m.user==='👑 '+App.user.name||m.user===App.user.name));if(isM)return;if(App.notifiedKeys[s.key])return;App.notifiedKeys[s.key]=true;App.lastChatTimestamp=Math.max(App.lastChatTimestamp,m.timestamp||0);App.unreadCount++;updateBadge();});
  }

  // ============ INIT ============
  function init() {
    $('#tabLogin').addEventListener('click',toggleAuth);$('#tabRegister').addEventListener('click',toggleAuth);
    $('#loginBtn').addEventListener('click',login);$('#registerBtn').addEventListener('click',register);$('#resetPassBtn').addEventListener('click',resetPassword);
    $('#loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});$('#regPass').addEventListener('keydown',e=>{if(e.key==='Enter')register();});
    $('#chatHeader').addEventListener('click',toggleChat);$('#chatBackBtn').addEventListener('click',switchToGlobalChat);
    $('#chatMsgInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendMessage();}});
    $('#sendMsgBtn').addEventListener('click',sendMessage);$('#chatPhotoBtn').addEventListener('click',()=>$('#chatPhotoInput').click());$('#chatPhotoInput').addEventListener('change',sendPhoto);
    $('#stickerToggleBtn').addEventListener('click',e=>{e.stopPropagation();const p=$('#stickerPanel');p.classList.toggle('open');if(p.classList.contains('open'))renderStickerUI();});
    document.addEventListener('click',e=>{const p=$('#stickerPanel');if(p&&p.classList.contains('open')&&!e.target.closest('#stickerPanel')&&!e.target.closest('.sticker-toggle'))p.classList.remove('open');});
    $('#sidebarToggleBtn').addEventListener('click',toggleSidebar);$('#sidebarCloseBtn').addEventListener('click',()=>$('#avatarCarousel').classList.remove('open'));
    $('#mpCloseBtn').addEventListener('click',closeMiniProfile);$('#mpChatBtn').addEventListener('click',openPrivateChat);
    
    // Добавлен клик на аватарку внутри мини-профиля
    $('#mpAvatarContainer').addEventListener('click', () => {
        if(App.selectedProfile) window.openAvatarPreview(App.selectedProfile);
    });

    document.addEventListener('click',e=>{const mp=$('#miniProfile');if(mp&&mp.classList.contains('show')&&!e.target.closest('#miniProfile')&&!e.target.closest('.avatar-item')&&!e.target.closest('#sidebarToggleBtn')&&!e.target.closest('.msg-author'))closeMiniProfile();});
    $('#mainProfileCard').addEventListener('click',e=>{if(e.target.closest('#settingsBtn'))return;window.openAvatarPreview();});
    $('#toggleFullImgBtn').addEventListener('click',()=>{const cv=$('#previewAvatarCanvas'),im=$('#previewFullImage');if(cv.style.display!=='none'){cv.style.display='none';im.src=App.previewData.imgUrl||'';im.style.display='block';$('#toggleFullImgBtn').textContent='Показать с эффектами';}else{cv.style.display='block';im.style.display='none';$('#toggleFullImgBtn').textContent='Показать оригинал';}});
    $('#closeAvatarPreview').addEventListener('click',()=>{$('#avatarPreviewModal').style.display='none';App.previewData=null;});
    $('#settingsBtn').addEventListener('click',openSettings);$('#settingsCloseBtn').addEventListener('click',closeSettings);
    $('#settingsSaveBtn').addEventListener('click',saveSettings);$('#settingsLogoutBtn').addEventListener('click',()=>{closeSettings();logout();});
    $('#avatarCloseBtn').addEventListener('click',closeSettings);$('#avatarSaveBtn').addEventListener('click',saveAvatar);
    $('#setAvatarFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{App.user.avatar=ev.target.result;toast('Фото загружено (не забудьте нажать Сохранить)');};r.readAsDataURL(f);});
    document.querySelectorAll('.settings-tab').forEach(b=>b.addEventListener('click',function(){const tab=this.dataset.tab;document.querySelectorAll('.settings-tab').forEach(x=>{x.classList.remove('active');x.style.background='transparent';x.style.color='var(--muted)';});this.classList.add('active');this.style.background='var(--accent)';this.style.color='#fff';$('#stab-main').style.display=tab==='main'?'flex':'none';$('#stab-avatar').style.display=tab==='avatar'?'flex':'none';}));
    $('#setSpeed').addEventListener('input',function(){App.avatarSettings.speed=parseFloat(this.value);$('#setSpeedVal').textContent=App.avatarSettings.speed+'x';});
    $('#setGlow').addEventListener('input',function(){App.avatarSettings.glow=parseInt(this.value);$('#setGlowVal').textContent=App.avatarSettings.glow+'px';});
    $('#setColor1').addEventListener('input',function(){App.avatarSettings.color1=this.value;});$('#setColor2').addEventListener('input',function(){App.avatarSettings.color2=this.value;});
    $('#setRingColor').addEventListener('input',function(){App.avatarSettings.ringColor=this.value;});$('#setRingThickness').addEventListener('change',function(){App.avatarSettings.ringThickness=this.value;});
    loadPunktsForRegister();
    AUTH.onAuthStateChanged(async user=>{if(user&&!App.user){const snap=await DB.ref('users/'+user.uid).once('value');if(snap.exists()){App.user=snap.val();App.user.uid=user.uid;finishLogin();}}});
    window.addEventListener('beforeunload',()=>{if(App.user)DB.ref('presence/'+App.user.uid).set({online:false,ts:Date.now()});});
    
    window.BASE_EMOJIS = ['😀','😃','😄','😁','😆','😅','😂','🤣','🥲','☺️','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🥸','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','ร้อน','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🤑','🤠','😈','👿','👹','👺','🤡','💩','👻','💀','☠️','👽','👾','🤖','🎃','😺','😸','😹','😻','😼','😽','🙀','😿','😾'];
  }
  document.addEventListener('DOMContentLoaded', init);
})();
</script>
