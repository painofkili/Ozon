    const rawImg = `<img class="${imgCls}" src="${url||''}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" onclick="event.stopPropagation();viewPhoto('${url||''}')" style="${!url?'display:none':''}; ${type==='chat'||type==='mini'?'width:76px;height:76px;border-radius:50%;object-fit:cover;position:relative;z-index:10;':''}">`;

        db.ref('activeShifts/'+S.user.name).once('value',s=>{
            if(s.exists()&&s.val().active){
                const startedAt=s.val().startedAt||0;
                if(Date.now()-startedAt>SHIFT_TIMEOUT){
                    db.ref('activeShifts/'+S.user.name).remove();
                    S.onShift=false;
                    toast('⚠️ Прошлая смена не была закрыта и аннулирована',true);
                }else{
                    S.onShift=true;
                    setTimeout(()=>{

    setInterval(checkShiftTimeout,5*60*1000);
}

function renderStatsTab(){const myShifts=S.allShifts.filter(s=>s.user===S.user.name);const now=new Date(),y=now.getFullYear(),m=now.getMonth();const dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,0).getDay();let h=`<h4 style="text-align:center;margin-bottom:8px">📅 Календарь</h4>`;h+=`<div style="text-align:center;margin-bottom:4px"><b>${now.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</b></div>`;h+='<div class="cal">';for(const d of['Пн','Вт','Ср','Чт','Пт','Сб','Вс'])h+=`<div class="hd">${d}</div>`;for(let i=0;i<fd;i++)h+='<div></div>';const sd={};myShifts.forEach(s=>{sd[s.date]=(sd[s.date]||0)+1});const ts=now.toLocaleDateString('ru-RU');for(let d=1;d<=dim;d++){const ds=new Date(y,m,d).toLocaleDateString('ru-RU');let cl=sd[ds]?'sd':'';if(ds===ts)cl+=' td';h+=`<div class="${cl}">${d}</div>`}h+='</div>';const tot=myShifts.length,th=myShifts.reduce((s,x)=>s+(x.hours||0),0),tt2=myShifts.reduce((s,x)=>s+(x.tovar||0),0);h+=`<div class="card">📅 Смен: <b>${tot}</b><br>⏱ Часов: <b>${th}</b><br>📦 Товаров: <b>${tt2}</b></div>`;h+=`<button class="btn-red" onclick="clearMyShifts()">🗑 Очистить</button>`;document.getElementById('tabContent').innerHTML=h}
function clearMyShifts(){if(!confirm('Удалить все смены?'))return;db.ref('shifts').orderByChild('user').equalTo(S.user.name).once('value',s=>{s.forEach(c=>db.ref('shifts/'+c.key).remove())});toast('✅ Очищено')}

function renderHistoryTab(){db.ref('payments').orderByChild('user').equalTo(S.user.name).once('value',s=>{const a=[];s.forEach(c=>a.push(c.val()));a.sort((x,y)=>y.timestamp-x.timestamp);document.getElementById('tabContent').innerHTML='<h4 style="text-align:center;margin-bottom:8px">💳 Выплаты</h4>'+(a.length?a.map(x=>`<div class="card">📅 ${new Date(x.dateFrom).toLocaleDateString('ru-RU')} – ${new Date(x.dateTo).toLocaleDateString('ru-RU')}<br><b>${x.total} ₽</b><br><small>${new Date(x.timestamp).toLocaleString('ru-RU')}</small></div>`).join(''):'<p>Нет выплат</p>')})}
function renderNotifyTab(){db.ref('notifications').orderByChild('user').equalTo(S.user.name).once('value',s=>{const arr=[];s.forEach(c=>arr.push(c.val()));arr.sort((a,b)=>b.timestamp-a.timestamp);document.getElementById('tabContent').innerHTML='<h4 style="text-align:center;margin-bottom:8px">🔔 Уведомления</h4>'+(arr.length?arr.map(x=>`<div class="notify-item">${x.text} <small style="color:#999">${new Date(x.timestamp).toLocaleString('ru-RU')}</small></div>`).join(''):'<p>Нет уведомлений</p>')+'<button class="btn-red" onclick="clearNotif()" style="margin-top:8px">🗑 Очистить</button>'})}
function clearNotif(){if(!confirm('Удалить все уведомления?'))return;db.ref('notifications').orderByChild('user').equalTo(S.user.name).once('value',s=>{s.forEach(c=>db.ref('notifications/'+c.key).remove())});toast('✅ Очищено')}

function renderHallTab(){db.ref('shifts').once('value',snap=>{const users={};snap.forEach(c=>{const s=c.val();if(!users[s.user])users[s.user]={hours:0,tovar:0};users[s.user].hours+=s.hours||0;users[s.user].tovar+=s.tovar||0});let arr=[];for(const n in users)arr.push({name:n,hours:users[n].hours,tovar:users[n].tovar});let h='<h4 style="text-align:center;margin-bottom:8px">🏆 Доска почёта</h4>';arr.sort((a,b)=>b.hours-a.hours);h+='<div class="card"><b>⏱ Топ по часам</b><div>';for(let i=0;i<Math.min(arr.length,5);i++){const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';h+=`<div class="hall-item"><span class="hall-medal">${medal}</span> ${arr[i].name} — <b>${arr[i].hours}ч</b></div>`}h+='</div></div>';arr.sort((a,b)=>b.tovar-a.tovar);h+='<div class="card"><b>📦 Топ по товарам</b><div>';for(let i=0;i<Math.min(arr.length,5);i++){const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';h+=`<div class="hall-item"><span class="hall-medal">${medal}</span> ${arr[i].name} — <b>${arr[i].tovar} шт</b></div>`}h+='</div></div>';arr.sort((a,b)=>(b.hours+b.tovar)-(a.hours+a.tovar));h+=`<div class="card"><b>🌟 Работник месяца</b><div class="hall-item"><span class="hall-medal">🌟</span> ${arr[0]?.name||'—'} — ${arr[0]?.hours||0}ч / ${arr[0]?.tovar||0} шт</div></div>`;db.ref('punishes').once('value',ps=>{const pusers={};ps.forEach(c=>{const p=c.val();pusers[p.user]=(pusers[p.user]||0)+(p.amount||0)});const parr=[];for(const n in pusers)parr.push({name:n,amount:pusers[n]});parr.sort((a,b)=>b.amount-a.amount);h+=`<div class="card"><b>💀 Штрафник месяца</b><div class="hall-item"><span class="hall-medal">💀</span> ${parr[0]?.name||'—'} — <b>${parr[0]?.amount||0} ₽</b></div></div>`;db.ref('premiums').once('value',prs=>{const prusers={};prs.forEach(c=>{const p=c.val();prusers[p.user]=(prusers[p.user]||0)+(p.amount||0)});const prarr=[];for(const n in prusers)prarr.push({name:n,amount:prusers[n]});prarr.sort((a,b)=>b.amount-a.amount);h+=`<div class="card"><b>🎁 Любимчик бога</b><div class="hall-item"><span class="hall-medal">🎁</span> ${prarr[0]?.name||'—'} — <b>${prarr[0]?.amount||0} ₽</b></div></div>`;document.getElementById('tabContent').innerHTML=h})})})}

function renderCreatorTab(){document.getElementById('tabContent').innerHTML=`<h4 style="text-align:center;margin-bottom:8px">🌌 Сила Создателя</h4><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><button class="btn-gold" style="flex:1;min-width:100px" onclick="summonBoss()">👔 Вызвать</button><button class="btn-gold" style="flex:1;min-width:100px" onclick="monkeySomeone()">🐒 Обезьяна</button><button class="btn-gold" style="flex:1;min-width:100px" onclick="clownSomeone()">🤡 Клоун</button><button class="btn-gold" style="flex:1;min-width:100px" onclick="openThought()">💭 Мысли</button></div>`}
function summonBoss(){const vkId=prompt('ВК ID начальника:');if(vkId){vkSend(vkId,'👔 Создатель хочет тебя видеть. Зайди в чат.');toast('✅ Вызов отправлен')}}
function monkeySomeone(){const name=prompt('Кого превратить в обезьяну на 24 часа?');if(!name)return;db.ref('users/'+name).once('value',s=>{if(!s.exists()){toast('Пользователь не найден',true);return}const origAv=s.val().avatar;db.ref('users/'+name+'/avatar').set('https://raw.githubusercontent.com/painofkili/ozon/main/monkey.png');db.ref('chat').push({user:'🌌 '+S.user.name,text:'🐒 '+name+' теперь обезьяна на 24 часа!',timestamp:Date.now()});setTimeout(()=>db.ref('users/'+name+'/avatar').set(origAv),86400000);toast('✅ Готово')})}
function clownSomeone(){const name=prompt('Кого назначить клоуном дня?');if(name){db.ref('chat').push({user:'🌌 '+S.user.name,text:'🤡 '+name+' — клоун дня!',timestamp:Date.now()});toast('✅ Назначено')}}

function renderPunktsTab(){db.ref('punkts').once('value',s=>{let ph='';s.forEach(c=>{ph+=`<div class="worker-row"><span><b>${c.key}</b><br>${c.val().rate||0} ₽/ч</span><span><button class="btn-blue" onclick="editPunkt('${c.key}',${c.val().rate||0})">✏️</button><button class="btn-red" onclick="delPunkt('${c.key}')">✕</button></span></div>`});document.getElementById('tabContent').innerHTML='<button class="btn-green" onclick="addPunkt()">+ Пункт</button><div>'+(ph||'<p>Нет пунктов</p>')+'</div>'})}
function addPunkt(){const id=prompt('Номер пункта:');if(id)db.ref('punkts/'+id).set({rate:parseInt(prompt('Ставка (₽/ч):','210'))||210});renderPunktsTab()}
function editPunkt(id,cur){const r=parseInt(prompt('Ставка для '+id+':',cur));if(r&&!isNaN(r)){db.ref('punkts/'+id+'/rate').set(r);renderPunktsTab()}}
function delPunkt(id){if(confirm('Удалить '+id+'?')){db.ref('punkts/'+id).remove();renderPunktsTab()}}

function renderWorkersTab(){db.ref('users').once('value',s=>{const pkSet={};let wh='';s.forEach(c=>{const w=c.val();if(w.punkt)pkSet[w.punkt]=true;const st=getStatus(S.allShifts.filter(sh=>sh.user===w.name).length);wh+=`<div class="worker-row"><span>${w.avatar?`<img src="${w.avatar}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px">`:''}<b>${w.name}</b> <span style="background:#444;padding:2px 8px;border-radius:10px;font-size:11px">${st.name}</span><br>Пункт ${w.punkt||'?'} | Надбавка: ${w.bonus||0} ₽</span><span><button class="btn-orange" onclick="setBonus('${c.key}','${w.name}',${w.bonus||0})">💰</button><button class="btn-gold" onclick="openPremium('${w.name}')">🎁</button><button class="btn-purple" onclick="openPunish('${w.name}')">⚠️</button><button class="btn-blue" onclick="A.resetPass('${w.name}')">🔑</button><button class="btn-red" onclick="delWorker('${c.key}','${w.name}')">✕</button></span></div>`});let selH='<option value="">Все пункты</option>';for(const p in pkSet){if(p)selH+=`<option value="${p}">${p}</option>`}document.getElementById('tabContent').innerHTML=`<select id="filterPunkt" onchange="renderWorkersTab()">${selH}</select><div>${wh||'<p>Нет сотрудников</p>'}</div>`})}
function setBonus(key,name,cur){const b=prompt('Надбавка для '+name+':',cur);if(b!==null&&!isNaN(parseInt(b))){db.ref('users/'+key+'/bonus').set(parseInt(b));renderWorkersTab()}}
function delWorker(key,name){if(name==='Костя'){toast('🚫 Создателя нельзя удалить!',true);return}if(!confirm('Удалить '+name+'?'))return;db.ref('shifts').orderByChild('user').equalTo(name).once('value',s=>{s.forEach(c=>db.ref('shifts/'+c.key).remove())});db.ref('users/'+key).remove();renderWorkersTab()}
function openPremium(name){S.curPremium=name;document.getElementById('premiumCard').innerHTML=`<h4>🎁 Премии: ${name}</h4><div id="premiumList"></div><input id="premiumAmount" type="number" placeholder="Сумма"><button class="btn-gold" onclick="addPremium()">🎁 Выдать</button><button class="btn-gray" onclick="closeModals()">↩ Назад</button>`;document.getElementById('premiumModal').style.display='flex';loadPremiums()}
function loadPremiums(){if(!S.curPremium)return;db.ref('premiums').orderByChild('user').equalTo(S.curPremium).on('value',s=>{let h='';s.forEach(c=>{h+=`<div class="worker-row"><span>${c.val().amount} ₽</span><button class="btn-red" onclick="delPremium('${c.key}')" style="width:auto;padding:4px 8px;font-size:10px">✕</button></div>`});const el=document.getElementById('premiumList');if(el)el.innerHTML=h||'<p>Нет премий</p>'})}
function addPremium(){const am=parseInt(document.getElementById('premiumAmount').value);if(!am||isNaN(am)){toast('Введи сумму!',true);return}db.ref('premiums').push({user:S.curPremium,amount:am,timestamp:Date.now()});const st=getGodStatus(S.godRating);const txts={'🐣 Мини-босс':['🐣 +'+am+'₽!'],'💰 Эконом':['💰 +'+am+'₽'],'👔 Руководитель':['👔 +'+am+'₽'],'💼 Мистер Бизнес':['💼 +'+am+'₽'],'🗿 Сигма':['🗿 +'+am+'₽'],'🌌 Господь':['🙏 +'+am+'₽']};db.ref('notifications').push({user:S.curPremium,text:(txts[st.name]||['+'+am+'₽'])[0],timestamp:Date.now()});S.godRating+=2;updateGodUI();document.getElementById('premiumAmount').value=''}
function delPremium(id){if(confirm('Удалить?')){db.ref('premiums/'+id).remove();S.godRating=Math.max(0,S.godRating-2);updateGodUI()}}
function openPunish(name){if(name==='Костя'){toast('🚫 Создателя нельзя штрафовать!',true);return}S.curPunish=name;document.getElementById('punishCard').innerHTML=`<h4>⚠️ Штрафы: ${name}</h4><div id="punishList"></div><div style="display:flex;gap:4px"><input id="punishAmount" type="number" placeholder="Сумма"><input id="punishReason" placeholder="Причина"></div><button class="btn-red" onclick="addPunish()">+ Штраф</button><button class="btn-gray" onclick="closeModals()">↩ Назад</button>`;document.getElementById('punishModal').style.display='flex';loadPunishes()}
function loadPunishes(){if(!S.curPunish)return;db.ref('punishes').orderByChild('user').equalTo(S.curPunish).on('value',s=>{let h='';s.forEach(c=>{h+=`<div class="worker-row"><span>${c.val().amount} ₽ — ${c.val().reason}</span><button class="btn-red" onclick="delPunish('${c.key}')" style="width:auto;padding:4px 8px;font-size:10px">✕</button></div>`});const el=document.getElementById('punishList');if(el)el.innerHTML=h||'<p>Нет штрафов</p>'})}
function addPunish(){const am=parseInt(document.getElementById('punishAmount').value),r=document.getElementById('punishReason').value.trim();if(!am||isNaN(am)||!r){toast('Введи сумму и причину!',true);return}db.ref('punishes').push({user:S.curPunish,amount:am,reason:r,timestamp:Date.now()});const st=getGodStatus(S.godRating);const txts={'🐣 Мини-босс':['🐣 -'+am+'₽'],'💰 Эконом':['💰 -'+am+'₽'],'👔 Руководитель':['👔 -'+am+'₽'],'💼 Мистер Бизнес':['💼 -'+am+'₽'],'🗿 Сигма':['🗿 -'+am+'₽'],'🌌 Господь':['🙏 -'+am+'₽']};db.ref('notifications').push({user:S.curPunish,text:(txts[st.name]||['-'+am+'₽'])[0],timestamp:Date.now()});S.godRating=Math.max(0,S.godRating-1);updateGodUI();document.getElementById('punishAmount').value='';document.getElementById('punishReason').value=''}
function delPunish(id){if(confirm('Удалить?')){db.ref('punishes/'+id).remove();S.godRating+=1;updateGodUI()}}

function renderCalcTab(){db.ref('users').once('value',s=>{let h='<select id="calcUser" onchange="onCalcSel()"><option value="">-- Выбери --</option>';s.forEach(c=>{h+=`<option value="${c.val().name}">${c.val().name}</option>`});h+='</select><div id="calcBlock" style="display:none"><div style="display:flex;gap:4px"><input id="calcFrom" type="date" style="flex:1"><span>–</span><input id="calcTo" type="date" style="flex:1"></div>';h+='<button class="btn-cyan" onclick="godAddShift()">+ Смена</button><button class="btn-green" onclick="calcZP()">🧮 Посчитать</button><button class="btn-blue" onclick="markPaid()">✅ Оплачено</button>';h+='<div id="zpResult" class="card" style="display:none"></div><h4 style="margin-top:10px">📅 Календарь</h4><div id="calHead" style="text-align:center;margin-bottom:4px"></div><div class="cal" id="godCal"></div><div id="shiftDet" style="margin-top:8px"></div></div>';document.getElementById('tabContent').innerHTML=h})}
function onCalcSel(){const u=document.getElementById('calcUser').value,block=document.getElementById('calcBlock');if(!u){block.style.display='none';return}block.style.display='block';const now=new Date(),t=new Date(now.getTime()-14*86400000);document.getElementById('calcFrom').value=t.toISOString().split('T')[0];document.getElementById('calcTo').value=now.toISOString().split('T')[0];loadGodShifts(u)}
function godAddShift(){S.curAddUser=document.getElementById('calcUser').value;if(!S.curAddUser){toast('Выбери сотрудника!',true);return}document.getElementById('addShiftCard').innerHTML=`<h4>+ Смена: ${S.curAddUser}</h4><input id="shiftDate" type="date" value="${new Date().toISOString().split('T')[0]}"><input id="shiftFrom" value="9"><input id="shiftTo" value="21"><input id="shiftTovar" type="number" placeholder="Товаров"><button class="btn-green" onclick="saveGodShift()">💾</button><button class="btn-gray" onclick="closeModals()">↩</button>`;document.getElementById('addShiftModal').style.display='flex'}
function saveGodShift(){const d=document.getElementById('shiftDate').value,tf=document.getElementById('shiftFrom').value||'9',tt=document.getElementById('shiftTo').value||'21',tv=parseInt(document.getElementById('shiftTovar').value)||0;if(!d){toast('Выбери дату!',true);return}db.ref('shifts/'+S.curAddUser+'_'+Date.now()).set({user:S.curAddUser,punkt:'49',date:new Date(d).toLocaleDateString('ru-RU'),timeFrom:tf,timeTo:tt,hours:parseInt(tt)-parseInt(tf),tovar:tv,paid:false,timestamp:new Date(d).toISOString()});toast('✅');closeModals();loadGodShifts(S.curAddUser)}
function loadGodShifts(user){db.ref('shifts').orderByChild('user').equalTo(user).once('value',s=>{S.allShifts=[];s.forEach(c=>{const x=c.val();x._id=c.key;S.allShifts.push(x)});S.allShifts.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));renderGodCal()})}
function renderGodCal(){const now=new Date(),y=now.getFullYear(),m=now.getMonth(),dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,0).getDay();document.getElementById('calHead').innerHTML='<b>'+now.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})+'</b>';let h='';for(const d of['Пн','Вт','Ср','Чт','Пт','Сб','Вс'])h+='<div class="hd">'+d+'</div>';for(let i=0;i<fd;i++)h+='<div></div>';const sd={};S.allShifts.forEach(s=>{sd[s.date]=s});const ts=now.toLocaleDateString('ru-RU');for(let d=1;d<=dim;d++){const ds=new Date(y,m,d).toLocaleDateString('ru-RU');let cl=sd[ds]?'sd':'';if(ds===ts)cl+=' td';h+=`<div class="${cl}" onclick="showShiftDet('${ds}')">${d}</div>`}document.getElementById('godCal').innerHTML=h}
function showShiftDet(ds){const shifts=S.allShifts.filter(s=>s.date===ds);let h='<b>'+ds+'</b><br>';shifts.forEach(s=>{h+=`<div style="display:flex;gap:4px;align-items:center;margin:4px 0"><input id="ed_${s._id}_tf" value="${s.timeFrom}" style="width:40px">–<input id="ed_${s._id}_tt" value="${s.timeTo}" style="width:40px">Тов: <input id="ed_${s._id}_tv" type="number" value="${s.tovar}" style="width:60px"><button class="btn-blue" onclick="editGodShift('${s._id}')" style="width:auto;padding:8px 12px;font-size:12px">💾</button><button class="btn-red" onclick="delGodShift('${s._id}')" style="width:auto;padding:8px 12px;font-size:12px">✕</button></div>`});document.getElementById('shiftDet').innerHTML=h}
function editGodShift(id){const tf=document.getElementById('ed_'+id+'_tf').value,tt=document.getElementById('ed_'+id+'_tt').value,tv=parseInt(document.getElementById('ed_'+id+'_tv').value)||0;db.ref('shifts/'+id).update({timeFrom:tf,timeTo:tt,hours:parseInt(tt)-parseInt(tf),tovar:tv});toast('✅ Обновлено');loadGodShifts(document.getElementById('calcUser').value)}
function delGodShift(id){if(confirm('Удалить смену?')){db.ref('shifts/'+id).remove();loadGodShifts(document.getElementById('calcUser').value)}}
function calcZP(){const u=document.getElementById('calcUser').value,from=new Date(document.getElementById('calcFrom').value),to=new Date(document.getElementById('calcTo').value);to.setHours(23,59,59);if(!u||isNaN(from)||isNaN(to)){toast('Заполни период!',true);return}db.ref('punkts').once('value',pkSnap=>{const rates={};pkSnap.forEach(c=>{rates[c.key]=c.val().rate||0});db.ref('users/'+u).once('value',uSnap=>{const bonus=uSnap.exists()?uSnap.val().bonus||0:0;db.ref('punishes').orderByChild('user').equalTo(u).once('value',pnSnap=>{let totalPunish=0;pnSnap.forEach(c=>{const p=c.val();if(new Date(p.timestamp)>=from&&new Date(p.timestamp)<=to)totalPunish+=p.amount||0});db.ref('premiums').orderByChild('user').equalTo(u).once('value',prSnap=>{let totalPremium=0;prSnap.forEach(c=>{const p=c.val();if(new Date(p.timestamp)>=from&&new Date(p.timestamp)<=to)totalPremium+=p.amount||0});const shifts=S.allShifts.filter(s=>{const t=new Date(s.timestamp);return t>=from&&t<=to&&!s.paid});let th=0,tt2=0,tz=0;shifts.forEach(s=>{const hh=s.hours||0,tv=s.tovar||0;th+=hh;tt2+=tv;tz+=hh*(rates[s.punkt]||0)+tv+bonus});tz+=totalPremium;const el=document.getElementById('zpResult');el.style.display='block';el.innerHTML=`📊 <b>${u}</b><br>${from.toLocaleDateString('ru-RU')} – ${to.toLocaleDateString('ru-RU')}<br><br>Часов: ${th}<br>Товаров: ${tt2}<br>ЗП: ${tz-totalPremium} ₽<br>Премии: +${totalPremium} ₽<br>Штрафы: -${totalPunish} ₽<br><b>Итого: ${tz-totalPunish} ₽</b>`;S.lastCalc={user:u,from:from.toISOString(),to:to.toISOString(),shifts:shifts.map(s=>s._id),total:tz-totalPunish}})})})})}
function markPaid(){if(!S.lastCalc?.shifts?.length){toast('Сначала нажми Посчитать!',true);return}if(!confirm('Оплачено?\n'+S.lastCalc.total+' ₽'))return;db.ref('payments').push({user:S.lastCalc.user,dateFrom:S.lastCalc.from,dateTo:S.lastCalc.to,total:S.lastCalc.total,timestamp:Date.now()});S.lastCalc.shifts.forEach(id=>db.ref('shifts/'+id+'/paid').set(true));toast('✅');document.getElementById('zpResult').style.display='none';S.lastCalc=null}

function renderAnnounceTab(){document.getElementById('tabContent').innerHTML=`<h4 style="text-align:center;margin-bottom:8px">📢 Объявления</h4><textarea id="annText" placeholder="Объявление..." rows="3"></textarea><div style="display:flex;gap:8px;align-items:center"><select id="annExpType" onchange="this.value==='forever'?document.getElementById('annExpVal').style.display='none':document.getElementById('annExpVal').style.display='block'" style="flex:1"><option value="forever">Навсегда</option><option value="hours">Часы</option><option value="days">Дни</option></select><input id="annExpVal" type="number" placeholder="Кол-во" value="24" style="display:none;flex:1"></div><button class="btn-green" onclick="postAnn()">📢 Опубликовать</button><button class="btn-red" onclick="clearAnn()">🗑 Удалить все</button>`}
function postAnn(){const t=document.getElementById('annText').value.trim();if(!t)return;const type=document.getElementById('annExpType').value,val=parseInt(document.getElementById('annExpVal').value)||24;let expiry=null;if(type==='hours')expiry=Date.now()+val*3600000;else if(type==='days')expiry=Date.now()+val*86400000;db.ref('announce').push({text:t,timestamp:Date.now(),expiry});document.getElementById('annText').value='';toast('✅ Опубликовано!')}
function clearAnn(){if(confirm('Удалить все объявления?')){db.ref('announce').remove();toast('✅ Удалено')}}

function closeModals(){document.querySelectorAll('.modal-bg').forEach(m=>m.style.display='none')}

function openSettings(){
    const card=document.getElementById('settingsCard');let h='<h3 style="text-align:center">⚙️ Настройки</h3>';
    h+='<input id="setNewName" placeholder="Новое имя"><input id="setNewPass" type="password" placeholder="Новый пароль">';
    if(S.user.role!=='god')h+='<select id="setNewPunkt"><option value="">Не менять</option></select>';
    h+='<input id="setNewVk" placeholder="ВК ID (цифры)"><label style="font-size:12px;color:#aaa;display:block;margin-top:4px">Аватар</label><input id="setNewAv" type="file" accept="image/*" onchange="prevSetAv()"><div id="setAvPrev" style="text-align:center;margin:4px 0"></div>';
    if(S.user.role==='creator'){h+='<label style="font-size:12px;color:#aaa;display:block;margin-top:4px">Форма кнопок</label><select id="setBtnShape"><option value="0px">Квадратные</option><option value="8px">Слегка круглые</option><option value="12px" selected>Круглые</option><option value="30px">Овальные</option></select>';h+='<label style="font-size:12px;color:#aaa;display:block;margin-top:4px">Размер кнопок</label><select id="setBtnSize"><option value="8px, 13px">Маленькие</option><option value="12px, 15px" selected>Средние</option><option value="16px, 18px">Большие</option></select>';h+='<label style="font-size:12px;color:#aaa;display:block;margin-top:4px">Размер чата</label><select id="setChatSize"><option value="200">Маленький</option><option value="300" selected>Средний</option><option value="400">Большой</option></select>';h+='<label style="font-size:12px;color:#aaa;display:block;margin-top:4px">Шрифт чата</label><select id="setChatFont"><option value="12">Мелкий</option><option value="13" selected>Средний</option><option value="15">Крупный</option></select>';h+='<button class="btn-gold" onclick="openStickerMan()" style="margin:10px 0">📦 Управление стикерами</button>'}
    if(S.user.role==='god'){h+='<label style="font-size:12px;color:#aaa;display:block;margin-top:4px">Цвет крыльев 1</label><input id="setWingC1" type="color" value="'+getComputedStyle(document.documentElement).getPropertyValue('--wing-c1').trim()+'">';h+='<label style="font-size:12px;color:#aaa;display:block;margin-top:4px">Цвет крыльев 2</label><input id="setWingC2" type="color" value="'+getComputedStyle(document.documentElement).getPropertyValue('--wing-c2').trim()+'">';h+='<label style="font-size:12px;color:#aaa;display:block;margin-top:4px">Скорость крыльев</label><select id="setWingSpd"><option value="1s">Быстро</option><option value="2s" selected>Средне</option><option value="3s">Медленно</option></select>'}
    h+='<button class="btn-green" onclick="saveSettings()">💾 Сохранить</button><button class="btn-gray" onclick="closeModals()">↩ Назад</button>';card.innerHTML=h;document.getElementById('settingsModal').style.display='flex';
    document.getElementById('setNewVk').value=S.user.vkId||'';
    if(S.user.role==='creator'){document.getElementById('setChatSize').value=localStorage.getItem('chatSize')||'300';document.getElementById('setChatFont').value=localStorage.getItem('chatFont')||'13';document.getElementById('setBtnShape').value=localStorage.getItem('btnShape')||'12px';document.getElementById('setBtnSize').value=localStorage.getItem('btnSize')||'12px, 15px'}
    if(S.user.role==='god'){document.getElementById('setWingSpd').value=localStorage.getItem('wingSpd')||'2s'}
    if(S.user.role!=='god'){db.ref('punkts').once('value',s=>{const sel=document.getElementById('setNewPunkt');if(!sel)return;s.forEach(c=>{sel.innerHTML+=`<option value="${c.key}">${c.key}</option>`})})}
}
function prevSetAv(){const f=document.getElementById('setNewAv').files[0];if(!f)return;const r=new FileReader();r.onload=e=>{S.newAvData=e.target.result;document.getElementById('setAvPrev').innerHTML=`<img class="avatar" src="${S.newAvData}">`};r.readAsDataURL(f)}
function saveSettings(){
    const nn=document.getElementById('setNewName').value.trim(),np=document.getElementById('setNewPass').value.trim(),nvk=document.getElementById('setNewVk').value.trim();const ok=S.user.name;const up={};let npu='';
    if(S.user.role!=='god'){const sel=document.getElementById('setNewPunkt');if(sel)npu=sel.value}
    if(nn&&nn!==S.user.name){up['users/'+nn]={name:nn,punkt:npu||S.user.punkt,password:S.user.password||'',bonus:S.user.bonus||0,avatar:S.newAvData||S.user.avatar||'',vkId:nvk||S.user.vkId||''};if(np)up['users/'+nn+'/password']=np;up['users/'+ok]=null;S.user.name=nn;if(npu)S.user.punkt=npu}else{const uu={name:S.user.name,punkt:S.user.punkt||'',avatar:S.user.avatar||'',vkId:S.user.vkId||''};if(np)uu.password=np;if(S.newAvData)uu.avatar=S.newAvData;if(nvk)uu.vkId=nvk;if(npu)uu.punkt=npu;up['users/'+ok]=uu;if(npu)S.user.punkt=npu}
    if(S.user.role==='creator'){['chatSize','chatFont','btnShape','btnSize'].forEach(k=>localStorage.setItem(k,document.getElementById('set'+k.charAt(0).toUpperCase()+k.slice(1)).value));document.documentElement.style.setProperty('--chat-h',localStorage.getItem('chatSize')+'px');document.documentElement.style.setProperty('--chat-fs',localStorage.getItem('chatFont')+'px');document.documentElement.style.setProperty('--radius',localStorage.getItem('btnShape'));const parts=localStorage.getItem('btnSize').split(',');document.documentElement.style.setProperty('--pad',parts[0].trim());document.documentElement.style.setProperty('--fs',parts[1].trim())}
    if(S.user.role==='god'){const wc1=document.getElementById('setWingC1').value,wc2=document.getElementById('setWingC2').value,wspd=document.getElementById('setWingSpd').value;localStorage.setItem('wingC1',wc1);localStorage.setItem('wingC2',wc2);localStorage.setItem('wingSpd',wspd);document.documentElement.style.setProperty('--wing-c1',wc1);document.documentElement.style.setProperty('--wing-c2',wc2);document.documentElement.style.setProperty('--wing-spd',wspd);const gup={};if(nn)gup.name=nn;if(S.newAvData)gup.avatar=S.newAvData;if(nvk)gup.vkId=nvk;if(np)db.ref('godPassword').set(np);if(Object.keys(gup).length>0)db.ref('godSettings').update(gup);if(S.newAvData)S.user.avatar=S.newAvData;if(nvk)S.user.vkId=nvk}
    if(Object.keys(up).length===0&&S.user.role!=='creator'&&S.user.role!=='god'){closeModals();return}
    db.ref().update(up,err=>{if(err){toast('Ошибка сохранения',true);return}if(np&&S.user.role!=='god')S.user.password=np;if(S.newAvData)S.user.avatar=S.newAvData;if(nvk)S.user.vkId=nvk;localStorage.setItem('ozon_user',JSON.stringify(S.user));closeModals();renderProfile();buildCarousel();toast('✅ Настройки сохранены')})
}

function openStickerMan(){document.getElementById('settingsModal').style.display='none';document.getElementById('stickerManCard').innerHTML=`<h3 style="text-align:center">📦 Мои стикерпаки</h3><div id="smPacks"></div><hr style="border-color:#444;margin:12px 0"><h4>Создать новый пак</h4><input id="newPackName" placeholder="Название пака"><label style="font-size:12px;color:#aaa;display:block">Иконка пака (PNG)</label><input id="newPackIcon" type="file" accept="image/png"><button class="btn-green" onclick="createPack()">➕ Создать пак</button><button class="btn-gray" onclick="closeStickerMan()">↩ Назад</button>`;document.getElementById('stickerManModal').style.display='flex';renderStickerMan()}
function closeStickerMan(){document.getElementById('stickerManModal').style.display='none';document.getElementById('settingsModal').style.display='flex'}
function renderStickerMan(){const packs=STICKER.getPacks();let h='';for(const p of packs){const cnt=p.pack.stickers?Object.keys(p.pack.stickers).length:0;h+=`<div class="pack-list-item"><img class="pack-icon" src="${p.pack.icon||''}"><div style="flex:1"><b>${p.pack.name}</b><br><small style="color:#aaa">${cnt} стикеров</small></div><button class="btn-blue" onclick="openPackEdit('${p.id}')" style="width:auto;padding:8px">✏️</button></div>`}document.getElementById('smPacks').innerHTML=h||'<p style="color:#aaa;text-align:center">Нет паков</p>'}
function createPack(){const name=document.getElementById('newPackName').value.trim(),fi=document.getElementById('newPackIcon');if(!name||!fi.files[0]){toast('Введи название и выбери иконку!',true);return}const r=new FileReader();r.onload=e=>{db.ref('sticker_packs').push({name,creator:S.user.name,icon:e.target.result,allowed_users:{},timestamp:Date.now()}).then(()=>{document.getElementById('newPackName').value='';fi.value='';toast('✅ Пак создан!');renderStickerMan()})};r.readAsDataURL(fi.files[0])}
function openPackEdit(id){S.editPackId=id;document.getElementById('stickerManModal').style.display='none';const pack=S.stickerPacks[id];if(!pack)return;let hUsers='';for(const uname in S.allUsers){if(uname===S.user.name)continue;hUsers+=`<div class="user-cb-item"><input type="checkbox" id="cb_${uname}" ${pack.allowed_users?.[uname]?'checked':''} onchange="tglPackAccess('${uname}',this.checked)"><label for="cb_${uname}">${uname}</label></div>`}let hSt='';if(pack.stickers){for(const sid in pack.stickers){const st=pack.stickers[sid];hSt+=`<div style="position:relative;width:60px;height:60px;background:rgba(255,255,255,0.05);border-radius:8px;display:flex;align-items:center;justify-content:center"><img src="${st.img}" style="max-width:100%;max-height:100%;object-fit:contain"><div style="position:absolute;bottom:-5px;right:-5px;background:#000;border-radius:50%;font-size:12px;border:1px solid #444;width:20px;height:20px;text-align:center">${st.emoji}</div></div>`}}document.getElementById('packEditCard').innerHTML=`<h3 style="text-align:center">${pack.name}</h3><div class="card"><h4>👥 Доступ</h4><div class="user-cb-list">${hUsers}</div></div><div class="card"><h4>➕ Добавить стикер</h4><input id="peStImg" type="file" accept="image/png"><select id="peStEmoji">${BASE_EMOJIS.map(e=>`<option value="${e}">${e}</option>`).join('')}</select><button class="btn-blue" onclick="upStToPack()">Загрузить</button></div><h4>Стикеры</h4><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">${hSt||'<small style="color:#aaa">Пусто</small>'}</div><button class="btn-gray" onclick="closePackEdit()" style="margin-top:15px">↩ Назад</button>`;document.getElementById('packEditModal').style.display='flex'}
function closePackEdit(){S.editPackId=null;document.getElementById('packEditModal').style.display='none';document.getElementById('stickerManModal').style.display='flex';renderStickerMan()}
function tglPackAccess(name,on){if(!S.editPackId)return;if(on)db.ref('sticker_packs/'+S.editPackId+'/allowed_users/'+name).set(true);else db.ref('sticker_packs/'+S.editPackId+'/allowed_users/'+name).remove()}
function upStToPack(){if(!S.editPackId)return;const fi=document.getElementById('peStImg'),emoji=document.getElementById('peStEmoji').value;if(!fi.files[0]){toast('Выбери PNG!',true);return}const r=new FileReader();r.onload=e=>{db.ref('sticker_packs/'+S.editPackId+'/stickers').push({img:e.target.result,emoji,timestamp:Date.now()}).then(()=>{fi.value='';toast('✅ Стикер добавлен!');openPackEdit(S.editPackId)})};r.readAsDataURL(fi.files[0])}

function openThought(){document.getElementById('thoughtCard').innerHTML=`<h4 style="text-align:center">💭 Мысль Создателя</h4><textarea id="thoughtText" placeholder="О чём думаешь?" rows="3" style="resize:vertical"></textarea><label style="font-size:12px;color:#aaa;display:block;margin-top:4px">Срок действия</label><div style="display:flex;gap:8px;align-items:center"><select id="thoughtExpType" onchange="document.getElementById('thoughtExpVal').style.display=this.value==='forever'?'none':'block'" style="flex:1"><option value="forever">Навсегда</option><option value="hours">Часы</option><option value="days">Дни</option></select><input id="thoughtExpVal" type="number" placeholder="Кол-во" value="24" style="display:none;flex:1"></div><button class="btn-gold" onclick="sendThought()">🚀 Отправить</button><button class="btn-gray" onclick="closeModals()">↩ Отмена</button>`;document.getElementById('thoughtModal').style.display='flex'}
function sendThought(){const text=document.getElementById('thoughtText').value.trim();if(!text)return;const type=document.getElementById('thoughtExpType').value,val=parseInt(document.getElementById('thoughtExpVal').value)||24;let expiry=null;if(type==='hours')expiry=Date.now()+val*3600000;else if(type==='days')expiry=Date.now()+val*86400000;db.ref('creatorThought').set({text,expiry,timestamp:Date.now()});document.getElementById('thoughtText').value='';closeModals();toast('💭 Мысль отправлена!')}
function loadThought(){db.ref('creatorThought').on('value',s=>{const b=document.getElementById('annBlock');if(!s.exists()){b.style.display='none';return}const t=s.val();if(t.expiry&&Date.now()>t.expiry){db.ref('creatorThought').remove();b.style.display='none';return}b.style.display='block';b.style.background='linear-gradient(135deg, rgba(138,43,226,0.3), rgba(0,191,255,0.2))';b.style.border='1px solid rgba(138,43,226,0.5)';b.style.color='#fff';b.innerHTML=`💭 <b>${t.text}</b><br><small>${t.expiry?'До: '+new Date(t.expiry).toLocaleString('ru-RU'):'Навсегда'}</small>`})}

function loadPinned(){db.ref('pinned').on('value',s=>{const b=document.getElementById('pinnedMsg');if(!s.exists()){b.style.display='none';return}const m=s.val();b.style.display='block';document.getElementById('pinnedInner').innerHTML='📌 <b>'+(m.user||'?').replace('🌌 ','').replace('👑 ','')+':</b> '+(m.text||'[Вложение]')})}
function unpinMsg(){if(S.user && (S.user.role==='creator'||S.user.role==='god')){db.ref('pinned').remove();document.getElementById('pinnedMsg').style.display='none';toast('📌 Откреплено!');}else{toast('🚫 Только Создатель или Начальник может откреплять!',true);}}

function loadAnnounce(){db.ref('announce').limitToLast(1).on('value',s=>{const b=document.getElementById('annBlock');if(!s.exists()){b.style.display='none';return}let last=null;s.forEach(c=>{last=c.val();last._key=c.key});if(last.expiry&&Date.now()>last.expiry){db.ref('announce/'+last._key).remove();b.style.display='none';return}b.style.display='block';b.innerHTML=`<b>📢 ${last.text}</b><br><small>${last.expiry?'До: '+new Date(last.expiry).toLocaleString('ru-RU'):'Бессрочно'} • ${new Date(last.timestamp).toLocaleString('ru-RU')}</small>`})}

function buildCarousel(){SIDEBAR.build()}

function updateGodUI(){if(S.user.role!=='god')return;db.ref('premiums').once('value',s=>{S.godRating=s.numChildren()*2;db.ref('punishes').once('value',p=>{S.godRating-=p.numChildren();if(S.godRating<0)S.godRating=0;const st=getGodStatus(S.godRating);const el=document.getElementById('godProg'),txt=document.getElementById('godProgTxt');if(el){el.style.width='100%';el.style.background=st.color}if(txt)txt.textContent=st.name})})}

document.addEventListener('DOMContentLoaded',()=>{
    db.ref('users').on('value',s=>{S.allUsers={};s.forEach(c=>{S.allUsers[c.key]=c.val()});if(S.user)buildCarousel()});
    db.ref('activeShifts').on('value',s=>{S.activeShifts={};s.forEach(c=>{if(c.val()?.active)S.activeShifts[c.key]=true});if(S.user)buildCarousel()});
    db.ref('godSettings').on('value',s=>{S.godSettings=s.exists()?s.val():null;if(S.user)buildCarousel()});
    db.ref('sticker_packs').on('value',s=>{S.stickerPacks=s.val()||{}});
    db.ref('shifts').on('value',s=>{S.allShifts=[];s.forEach(c=>{const x=c.val();x._id=c.key;S.allShifts.push(x)})});
    document.addEventListener('click',e=>{if(S.openDD&&!e.target.closest('.msg-dd')&&!e.target.closest('.msg-menu')){S.openDD.classList.remove('show');S.openDD=null}const mp=document.getElementById('miniProf');if(mp?.classList.contains('show')&&!e.target.closest('#miniProf')&&!e.target.closest('.ava-it')&&!e.target.closest('.avatar-mini')&&!e.target.closest('.ava-wr')&&!e.target.closest('.avatar-god-wrap'))SIDEBAR.closeMini();const sp=document.getElementById('stPanel');if(sp?.classList.contains('show')&&!e.target.closest('#stPanel')&&!e.target.closest('.st-toggle')&&!e.target.closest('.input-wr'))sp.classList.remove('show')});
    document.querySelectorAll('.modal-bg').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.style.display='none'})});
    if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
    const saved=localStorage.getItem('ozon_user');
    if(saved){const parsed=JSON.parse(saved);if(parsed.role&&parsed.name){S.user=parsed;A.enter()}else{localStorage.removeItem('ozon_user')}}
    ['chatSize','chatFont','btnShape','btnSize'].forEach(k=>{const v=localStorage.getItem(k);if(v){if(k==='chatSize')document.documentElement.style.setProperty('--chat-h',v+'px');if(k==='chatFont')document.documentElement.style.setProperty('--chat-fs',v+'px');if(k==='btnShape')document.documentElement.style.setProperty('--radius',v);if(k==='btnSize'){const parts=v.split(',');document.documentElement.style.setProperty('--pad',parts[0].trim());document.documentElement.style.setProperty('--fs',parts[1].trim())}}});
    const wc1=localStorage.getItem('wingC1')||'#F44336';const wc2=localStorage.getItem('wingC2')||'#FFC107';const wspd=localStorage.getItem('wingSpd')||'2s';document.documentElement.style.setProperty('--wing-c1',wc1);document.documentElement.style.setProperty('--wing-c2',wc2);document.documentElement.style.setProperty('--wing-spd',wspd);
    document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();CHAT.send()}});
});
</script>
</body>
