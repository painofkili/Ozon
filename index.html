<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;height:100vh;width:100vw;background:#0a0a1a}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#eee;font-size:16px;display:flex;flex-direction:column}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1000;display:block}
:root{--accent:#7c3aed;--accent2:#a855f7;--gold:#f5c518;--bg2:rgba(20,22,40,0.85);--bg3:rgba(30,32,55,0.65);--border:rgba(100,80,220,0.2);--text:#e8e8ff;--muted:#888;--green:#22c55e;--red:#ef4444}
body.theme-creator{--accent:#7c3aed;--accent2:#00d4ff;--gold:#f5c518}
body.theme-god{--accent:#b8860b;--accent2:#ffd700;--gold:#ffd700}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px);padding:16px;margin-bottom:8px}
input,select,textarea{width:100%;padding:10px 14px;font-size:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,25,0.6);color:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
button{border:none;font-weight:bold;cursor:pointer;border-radius:10px;transition:all .2s;padding:10px 14px}
button:hover{transform:scale(1.02);filter:brightness(1.1)}
.btn-green{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff}
.btn-red{background:linear-gradient(135deg,#e94560,#c62828);color:#fff}
.btn-gray{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.btn-blue{background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff}
.tabs{display:flex;gap:6px;margin:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tabs button{height:40px;display:flex;align-items:center;gap:6px;border-radius:99px;background:rgba(255,255,255,0.06);color:#aaa;border:1px solid transparent;padding:0 14px;font-size:13px;white-space:nowrap;flex-shrink:0;cursor:pointer}
.tabs button.active{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.tab-content{display:none;width:100%;animation:fadeIn 0.3s ease}
.tab-content.active-tab{display:block}
.app-container{display:flex;width:100%;height:100vh;position:relative;z-index:1;justify-content:center;overflow:hidden}
.main-content{width:100%;max-width:720px;padding:10px 14px;display:flex;flex-direction:column;padding-bottom:80px;height:100%;gap:6px}
.profile-row{display:flex;align-items:center;gap:12px;padding:8px 0;flex-shrink:0}
.badge{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;display:inline-block}
.badge-creator{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.badge-god{background:linear-gradient(135deg,#FFD700,#FF4500);color:#fff}
.badge-manager{background:#2d6a4f;color:#95d5b2}
.name-creator{background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-god{background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-manager{color:#eee;font-weight:bold}

/* ====== АВАТАР С РАМКОЙ (CANVAS) ====== */
.avatar-wrap{position:relative;width:44px;height:44px;flex-shrink:0}
.avatar-wrap.big{width:60px;height:60px}
.avatar-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%}
.avatar-wrap .avatar-base{z-index:1}
.avatar-wrap .avatar-frame{z-index:2;pointer-events:none}

/* ====== ЧАТ ====== */
.chat-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;margin:0}
.chat-header-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);cursor:pointer;flex-shrink:0}
.chat-label{flex:1;font-weight:bold;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#chat{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;background:transparent;display:flex;flex-direction:column;gap:4px}
#chat.hidden{display:none}
.chat-message-row{display:flex;align-items:flex-start;gap:8px;padding:4px 8px;border-radius:8px;transition:background 0.2s}
.chat-message-row:hover{background:rgba(255,255,255,0.02)}
.chat-message-row.own{flex-direction:row-reverse}
.chat-message-content{flex:1;min-width:0}
.chat-message-header{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.chat-message-header.own{justify-content:flex-end}
.chat-message-header .name{font-weight:600;font-size:13px}
.chat-message-header .time{font-size:10px;color:var(--muted)}
.chat-message-text{font-size:14px;word-break:break-word;color:#ddd;line-height:1.4}
.chat-message-text .chat-img{max-width:200px;max-height:140px;border-radius:8px;margin-top:4px;cursor:pointer;object-fit:cover}
.chat-message-text .chat-sticker{max-width:100px;max-height:100px;object-fit:contain;margin:2px 0}
.chat-input-bar{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:720px;background:var(--bg2);backdrop-filter:blur(16px);padding:8px 12px;display:flex;gap:8px;align-items:center;z-index:100;border-top:1px solid var(--border)}
.input-wrapper{position:relative;flex:1;display:flex;align-items:center;background:rgba(0,0,0,0.3);border-radius:10px;border:1px solid rgba(255,255,255,0.05)}
.input-wrapper input{background:transparent;border:none;padding:10px 36px 10px 14px;font-size:14px;width:100%;margin:0}
.input-wrapper input:focus{box-shadow:none;background:transparent}
.sticker-toggle{position:absolute;right:6px;background:transparent;border:none;font-size:18px;cursor:pointer;color:#aaa;padding:0}
#sendMsgBtn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;flex-shrink:0;background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
#chatPhotoBtn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);color:#aaa}
.sticker-panel{position:absolute;bottom:60px;right:0;width:280px;height:300px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;display:none;flex-direction:column;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.6);backdrop-filter:blur(20px);overflow:hidden}
.sticker-panel.open{display:flex}
.sticker-content{flex:1;overflow-y:auto;padding:10px;display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start}
.emoji-item{width:36px;height:36px;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;transition:0.1s}
.emoji-item:hover{transform:scale(1.2);background:rgba(255,255,255,0.05)}
.avatar-carousel{width:100px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:-120px;height:100vh;padding:50px 0 20px;z-index:1000;backdrop-filter:blur(20px);transition:right 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:-10px 0 30px rgba(0,0,0,0.5)}
.avatar-carousel.open{right:0}
.avatar-carousel-inner{display:flex;flex-direction:column;align-items:center;width:100%;gap:10px;overflow-y:auto;height:100%;padding:10px 0}
.avatar-item{width:50px;height:50px;border-radius:50%;cursor:pointer;position:relative;transition:0.2s;flex-shrink:0}
.avatar-item img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid transparent}
.avatar-item .online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;background:#4CAF50;border-radius:50%;border:2px solid #111}
.btn-sidebar-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);width:32px;height:44px;background:var(--bg2);border:1px solid var(--border);border-right:none;border-radius:10px 0 0 10px;color:#fff;font-size:13px;cursor:pointer;z-index:999;backdrop-filter:blur(8px)}
.sidebar-close-btn{position:absolute;top:10px;left:10px;background:rgba(255,255,255,0.05);border:none;color:#aaa;width:24px;height:24px;border-radius:50%;font-size:12px;cursor:pointer}
.mini-profile{position:fixed;right:120px;top:50%;transform:translateY(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;width:200px;z-index:1100;display:none;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,0.6)}
.mini-profile.show{display:block;animation:slideIn 0.2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-50%) translateX(20px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.mp-close-btn{position:absolute;top:6px;right:6px;background:rgba(255,255,255,0.05);border:none;color:#aaa;width:22px;height:22px;border-radius:50%;font-size:10px;cursor:pointer}
.calendar{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px}
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:0 4px}
.cal-nav{background:rgba(255,255,255,0.05);color:#fff;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;border:1px solid rgba(255,255,255,0.05)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px}
.cal-day-name{text-align:center;font-size:10px;color:var(--muted);padding-bottom:4px;font-weight:600}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;background:rgba(255,255,255,0.02)}
.cal-day.today{border:1px solid var(--accent);color:var(--accent);font-weight:700;background:rgba(124,58,237,0.1)}
.cal-day.has-shift{background:rgba(34,197,94,0.15);color:#4ade80;font-weight:700}
.management-item{background:rgba(255,255,255,0.03);border:1px solid var(--border);padding:10px;border-radius:8px;margin-bottom:6px}
.worker-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);gap:6px;flex-wrap:wrap}
.worker-row button{width:auto;padding:4px 10px;font-size:11px}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;pointer-events:none;display:flex;flex-direction:column;gap:6px}
.toast-msg{padding:10px 18px;border-radius:12px;background:var(--bg2);border:1px solid var(--accent);color:#fff;font-size:13px;box-shadow:0 5px 20px rgba(0,0,0,0.6);transform:translateY(-20px);opacity:0;transition:all 0.3s;text-align:center;backdrop-filter:blur(10px)}
.toast-msg.error{border-color:var(--red)}
.toast-msg.show{transform:translateY(0);opacity:1}
#photoViewer{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.9);z-index:10000;display:none;align-items:center;justify-content:center}
#photoViewer img{max-width:90%;max-height:90%;border-radius:8px}
#settingsPanel{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px}
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto}
.settings-tab{flex:1;padding:8px;border-radius:8px;font-size:13px;background:transparent;color:var(--muted);border:none;cursor:pointer;transition:0.2s}
.settings-tab.active{background:var(--accent);color:#fff}
#stab-avatar{display:none}
#stab-main{display:flex;flex-direction:column;gap:10px}
.avatar-preview-wrap{position:relative;width:60px;height:60px;flex-shrink:0}
.avatar-preview-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%}
.avatar-preview-wrap .preview-base{z-index:1}
.avatar-preview-wrap .preview-frame{z-index:2;pointer-events:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.tabs button{padding:0 10px;font-size:11px}.main-content{padding:6px 8px;padding-bottom:70px}.chat-input-bar{padding:6px 8px}.mini-profile{right:10px;width:180px}.avatar-carousel{width:80px}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="toastContainer" class="toast-container"></div>
<div id="photoViewer" onclick="this.style.display='none'"><img id="photoViewerImg"></div>

<!-- ====== ЛОГИН ====== -->
<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;">
  <div style="max-width:380px;width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:12px;">
    <div style="text-align:center;font-size:22px;font-weight:800;background:linear-gradient(135deg,#f5c518,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🌌 Ozon Hub</div>
    <div style="display:flex;background:rgba(0,0,0,0.3);border-radius:10px;padding:4px;">
      <button id="tabLogin" style="flex:1;padding:8px;border:none;border-radius:8px;background:#7c3aed;font-size:14px;font-weight:600;color:#fff;">Вход</button>
      <button id="tabRegister" style="flex:1;padding:8px;border:none;border-radius:8px;background:transparent;font-size:14px;font-weight:600;color:#6a7a94;">Регистрация</button>
    </div>
    <div id="loginFields" style="display:flex;flex-direction:column;gap:10px;">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPass" placeholder="Пароль">
      <button class="btn-gold" id="loginBtn" style="padding:12px;font-size:15px;">🔑 Войти</button>
    </div>
    <div id="registerFields" style="display:none;flex-direction:column;gap:10px;">
      <input type="text" id="regName" placeholder="Имя">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPass" placeholder="Пароль">
      <button class="btn-gold" id="registerBtn" style="padding:12px;font-size:15px;">📝 Зарегистрироваться</button>
    </div>
    <div id="authError" style="color:var(--red);font-size:13px;text-align:center;display:none;"></div>
  </div>
</div>

<!-- ====== ОСНОВНОЕ ПРИЛОЖЕНИЕ ====== -->
<div id="app" class="app-container" style="display:none">
  <button class="btn-sidebar-toggle" id="sidebarToggleBtn">👥</button>
  <div class="main-content" id="mainContent">
    <div id="announceBlock" style="display:none;background:rgba(200,150,0,0.08);border:1px solid rgba(200,150,0,0.3);padding:10px;border-radius:10px;text-align:center;font-size:13px;color:#ffd700;"></div>
    <div id="thoughtBlock" style="display:none;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(0,212,255,0.05));border:1px solid rgba(124,58,237,0.4);padding:12px;border-radius:10px;text-align:center;font-size:14px;color:#e0e0ff;position:relative;"></div>
    
    <div class="profile-row">
      <div id="profileAvatarWrap" class="avatar-wrap big"></div>
      <div style="flex:1">
        <b id="creatorNameWrapper" class="name-manager" style="font-size:17px;"><span id="uname"></span></b> 
        <span id="roleBadge" class="badge badge-manager">Сотрудник</span><br>
        <span style="font-size:11px;color:#aaa;">Пункт <span id="upunkt">—</span></span>
      </div>
      <button class="btn-gray" id="settingsBtn" style="width:auto;padding:6px 12px;font-size:12px;">⚙️</button>
    </div>
    
    <div class="tabs" id="tabsContainer"></div>
    <div id="tabContentContainer" style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding-bottom:4px;"></div>
    
    <div class="chat-section" id="chatContainer">
      <div class="chat-header-bar" id="chatHeader">
        <span style="font-size:16px;">💬</span>
        <span class="chat-label" id="chatLabel">Общий чат</span>
        <button class="chat-back-btn" id="chatBackBtn" style="display:none;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#ccc;padding:3px 8px;border-radius:6px;font-size:11px;">↩ Назад</button>
        <span id="chatArrow" style="color:#aaa;font-size:12px;transition:transform 0.3s;transform:rotate(180deg);">▼</span>
      </div>
      <div id="chat"></div>
    </div>
  </div>
  
  <div class="chat-input-bar" id="chatInputBar">
    <div class="input-wrapper">
      <input id="chatMsgInput" placeholder="Сообщение...">
      <button class="sticker-toggle" id="stickerToggleBtn">😀</button>
      <div id="stickerPanel" class="sticker-panel">
        <div class="sticker-content" id="stickerContent"></div>
      </div>
    </div>
    <button class="btn-gray" id="chatPhotoBtn" style="width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;padding:0;">📎</button>
    <input id="chatPhotoInput" type="file" accept="image/*" multiple style="display:none;">
    <button class="btn-gold" id="sendMsgBtn">➤</button>
  </div>
  
  <div class="avatar-carousel" id="avatarCarousel">
    <button class="sidebar-close-btn" id="sidebarCloseBtn">✕</button>
    <div class="avatar-carousel-inner" id="carouselInner"></div>
  </div>
  
  <div class="mini-profile" id="miniProfile">
    <button class="mp-close-btn" id="mpCloseBtn">✕</button>
    <div id="mpAvatarWrap" style="display:flex;justify-content:center;margin:4px 0;"></div>
    <div id="mpName" style="text-align:center;font-weight:bold;font-size:15px;"></div>
    <div id="mpStatus" style="text-align:center;font-size:12px;padding:2px 8px;border-radius:8px;display:inline-block;width:auto;margin:4px auto;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.3);"></div>
    <div id="mpPunkt" style="text-align:center;font-size:11px;color:var(--muted);margin:4px 0;"></div>
    <button class="btn-gold" id="mpChatBtn" style="width:100%;padding:8px;margin-top:8px;font-size:12px;">💬 Личный чат</button>
  </div>
</div>

<!-- ====== НАСТРОЙКИ ====== -->
<div id="settingsPanel">
  <div class="settings-card">
    <h3 style="text-align:center;margin-bottom:12px;">⚙️ Настройки</h3>
    <div style="display:flex;gap:4px;margin-bottom:12px;">
      <button class="settings-tab active" data-tab="main" style="flex:1;padding:8px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;">Основное</button>
      <button class="settings-tab" data-tab="avatar" style="flex:1;padding:8px;border-radius:8px;background:transparent;color:var(--muted);font-size:12px;">Аватар</button>
    </div>
    <div id="stab-main">
      <div><label style="font-size:11px;color:var(--muted);">Новое имя</label><input id="setName" placeholder="Оставьте пустым"></div>
      <div><label style="font-size:11px;color:var(--muted);">Пункт</label><select id="setPunkt"><option value="">Не менять</option></select></div>
      <div><label style="font-size:11px;color:var(--muted);">ВК ID</label><input id="setVk" placeholder="265035511"></div>
      <button class="btn-green" id="settingsSaveBtn">💾 Сохранить</button>
      <button class="btn-red" id="settingsLogoutBtn">🚪 Выйти</button>
      <button class="btn-gray" id="settingsCloseBtn">Отмена</button>
    </div>
    <div id="stab-avatar" style="display:none;flex-direction:column;gap:10px;">
      <div style="display:flex;align-items:center;gap:14px;padding:8px;background:rgba(255,255,255,0.03);border-radius:10px;">
        <div id="previewAvatarWrap" class="avatar-preview-wrap"></div>
        <div>
          <button class="btn-blue" id="avatarUploadBtn" style="padding:6px 12px;font-size:12px;width:auto;">📷 Выбрать фото</button>
          <input type="file" id="avatarFileInput" accept="image/*" style="display:none;">
          <p style="font-size:10px;color:var(--muted);margin-top:4px;">Макс. 200x200, ~1MB</p>
        </div>
      </div>
      <button class="btn-green" id="avatarSaveBtn">💾 Сохранить аватар</button>
      <button class="btn-gray" id="avatarCloseBtn">Отмена</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

function drawFrame(ctx, w, h, role, settings){
  const cx = w/2, cy = h/2;
  const time = Date.now() / 1000 * (settings.speed || 1);
  ctx.clearRect(0, 0, w, h);
  ctx.shadowBlur = settings.glow || 20;
  
  if(role === 'creator'){
    // КОСМИЧЕСКИЕ ОРБИТЫ (для Кости)
    const colors = ['#00d4ff', '#7c3aed', '#f5c518'];
    ctx.shadowColor = '#00d4ff';
    for(let i=0; i<3; i++){
      ctx.save();
      ctx.rotate(i * Math.PI * 2/3 + time * 0.5);
      ctx.strokeStyle = colors[i];
      ctx.lineWidth = 2.5;
      ctx.globalAlpha = 0.8;
      ctx.shadowBlur = settings.glow || 20;
      ctx.shadowColor = colors[i];
      ctx.beginPath();
      ctx.ellipse(0, 0, w/2-2, h/3, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    // Протоны на орбитах
    for(let i=0; i<3; i++){
      const angle = time * 0.7 + i * Math.PI * 2/3;
      const rx = w/2-2, ry = h/3;
      const x = rx * Math.cos(angle) * Math.cos(i*0.8) - ry * Math.sin(angle) * Math.sin(i*0.8);
      const y = rx * Math.cos(angle) * Math.sin(i*0.8) + ry * Math.sin(angle) * Math.cos(i*0.8);
      ctx.shadowBlur = 15;
      ctx.shadowColor = colors[i];
      ctx.fillStyle = colors[i];
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  } else if(role === 'god'){
    // БОЖЕСТВЕННЫЙ НИМБ (для Игоря)
    const colors = ['#ffd700', '#ff8c00', '#fff700'];
    ctx.shadowColor = '#ffd700';
    // Золотое кольцо
    ctx.shadowBlur = settings.glow || 30;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.arc(cx, cy, w/2-2, 0, Math.PI * 2);
    ctx.stroke();
    // Лучи
    for(let i=0; i<16; i++){
      const angle = time * 0.3 + i * Math.PI/8;
      const len = w/2 + Math.sin(time * 0.5 + i) * 8;
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#ffd700';
      ctx.strokeStyle = i%2===0 ? '#ffd700' : '#ff8c00';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.5 + Math.sin(time + i) * 0.2;
      ctx.beginPath();
      ctx.moveTo(cx + (w/2-6) * Math.cos(angle), cy + (w/2-6) * Math.sin(angle));
      ctx.lineTo(cx + len * Math.cos(angle), cy + len * Math.sin(angle));
      ctx.stroke();
    }
    // Искры (частицы)
    for(let i=0; i<20; i++){
      const angle = time * 0.5 + i * 1.2;
      const dist = w/2 + Math.sin(time * 0.7 + i * 0.5) * 6;
      const x = cx + dist * Math.cos(angle);
      const y = cy + dist * Math.sin(angle);
      const size = 1.5 + Math.sin(time + i) * 0.5;
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#ffd700';
      ctx.fillStyle = i%2===0 ? '#fff7a0' : '#ffd700';
      ctx.globalAlpha = 0.6 + Math.sin(time * 0.5 + i) * 0.3;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
}

function renderAvatarWithFrame(containerId, name, role, avatarBase64, size){
  size = size || 44;
  const container = document.getElementById(containerId);
  if(!container) return;
  
  const isBig = size > 50;
  container.style.width = size + 'px';
  container.style.height = size + 'px';
  container.className = 'avatar-wrap' + (isBig ? ' big' : '');
  container.innerHTML = `
    <canvas id="${containerId}_base" class="avatar-base" width="${size}" height="${size}"></canvas>
    <canvas id="${containerId}_frame" class="avatar-frame" width="${size}" height="${size}"></canvas>
  `;
  
  // Рисуем аватарку
  const baseCanvas = document.getElementById(containerId + '_base');
  const baseCtx = baseCanvas.getContext('2d');
  baseCtx.clearRect(0, 0, size, size);
  baseCtx.beginPath();
  baseCtx.arc(size/2, size/2, size/2-2, 0, Math.PI*2);
  baseCtx.clip();
  
  if(avatarBase64 && avatarBase64.startsWith('data:image')){
    const img = new Image();
    img.onload = function(){
      baseCtx.drawImage(img, 0, 0, size, size);
    };
    img.src = avatarBase64;
  } else {
    baseCtx.fillStyle = '#2a2a4a';
    baseCtx.fillRect(0, 0, size, size);
    baseCtx.fillStyle = '#6366f1';
    baseCtx.font = 'bold ' + (size * 0.4) + 'px sans-serif';
    baseCtx.textAlign = 'center';
    baseCtx.textBaseline = 'middle';
    baseCtx.fillText(name.charAt(0).toUpperCase(), size/2, size/2);
  }
  
  // Рисуем рамку (анимируется через requestAnimationFrame)
  const frameCanvas = document.getElementById(containerId + '_frame');
  const frameCtx = frameCanvas.getContext('2d');
  const settings = { speed: 1, glow: 25 };
  
  function animateFrame(){
    if(!document.getElementById(containerId)) return;
    drawFrame(frameCtx, size, size, role, settings);
    requestAnimationFrame(animateFrame);
  }
  animateFrame();
}

async function login(){
  const email = $('#loginEmail').value.trim();
  const pass = $('#loginPass').value.trim();
  const err = $('#authError');
  if(!email || !pass){err.textContent='Заполните все поля';err.style.display='block';return}
  try{
    const cred = await AUTH.signInWithEmailAndPassword(email, pass);
    const snap = await DB.ref('users/'+cred.user.uid).once('value');
    if(!snap.exists()){err.textContent='Пользователь не найден';err.style.display='block';return}
    App.user = snap.val(); App.uid = cred.user.uid;
    finishLogin();
  }catch(e){err.textContent=e.message;err.style.display='block'}
}
$('#loginBtn').addEventListener('click',login);

  const name = $('#regName').value.trim();

function renderTabs(){

    {id:'shift',icon:'🔵',label:'Смена'},{id:'stats',icon:'📊',label:'Стат'},
    {id:'history',icon:'💳',label:'Выплаты'},{id:'board',icon:'🏆',label:'Доска'},{id:'power',icon:'⚡',label:'Сила'}
  ] : App.isGod ? [
    {id:'punkts',icon:'📍',label:'Пункты'},{id:'workers',icon:'👥',label:'Сотрудники'},
    {id:'salary',icon:'💰',label:'Расчёт ЗП'},{id:'announce',icon:'📢',label:'Объявления'}
  ] : [
    {id:'shift',icon:'🔵',label:'Смена'},{id:'stats',icon:'📊',label:'Стат'},
    {id:'history',icon:'💳',label:'Выплаты'},{id:'board',icon:'🏆',label:'Доска'}
  ];
  $('#tabsContainer').innerHTML = cfg.map((t,i)=>`<button id="tab_${t.id}" class="${i===0?'active':''}" data-tab="${t.id}">${t.icon} <span>${t.label}</span></button>`).join('');
  $('#tabContentContainer').innerHTML = cfg.map((t,i)=>`<div id="panel_${t.id}" class="tab-content${i===0?' active-tab':''}"></div>`).join('');
  if(cfg.length) renderTab(cfg[0].id);
  $$('#tabsContainer button').forEach(b=>b.addEventListener('click',function(){
    const id=this.dataset.tab;
    // Если вкладка уже активна — сворачиваем
    if(this.classList.contains('active')){
      this.classList.remove('active');
      document.getElementById('panel_'+id).classList.remove('active-tab');
      return;
    }
    $$('#tabsContainer button, #tabContentContainer .tab-content').forEach(x=>x.classList.remove('active','active-tab'));
    this.classList.add('active');
    document.getElementById('panel_'+id).classList.add('active-tab');
    renderTab(id);
  }));
}
function renderTab(id){
  const p = document.getElementById('panel_'+id); if(!p) return;
  p.innerHTML = '';
  switch(id){
    case 'shift': renderShift(p); break;
    case 'stats': renderStats(p); break;
    case 'history': renderHistory(p); break;
    case 'board': renderBoard(p); break;
    case 'power': renderPower(p); break;
    case 'announce': renderAnnounce(p); break;
    case 'punkts': renderPunkts(p); break;
    case 'workers': renderWorkers(p); break;
    case 'salary': renderSalary(p); break;
  }
}

  DB.ref('shifts').push({user:App.uid, user_name:App.user.name, punkt:App.user.punkt||'49', date:new Date().toLocaleDateString('ru-RU'), hours:hr, tovar:tv, paid:false, timestamp:Date.now()}).then(()=>{

    if(App.shiftTimer)clearInterval(App.shiftTimer); App.onShift=false; loadShift(); toast('✅ Смена закрыта!');
  });
}

function renderStats(p){
  p.innerHTML = `<div class="calendar"><div class="cal-header"><button class="cal-nav" id="calPrev">◀</button><div id="calTitle" style="font-size:13px;font-weight:700;"></div><button class="cal-nav" id="calNext">▶</button></div><div class="cal-grid" id="calGrid"></div></div><div class="card" style="margin-top:8px;"><div>Смен: <b id="statShifts">0</b></div><div>Часов: <b id="statHours">0</b></div><div>Товаров: <b id="statTovar">0</b></div></div>`;
  $('#calPrev').addEventListener('click', ()=>changeCal(-1));
  $('#calNext').addEventListener('click', ()=>changeCal(1));
  renderCalendar();
}
function renderCalendar(){
  const months = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  $('#calTitle').textContent = months[App.calMonth] + ' ' + App.calYear;
  DB.ref('shifts').orderByChild('user').equalTo(App.uid).once('value').then(s=>{
    const dayMap={}; let ts=0,th=0,tt=0;
    s.forEach(c=>{
      const x=c.val(); const d=new Date(x.timestamp);
      if(d.getFullYear()===App.calYear && d.getMonth()===App.calMonth){
        dayMap[d.getDate()]=true; ts++; th+=x.hours||0; tt+=x.tovar||0;
      }
    });
    $('#statShifts').textContent=ts; $('#statHours').textContent=th.toFixed(1); $('#statTovar').textContent=tt;
    const fd = new Date(App.calYear, App.calMonth, 1).getDay(), off=(fd+6)%7, dim = new Date(App.calYear, App.calMonth+1, 0).getDate();
    const grid = $('#calGrid');
    grid.innerHTML = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>'<div class="cal-day-name">'+d+'</div>').join('');
    for(let i=0;i<off;i++) grid.innerHTML += '<div class="cal-day" style="opacity:0;"></div>';
    for(let d=1;d<=dim;d++){
      const has = dayMap[d] ? 'has-shift' : '';
      grid.innerHTML += `<div class="cal-day ${has}">${d}</div>`;
    }
  });
}
function changeCal(dir){App.calMonth+=dir; if(App.calMonth<0){App.calMonth=11;App.calYear--} if(App.calMonth>11){App.calMonth=0;App.calYear++} renderCalendar(); }

    let h=''; s.forEach(c=>{const p=c.val(); h+=`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">💰 <b>${p.amount}₽</b> (${p.hours}ч, ${p.tovar} товаров)<br><small style="color:var(--muted);">${p.date}</small></div>`});
    list.innerHTML=h;

}

// ====== РАСЧЁТ ЗП (Игорь) ======
function renderSalary(p){
  p.innerHTML = `<div class="card"><h3 style="font-size:15px;">💰 Расчёт ЗП</h3><div id="salaryList">Загрузка...</div></div>`;
  calculateSalary();
}
function calculateSalary(){
  Promise.all([DB.ref('users').once('value'), DB.ref('shifts').once('value'), DB.ref('bonus_penalties').once('value')]).then(([usersSnap, shiftsSnap, bonusSnap])=>{
    const users = usersSnap.val()||{};
    const shifts = shiftsSnap.val()||{};
    const bonuses = bonusSnap.val()||{};
    const el = $('#salaryList');
    let h = '';
    const unpaid = {};
    for(const key in shifts){
      const s = shifts[key];
      if(!s.paid){
        if(!unpaid[s.user]) unpaid[s.user] = {hours:0, tovar:0, keys:[]};
        unpaid[s.user].hours += s.hours||0;
        unpaid[s.user].tovar += s.tovar||0;
        unpaid[s.user].keys.push(key);
      }
    }
    for(const uid in unpaid){
      const u = users[uid]; if(!u) continue;
      const data = unpaid[uid];
      let bonusTotal = 0;
      if(bonuses[uid]){
        for(const key in bonuses[uid]){
          bonusTotal += bonuses[uid][key].amount || 0;
        }
      }
      const rate = 150;
      const base = Math.round(data.hours * rate + data.tovar * 2);
      const total = Math.max(0, base + bonusTotal);
      h += `<div class="management-item">
        <b>${esc(u.name)}</b> (ПВЗ: ${esc(u.punkt||'49')})
        <div style="font-size:12px;">Часы: <b>${data.hours.toFixed(1)}ч</b> | Товары: <b>${data.tovar}</b> | Премии/штрафы: <b>${bonusTotal>0?'+':''}${bonusTotal}₽</b></div>
        <div style="color:var(--green);font-weight:bold;font-size:16px;">К выплате: ${total}₽</div>
        <button class="btn-green" style="width:100%;padding:6px;font-size:12px;" onclick="payoutSalary('${uid}', ${total}, ${data.hours}, ${data.tovar}, '${data.keys.join(',')}')">💳 Выплатить</button>
      </div>`;
    }
    el.innerHTML = h || '<p style="color:var(--muted);">Нет неоплаченных смен</p>';
  });
}
window.payoutSalary = function(uid, amount, hours, tovar, keysStr){
  if(!confirm(`Выплатить ${amount}₽?`)) return;
  const keys = keysStr.split(',');
  const updates = {};
  keys.forEach(k=>{ updates['shifts/'+k+'/paid'] = true; });
  const payoutKey = DB.ref('payouts').push().key;
  updates['payouts/'+payoutKey] = {user:uid, amount, hours, tovar, date:new Date().toLocaleDateString('ru-RU')};
  DB.ref().update(updates).then(()=>{
    toast(`✅ Выплачено ${amount}₽`);
    DB.ref('users/'+uid).once('value').then(s=>{const u=s.val(); if(u&&u.vkId) sendVkNotify(u.vkId, `💵 Выплата ЗП ${amount}₽`);});
    calculateSalary();
  });
};

// ====== ЧАТ ======
function loadChat(){
  const ref = App.privateChatWith ? DB.ref('privateChats/'+[App.uid, App.privateChatWith].sort().join('_')) : DB.ref('chat');
  if(App.chatListener) App.chatListener.off();
  App.chatListener = ref.limitToLast(50);
  App.chatListener.on('value', s=>{
    let h='';
    s.forEach(c=>{
      const m = c.val();
      const isMine = m.user === App.user.name;
      const avatarHtml = `<div id="chat_avatar_${c.key}" style="width:32px;height:32px;flex-shrink:0;"></div>`;
      const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}) : '';
      let content = '';
      if(m.text) content += esc(m.text);
      if(m.sticker) content += `<img class="chat-sticker" src="${esc(m.sticker)}">`;
      if(m.photo) content += `<br><img class="chat-img" src="${esc(m.photo)}" onclick="document.getElementById('photoViewerImg').src='${esc(m.photo)}';document.getElementById('photoViewer').style.display='flex';">`;
      h += `<div class="chat-message-row ${isMine ? 'own' : ''}">
        ${avatarHtml}
        <div class="chat-message-content">
          <div class="chat-message-header ${isMine ? 'own' : ''}">
            <span class="name" style="color:${stringToColor(m.user)}">${esc(m.user)}</span>
            <span class="time">${time}</span>
          </div>
          <div class="chat-message-text">${content}</div>
        </div>
      </div>`;
    });
    $('#chat').innerHTML = h || '<p style="color:var(--muted);text-align:center;padding:20px;font-size:13px;">Нет сообщений</p>';
    $('#chat').scrollTop = $('#chat').scrollHeight;
    
    // Рендерим аватарки в сообщениях
    s.forEach(c=>{
      const m = c.val();
      const containerId = 'chat_avatar_' + c.key;
      const container = document.getElementById(containerId);
      if(container){
        renderAvatarWithFrame(containerId, m.user, m.role, m.avatar || '', 32);
      }
    });
  });
}
function toggleChat(){
  if($('#chat').classList.contains('hidden')){
    $('#chat').classList.remove('hidden'); $('#chatArrow').style.transform='rotate(180deg)'; $('#chatInputBar').style.display='flex';
    $('#chat').scrollTop = $('#chat').scrollHeight;
  }else{
    $('#chat').classList.add('hidden'); $('#chatArrow').style.transform='rotate(0deg)'; $('#chatInputBar').style.display='none';
  }
}
function sendMsg(){
  const t = $('#chatMsgInput').value.trim(); if(!t) return;
  const ref = App.privateChatWith ? DB.ref('privateChats/'+[App.uid, App.privateChatWith].sort().join('_')) : DB.ref('chat');
  const msgData = {user:App.user.name, text:t, timestamp:Date.now(), role:App.user.role, avatar:App.user.avatar||''};
  const mentions = t.match(/@(\S+)/g);
  if(mentions){
    DB.ref('users').once('value').then(s=>{
      s.forEach(c=>{
        const u=c.val();
        if(u.vkId){
          mentions.forEach(m=>{
            const name = m.slice(1);
            if(u.name === name) sendVkNotify(u.vkId, `📢 Упоминание в чате от ${App.user.name}:\n"${t}"`);
          });
        }
      });
    });
  }
  ref.push(msgData).then(()=>{ $('#chatMsgInput').value=''; });
}
function sendPhoto(){
  const file = $('#chatPhotoInput').files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = function(e){
    const ref = App.privateChatWith ? DB.ref('privateChats/'+[App.uid, App.privateChatWith].sort().join('_')) : DB.ref('chat');
    ref.push({user:App.user.name, photo:e.target.result, timestamp:Date.now(), role:App.user.role, avatar:App.user.avatar||''});
  };
  r.readAsDataURL(file);
  $('#chatPhotoInput').value='';
}
function sendSticker(sticker){
  const ref = App.privateChatWith ? DB.ref('privateChats/'+[App.uid, App.privateChatWith].sort().join('_')) : DB.ref('chat');
  ref.push({user:App.user.name, sticker:sticker, timestamp:Date.now(), role:App.user.role, avatar:App.user.avatar||''});
  $('#stickerPanel').classList.remove('open');
}
function renderStickers(){
  const content = $('#stickerContent');
  content.innerHTML = BASE_EMOJIS.map(e => `<div class="emoji-item" onclick="document.getElementById('chatMsgInput').value += '${e}'">${e}</div>`).join('');
}

// ====== САЙДБАР ======
function buildCarousel(){
  const el = $('#carouselInner'); if(!el) return; el.innerHTML='';
  for(const uid in App.allUserData){
    if(uid === App.uid) continue;
    const d = App.allUserData[uid];
    const online = App.activeShifts[uid] ? '<div class="online-dot"></div>' : '';
    const avatar = d.avatar ? `<img src="${esc(d.avatar)}">` : `<div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#334,#112);display:flex;align-items:center;justify-content:center;font-size:18px;color:#ccc;font-weight:bold;">${esc(d.name.charAt(0))}</div>`;
    el.innerHTML += `<div class="avatar-item" onclick="openMini('${uid}')">${avatar}${online}</div>`;
  }
}
function openMini(uid){
  const d = App.allUserData[uid]; if(!d) return;
  renderAvatarWithFrame('mpAvatarWrap', d.name, d.role, d.avatar||'', 44);
  $('#mpName').textContent = d.name;
  $('#mpStatus').textContent = d.role === 'god' ? '👑 Начальник' : d.role === 'creator' ? '🌌 Создатель' : '📦 Сотрудник';
  $('#mpStatus').style.background = d.role === 'god' ? 'rgba(255,215,0,0.3)' : d.role === 'creator' ? 'rgba(124,58,237,0.3)' : 'rgba(34,197,94,0.2)';
  $('#mpPunkt').textContent = App.activeShifts[uid] ? `🟢 На смене (ПВЗ: ${d.punkt||'49'})` : '🔴 Выходной';
  $('#mpChatBtn').onclick = function(){ startPrivateChat(uid, d.name); };
  $('#miniProfile').classList.add('show');
}
function startPrivateChat(uid, name){
  App.privateChatWith = uid;
  $('#chatLabel').textContent = '💬 ' + name;
  $('#chatBackBtn').style.display = 'inline-block';
  $('#miniProfile').classList.remove('show');
  $('#avatarCarousel').classList.remove('open');
  loadChat();
}
function switchGlobalChat(){
  App.privateChatWith = null;
  $('#chatLabel').textContent = 'Общий чат';
  $('#chatBackBtn').style.display = 'none';
  loadChat();
}

// ====== НАСТРОЙКИ ======
function openSettings(){
  $('#mainContent').style.display = 'none';
  $('#avatarCarousel').style.display = 'none';
  $('#settingsPanel').style.display = 'flex';
  $('#setVk').value = App.user.vkId||''; 
  $('#setName').value = '';
  loadPunktsSettings();
  // Превью аватара с рамкой
  renderAvatarWithFrame('previewAvatarWrap', App.user.name, App.user.role, App.user.avatar||'', 60);
}
function closeSettings(){
  $('#settingsPanel').style.display = 'none';
  $('#mainContent').style.display = 'flex';
  $('#avatarCarousel').style.display = 'flex';
}
function loadPunktsSettings(){
  DB.ref('punkts').once('value').then(s=>{
    const sel=$('#setPunkt'); sel.innerHTML='<option value="">Не менять</option>';
    s.forEach(c=>{sel.innerHTML+=`<option value="${c.key}">${c.key}</option>`});
  });
}
function saveSettings(){
  const nn=$('#setName').value.trim(), npu=$('#setPunkt').value, nvk=$('#setVk').value.trim();
  const up={}; if(nn) up.name=nn; if(npu) up.punkt=npu; if(nvk) up.vkId=nvk;
  if(Object.keys(up).length){
    DB.ref('users/'+App.uid).update(up).then(()=>{
      if(nn) App.user.name=nn; if(npu) App.user.punkt=npu; if(nvk) App.user.vkId=nvk;
      updateUI(); toast('✅ Сохранено');
    });
  }
  closeSettings();
}
function saveAvatar(){
  if(!App.avatarFileData){toast('Выберите фото',true); return;}
  DB.ref('users/'+App.uid+'/avatar').set(App.avatarFileData).then(()=>{
    App.user.avatar = App.avatarFileData;
    updateUI();
    toast('✅ Аватар сохранён');
    closeSettings();
  });
}
function logout(){
  if(!confirm('Выйти?'))return;
  if(App.shiftTimer)clearInterval(App.shiftTimer);
  if(App.chatListener) App.chatListener.off();
  AUTH.signOut().then(()=>{
    App.user=null; App.uid=null;
    $('#app').style.display='none'; $('#loginScreen').style.display='flex';
    document.body.className='';
  });
}

// ====== ОБЪЯВЛЕНИЯ И МЫСЛИ ======
function loadAnnounce(){
  DB.ref('announce').limitToLast(1).on('value', s=>{
    const el = $('#announceBlock');
    if(!s.exists()){el.style.display='none'; return}
    let last; s.forEach(c=>{last=c.val()});
    el.style.display='block'; el.innerHTML = '📢 ' + esc(last.text);
  });
}
function loadThought(){
  DB.ref('creatorThought').on('value', s=>{
    const el = $('#thoughtBlock');
    if(!s.exists()){el.style.display='none'; return}
    el.style.display='block'; el.innerHTML = '💭 ' + esc(s.val().text);
  });
}

// ====== ЛИСТЕНЕРЫ ======
function initListeners(){
  DB.ref('users').on('value', s=>{
    App.allUserData = s.val()||{};
    buildCarousel();
    if(App.user && App.user.uid) updateProfileAvatar();
  });
  DB.ref('activeShifts').on('value', s=>{
    App.activeShifts = s.val()||{};
    if(App.activeShifts[App.uid] && App.activeShifts[App.uid].active){ App.onShift=true; } else { App.onShift=false; }
    buildCarousel();
    if(document.getElementById('shiftContent')) loadShift();
  });
}

// ====== DOM СОБЫТИЯ ======
document.addEventListener('DOMContentLoaded', function(){
  // Чат
  $('#chatHeader').addEventListener('click', toggleChat);
  $('#chatBackBtn').addEventListener('click', switchGlobalChat);
  $('#sendMsgBtn').addEventListener('click', sendMsg);
  $('#chatMsgInput').addEventListener('keydown', e=>{if(e.key==='Enter'){e.preventDefault(); sendMsg();}});
  $('#chatPhotoBtn').addEventListener('click', ()=>$('#chatPhotoInput').click());
  $('#chatPhotoInput').addEventListener('change', sendPhoto);
  $('#stickerToggleBtn').addEventListener('click', function(e){
    e.stopPropagation(); const p=$('#stickerPanel'); p.classList.toggle('open');
    if(p.classList.contains('open')) renderStickers();
  });
  document.addEventListener('click', ()=>{ $('#stickerPanel').classList.remove('open'); });
  // Сайдбар
  $('#sidebarToggleBtn').addEventListener('click', ()=>$('#avatarCarousel').classList.toggle('open'));
  $('#sidebarCloseBtn').addEventListener('click', ()=>$('#avatarCarousel').classList.remove('open'));
  $('#mpCloseBtn').addEventListener('click', ()=>$('#miniProfile').classList.remove('show'));
  // Настройки
  $('#settingsBtn').addEventListener('click', openSettings);
  $('#settingsCloseBtn').addEventListener('click', closeSettings);
  $('#settingsSaveBtn').addEventListener('click', saveSettings);
  $('#settingsLogoutBtn').addEventListener('click', ()=>{closeSettings(); logout();});
  $('#avatarCloseBtn').addEventListener('click', closeSettings);
  $('#avatarSaveBtn').addEventListener('click', saveAvatar);
  $('#avatarUploadBtn').addEventListener('click', ()=>$('#avatarFileInput').click());
  $('#avatarFileInput').addEventListener('change', function(e){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      const img = new Image();
      img.onload = function(){
        const canvas = document.createElement('canvas');
        let w=img.width, h=img.height;
        const max=200; if(w>h){if(w>max){h*=max/w; w=max;}}else{if(h>max){w*=max/h; h=max;}}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        App.avatarFileData = canvas.toDataURL('image/jpeg',0.7);
        renderAvatarWithFrame('previewAvatarWrap', App.user.name, App.user.role, App.avatarFileData, 60);
        toast('✅ Фото загружено, сохраните изменения');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  // Табы настроек
  $$('.settings-tab').forEach(b=>b.addEventListener('click', function(){
    const tab=this.dataset.tab;
    $$('.settings-tab').forEach(x=>{x.classList.remove('active'); x.style.background='transparent'; x.style.color='var(--muted)';});
    this.classList.add('active'); this.style.background='var(--accent)'; this.style.color='#fff';
    $('#stab-main').style.display = tab==='main' ? 'flex' : 'none';
    $('#stab-avatar').style.display = tab==='avatar' ? 'flex' : 'none';
  }));
});

})();
