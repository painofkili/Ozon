  <div id="chat" class="open"></div>

</div>

<div id="premiumCard" style="display:none"><div class="card"><h4>🎁 Премии: <span id="premiumUser"></span></h4><div id="premiumList"></div><input id="premiumAmount" type="number" placeholder="Сумма"><button class="btn-gold" onclick="addPremium()">🎁 Выдать</button><button class="btn-gray" onclick="backToApp()">↩</button></div></div>
<div id="settingsCard" style="display:none"><div class="card"><h4>⚙️ Настройки</h4><input id="newGodName" placeholder="Имя"><input id="newGodPass" type="password" placeholder="Пароль"><input id="newGodVkId" placeholder="ВК ID (цифры)"><label>Аватарка</label><input id="newGodAvatar" type="file" accept="image/*" onchange="previewAvatar()"><div id="avatarPreview" style="text-align:center;margin:6px 0"></div><button class="btn-green" onclick="saveSettings()">💾</button><button class="btn-gray" onclick="backToApp()">↩</button></div></div>

var VK_TOKEN="vk1.a.1ccqIy8pmM0W_RnIymI9XOMvA6ILX5yxNfZZAiF5HHBdjHK_vOAimgsyljky-TCiReMgJRAlaRvpYEypifmF-iUonUGvldlw5LvDWAOSUpN1WDcnS_7Uit-Yh3BuUF5Ic5NoZ48Qhlmu4ErB87fpTplEI7E3sarTm9LC-Vd8zTbeQp4xgyB1s5yg6oBxTBaNZAFp-ioqBWG25jR8GREmWw";

function loadWorkerStatuses(cb){db.ref('shifts').once('value',function(s){var counts={};s.forEach(function(c){var u=c.val().user;counts[u]=(counts[u]||0)+1});var STATUSES=[{name:'📦 Штрих',min:0},{name:'🚚 ПВЗюк',min:4},{name:'🏭 Пунктовой',min:8},{name:'🚀 Озонавт',min:13},{name:'👑 Озоний',min:21}];for(var n in counts){var st=STATUSES[0];for(var i=STATUSES.length-1;i>=0;i--){if(counts[n]>=STATUSES[i].min){st=STATUSES[i];break}}workerStatuses[n]=st.name}if(cb)cb();});}

function recountRating(){godRating=0;db.ref('premiums').once('value',function(s){godRating+=s.numChildren()*2;db.ref('punishes').once('value',function(p){godRating-=p.numChildren();if(godRating<0)godRating=0;updateGodStatusUI()})})}

};

  '💼 Мистер Бизнес':['💼 Кризис. -{sum}₽.','💼 Сокращение штата. -{sum}₽.'],

};

function getGodStatus(n){for(var i=GOD_STATUSES.length-1;i>=0;i--){if(n>=GOD_STATUSES[i].min)return GOD_STATUSES[i]}return GOD_STATUSES[0]}
function updateGodStatusUI(){var st=getGodStatus(godRating),ns=null;for(var i=0;i<GOD_STATUSES.length;i++){if(GOD_STATUSES[i].min>godRating){ns=GOD_STATUSES[i];break}}var b=document.getElementById('godStatusBadge');if(!b)return;b.textContent=st.name;b.style.background=st.color;b.style.color='#fff';var p=ns?((godRating-st.min)/(ns.min-st.min)*100):100;document.getElementById('godProgressFill').style.width=p+'%';document.getElementById('godProgressFill').style.background=st.color;document.getElementById('godProgressText').textContent=ns?godRating+'/'+ns.min+' до '+ns.name:'⭐ Максимум!'}

function enter(){document.getElementById('loginCard').style.display='none';document.getElementById('app').style.display='block';updateUI();showTab('punkts');loadChat();updateGodStatusUI();allUsers['👑 '+godName]=godAvatarData||'';}

function saveSettings(){var nn=document.getElementById('newGodName').value.trim(),np=document.getElementById('newGodPass').value.trim(),nvk=document.getElementById('newGodVkId').value.trim(),up={};if(nn){up.name=nn;godName=nn;allUsers['👑 '+godName]=godAvatarData||''}if(np){db.ref('godPassword').set(np);godPass=np}if(newAvatarData){up.avatar=newAvatarData;godAvatarData=newAvatarData;allUsers['👑 '+godName]=newAvatarData}else{up.avatar=godAvatarData||''}if(nvk){up.vkId=nvk;godVkId=nvk}if(Object.keys(up).length>0)db.ref('godSettings').update(up);updateUI();backToApp();alert('✅')}
function showTab(t){
  var tabs={punkts:'punktsTab',workers:'workersTab',calc:'calcTab',announce:'announceTab',hall:'hallTab'};
  var active=document.querySelector('.tabs button.active');
  if(active&&active.id==='tab'+t.charAt(0).toUpperCase()+t.slice(1)){document.getElementById(tabs[t]).style.display='none';active.classList.remove('active');return;}
  Object.keys(tabs).forEach(function(k){document.getElementById(tabs[k]).style.display='none'});
  document.getElementById(tabs[t]).style.display='block';
  ['tabPunkts','tabWorkers','tabCalc','tabAnnounce','tabHall'].forEach(function(id){document.getElementById(id).classList.remove('active')});
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
  if(t==='punkts')loadPunkts();if(t==='workers')loadWorkers();if(t==='calc')loadCalcUsers();if(t==='hall')loadHall();
}
function loadPunkts(){db.ref('punkts').once('value',function(s){var h='';s.forEach(function(c){h+='<div class="worker-row"><span><b>'+c.key+'</b><br>'+(c.val().rate||0)+' ₽/ч</span><span><button class="btn-blue" onclick="editPunkt(\''+c.key+'\','+(c.val().rate||0)+')">✏️</button><button class="btn-red" onclick="deletePunkt(\''+c.key+'\')">✕</button></span></div>'});document.getElementById('punktsList').innerHTML=h||'<p>Нет пунктов</p>'})}
function addPunkt(){var id=prompt('Номер пункта:');if(!id)return;db.ref('punkts/'+id).set({rate:parseInt(prompt('Ставка (₽/ч):','210'))||210});loadPunkts()}
function editPunkt(id,cur){var r=parseInt(prompt('Ставка для '+id+':',cur));if(r&&!isNaN(r)){db.ref('punkts/'+id+'/rate').set(r);loadPunkts()}}

function loadWorkers(){loadWorkerStatuses(function(){var fp=document.getElementById('filterPunkt').value;db.ref('users').once('value',function(s){var h='',pk={};s.forEach(function(c){var w=c.val();if(w.punkt)pk[w.punkt]=!0;if(fp&&w.punkt!==fp)return;var isCreator=w.name==='Костя';var wav=w.avatar?'<img src="'+w.avatar+'" style="width:30px;height:30px;border-radius:50%;object-fit:cover;margin-right:6px;vertical-align:middle'+(isCreator?';box-shadow:0 0 10px rgba(245,197,24,0.6)':'')+'">':'';var wst=workerStatuses[w.name]||'📦 Штрих';h+='<div class="worker-row'+(isCreator?' creator-row':'')+'"><span>'+wav+'<b>'+(isCreator?'<span style="color:#f5c518">🌌 '+w.name+'</span>':w.name)+'</b> <span class="worker-status" style="background:#444">'+wst+'</span>'+(isCreator?'<span class="creator-badge">🌌 Создатель</span>':'')+'<br>Пункт '+(w.punkt||'?')+' | Надбавка: '+(w.bonus||0)+' ₽</span><span><button class="btn-orange" onclick="setBonus(\''+c.key+'\',\''+w.name+'\','+(w.bonus||0)+')">💰</button><button class="btn-gold" onclick="openPremium(\''+w.name+'\')">🎁</button><button class="btn-purple" onclick="openPunish(\''+w.name+'\')">⚠️</button><button class="btn-red" onclick="deleteWorker(\''+c.key+'\',\''+w.name+'\')">✕</button></span></div>'});document.getElementById('workersList').innerHTML=h||'<p>Нет сотрудников</p>';var sel=document.getElementById('filterPunkt');sel.innerHTML='<option value="">Все пункты</option>';Object.keys(pk).forEach(function(p){if(p)sel.innerHTML+='<option value="'+p+'">'+p+'</option>'})})})}
function setBonus(key,name,cur){var b=prompt('Надбавка для '+name+':',cur);if(b!==null&&!isNaN(parseInt(b))){db.ref('users/'+key+'/bonus').set(parseInt(b));loadWorkers()}}
function deleteWorker(key,name){if(name==='Костя'){alert('🚫 Создателя нельзя удалить!');return}if(!confirm('Удалить '+name+'?'))return;db.ref('shifts').orderByChild('user').equalTo(name).once('value',function(s){s.forEach(function(c){db.ref('shifts/'+c.key).remove()})});db.ref('users/'+key).remove();loadWorkers()}
function openPremium(user){currentPremiumUser=user;document.getElementById('app').style.display='none';document.getElementById('premiumCard').style.display='block';document.getElementById('premiumUser').textContent=user;loadPremiums()}
function openPunish(user){if(user==='Костя'){alert('🚫 Создателя нельзя штрафовать!');return}currentPunish=user;document.getElementById('app').style.display='none';document.getElementById('punishCard').style.display='block';document.getElementById('punishUser').textContent=user;loadPunishes()}
function loadPremiums(){if(!currentPremiumUser)return;db.ref('premiums').orderByChild('user').equalTo(currentPremiumUser).on('value',function(s){var h='';s.forEach(function(c){h+='<div class="punish-row"><span>'+c.val().amount+' ₽</span><button class="btn-red" onclick="delPremium(\''+c.key+'\')" style="width:auto;padding:4px 8px;font-size:10px">✕</button></div>'});document.getElementById('premiumList').innerHTML=h||'<p>Нет премий</p>'})}
function addPremium(){var am=parseInt(document.getElementById('premiumAmount').value);if(!am||isNaN(am)){alert('Введи сумму!');return}var st=getGodStatus(godRating),texts=PREMIUM_TEXTS[st.name]||['+{sum}₽'],msg=randomText(texts,am);db.ref('premiums').push({user:currentPremiumUser,amount:am,timestamp:Date.now()});db.ref('notifications').push({user:currentPremiumUser,text:msg,timestamp:Date.now()});godRating+=2;updateGodStatusUI();document.getElementById('premiumAmount').value=''}
function delPremium(id){if(confirm('Удалить премию?')){db.ref('premiums/'+id).remove();recountRating()}}
function loadPunishes(){if(!currentPunish)return;db.ref('punishes').orderByChild('user').equalTo(currentPunish).on('value',function(s){var h='';s.forEach(function(c){h+='<div class="punish-row"><span>'+c.val().amount+' ₽ — '+c.val().reason+'</span><button class="btn-red" onclick="delPunish(\''+c.key+'\')" style="width:auto;padding:4px 8px;font-size:10px">✕</button></div>'});document.getElementById('punishList').innerHTML=h||'<p>Нет штрафов</p>'})}
function addPunish(){var am=parseInt(document.getElementById('punishAmount').value),r=document.getElementById('punishReason').value.trim();if(!am||isNaN(am)||!r){alert('Введи сумму и причину!');return}var st=getGodStatus(godRating),texts=PUNISH_TEXTS[st.name]||['-{sum}₽'],msg=randomText(texts,am);db.ref('punishes').push({user:currentPunish,amount:am,reason:r,timestamp:Date.now()});db.ref('notifications').push({user:currentPunish,text:msg,timestamp:Date.now()});godRating-=1;if(godRating<0)godRating=0;updateGodStatusUI();document.getElementById('punishAmount').value='';document.getElementById('punishReason').value=''}
function delPunish(id){if(confirm('Удалить штраф?')){db.ref('punishes/'+id).remove();recountRating()}}
function loadCalcUsers(){db.ref('users').once('value',function(s){var sel=document.getElementById('calcUser');sel.innerHTML='<option value="">-- Выбери --</option>';s.forEach(function(c){sel.innerHTML+='<option value="'+c.val().name+'">'+c.val().name+'</option>'})})}
function onCalcSelect(){var u=document.getElementById('calcUser').value;document.getElementById('calcBlock').style.display=u?'block':'none';if(u){var n=new Date(),t=new Date(n.getTime()-14*24*60*60*1000);document.getElementById('calcFrom').value=t.toISOString().split('T')[0];document.getElementById('calcTo').value=n.toISOString().split('T')[0];document.getElementById('zpResult').style.display='none';loadShifts(u)}}
function addShift(){var u=document.getElementById('calcUser').value;if(!u){alert('Выбери сотрудника!');return}currentAddUser=u;document.getElementById('addShiftUser').textContent=u;document.getElementById('shiftDate').value=new Date().toISOString().split('T')[0];document.getElementById('app').style.display='none';document.getElementById('addShiftCard').style.display='block'}
function saveShift(){var d=document.getElementById('shiftDate').value,tf=document.getElementById('shiftFrom').value||'9',tt=document.getElementById('shiftTo').value||'21',tv=parseInt(document.getElementById('shiftTovar').value)||0;if(!d){alert('Выбери дату!');return}db.ref('shifts/'+currentAddUser+'_'+Date.now()).set({user:currentAddUser,punkt:'49',date:new Date(d).toLocaleDateString('ru-RU'),timeFrom:tf,timeTo:tt,hours:parseInt(tt)-parseInt(tf),tovar:tv,paid:!1,timestamp:new Date(d).toISOString()});alert('✅');backToApp();loadShifts(currentAddUser)}
function loadShifts(user){db.ref('shifts').orderByChild('user').equalTo(user).once('value',function(s){allShifts=[];s.forEach(function(c){var x=c.val();x._id=c.key;allShifts.push(x)});allShifts.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp)});renderCalendar()})}
function renderCalendar(){var now=new Date(),y=now.getFullYear(),m=now.getMonth(),dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,0).getDay();document.getElementById('calHeader').innerHTML='<b>'+now.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})+'</b>';var days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'],h='';for(var i=0;i<7;i++)h+='<div class="header">'+days[i]+'</div>';for(var i=0;i<fd;i++)h+='<div></div>';var sd={};allShifts.forEach(function(s){sd[s.date]=s});var ts=now.toLocaleDateString('ru-RU');for(var d=1;d<=dim;d++){var ds=new Date(y,m,d).toLocaleDateString('ru-RU'),cl='';if(sd[ds])cl='shift-day';if(ds===ts)cl+=' today';h+='<div class="'+cl+'" onclick="showShiftDetail(\''+ds+'\')">'+d+'</div>'}document.getElementById('calendar').innerHTML=h}
function showShiftDetail(dateStr){var shifts=allShifts.filter(function(s){return s.date===dateStr});var h='<b>'+dateStr+'</b><br>';shifts.forEach(function(s){h+='<div class="shift-edit-row">';h+='<input id="ed_'+s._id+'_tf" value="'+s.timeFrom+'" style="width:40px">–';h+='<input id="ed_'+s._id+'_tt" value="'+s.timeTo+'" style="width:40px">';h+='Товаров: <input id="ed_'+s._id+'_tv" type="number" value="'+s.tovar+'" style="width:60px">';h+='<button class="btn-blue" onclick="editShift(\''+s._id+'\')">💾</button>';h+='<button class="btn-red" onclick="delShift(\''+s._id+'\')">✕</button>';h+='</div>'});document.getElementById('shiftDetail').innerHTML=h}
function editShift(id){var tf=document.getElementById('ed_'+id+'_tf').value;var tt=document.getElementById('ed_'+id+'_tt').value;var tv=parseInt(document.getElementById('ed_'+id+'_tv').value)||0;db.ref('shifts/'+id).update({timeFrom:tf,timeTo:tt,hours:parseInt(tt)-parseInt(tf),tovar:tv});alert('✅ Обновлено');loadShifts(document.getElementById('calcUser').value)}
function delShift(id){if(confirm('Удалить смену?')){db.ref('shifts/'+id).remove();loadShifts(document.getElementById('calcUser').value)}}
function calcZP(){var u=document.getElementById('calcUser').value,from=new Date(document.getElementById('calcFrom').value),to=new Date(document.getElementById('calcTo').value);to.setHours(23,59,59);if(!u||isNaN(from)||isNaN(to)){alert('Заполни период!');return}db.ref('punkts').once('value',function(pkSnap){var rates={};pkSnap.forEach(function(c){rates[c.key]=c.val().rate||0});db.ref('users/'+u).once('value',function(uSnap){var bonus=uSnap.exists()?uSnap.val().bonus||0:0;db.ref('punishes').orderByChild('user').equalTo(u).once('value',function(pnSnap){var totalPunish=0;pnSnap.forEach(function(c){var p=c.val();if(new Date(p.timestamp)>=from&&new Date(p.timestamp)<=to)totalPunish+=p.amount||0});db.ref('premiums').orderByChild('user').equalTo(u).once('value',function(prSnap){var totalPremium=0;prSnap.forEach(function(c){var p=c.val();if(new Date(p.timestamp)>=from&&new Date(p.timestamp)<=to)totalPremium+=p.amount||0});var shifts=allShifts.filter(function(s){var t=new Date(s.timestamp);return t>=from&&t<=to&&!s.paid});var th=0,tt=0,tz=0;shifts.forEach(function(s){var h=s.hours||0,tv=s.tovar||0;th+=h;tt+=tv;tz+=h*(rates[s.punkt]||0)+tv+bonus});tz+=totalPremium;document.getElementById('zpResult').style.display='block';document.getElementById('zpResult').innerHTML='📊 <b>'+u+'</b>\n'+from.toLocaleDateString('ru-RU')+' – '+to.toLocaleDateString('ru-RU')+'\n\nЧасов: '+th+'\nТоваров: '+tt+'\nЗП: '+(tz-totalPremium)+' ₽\nПремии: +'+totalPremium+' ₽\nШтрафы: -'+totalPunish+' ₽\n<b>Итого: '+(tz-totalPunish)+' ₽</b>';lastCalc={user:u,from:from.toISOString(),to:to.toISOString(),shifts:shifts.map(function(s){return s._id}),total:tz-totalPunish}})})})})}
function markPaid(){if(!lastCalc||!lastCalc.shifts.length){alert('Сначала нажми Посчитать!');return}if(!confirm('Оплачено?\n'+lastCalc.total+' ₽'))return;db.ref('payments').push({user:lastCalc.user,dateFrom:lastCalc.from,dateTo:lastCalc.to,total:lastCalc.total,timestamp:Date.now()});lastCalc.shifts.forEach(function(id){db.ref('shifts/'+id+'/paid').set(!0)});alert('✅');document.getElementById('zpResult').style.display='none';lastCalc=null}
function postAnnounce(){var t=document.getElementById('announceText').value.trim();if(!t)return;db.ref('announce').push({text:t,timestamp:Date.now()});document.getElementById('announceText').value='';alert('✅ Опубликовано!')}
function clearAnnounce(){if(!confirm('Удалить все объявления?'))return;db.ref('announce').remove();alert('✅ Удалено')}
function loadHall(){
  db.ref('shifts').once('value',function(snap){var users={};snap.forEach(function(c){var s=c.val();if(!users[s.user])users[s.user]={hours:0,tovar:0};users[s.user].hours+=s.hours||0;users[s.user].tovar+=s.tovar||0});var arr=[];for(var n in users)arr.push({name:n,hours:users[n].hours,tovar:users[n].tovar});arr.sort(function(a,b){return b.hours-a.hours});var hh='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';hh+='<div class="hall-item"><span class="hall-medal">'+m+'</span> '+arr[i].name+' — <b>'+arr[i].hours+'ч</b></div>'}document.getElementById('hallHours').innerHTML=hh||'Нет данных';arr.sort(function(a,b){return b.tovar-a.tovar});var ht='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';ht+='<div class="hall-item"><span class="hall-medal">'+m+'</span> '+arr[i].name+' — <b>'+arr[i].tovar+' шт</b></div>'}document.getElementById('hallTovar').innerHTML=ht||'Нет данных';arr.sort(function(a,b){return(b.hours+b.tovar)-(a.hours+a.tovar)});document.getElementById('hallBest').innerHTML=arr.length?'<div class="hall-item"><span class="hall-medal">🌟</span> '+arr[0].name+' — '+arr[0].hours+'ч / '+arr[0].tovar+' шт</div>':'Нет данных';db.ref('punishes').once('value',function(ps){var pusers={};ps.forEach(function(c){var p=c.val();if(!pusers[p.user])pusers[p.user]=0;pusers[p.user]+=p.amount||0});var parr=[];for(var n in pusers)parr.push({name:n,amount:pusers[n]});parr.sort(function(a,b){return b.amount-a.amount});document.getElementById('hallWorst').innerHTML=parr.length?'<div class="hall-item"><span class="hall-medal">💀</span> '+parr[0].name+' — <b>'+parr[0].amount+' ₽</b></div>':'Нет данных'});db.ref('premiums').once('value',function(prs){var prusers={};prs.forEach(function(c){var p=c.val();if(!prusers[p.user])prusers[p.user]=0;prusers[p.user]+=p.amount||0});var prarr=[];for(var n in prusers)prarr.push({name:n,amount:prusers[n]});prarr.sort(function(a,b){return b.amount-a.amount});document.getElementById('hallPremium').innerHTML=prarr.length?'<div class="hall-item"><span class="hall-medal">🎁</span> '+prarr[0].name+' — <b>'+prarr[0].amount+' ₽</b></div>':'Нет данных'})})}
function sendGodPhoto(){var files=document.getElementById('godChatPhoto').files;if(!files.length)return;var photos=[],count=Math.min(files.length,5);for(var i=0;i<count;i++){(function(file){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),mw=300,s=mw/img.width;c.width=mw;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);var thumb=c.toDataURL('image/jpeg',0.6);photos.push({full:e.target.result,thumb:thumb});if(photos.length===count){db.ref('chat').push({user:'👑 '+godName,text:'📷 '+count+' фото',photos:photos,timestamp:Date.now()})}};img.src=e.target.result};r.readAsDataURL(file)})(files[i])}document.getElementById('godChatPhoto').value=''}
function loadChat(){db.ref('chat').limitToLast(30).on('value',function(s){var h='';s.forEach(function(c){var m=c.val(),isCreator=m.user&&m.user.indexOf('🌌')===0,sn=(m.user||'').replace('📢 ','').replace('🌌 ',''),av=allUsers[sn]||allUsers[m.user]||'',ah=av?'<img src="'+av+'" style="width:24px;height:24px;border-radius:50%;object-fit:cover;margin-right:4px;vertical-align:middle">':'';if(isCreator){h+='<div class="chat-msg-creator">'}else{h+='<p>'}h+='<span class="del-msg" onclick="delChatMsg(\''+c.key+'\')">✕</span>'+ah+'<b class="'+(isCreator?'author':'')+'">'+(isCreator?'👑 ':'')+(m.user||'?')+':</b> '+(m.text||'');if(m.photo){h+='<br><img class="chat-img" src="'+(m.thumb||m.photo)+'" onclick="event.stopPropagation();viewFull(\''+m.photo+'\')">'}if(m.photos&&m.photos.length){var ft=typeof m.photos[0]==='object'?m.photos[0].thumb:m.photos[0],af=[];for(var i=0;i<m.photos.length;i++){af.push(typeof m.photos[i]==='object'?m.photos[i].full:m.photos[i])}var pd=JSON.stringify(af).replace(/'/g,"&#39;").replace(/"/g,'&quot;');h+='<br><img class="thumb" src="'+ft+'" onclick="event.stopPropagation();viewPack(\''+pd+'\')">';if(m.photos.length>1)h+=' <span style="font-size:11px;color:#999">+ ещё '+(m.photos.length-1)+'</span>'}h+=isCreator?'</div>':'</p>'});document.getElementById('chat').innerHTML=h;document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight})}
function viewFull(url){document.getElementById('photoViewerImg').src=url;document.getElementById('photoViewer').style.display='flex'}
function viewPack(pd){var ph=JSON.parse(pd.replace(/&quot;/g,'"').replace(/&#39;/g,"'")),v=document.getElementById('photoViewer'),im=document.getElementById('photoViewerImg'),idx=0;im.src=ph[0];v.style.display='flex';v.onclick=function(e){if(e.target===v){v.style.display='none';v.onclick=null}};im.onclick=function(e){e.stopPropagation();idx++;if(idx<ph.length)im.src=ph[idx];else v.style.display='none'}}
function delChatMsg(key){db.ref('chat/'+key).once('value',function(s){if(s.val()&&s.val().user&&s.val().user.indexOf('🌌')===0){alert('🚫 Сообщения Создателя нельзя удалить!');return}if(confirm('Удалить?')){db.ref('chat/'+key).remove()}})}
function sendChat(){var t=document.getElementById('chatInput').value.trim();if(!t)return;var mentions=t.match(/@(\S+)/g);if(mentions){db.ref('users').once('value',function(snap){var vkIds={};snap.forEach(function(c){vkIds[c.val().name]=c.val().vkId||''});if(godVkId)vkIds[godName]=godVkId;for(var i=0;i<mentions.length;i++){var name=mentions[i].replace('@','');var vkId=vkIds[name];if(vkId){sendVkNotify(vkId,'📢 Начальник упомянул вас в чате Ozon:\n'+t)}}})}db.ref('chat').push({user:'👑 '+godName,text:t,timestamp:Date.now()});document.getElementById('chatInput').value='';}
document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendChat()}});
