<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>График Ozon</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #0f3460;
  --green: #4CAF50;
  --red: #e94560;
  --text: #eee;
  --muted: #aaa;
  --gold: #f5c518;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; background: var(--bg); color: var(--text); padding: 10px; max-width: 420px; margin: 0 auto; min-height: 100vh; }
.card { background: var(--card); padding: 15px; border-radius: 14px; margin: 8px 0; }
input, button, select { width: 100%; padding: 12px; font-size: 15px; margin: 4px 0; border-radius: 10px; border: none; }
input, select { background: #1a1a2e; color: #fff; border: 1px solid #333; }
button { background: var(--green); color: #fff; font-weight: bold; cursor: pointer; }
button.gray { background: #555; }
button.blue { background: #2196F3; }
button.red { background: var(--red); }
button:disabled { opacity: 0.5; cursor: default; }
.avatar { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; }
.avatar-mini { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; margin-right: 4px; vertical-align: middle; }
.profile-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.status-badge { font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-left: 4px; }
.progress-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.tabs { display: flex; gap: 4px; margin: 10px 0; }
.tabs button { flex: 1; font-size: 11px; padding: 10px 4px; background: #333; color: #aaa; }
.tabs button.active { background: var(--green); color: #fff; }
.tab-icon { display: block; font-size: 18px; margin-bottom: 2px; }
#chat { max-height: 200px; overflow-y: auto; padding: 8px; border-radius: 10px; margin: 8px 0; background: #1a1a2e; }
#chat p { margin: 3px 0; font-size: 13px; position: relative; }
#chat .thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; cursor: pointer; margin: 2px; }
#chat .del-msg { position: absolute; top: 0; right: 0; background: var(--red); color: #fff; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; line-height: 16px; text-align: center; cursor: pointer; display: none; }
#chat p:hover .del-msg { display: block; }
.photo-preview { display: flex; gap: 4px; flex-wrap: wrap; }
.photo-preview img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
#photoViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
#photoViewer img { max-width: 95%; max-height: 90%; border-radius: 8px; }
.stat-card { background: #1a1a2e; padding: 8px; border-radius: 10px; margin: 4px 0; font-size: 13px; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 11px; }
.calendar div { padding: 6px; border-radius: 4px; }
.calendar .shift-day { background: var(--green); color: #fff; }
.calendar .today { border: 2px solid #2196F3; }
.calendar .header { font-weight: bold; background: #333; }
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:6px">
  <img src="https://raw.githubusercontent.com/painofkili/ozon/main/logo.png" style="height:36px" onerror="this.style.display='none'">
</div>

<div id="login">
  <input id="name" placeholder="Имя">
  <input id="pass" type="password" placeholder="Пароль">
  <button onclick="login()">Войти</button>
  <button onclick="showRegister()" class="blue">Регистрация</button>
</div>

<div id="registerCard" style="display:none">
  <div class="card">
    <h3 style="text-align:center">📝 Регистрация</h3>
    <input id="regName" placeholder="Имя">
    <input id="regPunkt" placeholder="Номер пункта (например 49)">
    <input id="regPass" type="password" placeholder="Пароль">
    <label>Аватарка</label>
    <input id="regAvatar" type="file" accept="image/*" onchange="previewRegAvatar()">
    <div id="regAvatarPreview" style="text-align:center;margin:4px 0"></div>
    <button onclick="register()">Зарегистрироваться</button>
    <button class="gray" onclick="document.getElementById('registerCard').style.display='none';document.getElementById('login').style.display='block';">Назад</button>
  </div>
</div>

<div id="settingsCard" style="display:none">
  <div class="card">
    <h3 style="text-align:center">⚙️ Настройки</h3>
    <input id="newName" placeholder="Новое имя">
    <input id="newPass" type="password" placeholder="Новый пароль">
    <select id="newPunkt"></select>
    <label>Новая аватарка</label>
    <input id="newAvatar" type="file" accept="image/*" onchange="previewNewAvatar()">
    <div id="newAvatarPreview" style="text-align:center;margin:4px 0"></div>
    <button onclick="saveSettings()">💾 Сохранить</button>
    <button class="gray" onclick="closeSettings()">Назад</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="profile-row">
    <img id="profileAvatar" class="avatar" src="" style="display:none">
    <div style="flex:1">
      <b><span id="uname"></span></b> <span id="statusBadge" class="status-badge"></span><br>
      <span style="font-size:11px;color:var(--muted)">Пункт <span id="upunkt"></span></span>
      <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
      <span id="progressText" style="font-size:10px;color:var(--muted)"></span>
    </div>
    <button class="gray" onclick="openSettings()" style="width:auto;padding:8px 12px">⚙️</button>
  </div>
  
  <div class="tabs">
    <button id="tabShift" class="active" onclick="showTab('shift')"><span class="tab-icon">🔵</span>Смена</button>
    <button id="tabStats" onclick="showTab('stats')"><span class="tab-icon">📊</span>Статистика</button>
    <button id="tabHistory" onclick="showTab('history')"><span class="tab-icon">💳</span>Выплаты</button>
  </div>
  
  <div id="shiftTab">
    <button id="startBtn" onclick="startShift()">🔵 НА СМЕНУ</button>
    <button id="onShiftBtn" class="blue" style="display:none" disabled>🟢 НА СМЕНЕ</button>
    <div id="shift" style="display:none">
      <input id="timeFrom" value="9" placeholder="Начало">
      <input id="timeTo" value="21" placeholder="Конец">
      <input id="tov" placeholder="Товары">
      <label>Фотоотчёт (до 5)</label>
      <input id="photos" type="file" accept="image/*" multiple onchange="previewPhotos()">
      <div id="photoPreviews" class="photo-preview"></div>
      <button class="red" onclick="endShift()">СО СМЕНЫ</button>
    </div>
    <button class="gray" onclick="logout()">Выйти</button>
    <div id="chat"></div>
    <div style="display:flex;gap:4px"><input id="msg" placeholder="Чат..."><button onclick="send()" style="width:auto">➤</button></div>
  </div>
  
  <div id="statsTab" style="display:none">
    <h4>📅 Календарь смен</h4>
    <div id="calHeader" style="text-align:center;margin-bottom:4px"></div>
    <div class="calendar" id="calendar"></div>
    <div class="stat-card" id="statsSummary">Загрузка...</div>
    <button class="red" onclick="clearMyShifts()">🗑 Очистить мои смены</button>
  </div>
  
  <div id="historyTab" style="display:none">
    <h4>💳 История выплат</h4>
    <div id="historyContent">Загрузка...</div>
  </div>
</div>

<div id="photoViewer" onclick="this.style.display='none'"><img id="photoViewerImg" src=""></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyA9jEn0r1oTnyx3ngFNCsOUyj4HGfCHAFo",
  authDomain: "ozon-grafik-4ad9f.firebaseapp.com",
  databaseURL: "https://ozon-grafik-4ad9f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ozon-grafik-4ad9f",
  storageBucket: "ozon-grafik-4ad9f.firebasestorage.app",
  messagingSenderId: "798009068634",
  appId: "1:798009068634:web:4b70eea3cce6c96f4f5c63"
});
var db = firebase.database();
var user = null, onShift = false, photoBase64 = [], regAvatarData = null, newAvatarData = null, allMyShifts = [], allUsers = {};

db.ref('users').on('value', function(s) { s.forEach(function(c) { allUsers[c.key] = c.val().avatar || ''; }); });

var STATUSES = [
  { name: '📦 Штрих', color: '#999', min: 0, max: 3 },
  { name: '🚚 ПВЗюк', color: '#cd7f32', min: 4, max: 7 },
  { name: '🏭 Пунктовой', color: '#2196F3', min: 8, max: 12 },
  { name: '🚀 Озонавт', color: '#4CAF50', min: 13, max: 20 },
  { name: '👑 Озоний', color: '#f5c518', min: 21, max: 999 }
];

function getStatus(totalShifts) {
  for (var i = STATUSES.length - 1; i >= 0; i--) {
    if (totalShifts >= STATUSES[i].min) return STATUSES[i];
  }
  return STATUSES[0];
}

function updateStatusUI() {
  var total = allMyShifts.length;
  var status = getStatus(total);
  var nextStatus = null;
  for (var i = 0; i < STATUSES.length; i++) {
    if (STATUSES[i].min > total) { nextStatus = STATUSES[i]; break; }
  }
  var badge = document.getElementById('statusBadge');
  badge.textContent = status.name;
  badge.style.background = status.color;
  badge.style.color = '#000';
  
  var progress = nextStatus ? ((total - status.min) / (nextStatus.min - status.min) * 100) : 100;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressFill').style.background = status.color;
  document.getElementById('progressText').textContent = nextStatus ? total + '/' + nextStatus.min + ' до ' + nextStatus.name : 'Максимальный уровень!';
}

function loadPunkts(cb) { db.ref('punkts').once('value', function(s) { var p = []; s.forEach(function(c) { p.push(c.key); }); if (cb) cb(p); }); }

var saved = localStorage.getItem('ozon_user');
if (saved) {
  user = JSON.parse(saved); user.punkt = user.punkt || '49';
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  updateProfileUI(); loadChat(); loadAllData(); loadHistory();
  if (localStorage.getItem('ozon_onShift') === '1') {
    onShift = true;
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('onShiftBtn').style.display = 'block';
    document.getElementById('shift').style.display = 'block';
  }
}

function updateProfileUI() {
  document.getElementById('uname').textContent = user.name;
  document.getElementById('upunkt').textContent = user.punkt || '?';
  if (user.avatar) { document.getElementById('profileAvatar').src = user.avatar; document.getElementById('profileAvatar').style.display = 'inline'; }
  updateStatusUI();
}

function showTab(tab) {
  document.getElementById('shiftTab').style.display = tab==='shift'?'block':'none';
  document.getElementById('statsTab').style.display = tab==='stats'?'block':'none';
  document.getElementById('historyTab').style.display = tab==='history'?'block':'none';
  ['tabShift','tabStats','tabHistory'].forEach(function(id) { document.getElementById(id).classList.remove('active'); });
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  if (tab==='stats') renderCalendar();
  if (tab==='history') loadHistory();
}

function loadAllData() {
  if (!user) return;
  db.ref('shifts').orderByChild('user').equalTo(user.name).on('value', function(s) {
    allMyShifts = []; s.forEach(function(c) { var x = c.val(); x._id = c.key; allMyShifts.push(x); });
    allMyShifts.sort(function(a,b) { return new Date(b.timestamp) - new Date(a.timestamp); });
    updateStatusUI();
    if (document.getElementById('statsTab').style.display !== 'none') renderCalendar();
  });
}

function renderCalendar() {
  var now = new Date(), year = now.getFullYear(), month = now.getMonth();
  var daysInMonth = new Date(year, month+1, 0).getDate(), firstDay = new Date(year, month, 0).getDay();
  document.getElementById('calHeader').innerHTML = '<b>' + now.toLocaleDateString('ru-RU', {month:'long',year:'numeric'}) + '</b>';
  var days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'], html = '';
  for (var i = 0; i < 7; i++) html += '<div class="header">' + days[i] + '</div>';
  for (var i = 0; i < firstDay; i++) html += '<div></div>';
  var shiftDates = {}; allMyShifts.forEach(function(s) { shiftDates[s.date] = (shiftDates[s.date]||0)+1; });
  var todayStr = now.toLocaleDateString('ru-RU');
  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = new Date(year, month, d).toLocaleDateString('ru-RU'), cls = '';
    if (shiftDates[dateStr]) cls = 'shift-day';
    if (dateStr === todayStr) cls += ' today';
    html += '<div class="' + cls + '">' + d + '</div>';
  }
  document.getElementById('calendar').innerHTML = html;
  var totalShifts = allMyShifts.length, totalHours = allMyShifts.reduce(function(s, x) { return s + (x.hours||0); }, 0), totalTovar = allMyShifts.reduce(function(s, x) { return s + (x.tovar||0); }, 0);
  document.getElementById('statsSummary').innerHTML = '📅 Смен: <b>' + totalShifts + '</b><br>⏱ Часов: <b>' + totalHours + '</b><br>📦 Товаров: <b>' + totalTovar + '</b>';
}

function loadHistory() {
  if (!user) return;
  db.ref('payments').orderByChild('user').equalTo(user.name).once('value', function(s) {
    var arr = []; s.forEach(function(c) { arr.push(c.val()); }); arr.sort(function(a,b) { return b.timestamp - a.timestamp; });
    document.getElementById('historyContent').innerHTML = arr.length ? arr.map(function(x) {
      return '<div class="stat-card">📅 ' + new Date(x.dateFrom).toLocaleDateString('ru-RU') + ' – ' + new Date(x.dateTo).toLocaleDateString('ru-RU') + '<br><b>' + x.total + ' ₽</b><br><small>' + new Date(x.timestamp).toLocaleString('ru-RU') + '</small></div>';
    }).join('') : '<p>Нет выплат</p>';
  });
}

function clearMyShifts() { if (!confirm('Удалить ВСЕ твои смены?')) return; db.ref('shifts').orderByChild('user').equalTo(user.name).once('value', function(s) { s.forEach(function(c) { db.ref('shifts/' + c.key).remove(); }); alert('✅ Удалено'); }); }

function openSettings() { document.getElementById('app').style.display='none'; document.getElementById('settingsCard').style.display='block'; document.getElementById('newAvatarPreview').innerHTML=''; newAvatarData = null; loadPunkts(function(punkts) { var s = document.getElementById('newPunkt'); s.innerHTML = '<option value="">Не менять</option>'; for (var i = 0; i < punkts.length; i++) { s.innerHTML += '<option value="' + punkts[i] + '">' + punkts[i] + '</option>'; } }); }
function closeSettings() { document.getElementById('settingsCard').style.display='none'; document.getElementById('app').style.display='block'; }

function saveSettings() {
  var nn = document.getElementById('newName').value.trim(), np = document.getElementById('newPass').value.trim(), npunkt = document.getElementById('newPunkt').value, oldKey = user.name, updates = {};
  if (nn && nn !== user.name) {
    updates['users/' + nn] = { name: nn, punkt: npunkt || user.punkt, password: user.password, bonus: user.bonus || 0, avatar: user.avatar || '' };
    if (newAvatarData) updates['users/' + nn + '/avatar'] = newAvatarData;
    if (np) updates['users/' + nn + '/password'] = np;
    updates['users/' + oldKey] = null; user.name = nn; if (npunkt) user.punkt = npunkt;
  } else {
    var uu = {}; if (np) uu.password = np; if (newAvatarData) uu.avatar = newAvatarData; if (npunkt) uu.punkt = npunkt;
    if (Object.keys(uu).length > 0) updates['users/' + oldKey] = uu; if (npunkt) user.punkt = npunkt;
  }
  if (Object.keys(updates).length === 0) { closeSettings(); return; }
  db.ref().update(updates, function(err) { if (err) { alert('Ошибка: ' + err); return; } if (np) user.password = np; if (newAvatarData) user.avatar = newAvatarData; localStorage.setItem('ozon_user', JSON.stringify(user)); updateProfileUI(); closeSettings(); alert('✅ Настройки сохранены!'); });
}

function previewRegAvatar() { var f = document.getElementById('regAvatar').files[0]; if (!f) return; var r = new FileReader(); r.onload = function(e) { regAvatarData = e.target.result; document.getElementById('regAvatarPreview').innerHTML = '<img class="avatar" src="' + regAvatarData + '">'; }; r.readAsDataURL(f); }
function previewNewAvatar() { var f = document.getElementById('newAvatar').files[0]; if (!f) return; var r = new FileReader(); r.onload = function(e) { newAvatarData = e.target.result; document.getElementById('newAvatarPreview').innerHTML = '<img class="avatar" src="' + newAvatarData + '">'; }; r.readAsDataURL(f); }
function showRegister() { document.getElementById('login').style.display='none'; document.getElementById('registerCard').style.display='block'; }

function login() { var n = document.getElementById('name').value.trim(), p = document.getElementById('pass').value.trim(); db.ref('users/' + n).once('value', function(s) { if (s.exists() && s.val().password === p) { user = s.val(); user.punkt = user.punkt || '49'; localStorage.setItem('ozon_user', JSON.stringify(user)); document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; updateProfileUI(); loadChat(); loadAllData(); loadHistory(); } else alert('Неверно!'); }); }
function register() { var n = document.getElementById('regName').value.trim(), pk = document.getElementById('regPunkt').value.trim(), p = document.getElementById('regPass').value.trim(); if (!n || !p || !pk) { alert('Заполни все поля!'); return; } db.ref('users/' + n).once('value', function(s) { if (s.exists()) { alert('Уже есть!'); return; } db.ref('users/' + n).set({ name: n, punkt: pk, password: p, bonus: 0, avatar: regAvatarData || '' }, function() { alert('✅ Зарегистрирован!'); document.getElementById('registerCard').style.display='none'; document.getElementById('login').style.display='block'; }); }); }

function previewPhotos() { photoBase64 = []; document.getElementById('photoPreviews').innerHTML = ''; var files = document.getElementById('photos').files; for (var i = 0; i < Math.min(files.length, 5); i++) { (function(file) { var reader = new FileReader(); reader.onload = function(e) { var img = new Image(); img.onload = function() { var canvas = document.createElement('canvas'), maxW = 200, scale = maxW / img.width; canvas.width = maxW; canvas.height = img.height * scale; canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height); var thumb = canvas.toDataURL('image/jpeg', 0.6); photoBase64.push({ full: e.target.result, thumb: thumb }); var preview = document.createElement('img'); preview.src = thumb; document.getElementById('photoPreviews').appendChild(preview); }; img.src = e.target.result; }; reader.readAsDataURL(file); })(files[i]); } }

function startShift() { onShift = true; localStorage.setItem('ozon_onShift', '1'); document.getElementById('startBtn').style.display='none'; document.getElementById('onShiftBtn').style.display='block'; document.getElementById('shift').style.display='block'; var time = new Date().toLocaleTimeString('ru-RU'); db.ref('chat').push({ user: '📢 ' + user.name, text: '🔵 Пункт ' + user.punkt + ' на смене! (' + time + ')', timestamp: Date.now() }); }

function endShift() {
  var tf = document.getElementById('timeFrom').value || '9', tt = document.getElementById('timeTo').value || '21', tv = parseInt(document.getElementById('tov').value)||0, hours = parseInt(tt) - parseInt(tf), time = new Date().toLocaleTimeString('ru-RU'), photos = photoBase64.slice(0, 5);
  db.ref('shifts/' + user.name + '_' + Date.now()).set({ user: user.name, punkt: user.punkt || '49', date: new Date().toLocaleDateString('ru-RU'), timeFrom: tf, timeTo: tt, hours: hours, tovar: tv, photos: photos, paid: false, timestamp: new Date().toISOString() });
  db.ref('chat').push({ user: '📢 ' + user.name, text: '🔴 Пункт ' + user.punkt + ' с ' + tf + ' до ' + tt + ', товаров: ' + tv, timestamp: Date.now(), photos: photos });
  
  // Проверяем повышение статуса
  var oldStatus = getStatus(allMyShifts.length);
  allMyShifts.push({ hours: hours, tovar: tv, date: new Date().toLocaleDateString('ru-RU') });
  var newStatus = getStatus(allMyShifts.length);
  if (oldStatus.name !== newStatus.name) {
    db.ref('chat').push({ user: '🎉 СИСТЕМА', text: user.name + ' получил статус ' + newStatus.name + '!', timestamp: Date.now() });
  }
  
  onShift = false; localStorage.removeItem('ozon_onShift'); document.getElementById('shift').style.display='none'; document.getElementById('onShiftBtn').style.display='none'; document.getElementById('startBtn').style.display='block';
  document.getElementById('tov').value=''; document.getElementById('photos').value=''; document.getElementById('photoPreviews').innerHTML=''; photoBase64 = [];
}

function logout() { user = null; onShift = false; localStorage.removeItem('ozon_user'); localStorage.removeItem('ozon_onShift'); document.getElementById('app').style.display='none'; document.getElementById('settingsCard').style.display='none'; document.getElementById('registerCard').style.display='none'; document.getElementById('login').style.display='block'; }

function loadChat() { db.ref('chat').limitToLast(30).on('value', function(s) { var h = ''; s.forEach(function(c) { var m = c.val(), canDel = (user && (m.user === user.name || m.user === '📢 ' + user.name)), senderName = (m.user||'').replace('📢 ',''), ava = allUsers[senderName] || '', avaHtml = ava ? '<img class="avatar-mini" src="' + ava + '">' : ''; h += '<p>' + (canDel ? '<span class="del-msg" onclick="delChatMsg(\'' + c.key + '\')">✕</span>' : '') + avaHtml + '<b>' + (m.user||'?') + ':</b> ' + (m.text||''); if (m.photos && m.photos.length) { var firstThumb = typeof m.photos[0] === 'object' ? m.photos[0].thumb : m.photos[0], allFull = []; for (var i = 0; i < m.photos.length; i++) { allFull.push(typeof m.photos[i] === 'object' ? m.photos[i].full : m.photos[i]); } var packData = JSON.stringify(allFull).replace(/'/g, "&#39;").replace(/"/g, '&quot;'); h += '<br><img class="thumb" src="' + firstThumb + '" onclick="event.stopPropagation();viewPack(\'' + packData + '\')">'; if (m.photos.length > 1) h += ' <span style="font-size:11px;color:#999">+ ещё ' + (m.photos.length-1) + '</span>'; } h += '</p>'; }); document.getElementById('chat').innerHTML = h; document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight; }); }
function viewPack(packData) { var photos = JSON.parse(packData.replace(/&quot;/g, '"').replace(/&#39;/g, "'")), viewer = document.getElementById('photoViewer'), img = document.getElementById('photoViewerImg'), idx = 0; img.src = photos[0]; viewer.style.display = 'flex'; viewer.onclick = function(e) { if (e.target === viewer) { viewer.style.display = 'none'; viewer.onclick = null; } }; img.onclick = function(e) { e.stopPropagation(); idx++; if (idx < photos.length) img.src = photos[idx]; else viewer.style.display = 'none'; }; }
function delChatMsg(key) { if (confirm('Удалить сообщение?')) { db.ref('chat/' + key).remove(); } }
function send() { var t = document.getElementById('msg').value.trim(); if (!t || !user) return; db.ref('chat').push({ user: user.name, text: t, timestamp: Date.now() }); document.getElementById('msg').value = ''; }
document.getElementById('msg').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); send(); } });
</script>
</body>
</html>
