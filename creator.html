<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ozon Создатель - Полная версия</title>
<style>
    /* Базовые стили */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Trebuchet MS', sans-serif; color: #eee; background: #0a0a1a; min-height: 100vh; overflow-x: hidden; }
    .bg { width: 100vw; height: 100vh; position: fixed; background: radial-gradient(circle at 50% 20%, #12092b 0%, #060612 70%); z-index: -1; }
    
    /* Контейнер */
    .app-container { display: flex; width: 100%; min-height: 100vh; }
    .main-content { flex: 1; padding: 16px; display: flex; flex-direction: column; }
    #chat { flex: 1; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
    
    /* Сайдбар */
    .avatar-carousel { width: 80px; background: rgba(10, 10, 25, 0.9); border-left: 1px solid rgba(138, 43, 226, 0.3); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 12px; }
    .avatar-item { width: 50px; height: 50px; border-radius: 50%; border: 2px solid transparent; position: relative; background: #1a1a3a; display: flex; align-items: center; justify-content: center; }
    .avatar-item.online { border-color: #4CAF50; }
    .online-dot { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background: #4CAF50; border-radius: 50%; border: 2px solid #0a0a1a; }
    
    /* Инпуты и кнопки */
    .input-area { display: flex; gap: 8px; }
    input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a3a; color: white; }
    .btn-gold { background: #d4af37; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; color: black; font-weight: bold; }
</style>
</head>
<body>
<div class="bg"></div>

<div id="login" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
    <h3>🌌 Вход Создателя</h3>
    <input id="creatorPass" type="password" placeholder="Пароль">
    <button class="btn-gold" onclick="creatorLogin()">Войти</button>
</div>

<div id="app" class="app-container" style="display:none">
    <div class="main-content">
        <div id="chat"></div>
        <div class="input-area">
            <input id="chatMsgInput" placeholder="Сообщение...">
            <button class="btn-gold" onclick="sendMsg()">➤</button>
        </div>
    </div>
    <div class="avatar-carousel" id="carouselInner"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
    firebase.initializeApp({apiKey:"AIzaSyA9jEn0r1oTnyx3ngFNCsOUyj4HGfCHAFo", databaseURL:"https://ozon-grafik-4ad9f-default-rtdb.europe-west1.firebasedatabase.app"});
    const db = firebase.database();
    let activeShifts = {}, allUserData = {}, _user = null;
    const msgSound = new Audio('https://actions.google.com/sounds/v1/notifications/piece_of_cake.ogg');

    function creatorLogin() {
        if(document.getElementById('creatorPass').value === '2706') {
            _user = {name:'Костя'};
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadData();
        }
    }

    function cleanOldMessages(days = 7) {
        const cutoff = Date.now() - (days * 24 * 60 * 60 * 1000);
        db.ref('chat').orderByChild('timestamp').endAt(cutoff).once('value', s => {
            s.forEach(c => { db.ref('chat/'+c.key).remove(); });
            alert('✅ Старые сообщения удалены!');
        });
    }

    function renderCarousel() {
        let h = '';
        Object.keys(allUserData).forEach(name => {
            let isOnline = !!activeShifts[name];
            h += `<div class="avatar-item ${isOnline ? 'online' : ''}">
                    ${name.charAt(0)}
                    ${isOnline ? '<div class="online-dot"></div>' : ''}
                  </div>`;
        });
        document.getElementById('carouselInner').innerHTML = h;
    }

    function loadData() {
        db.ref('users').on('value', s => { allUserData = s.val()||{}; renderCarousel(); });
        db.ref('activeShifts').on('value', s => { activeShifts = s.val()||{}; renderCarousel(); });
        db.ref('chat').limitToLast(20).on('child_added', s => {
            let m = s.val();
            document.getElementById('chat').innerHTML += `<div>${m.text}</div>`;
            if(m.timestamp > (Date.now() - 5000)) msgSound.play().catch(()=>{});
        });
    }

    function sendMsg() {
        let input = document.getElementById('chatMsgInput');
        db.ref('chat').push({text: input.value, timestamp: Date.now()});
        input.value = '';
    }
</script>
</body>
</html>
