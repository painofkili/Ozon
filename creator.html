<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ozon Создатель</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-y: auto; overflow-x: hidden; }
body { font-family: 'Trebuchet MS', Helvetica, sans-serif; color: #eee; padding: 0; max-width: 100%; margin: 0 auto; font-size: 16px; overflow: visible; }
.bg { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: #0a0a1a; z-index: -1000; }
.z-1,.z-2,.z-3 { position: absolute; width: 150vw; height: 150vw; left: -50vw; top: -50vw; transform-origin: center; transition: transform 0.1s ease-out; }
.tile { overflow: hidden; position: absolute; opacity: 0; top: 0; left: 0; width: 100%; height: 100%; background-repeat: repeat; background-size: 512px 512px; }
.top-left { background-image: url("https://raw.githubusercontent.com/painofkili/ozon/main/topleft.png"); }
.top-right { background-image: url("https://raw.githubusercontent.com/painofkili/ozon/main/topright.png"); }
.bottom-left { background-image: url("https://raw.githubusercontent.com/painofkili/ozon/main/bottomleft.png"); }
.bottom-right { background-image: url("https://raw.githubusercontent.com/painofkili/ozon/main/bottomright.png"); }
.animate-opacity { animation-name: slide-transparency; animation-iteration-count: infinite; }
.freq-5 { animation-duration: 5s; } .freq-6 { animation-duration: 6.33s; } .freq-7 { animation-duration: 7s; } .freq-8 { animation-duration: 8.88s; } .freq-9 { animation-duration: 9s; } .freq-10 { animation-duration: 10.17s; }
.delay-2 { animation-delay: 1.33s; } .delay-4 { animation-delay: 2.11s; }
@keyframes slide-transparency { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
.app-container { display: flex; width: 100%; min-height: 100vh; position: relative; z-index: 1; }
.main-content { flex: 1; padding: 12px 18px; overflow: visible; }
.avatar-carousel { width: 85px; min-width: 85px; background: rgba(22,33,62,0.9); border-left: 1px solid rgba(138,43,226,0.3); display: flex; align-items: center; justify-content: center; overflow: visible; position: sticky; top: 0; height: 100vh; perspective: 500px; padding: 30px 8px; z-index: 10; }
.avatar-carousel-inner { display: flex; flex-direction: column; align-items: center; transform-style: preserve-3d; padding: 0; }
.avatar-item { width: 48px; height: 48px; min-height: 48px; border-radius: 50%; margin: 6px 0; cursor: pointer; flex-shrink: 0; position: relative; transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s ease, box-shadow 0.3s ease; }
.avatar-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
.avatar-item .av-placeholder { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #444, #555); display: flex; align-items: center; justify-content: center; font-size: 17px; color: #ccc; font-weight: bold; }
.avatar-item.active .av-placeholder { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; }
.avatar-item.active { box-shadow: 0 0 35px rgba(138,43,226,1), 0 0 70px rgba(138,43,226,0.5); }
.avatar-item .online-dot { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; background: #4CAF50; border-radius: 50%; border: 2px solid #1a1a2e; box-shadow: 0 0 8px rgba(76,175,80,0.6); }
.mini-profile { position: fixed; right: 100px; top: 50%; transform: translateY(-50%); background: rgba(22,33,62,0.97); border: 1px solid rgba(138,43,226,0.5); border-radius: 16px; padding: 16px; width: 260px; z-index: 100; display: none; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
.mini-profile.show { display: block; animation: slideIn 0.2s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-50%) translateX(20px); } to { opacity: 1; transform: translateY(-50%) translateX(0); } }
.mini-profile .mp-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; margin: 0 auto; display: block; }
.mini-profile .mp-placeholder { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #444, #555); display: flex; align-items: center; justify-content: center; font-size: 22px; color: #ccc; margin: 0 auto; }
.mini-profile .mp-name { text-align: center; font-weight: bold; font-size: 16px; margin-top: 8px; }
.mini-profile .mp-status { text-align: center; font-size: 12px; padding: 4px 10px; border-radius: 10px; display: inline-block; margin: 4px auto; width: fit-content; background: #444; }
.mini-profile .mp-punkt { text-align: center; font-size: 12px; color: #aaa; }
.mini-profile .mp-calendar { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; text-align: center; font-size: 10px; margin-top: 8px; }
.mini-profile .mp-calendar div { padding: 4px; border-radius: 3px; }
.mini-profile .mp-calendar .mp-shift { background: #4CAF50; color: #fff; }
.mini-profile .mp-btn { width: 100%; padding: 10px; margin-top: 8px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; }
.card { background: rgba(22,33,62,0.85); padding: 16px; border-radius: 16px; margin: 8px 0; backdrop-filter: blur(10px); border: 1px solid rgba(138,43,226,0.2); overflow: visible; }
input, select, textarea { width: 100%; padding: 14px; font-size: 16px; margin: 4px 0; border-radius: 12px; border: 1px solid #444; background: rgba(26,26,46,0.8); color: #fff; }
button { border: none; font-weight: bold; cursor: pointer; border-radius: 12px; transition: all 0.2s; }
.btn-green { background: #4CAF50; color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
.btn-blue { background: #2196F3; color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
.btn-red { background: #e94560; color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
.btn-gray { background: #555; color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
.btn-gold { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
button:disabled { opacity: 0.5; cursor: default; }

/* АВАТАР + СПУТНИКИ — 3D ГАЛАКТИКА */
.avatar-wrapper { position: relative; display: inline-block; width: 64px; height: 64px; flex-shrink: 0; perspective: 200px; transform-style: preserve-3d; }
.avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; cursor: pointer; position: absolute; top: 0; left: 0; z-index: 3; display: block; box-shadow: 0 0 20px rgba(255,255,255,0.4), 0 0 40px rgba(245,197,24,0.3), 0 0 80px rgba(138,43,226,0.2); }
.avatar-creator { border-radius: 50%; overflow: hidden; }
.avatar-atmosphere { position: absolute; top: 0; left: 0; width: 64px; height: 64px; border-radius: 50%; overflow: hidden; pointer-events: none; z-index: 4; }
.avatar-atmosphere::before { content: ''; position: absolute; top: -8px; left: -8px; width: 80px; height: 80px; background: radial-gradient(ellipse at 30% 25%, rgba(138,43,226,0.5) 0%, transparent 35%), radial-gradient(ellipse at 65% 70%, rgba(0,191,255,0.4) 0%, transparent 30%), radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.25) 0%, transparent 45%), radial-gradient(ellipse at 20% 60%, rgba(245,197,24,0.3) 0%, transparent 40%); animation: atmosSpin 12s linear infinite; }
@keyframes atmosSpin { 100% { transform: rotate(360deg); } }
.avatar-halo { position: absolute; inset: -10px; border-radius: 50%; box-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 40px rgba(245,197,24,0.2), 0 0 70px rgba(138,43,226,0.15); animation: haloGlow 3s ease-in-out infinite; pointer-events: none; z-index: 0; }
@keyframes haloGlow { 0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 40px rgba(245,197,24,0.2), 0 0 70px rgba(138,43,226,0.15); } 50% { box-shadow: 0 0 30px rgba(255,255,255,0.5), 0 0 55px rgba(245,197,24,0.35), 0 0 90px rgba(138,43,226,0.25); } }
.avatar-orbit { position: absolute; top: 50%; left: 50%; border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; pointer-events: none; transform-style: preserve-3d; }
.orbit-front { z-index: 5; border-color: rgba(255,255,255,0.15); }
.avatar-moon { position: absolute; border-radius: 50%; }
.moon1 { width: 6px; height: 6px; top: -3px; left: 50%; margin-left: -3px; background: #fff; box-shadow: 0 0 6px #00BFFF, 0 0 14px #00BFFF, 0 0 22px rgba(0,191,255,0.8), 0 0 35px rgba(0,191,255,0.4); }
.moon2 { width: 5px; height: 5px; top: -2.5px; left: 50%; margin-left: -2.5px; background: #fff; box-shadow: 0 0 5px #8B00FF, 0 0 12px #8B00FF, 0 0 20px rgba(138,43,226,0.8), 0 0 30px rgba(138,43,226,0.4); }
.moon3 { width: 4px; height: 4px; top: -2px; left: 50%; margin-left: -2px; background: #fff; box-shadow: 0 0 4px #f5c518, 0 0 10px #f5c518, 0 0 18px rgba(245,197,24,0.8), 0 0 28px rgba(245,197,24,0.4); }
@keyframes spin1 { 100% { transform: translate(-50%, -50%) rotateX(8deg) rotate(360deg); } }
@keyframes spin2 { 100% { transform: translate(-50%, -50%) rotateX(-12deg) rotate(360deg); } }
@keyframes spin3 { 100% { transform: translate(-50%, -50%) rotateY(10deg) rotate(-360deg); } }
@keyframes zSwitch1 { 0%, 30% { z-index: 5; } 40%, 80% { z-index: 0; } 90%, 100% { z-index: 5; } }
@keyframes zSwitch2 { 0%, 25% { z-index: 0; } 35%, 75% { z-index: 5; } 85%, 100% { z-index: 0; } }

.avatar-mini { width: 42px !important; height: 42px !important; border-radius: 50%; object-fit: cover; margin-right: 6px; vertical-align: middle; }
.avatar-mini-creator { border: 2px solid #8B00FF; box-shadow: 0 0 12px rgba(138,43,226,0.6); }
.profile-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; overflow: visible; padding: 8px 0; }
.creator-badge { font-size: 13px; font-weight: bold; padding: 4px 12px; border-radius: 14px; background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; animation: badgePulse 2s ease-in-out infinite; display: inline-block; }
@keyframes badgePulse { 0%, 100% { box-shadow: 0 0 10px rgba(245,197,24,0.5); } 50% { box-shadow: 0 0 25px rgba(138,43,226,0.8); } }
.creator-name { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
.tabs { display: flex; gap: 5px; margin: 10px 0; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tabs button { width: 44px; height: 44px; display: flex; align-items: center; gap: 0.5rem; overflow: hidden; border-radius: 999px; transition: width .35s cubic-bezier(.22, 1, .36, 1), background .3s ease; background: #333; color: #aaa; border: none; cursor: pointer; padding: 0 10px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
.tabs button:hover { width: 115px; background: rgba(255,255,255,0.12); color: #fff; }
.tabs button.active { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; width: 115px; }
.tabs button .menu-icon { font-size: 18px; flex-shrink: 0; }
.tabs button .menu-label { opacity: 0; max-width: 0; transform: translateX(-6px); transition: opacity .2s ease, max-width .35s ease, transform .3s ease; }
.tabs button:hover .menu-label, .tabs button.active .menu-label { opacity: 1; max-width: 80px; transform: translateX(0); }
.chat-section { margin: 8px 0; }
.chat-header-bar { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 12px 16px; background: rgba(22,33,62,0.85); border-radius: 16px; border: 1px solid rgba(138,43,226,0.3); backdrop-filter: blur(10px); transition: all 0.3s; font-size: 15px; }
.chat-header-bar .chat-icon { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #f5c518, #8B00FF); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 0 15px rgba(138,43,226,0.4); transition: box-shadow 0.3s; }
.chat-header-bar.has-unread .chat-icon { animation: chatAlert 1s ease-in-out infinite; }
@keyframes chatAlert { 0%, 100% { box-shadow: 0 0 15px rgba(138,43,226,0.4); } 50% { box-shadow: 0 0 35px rgba(245,197,24,0.9), 0 0 50px rgba(138,43,226,0.7); } }
.chat-header-bar .chat-label { flex: 1; font-weight: bold; font-size: 15px; background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.chat-header-bar .chat-arrow { color: #aaa; font-size: 13px; transition: transform 0.3s; }
.chat-header-bar .chat-arrow.open { transform: rotate(180deg); }
.chat-header-bar .chat-badge { background: #e94560; color: #fff; border-radius: 50%; min-width: 22px; height: 22px; font-size: 11px; text-align: center; line-height: 22px; padding: 0 5px; }
.chat-back-btn { background: none; border: 1px solid rgba(138,43,226,0.4); color: #aaa; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; display: none; }
#chat { overflow-y: auto; overflow-x: visible; padding: 8px; border-radius: 12px; margin: 4px 0; background: rgba(22,33,62,0.75); font-size: 13px; transition: max-height 0.4s ease, padding 0.4s ease, margin 0.4s ease; max-height: 300px; border: 1px solid rgba(138,43,226,0.15); }
#chat.hidden { max-height: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important; margin-top: 0 !important; margin-bottom: 0 !important; overflow: hidden; opacity: 0; border: none; }
.chat-bubble-group { margin: 6px 0; display: flex; flex-direction: column; position: relative; overflow: visible; }
.chat-bubble-group.mine { align-items: flex-end; } .chat-bubble-group.other { align-items: flex-start; }
.chat-bubble { background: rgba(30,30,55,0.9); padding: 8px 12px; border-radius: 14px; margin: 2px 0; display: inline-block; max-width: 82%; font-size: 13px; word-break: break-word; border: 1px solid rgba(255,255,255,0.06); position: relative; overflow: visible; }
.chat-bubble.mine { background: rgba(76,175,80,0.25); border: 1px solid rgba(76,175,80,0.3); }
.chat-msg-creator { background: linear-gradient(135deg, rgba(245,197,24,0.2), rgba(138,43,226,0.25)); border: 1px solid rgba(138,43,226,0.5); padding: 8px 12px; border-radius: 12px; margin: 2px 0; animation: creatorBubblePulse 2.5s infinite alternate; display: inline-block; max-width: 82%; position: relative; overflow: visible; }
@keyframes creatorBubblePulse { 0% { box-shadow: 0 0 10px rgba(138,43,226,0.3); } 100% { box-shadow: 0 0 22px rgba(245,197,24,0.5); } }
.chat-msg-creator .author { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
#chat .chat-img { max-width: 220px; max-height: 160px; border-radius: 10px; margin: 5px 0; cursor: pointer; object-fit: cover; }
#chat .thumb { width: 75px; height: 75px; object-fit: cover; border-radius: 8px; cursor: pointer; margin: 3px; display: inline-block; }
#chat .photo-pack { display: flex; gap: 4px; flex-wrap: wrap; margin: 5px 0; }
.msg-menu-btn { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.5); color: #ccc; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 3; padding: 0; }
.chat-bubble:hover .msg-menu-btn, .chat-msg-creator:hover .msg-menu-btn { opacity: 1; }
.msg-menu-btn:hover { background: rgba(138,43,226,0.7); color: #fff; }
.msg-dropdown { position: absolute; top: 30px; right: 0; background: rgba(30,30,55,0.98); border-radius: 14px; padding: 6px 8px; display: none; gap: 5px; z-index: 10; border: 1px solid rgba(138,43,226,0.5); white-space: nowrap; box-shadow: 0 6px 20px rgba(0,0,0,0.6); }
.msg-dropdown.show { display: flex; }
.msg-dropdown button { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; font-size: 17px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); color: #fff; }
.msg-dropdown button:hover { transform: scale(1.15); }
.msg-dropdown .btn-like { color: #ff6b81; } .msg-dropdown .btn-like.liked { background: rgba(233,69,96,0.5); }
.msg-dropdown .btn-pin { color: #f5c518; } .msg-dropdown .btn-del { color: #ff4444; }
.like-indicator { font-size: 11px; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 2px 7px; display: none; margin-top: 3px; }
.like-indicator.has-likes { display: inline-block; }
.pinned { background: rgba(138,43,226,0.2); border: 1px solid rgba(138,43,226,0.4); padding: 10px 14px; margin: 6px 0; border-radius: 12px; font-size: 13px; overflow: visible; }
.announce-block { background: linear-gradient(135deg, rgba(255,249,196,0.15), rgba(255,224,130,0.1)); border: 1px solid rgba(245,197,24,0.4); color: #FFE082; padding: 12px; border-radius: 14px; margin-bottom: 6px; font-size: 13px; text-align: center; position: relative; }
.announce-del { position: absolute; top: 6px; right: 8px; background: #e94560; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; line-height: 20px; text-align: center; cursor: pointer; border: none; padding: 0; }
.thought-block { background: rgba(22,33,62,0.9); border: 1px solid rgba(138,43,226,0.5); color: #fff; padding: 12px; border-radius: 14px; margin-bottom: 6px; font-size: 14px; text-align: center; position: relative; backdrop-filter: blur(10px); box-shadow: 0 0 25px rgba(138,43,226,0.25), inset 0 0 20px rgba(138,43,226,0.05); }
.thought-block .thought-text { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; font-size: 15px; display: inline; }
.thought-emoji { font-size: 18px; }
.thought-del { position: absolute; top: 6px; right: 8px; background: #e94560; color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; line-height: 20px; text-align: center; cursor: pointer; border: none; padding: 0; }
.photo-preview { display: flex; gap: 4px; flex-wrap: wrap; }
.photo-preview img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
#photoViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
#photoViewer img { max-width: 95%; max-height: 90%; border-radius: 12px; }
.stat-card { background: rgba(22,33,62,0.75); padding: 12px 14px; border-radius: 12px; margin: 6px 0; font-size: 14px; border: 1px solid rgba(138,43,226,0.15); overflow: visible; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 12px; background: rgba(22,33,62,0.5); border-radius: 10px; padding: 6px; border: 1px solid rgba(138,43,226,0.15); }
.calendar div { padding: 6px; border-radius: 4px; }
.calendar .shift-day { background: #4CAF50; color: #fff; font-weight: bold; }
.calendar .today { border: 2px solid #2196F3; } .calendar .header { font-weight: bold; background: rgba(51,51,51,0.7); }
label { font-size: 12px; color: #aaa; display: block; margin-top: 4px; }
.notify-item { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; background: rgba(22,33,62,0.6); border-radius: 10px; margin: 5px 0; overflow: visible; }
.creator-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.creator-actions button { flex: 1; min-width: 90px; font-size: 13px; padding: 10px; }
.hall-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
.hall-medal { font-size: 22px; width: 30px; text-align: center; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 999; }
.modal-card { background: rgba(22,33,62,0.95); padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid rgba(138,43,226,0.3); }
.expiry-row { display: flex; gap: 8px; align-items: center; }
.expiry-row select, .expiry-row input { flex: 1; padding: 10px; font-size: 14px; }
.section-title { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; display: inline; }
.section-emoji { font-size: 20px; }
.announce-expiry, .thought-expiry { font-size: 10px; color: #aaa; margin-top: 4px; }
@media (max-width: 768px) {
  .avatar-wrapper { perspective: none; transform-style: flat; }
  .avatar-orbit { transform-style: flat; }
  .main-content { -webkit-transform: translateZ(0); transform: translateZ(0); padding: 8px 8px; }
  .app-container { -webkit-transform: translateZ(0); }
  #chat, .stat-card, .card { transform: translateZ(0); -webkit-transform: translateZ(0); }
  .main-content { max-width: 100% !important; }
}
@media (max-width: 500px) {
  .avatar-carousel { width: 50px; min-width: 50px; padding: 8px 1px; }
  .avatar-item { width: 36px; height: 36px; min-height: 36px; margin: 4px 0; }
  .mini-profile { right: 55px; width: 190px; padding: 12px; }
  .main-content { padding: 6px 8px; }
  .profile-row { gap: 8px; }
  .avatar-mini { width: 32px !important; height: 32px !important; }
  .tabs button { width: 38px; height: 38px; }
  .tabs button .menu-icon { font-size: 16px; }
  #chat { max-height: 200px; font-size: 12px; }
  .chat-bubble { max-width: 78%; font-size: 12px; }
  input, select, textarea, button { padding: 10px; font-size: 14px; }
}
@media (min-width: 800px) { .main-content { max-width: 600px; margin: 0 auto; } }
@media (min-width: 1200px) { .main-content { max-width: 700px; } }
</style>
</head>

var carouselIndex=0,carouselUsers=[],carouselEl,carouselInner;
function buildCarousel(){
  carouselUsers=[];var shown={};
  for(var name in allUserData){if(shown[name])continue;if(name==='Костя'&&_user&&_user.role==='creator')continue;shown[name]=true;carouselUsers.push(name)}
  if(godData&&godData.name&&!shown[godData.name]){shown[godData.name]=true;carouselUsers.push(godData.name);if(!allUserData[godData.name])allUserData[godData.name]={name:godData.name,avatar:godData.avatar||'',punkt:'',vkId:godData.vkId||''}}
  carouselUsers.sort();carouselEl=document.getElementById('avatarCarousel');
  carouselEl.innerHTML='<div class="avatar-carousel-inner" id="carouselInner"></div>';carouselInner=document.getElementById('carouselInner');
  if(_user){var myIdx=carouselUsers.indexOf(_user.name);if(myIdx>=0)carouselIndex=myIdx}
  renderCarousel();
  carouselEl.onwheel=function(e){e.preventDefault();if(carouselUsers.length===0)return;carouselIndex+=e.deltaY>0?1:-1;clampIndex();renderCarousel();updateProfileFromCarousel()};
  var tsY=0;carouselEl.addEventListener('touchstart',function(e){tsY=e.touches[0].clientY});
  carouselEl.addEventListener('touchmove',function(e){if(carouselUsers.length===0)return;var dy=tsY-e.touches[0].clientY;if(Math.abs(dy)>25){carouselIndex+=dy>0?1:-1;clampIndex();renderCarousel();updateProfileFromCarousel();tsY=e.touches[0].clientY}})
}
function clampIndex(){if(carouselIndex<0)carouselIndex=0;if(carouselIndex>=carouselUsers.length)carouselIndex=carouselUsers.length-1}
function renderCarousel(){
  if(!carouselInner||carouselUsers.length===0)return;var h='',total=carouselUsers.length,center=carouselIndex;
  for(var i=0;i<total;i++){
    var name=carouselUsers[i],d=allUserData[name]||{},av=d.avatar||'',isOnline=!!activeShifts[name];
    if(name===godData?.name)isOnline=false;var offset=i-center,absOff=Math.abs(offset);
    var scale=absOff===0?1.35:absOff===1?0.95:absOff===2?0.72:0.5,translateZ=absOff===0?35:absOff===1?5:absOff===2?-18:-35,opacity=absOff===0?1:absOff===1?0.75:absOff===2?0.5:0.25;
    h+='<div class="avatar-item'+(offset===0?' active':'')+(isOnline?' online':'')+'" style="transform:translateY('+(offset*50)+'px) translateZ('+translateZ+'px) scale('+scale+');opacity:'+opacity+';z-index:'+(10-absOff)+';" data-user="'+name.replace(/"/g,'&quot;')+'" onclick="selectProfile(\''+name.replace(/'/g,"\\'")+'\')">';
    if(av){h+='<img src="'+av+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">';h+='<div class="av-placeholder" style="display:none">'+name.charAt(0).toUpperCase()+'</div>'}
    else{h+='<div class="av-placeholder">'+name.charAt(0).toUpperCase()+'</div>'}
    if(isOnline)h+='<div class="online-dot"></div>';h+='</div>'
  }
  carouselInner.innerHTML=h
}
function updateProfileFromCarousel(){var name=carouselUsers[carouselIndex];if(!name)return;selectedProfile=name;if(name!==_user.name)showMiniProfile(name);else document.getElementById('miniProfile').classList.remove('show')}
function selectProfile(name,silent){if(!name)return;if(name===_user.name&&!silent)return;var idx=carouselUsers.indexOf(name);if(idx>=0){carouselIndex=idx;renderCarousel()}selectedProfile=name;if(name!==_user.name)showMiniProfile(name);else document.getElementById('miniProfile').classList.remove('show')}
function showMiniProfile(name){
  var d=allUserData[name];if(!d)return;var mp=document.getElementById('miniProfile'),avc=document.getElementById('mpAvatarContainer');
  if(d.avatar){avc.innerHTML='<img class="mp-avatar" src="'+d.avatar+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="mp-placeholder" style="display:none">'+name.charAt(0).toUpperCase()+'</div>'}
  else{avc.innerHTML='<div class="mp-placeholder">'+name.charAt(0).toUpperCase()+'</div>'}
  document.getElementById('mpName').textContent=name;
  if(name===godData?.name){document.getElementById('mpStatus').textContent='👑 Начальник';document.getElementById('mpPunkt').textContent='🔴 Не на смене';document.getElementById('mpCalendar').innerHTML=''}
  else{var sc=0;allMyShifts.forEach(function(s){if(s.user===name)sc++});
    var st=['📦 Штрих','🚚 ПВЗюк','🏭 Пунктовой','🚀 Озонавт','👑 Озоний'][sc>=21?4:sc>=13?3:sc>=8?2:sc>=4?1:0];
    document.getElementById('mpStatus').textContent=st;var isOnline=!!activeShifts[name];
    document.getElementById('mpPunkt').textContent=isOnline?'🟢 На смене (Пункт '+(d.punkt||'?')+')':'🔴 Выходной';
    var now=new Date(),calH='',startD=new Date(now.getTime()-13*86400000);
    for(var i=0;i<14;i++){var dd=new Date(startD.getTime()+i*86400000),ds=dd.toLocaleDateString('ru-RU'),isShift=false;allMyShifts.forEach(function(s){if(s.user===name&&s.date===ds)isShift=true});calH+='<div class="'+(isShift?'mp-shift':'')+'">'+dd.getDate()+'</div>'}
    document.getElementById('mpCalendar').innerHTML=calH
  }
  document.getElementById('mpChatBtn').style.display='block';mp.classList.add('show');clearTimeout(mp._timeout);mp._timeout=setTimeout(function(){mp.classList.remove('show')},5000)
}
function openPrivateChat(){if(!selectedProfile||selectedProfile===_user.name)return;privateChatWith=selectedProfile;document.getElementById('chatLabel').textContent='💬 '+selectedProfile;document.getElementById('chatBackBtn').style.display='inline-block';document.getElementById('miniProfile').classList.remove('show');loadChat()}

function showTab(tab){
  var tabs={shift:'shiftTab',stats:'statsTab',history:'historyTab',notify:'notifyTab',hall:'hallTab',creator:'creatorTab'};
  var active=document.querySelector('.tabs button.active');
  if(active&&active.id==='tab'+tab.charAt(0).toUpperCase()+tab.slice(1)){document.getElementById(tabs[tab]).style.display='none';active.classList.remove('active');return}

      document.getElementById('hallWorst').innerHTML=parr.length?'<div class="hall-item"><span class="hall-medal">💀</span> '+parr[0].name+' — <b>'+parr[0].amount+' ₽</b></div>':'Нет данных'
    });
    db.ref('premiums').once('value',function(prs){
      var prusers={};prs.forEach(function(c){var p=c.val();if(!prusers[p.user])prusers[p.user]=0;prusers[p.user]+=p.amount||0});
      var prarr=[];for(var n in prusers)prarr.push({name:n,amount:prusers[n]});
      prarr.sort(function(a,b){return b.amount-a.amount});
      document.getElementById('hallPremium').innerHTML=prarr.length?'<div class="hall-item"><span class="hall-medal">🎁</span> '+prarr[0].name+' — <b>'+prarr[0].amount+' ₽</b></div>':'Нет данных'
    })
  })
}
</script>
</body>
</html>
