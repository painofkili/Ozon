<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>График Ozon</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: Arial; 
  background: #1a1a2e url('https://raw.githubusercontent.com/painofkili/ozon/main/bg.jpg') center/cover fixed; 
  color: #eee; padding: 10px; max-width: 420px; margin: 0 auto; font-size: 16px;
}
body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,26,46,0.7); z-index: -1; }
.card { background: rgba(22,33,62,0.85); padding: 16px; border-radius: 14px; margin: 8px 0; backdrop-filter: blur(10px); }
input, select { width: 100%; padding: 14px; font-size: 16px; margin: 4px 0; border-radius: 10px; border: 1px solid #444; background: rgba(26,26,46,0.8); color: #fff; }
button { border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 12px; }
button:disabled { opacity: 0.5; cursor: default; }
.btn-green { background: #4CAF50; }
.btn-blue { background: #2196F3; }
.btn-red { background: #e94560; }
.btn-gray { background: #555; }
.avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; }
.avatar-mini { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; margin-right: 6px; vertical-align: middle; }
.profile-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.status-badge { font-size: 14px; font-weight: bold; padding: 4px 12px; border-radius: 12px; }
.progress-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.progress-text { font-size: 11px; color: #aaa; }
.tabs { display: flex; gap: 6px; margin: 10px 0; }
.tabs button { flex: 1; padding: 14px 8px; background: #333; font-size: 13px; color: #aaa; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.tabs button img { width: 32px; height: 32px; object-fit: contain; }
.tabs button.active { background: #4CAF50; color: #fff; }
#chat { max-height: 220px; overflow-y: auto; padding: 8px; border-radius: 10px; margin: 8px 0; background: rgba(26,26,46,0.8); font-size: 13px; }
#chat p { margin: 3px 0; position: relative; }
#chat .thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; cursor: pointer; margin: 2px; }
#chat .del-msg { position: absolute; top: 0; right: 0; background: #e94560; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 18px; text-align: center; cursor: pointer; display: none; }
#chat p:hover .del-msg { display: block; }
.photo-preview { display: flex; gap: 4px; flex-wrap: wrap; }
.photo-preview img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
#photoViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
#photoViewer img { max-width: 95%; max-height: 90%; border-radius: 10px; }
.stat-card { background: rgba(26,26,46,0.8); padding: 8px; border-radius: 10px; margin: 4px 0; font-size: 13px; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 12px; }
.calendar div { padding: 6px; border-radius: 4px; }
.calendar .shift-day { background: #4CAF50; color: #fff; font-weight: bold; }
.calendar .today { border: 2px solid #2196F3; }
.calendar .header { font-weight: bold; background: #333; }
label { font-size: 12px; color: #aaa; display: block; margin-top: 4px; }
</style>
</head>
<body>

<div id="login">
  <input id="name" placeholder="Имя">
  <input id="pass" type="password" placeholder="Пароль">
  <button class="btn-green" onclick="login()" style="padding:16px;display:flex;align-items:center;justify-content:center;gap:8px">
    <img src="https://raw.githubusercontent.com/painofkili/ozon/main/start.png" style="width:28px;height:28px;object-fit:contain">Войти
  </button>
  <button class="btn-blue" onclick="showRegister()" style="padding:16px">📝 Регистрация</button>
</div>

<div id="registerCard" style="display:none">
  <div class="card">
    <h3 style="text-align:center">📝 Регистрация</h3>
    <input id="regName" placeholder="Имя">
    <input id="regPunkt" placeholder="Номер пункта">
    <input id="regPass" type="password" placeholder="Пароль">
    <label>Аватарка</label>
    <input id="regAvatar" type="file" accept="image/*" onchange="previewRegAvatar()">
    <div id="regAvatarPreview" style="text-align:center;margin:4px 0"></div>
    <button class="btn-green" onclick="register()" style="padding:14px">✅ Зарегистрироваться</button>
    <button class="btn-gray" onclick="document.getElementById('registerCard').style.display='none';document.getElementById('login').style.display='block';" style="padding:14px">↩ Назад</button>
  </div>
</div>

<div id="settingsCard" style="display:none">
  <div class="card">
    <h3 style="text-align:center">⚙️ Настройки</h3>
    <input id="newName" placeholder="Новое имя">
    <input id="newPass" type="password" placeholder="Новый пароль">
    <select id="newPunkt"></select>
    <label>Новая аватарка</label>
    <input id="newAvatar" type="file" accept="image/*" onchange="previewNewAvatar()">
    <div id="newAvatarPreview" style="text-align:center;margin:4px 0"></div>
    <button class="btn-green" onclick="saveSettings()" style="padding:14px">💾 Сохранить</button>
    <button class="btn-gray" onclick="closeSettings()" style="padding:14px">↩ Назад</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="profile-row">
    <img id="profileAvatar" class="avatar" src="" style="display:none">
    <div style="flex:1">
      <b style="font-size:17px"><span id="uname"></span></b> 
      <span id="statusBadge" class="status-badge"></span><br>
      <span style="font-size:12px;color:#aaa">📍 Пункт <span id="upunkt"></span></span>
      <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
      <div id="progressText" class="progress-text"></div>
    </div>
    <button class="btn-gray" onclick="openSettings()" style="width:auto;padding:10px 14px">⚙️</button>
  </div>
  
  <div class="tabs">
  <button id="tabShift" class="active" onclick="showTab('shift')">
    <img src="https://raw.githubusercontent.com/painofkili/ozon/main/shift.png" style="width:100%;height:auto">
  </button>
  <button id="tabStats" onclick="showTab('stats')">
    <img src="https://raw.githubusercontent.com/painofkili/ozon/main/stats.png" style="width:100%;height:auto">
  </button>
  <button id="tabHistory" onclick="showTab('history')">
    <img src="https://raw.githubusercontent.com/painofkili/ozon/main/payments.png" style="width:100%;height:auto">
  </button>
</div>
  
  <div id="shiftTab">
    <button id="startBtn" class="btn-green" onclick="startShift()" style="padding:12px">
  <img src="https://raw.githubusercontent.com/painofkili/ozon/main/start.png" style="width:100%;height:auto">
</button>
    <button id="onShiftBtn" class="btn-blue" style="display:none;padding:18px" disabled>🟢 НА СМЕНЕ</button>
    <div id="shift" style="display:none">
      <input id="timeFrom" value="9" placeholder="Начало">
      <input id="timeTo" value="21" placeholder="Конец">
      <input id="tov" placeholder="Товары">
      <label>📸 Фотоотчёт (до 5)</label>
      <input id="photos" type="file" accept="image/*" multiple onchange="previewPhotos()">
      <div id="photoPreviews" class="photo-preview"></div>
      <button class="btn-red" onclick="endShift()" style="padding:16px">🔴 СО СМЕНЫ</button>
    </div>
    <button class="btn-gray" onclick="logout()" style="margin-top:8px;padding:12px">
  <img src="https://raw.githubusercontent.com/painofkili/ozon/main/exit.png" style="width:100%;height:auto">
</button>
    <div id="chat"></div>
    <div style="display:flex;gap:4px">
      <input id="msg" placeholder="Чат..." style="flex:1">
      <button class="btn-green" onclick="send()" style="width:auto;padding:10px">
  <img src="https://raw.githubusercontent.com/painofkili/ozon/main/send.png" style="height:44px;width:auto">
</button>
    </div>
  </div>
  
  <div id="statsTab" style="display:none">
    <h4 style="text-align:center">📅 Календарь смен</h4>
    <div id="calHeader" style="text-align:center;margin-bottom:4px"></div>
    <div class="calendar" id="calendar"></div>
    <div class="stat-card" id="statsSummary"></div>
    <button class="btn-red" onclick="clearMyShifts()" style="padding:14px">🗑 Очистить мои смены</button>
  </div>
  
  <div id="historyTab" style="display:none">
    <h4 style="text-align:center">💳 История выплат</h4>
    <div id="historyContent"></div>
  </div>
</div>

<div id="photoViewer" onclick="this.style.display='none'"><img id="photoViewerImg" src=""></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyA9jEn0r1oTnyx3ngFNCsOUyj4HGfCHAFo",
  authDomain: "ozon-grafik-4ad9f.firebaseapp.com",
  databaseURL: "https://ozon-grafik-4ad9f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ozon-grafik-4ad9f",
  storageBucket: "ozon-grafik-4ad9f.firebasestorage.app",
  messagingSenderId: "798009068634",
  appId: "1:798009068634:web:4b70eea3cce6c96f4f5c63"
});
var db = firebase.database();
var user = null, onShift = false, photoBase64 = [], regAvatarData = null, newAvatarData = null, allMyShifts = [], allUsers = {};

db.ref('users').on('value', function(s) { s.forEach(function(c) { allUsers[c.key] = c.val().avatar || ''; }); });

var STATUSES = [
  { name: '📦 Штрих', color: '#999', min: 0, max: 3 },
  { name: '🚚 ПВЗюк', color: '#cd7f32', min: 4, max: 7 },
  { name: '🏭 Пунктовой', color: '#2196F3', min: 8, max: 12 },
  { name: '🚀 Озонавт', color: '#4CAF50', min: 13, max: 20 },
  { name: '👑 Озоний', color: '#f5c518', min: 21, max: 999 }
];

function getStatus(n) { for (var i = STATUSES.length-1; i >= 0; i--) { if (n >= STATUSES[i].min) return STATUSES[i]; } return STATUSES[0]; }

function updateStatusUI() {
  var n = allMyShifts.length, st = getStatus(n), ns = null;
  for (var i = 0; i < STATUSES.length; i++) { if (STATUSES[i].min > n) { ns = STATUSES[i]; break; } }
  var b = document.getElementById('statusBadge'); b.textContent = st.name; b.style.background = st.color; b.style.color = '#000';
  var p = ns ? ((n - st.min) / (ns.min - st.min) * 100) : 100;
  document.getElementById('progressFill').style.width = p + '%'; document.getElementById('progressFill').style.background = st.color;
  document.getElementById('progressText').textContent = ns ? n + '/' + ns.min + ' до ' + ns.name : '⭐ Максимум!';
}

function loadPunkts(cb) { db.ref('punkts').once('value', function(s) { var p = []; s.forEach(function(c) { p.push(c.key); }); if (cb) cb(p); }); }

var saved = localStorage.getItem('ozon_user');
if (saved) {
  user = JSON.parse(saved); user.punkt = user.punkt || '49';
  document.getElementById('login').style.display = 'none'; document.getElementById('app').style.display = 'block';
  updateProfileUI(); loadChat(); loadAllData(); loadHistory();
  if (localStorage.getItem('ozon_onShift') === '1') {
    onShift = true; document.getElementById('startBtn').style.display='none'; document.getElementById('onShiftBtn').style.display='block'; document.getElementById('shift').style.display='block';
  }
}

function updateProfileUI() { document.getElementById('uname').textContent = user.name; document.getElementById('upunkt').textContent = user.punkt || '?'; if (user.avatar) { document.getElementById('profileAvatar').src = user.avatar; document.getElementById('profileAvatar').style.display = 'inline'; } updateStatusUI(); }

function showTab(tab) {
  document.getElementById('shiftTab').style.display = tab==='shift'?'block':'none';
  document.getElementById('statsTab').style.display = tab==='stats'?'block':'none';
  document.getElementById('historyTab').style.display = tab==='history'?'block':'none';
  ['tabShift','tabStats','tabHistory'].forEach(function(id) { document.getElementById(id).classList.remove('active'); });
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  if (tab==='stats') renderCalendar(); if (tab==='history') loadHistory();
}

function loadAllData() {
  if (!user) return;
  db.ref('shifts').orderByChild('user').equalTo(user.name).on('value', function(s) {
    allMyShifts = []; s.forEach(function(c) { var x = c.val(); x._id = c.key; allMyShifts.push(x); });
    allMyShifts.sort(function(a,b) { return new Date(b.timestamp) - new Date(a.timestamp); });
    updateStatusUI(); if (document.getElementById('statsTab').style.display !== 'none') renderCalendar();
  });
}

function renderCalendar() {
  var now = new Date(), y = now.getFullYear(), m = now.getMonth();
  var dim = new Date(y, m+1, 0).getDate(), fd = new Date(y, m, 0).getDay();
  document.getElementById('calHeader').innerHTML = '<b>' + now.toLocaleDateString('ru-RU', {month:'long',year:'numeric'}) + '</b>';
  var days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'], h = '';
  for (var i = 0; i < 7; i++) h += '<div class="header">' + days[i] + '</div>';
  for (var i = 0; i < fd; i++) h += '<div></div>';
  var sd = {}; allMyShifts.forEach(function(s) { sd[s.date] = (sd[s.date]||0)+1; });
  var ts = now.toLocaleDateString('ru-RU');
  for (var d = 1; d <= dim; d++) {
    var ds = new Date(y, m, d).toLocaleDateString('ru-RU'), cl = '';
    if (sd[ds]) cl = 'shift-day'; if (ds === ts) cl += ' today';
    h += '<div class="' + cl + '">' + d + '</div>';
  }
  document.getElementById('calendar').innerHTML = h;
  var tot = allMyShifts.length, th = allMyShifts.reduce(function(s, x) { return s + (x.hours||0); }, 0), tt = allMyShifts.reduce(function(s, x) { return s + (x.tovar||0); }, 0);
  document.getElementById('statsSummary').innerHTML = '📅 Смен: <b>' + tot + '</b><br>⏱ Часов: <b>' + th + '</b><br>📦 Товаров: <b>' + tt + '</b>';
}

function loadHistory() {
  if (!user) return;
  db.ref('payments').orderByChild('user').equalTo(user.name).once('value', function(s) {
    var a = []; s.forEach(function(c) { a.push(c.val()); }); a.sort(function(x,y) { return y.timestamp - x.timestamp; });
    document.getElementById('historyContent').innerHTML = a.length ? a.map(function(x) {
      return '<div class="stat-card">📅 ' + new Date(x.dateFrom).toLocaleDateString('ru-RU') + ' – ' + new Date(x.dateTo).toLocaleDateString('ru-RU') + '<br><b>' + x.total + ' ₽</b><br><small>' + new Date(x.timestamp).toLocaleString('ru-RU') + '</small></div>';
    }).join('') : '<p>Нет выплат</p>';
  });
}

function clearMyShifts() { if (!confirm('Удалить все смены?')) return; db.ref('shifts').orderByChild('user').equalTo(user.name).once('value', function(s) { s.forEach(function(c) { db.ref('shifts/' + c.key).remove(); }); alert('✅'); }); }

function openSettings() { document.getElementById('app').style.display='none'; document.getElementById('settingsCard').style.display='block'; document.getElementById('newAvatarPreview').innerHTML=''; newAvatarData = null; loadPunkts(function(p) { var s = document.getElementById('newPunkt'); s.innerHTML = '<option value="">Не менять</option>'; for (var i = 0; i < p.length; i++) { s.innerHTML += '<option value="' + p[i] + '">' + p[i] + '</option>'; } }); }
function closeSettings() { document.getElementById('settingsCard').style.display='none'; document.getElementById('app').style.display='block'; }

function saveSettings() {
  var nn = document.getElementById('newName').value.trim(), np = document.getElementById('newPass').value.trim(), npu = document.getElementById('newPunkt').value, ok = user.name, up = {};
  if (nn && nn !== user.name) { up['users/' + nn] = { name: nn, punkt: npu || user.punkt, password: user.password, bonus: user.bonus || 0, avatar: user.avatar || '' }; if (newAvatarData) up['users/' + nn + '/avatar'] = newAvatarData; if (np) up['users/' + nn + '/password'] = np; up['users/' + ok] = null; user.name = nn; if (npu) user.punkt = npu; }
  else { var uu = {}; if (np) uu.password = np; if (newAvatarData) uu.avatar = newAvatarData; if (npu) uu.punkt = npu; if (Object.keys(uu).length > 0) up['users/' + ok] = uu; if (npu) user.punkt = npu; }
  if (Object.keys(up).length === 0) { closeSettings(); return; }
  db.ref().update(up, function(err) { if (err) { alert('Ошибка'); return; } if (np) user.password = np; if (newAvatarData) user.avatar = newAvatarData; localStorage.setItem('ozon_user', JSON.stringify(user)); updateProfileUI(); closeSettings(); alert('✅'); });
}

function previewRegAvatar() { var f = document.getElementById('regAvatar').files[0]; if (!f) return; var r = new FileReader(); r.onload = function(e) { regAvatarData = e.target.result; document.getElementById('regAvatarPreview').innerHTML = '<img class="avatar" src="' + regAvatarData + '">'; }; r.readAsDataURL(f); }
function previewNewAvatar() { var f = document.getElementById('newAvatar').files[0]; if (!f) return; var r = new FileReader(); r.onload = function(e) { newAvatarData = e.target.result; document.getElementById('newAvatarPreview').innerHTML = '<img class="avatar" src="' + newAvatarData + '">'; }; r.readAsDataURL(f); }
function showRegister() { document.getElementById('login').style.display='none'; document.getElementById('registerCard').style.display='block'; }

function login() { var n = document.getElementById('name').value.trim(), p = document.getElementById('pass').value.trim(); db.ref('users/' + n).once('value', function(s) { if (s.exists() && s.val().password === p) { user = s.val(); user.punkt = user.punkt || '49'; localStorage.setItem('ozon_user', JSON.stringify(user)); document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; updateProfileUI(); loadChat(); loadAllData(); loadHistory(); } else alert('Неверно!'); }); }
function register() { var n = document.getElementById('regName').value.trim(), pk = document.getElementById('regPunkt').value.trim(), p = document.getElementById('regPass').value.trim(); if (!n || !p || !pk) { alert('Заполни все поля!'); return; } db.ref('users/' + n).once('value', function(s) { if (s.exists()) { alert('Уже есть!'); return; } db.ref('users/' + n).set({ name: n, punkt: pk, password: p, bonus: 0, avatar: regAvatarData || '' }, function() { alert('✅'); document.getElementById('registerCard').style.display='none'; document.getElementById('login').style.display='block'; }); }); }

function previewPhotos() { photoBase64 = []; document.getElementById('photoPreviews').innerHTML = ''; var files = document.getElementById('photos').files; for (var i = 0; i < Math.min(files.length, 5); i++) { (function(file) { var r = new FileReader(); r.onload = function(e) { var img = new Image(); img.onload = function() { var c = document.createElement('canvas'), mw = 200, s = mw / img.width; c.width = mw; c.height = img.height * s; c.getContext('2d').drawImage(img, 0, 0, c.width, c.height); var thumb = c.toDataURL('image/jpeg', 0.6); photoBase64.push({ full: e.target.result, thumb: thumb }); var pv = document.createElement('img'); pv.src = thumb; document.getElementById('photoPreviews').appendChild(pv); }; img.src = e.target.result; }; r.readAsDataURL(file); })(files[i]); } }

function startShift() { onShift = true; localStorage.setItem('ozon_onShift', '1'); document.getElementById('startBtn').style.display='none'; document.getElementById('onShiftBtn').style.display='block'; document.getElementById('shift').style.display='block'; var t = new Date().toLocaleTimeString('ru-RU'); db.ref('chat').push({ user: '📢 ' + user.name, text: '🔵 Пункт ' + user.punkt + ' на смене! (' + t + ')', timestamp: Date.now() }); }

function endShift() {
  var tf = document.getElementById('timeFrom').value || '9', tt = document.getElementById('timeTo').value || '21', tv = parseInt(document.getElementById('tov').value)||0, hh = parseInt(tt)-parseInt(tf), t = new Date().toLocaleTimeString('ru-RU'), ph = photoBase64.slice(0, 5);
  db.ref('shifts/' + user.name + '_' + Date.now()).set({ user: user.name, punkt: user.punkt||'49', date: new Date().toLocaleDateString('ru-RU'), timeFrom: tf, timeTo: tt, hours: hh, tovar: tv, photos: ph, paid: false, timestamp: new Date().toISOString() });
  db.ref('chat').push({ user: '📢 ' + user.name, text: '🔴 Пункт ' + user.punkt + ' с ' + tf + ' до ' + tt + ', товаров: ' + tv, timestamp: Date.now(), photos: ph });
  var os = getStatus(allMyShifts.length);
  var ns = getStatus(allMyShifts.length + 1);
  if (os.name !== ns.name) { db.ref('chat').push({ user: '🎉 СИСТЕМА', text: user.name + ' получил статус ' + ns.name + '!', timestamp: Date.now() }); }
  onShift = false; localStorage.removeItem('ozon_onShift'); document.getElementById('shift').style.display='none'; document.getElementById('onShiftBtn').style.display='none'; document.getElementById('startBtn').style.display='block';
  document.getElementById('tov').value=''; document.getElementById('photos').value=''; document.getElementById('photoPreviews').innerHTML=''; photoBase64 = [];
}

function logout() { user = null; onShift = false; localStorage.removeItem('ozon_user'); localStorage.removeItem('ozon_onShift'); document.getElementById('app').style.display='none'; document.getElementById('settingsCard').style.display='none'; document.getElementById('registerCard').style.display='none'; document.getElementById('login').style.display='block'; }

function loadChat() { db.ref('chat').limitToLast(30).on('value', function(s) { var h = ''; s.forEach(function(c) { var m = c.val(), cd = (user && (m.user === user.name || m.user === '📢 ' + user.name)), sn = (m.user||'').replace('📢 ',''), av = allUsers[sn] || '', ah = av ? '<img class="avatar-mini" src="' + av + '">' : ''; h += '<p>' + (cd ? '<span class="del-msg" onclick="delChatMsg(\'' + c.key + '\')">✕</span>' : '') + ah + '<b>' + (m.user||'?') + ':</b> ' + (m.text||''); if (m.photos && m.photos.length) { var ft = typeof m.photos[0] === 'object' ? m.photos[0].thumb : m.photos[0], af = []; for (var i = 0; i < m.photos.length; i++) { af.push(typeof m.photos[i] === 'object' ? m.photos[i].full : m.photos[i]); } var pd = JSON.stringify(af).replace(/'/g, "&#39;").replace(/"/g, '&quot;'); h += '<br><img class="thumb" src="' + ft + '" onclick="event.stopPropagation();viewPack(\'' + pd + '\')">'; if (m.photos.length > 1) h += ' <span style="font-size:11px;color:#999">+ ещё ' + (m.photos.length-1) + '</span>'; } h += '</p>'; }); document.getElementById('chat').innerHTML = h; document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight; }); }
function viewPack(pd) { var ph = JSON.parse(pd.replace(/&quot;/g, '"').replace(/&#39;/g, "'")), v = document.getElementById('photoViewer'), im = document.getElementById('photoViewerImg'), idx = 0; im.src = ph[0]; v.style.display = 'flex'; v.onclick = function(e) { if (e.target === v) { v.style.display = 'none'; v.onclick = null; } }; im.onclick = function(e) { e.stopPropagation(); idx++; if (idx < ph.length) im.src = ph[idx]; else v.style.display = 'none'; }; }
function delChatMsg(key) { if (confirm('Удалить?')) { db.ref('chat/' + key).remove(); } }
function send() { var t = document.getElementById('msg').value.trim(); if (!t || !user) return; db.ref('chat').push({ user: user.name, text: t, timestamp: Date.now() }); document.getElementById('msg').value = ''; }
document.getElementById('msg').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); send(); } });
</script>
</body>
</html>
