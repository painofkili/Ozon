<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;height:100%;width:100%;position:fixed;top:0;left:0;background:#0a0a1a}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#eee;font-size:16px;display:flex;flex-direction:column}
:root{--accent:#7c3aed;--accent2:#a855f7;--gold:#f5c518;--bg2:rgba(20,20,50,0.85);--bg3:rgba(30,30,60,0.7);--border:rgba(100,80,220,0.25);--text:#e8e8ff;--muted:#888;--green:#22c55e;--red:#ef4444}
body.theme-creator{--accent:#7c3aed;--accent2:#00d4ff;--gold:#f5c518}
body.theme-god{--accent:#b8860b;--accent2:#ffd700;--gold:#ffd700}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px);padding:16px;margin:6px 0}
input,select,textarea{width:100%;padding:12px 14px;font-size:15px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,25,0.6);color:#fff;outline:none;transition:0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,0.15)}
button{border:none;font-weight:bold;cursor:pointer;border-radius:12px;transition:all .2s;padding:12px 16px;font-size:15px}
button:hover{transform:scale(1.02);filter:brightness(1.1)}
button:active{transform:scale(0.95)}
.btn-green{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;width:100%}
.btn-red{background:linear-gradient(135deg,#e94560,#c62828);color:#fff;width:100%}
.btn-gray{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1);width:100%}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;width:100%}
.btn-blue{background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff;width:100%}
.btn-purple{background:#9C27B0;color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;width:auto}
.btn-off{background:rgba(100,100,100,0.3);color:#aaa;border:1px solid rgba(255,255,255,0.1);width:100%}
.btn-off.active{border-color:var(--red);color:#fff;background:rgba(239,68,68,0.2)}
.app-container{display:flex;width:100%;height:100%;position:relative;z-index:1;overflow:hidden}
.main-content{width:100%;max-width:100%;padding:12px 16px;display:flex;flex-direction:column;height:100%;gap:6px;transition:0.3s}
.profile-card{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px);flex-shrink:0;transition:0.2s}
.badge{font-size:12px;font-weight:bold;padding:4px 12px;border-radius:20px;display:inline-block}
.badge-creator{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.badge-god{background:linear-gradient(135deg,#FFD700,#FF4500);color:#fff}
.badge-manager{background:#2d6a4f;color:#95d5b2}
.name-creator{background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-god{background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-manager{color:#eee;font-weight:bold}
.tabs{display:flex;gap:6px;margin:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tabs button{height:44px;display:flex;align-items:center;gap:8px;border-radius:99px;background:rgba(255,255,255,0.06);color:#aaa;border:1px solid transparent;padding:0 16px;font-size:13px;white-space:nowrap;flex-shrink:0;transition:0.3s;min-width:44px;overflow:hidden}
.tabs button .tab-label{opacity:0;max-width:0;transition:all 0.3s}
.tabs button:hover .tab-label,.tabs button.active .tab-label{opacity:1;max-width:80px}
.tabs button.active{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;box-shadow:0 4px 15px rgba(138,43,226,0.3)}
.chat-section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;margin:0;transition:0.3s cubic-bezier(0.25, 0.8, 0.25, 1)}
.chat-header-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);cursor:pointer;flex-shrink:0}
.chat-header-bar:hover{background:rgba(0,0,0,0.3)}
#chat{flex:1;overflow-y:auto;padding:10px 14px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;background:transparent;display:flex;flex-direction:column;gap:2px;transition:opacity 0.2s}
.chat-input-wrapper{position:relative;width:100%;margin-top:auto;flex-shrink:0;transition:0.3s cubic-bezier(0.25, 0.8, 0.25, 1);opacity:1;transform:translateY(0)}
.chat-input-bar{width:100%;background:var(--bg2);backdrop-filter:blur(16px);padding:8px 12px;display:flex;gap:8px;align-items:center;z-index:100;border-top:1px solid var(--border);border-radius:16px}
.input-wrapper{position:relative;flex:1;display:flex;align-items:center;background:rgba(0,0,0,0.3);border-radius:20px;border:1px solid rgba(255,255,255,0.05)}
.input-wrapper input{background:transparent;border:none;padding:10px 40px 10px 16px;font-size:15px;width:100%}
#sendMsgBtn,#chatPhotoBtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);color:#aaa}
#sendMsgBtn{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;border:none}
.avatar-carousel{width:110px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:-130px;height:100%;padding:50px 0 20px;z-index:1000;backdrop-filter:blur(20px);transition:right 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:-10px 0 30px rgba(0,0,0,0.5)}
.avatar-carousel.open{right:0}
.avatar-carousel-inner{display:flex;flex-direction:column;align-items:center;width:100%;gap:12px;overflow-y:auto;height:100%;padding:10px 0;scrollbar-width:none;padding-bottom:30px}
.avatar-carousel-inner::-webkit-scrollbar{display:none}
.sidebar-close-btn{position:absolute;top:15px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#eee;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;z-index:10;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
.btn-sidebar-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);width:36px;height:50px;background:var(--bg2);border:1px solid var(--border);border-right:none;border-radius:14px 0 0 14px;color:#fff;font-size:14px;cursor:pointer;z-index:999;backdrop-filter:blur(8px)}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;pointer-events:none;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:12px 20px;border-radius:16px;background:var(--bg2);border:1px solid var(--accent);color:#fff;font-size:14px;box-shadow:0 5px 20px rgba(0,0,0,0.6);transform:translateY(-20px);opacity:0;transition:all 0.3s;text-align:center;backdrop-filter:blur(10px)}
.toast-msg.error{border-color:var(--red)}
.toast-msg.show{transform:translateY(0);opacity:1}
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:20px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;backdrop-filter:blur(20px)}
#settingsPanel{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px}
.settings-tab{flex:1;padding:8px;border-radius:10px;font-size:13px;background:transparent;color:var(--muted);border:none;cursor:pointer;transition:0.2s}
.settings-tab.active{background:var(--accent);color:#fff}
.avatar-wrap{position:relative;width:76px;height:76px;flex-shrink:0;border-radius:50%;cursor:pointer;z-index:10}
.avatar-wrap:hover{transform:scale(1.05); transition:0.2s;}
/* ВАЖНО: pointer-events:none здесь позволяет кликать "сквозь" канвас рамки,
  чтобы срабатывал клик по самой обертке .avatar-wrap 
*/
#mainAvatarCanvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:130px;height:130px;pointer-events:none;z-index:2}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media(min-width:1024px){
  .app-container{flex-direction:row;align-items:stretch;justify-content:center;gap:16px;padding:12px}
  .left-column{width:380px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow-y:auto;height:100%}
  .right-column{flex:1;display:flex;flex-direction:column;gap:6px;height:100%;min-width:0;overflow:hidden}
  .right-column .chat-section{flex:1}
  .right-column .chat-input-wrapper{flex-shrink:0}
  .main-content{flex-direction:row;padding:0;gap:16px;max-width:100%}
  #tabContentContainer{flex:1;overflow-y:auto}
}

@media(max-width:1023px){
  .main-content{flex-direction:column;padding:8px;height:100%;}
  .left-column{flex:0 0 42%; display:flex;flex-direction:column;margin-bottom:4px; transition:0.3s cubic-bezier(0.25, 0.8, 0.25, 1);}
  .right-column{flex:1 1 0%;display:flex;flex-direction:column;min-height:0; transition:0.3s cubic-bezier(0.25, 0.8, 0.25, 1);}
  #tabContentContainer{flex:1;overflow-y:auto;}
  .chat-input-wrapper{position:relative;width:100%;max-width:100%;z-index:100;flex-shrink:0;}
}
</style>
</head>
<body>
<div id="toastContainer" class="toast-container"></div>

<div id="avatarPreviewModal" style="display:none;position:fixed;inset:0;z-index:11000;background:rgba(0,0,0,0.85);backdrop-filter:blur(15px);align-items:center;justify-content:center;flex-direction:column;">
  <button id="closeAvatarPreview" style="position:absolute;top:max(30px, env(safe-area-inset-top));right:30px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;transition:0.2s;z-index:12000;display:flex;align-items:center;justify-content:center;">✕</button>
  <canvas id="previewAvatarCanvas" width="600" height="600" style="width:100%;max-width:350px;aspect-ratio:1/1;margin:0 auto;display:block;"></canvas>
  <div id="previewAvatarName" style="margin-top:10px;font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></div>
</div>

<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;height:100%;padding:20px;">
  <div style="max-width:380px;width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:14px;">
    <div style="text-align:center;font-size:24px;font-weight:800;background:linear-gradient(135deg,#f5c518,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Ozon Hub</div>
    <div style="display:flex;background:rgba(0,0,0,0.3);border-radius:12px;padding:4px;">
      <button id="tabLogin" style="flex:1;padding:10px;border:none;border-radius:10px;background:#7c3aed;font-size:15px;font-weight:600;color:#fff;">Вход</button>
      <button id="tabRegister" style="flex:1;padding:10px;border:none;border-radius:10px;background:transparent;font-size:15px;font-weight:600;color:#6a7a94;">Регистрация</button>
    </div>
    <div id="loginFields" style="display:flex;flex-direction:column;gap:12px;">
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
      <input id="loginPass" type="password" placeholder="Пароль" autocomplete="current-password">
      <button class="btn-gold" id="loginBtn">Войти</button>
    </div>
    <div id="registerFields" style="display:none;flex-direction:column;gap:12px;">
      <input id="regName" placeholder="Имя" autocomplete="name">
      <input id="regEmail" type="email" placeholder="Email" autocomplete="email">
      <input id="regPass" type="password" placeholder="Пароль (мин. 4 символа)" autocomplete="new-password">
      <button class="btn-gold" id="registerBtn">Зарегистрироваться</button>
    </div>
    <div id="authError" style="color:var(--red);font-size:13px;text-align:center;display:none;"></div>
  </div>
</div>

<div id="app" class="app-container" style="display:none">
  <button class="btn-sidebar-toggle" id="sidebarToggleBtn">👥</button>
  
  <div class="main-content" id="mainContent">
    <div class="left-column" id="leftColumn">
      
      <div class="profile-card" id="mainProfileCard">
        <div class="avatar-wrap" id="avatarTriggerBtn">
          <canvas id="mainAvatarCanvas" width="600" height="600"></canvas>
        </div>
        <div style="flex:1">
          <b id="creatorNameWrapper" class="name-creator" style="font-size:18px;"><span id="uname">Имя Пользователя</span></b><br>
          <span style="font-size:12px;color:#aaa;" id="punktLabel">Роль: Менеджер</span>
        </div>
        <button class="btn-gray" id="settingsBtn" style="width:auto;padding:8px 14px;font-size:13px;">⚙️</button>
      </div>
      
    </div>
    
    <div class="right-column" id="rightColumn">
      <div class="chat-section" id="chatSection">
        <div class="chat-header-bar" id="chatHeader">
          <span style="font-size:18px;">💬</span>
          <span id="chatLabel" style="flex:1;font-weight:bold;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Общий чат</span>
        </div>
        <div id="chat">
            <div style="text-align:center; color: var(--muted); margin-top:20px;">Добро пожаловать в Ozon Hub!</div>
        </div>
      </div>
      
      <div class="chat-input-wrapper" id="chatInputWrapper">
        <div class="chat-input-bar" id="chatInputBar">
          <div class="input-wrapper">
            <input id="chatMsgInput" placeholder="Введите сообщение...">
          </div>
          <button id="sendMsgBtn">➤</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="avatar-carousel" id="avatarCarousel">
    <button class="sidebar-close-btn" id="sidebarCloseBtn">✕</button>
    <div class="avatar-carousel-inner" id="carouselInner">
        <div style="color:var(--muted); font-size:12px; text-align:center; margin-top:20px;">Онлайн</div>
    </div>
  </div>
</div>

<div id="settingsPanel">
  <div class="settings-card">
    <h3 style="text-align:center;margin-bottom:16px;">⚙️ Настройки</h3>
    <div style="display:flex;gap:4px;margin-bottom:16px;">
      <button class="settings-tab active" data-tab="main">Основное</button>
      <button class="settings-tab" data-tab="avatar">Аватар</button>
    </div>
    
    <div id="stab-main" style="display:flex;flex-direction:column;gap:12px;">
      <div><label style="font-size:12px;color:var(--muted);">Новое имя</label><input id="setName" placeholder="Оставьте пустым"></div>
      <button class="btn-green" id="settingsSaveBtn">Сохранить</button>
      <button class="btn-red" id="settingsLogoutBtn">Выйти</button>
      <button class="btn-gray" id="settingsCloseBtn">Отмена</button>
    </div>
    
    <div id="stab-avatar" style="display:none;flex-direction:column;gap:12px;">
      <div id="avatarAdvanced">
        <label style="font-size:12px;color:var(--muted);">Стиль рамки</label>
        <select id="setStyleSelector">
            <option value="off">Без анимации</option>
            <option value="rgb-ring">Кольцо</option>
            <option value="cyber-grid">Сканер 🤖</option>
            <option value="fire">Огонь 🔥</option>
        </select>
        <div style="margin-top:8px;"><label style="font-size:12px;color:var(--muted);">Скорость <span id="setSpeedVal">1x</span></label><input type="range" id="setSpeed" min="0.1" max="3" step="0.1" value="1"></div>
        <div><label style="font-size:12px;color:var(--muted);">Цвет 1</label><input type="color" id="setColor1" value="#6366f1"></div>
        <div><label style="font-size:12px;color:var(--muted);">Цвет 2</label><input type="color" id="setColor2" value="#a855f7"></div>
      </div>
      <button class="btn-green" id="avatarSaveBtn">Применить</button>
      <button class="btn-gray" id="avatarCancelBtn">Отмена</button>
    </div>
  </div>
</div>


<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
(function() {
  'use strict';

  // =========================================================================
  // 🎨 БЛОК АНИМАЦИЙ АВАТАРОК (Сокращен для примера)
  // =========================================================================
  const EFFECTS_REGISTRY = {
    'off': (opts) => {
        const { ctx, cx, cy, fRadius, layer } = opts;
        if(layer === 'front') {
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, fRadius, 0, Math.PI*2);
            ctx.stroke();
        }
    },
    'rgb-ring': (opts) => {
        const { ctx, cx, cy, fRadius, state, color1, color2, layer } = opts;
        if(layer==='front') { 
            ctx.strokeStyle=color1; ctx.lineWidth=6; 
            ctx.beginPath(); 
            ctx.arc(cx,cy,fRadius,state.tick%(Math.PI*2),(state.tick%(Math.PI*2))+Math.PI*1.5); 
            ctx.stroke(); 
            
            ctx.strokeStyle=color2; 
            ctx.beginPath(); 
            ctx.arc(cx,cy,fRadius,(state.tick%(Math.PI*2))+Math.PI,(state.tick%(Math.PI*2))+Math.PI*2); 
            ctx.stroke(); 
        }
    },
    'cyber-grid': (opts) => {
        const { ctx, cx, cy, fRadius, state, color1, color2, layer } = opts;
        if(layer === 'front') {
          ctx.save(); ctx.translate(cx, cy);
          ctx.strokeStyle = color1; ctx.lineWidth = 2;
          ctx.shadowBlur = 10; ctx.shadowColor = color2;

          ctx.rotate(state.tick * 0.5);
          ctx.setLineDash([15, 10, 5, 10]);
          ctx.beginPath(); ctx.arc(0, 0, fRadius + 4, 0, Math.PI*2); ctx.stroke();

          ctx.rotate(-state.tick * 0.8);
          ctx.setLineDash([40, 20]);
          ctx.strokeStyle = color2; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.arc(0, 0, fRadius + 12, 0, Math.PI*2); ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
          
          const scanY = cy - fRadius + ((state.tick * 50) % (fRadius * 2));
          ctx.save();
          ctx.beginPath(); ctx.arc(cx, cy, fRadius, 0, Math.PI*2); ctx.clip();

          const grad = ctx.createLinearGradient(0, scanY - 40, 0, scanY);
          grad.addColorStop(0, 'rgba(0,0,0,0)');
          grad.addColorStop(1, color1);
          ctx.fillStyle = grad;
          ctx.fillRect(cx - fRadius, scanY - 40, fRadius * 2, 40);

          ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.shadowBlur = 15; ctx.shadowColor = color1;
          ctx.beginPath(); 
          ctx.moveTo(cx - fRadius, scanY); 
          ctx.lineTo(cx + fRadius, scanY); 
          
          /* ИСПРАВЛЕНА ОШИБКА ЗДЕСЬ (было stroke(); стало ctx.stroke();) */
          ctx.stroke(); 
          
          ctx.restore();
        }
    },
    'fire': (opts) => {
        const { ctx, cx, cy, fRadius, state, speed, layer } = opts;
        if(layer === 'front') {
            ctx.save(); ctx.translate(cx, cy);
            ctx.shadowBlur = 15; ctx.shadowColor = '#ff3300';
            const flameCount = 40; ctx.fillStyle = '#ff8c00';
            ctx.beginPath();
            for(let i = 0; i <= flameCount; i++) {
                const angle = (i / flameCount) * Math.PI * 2;
                const noise = Math.sin(state.tick * 5 + i * 1.5) * 8;
                const r = fRadius + Math.max(0, noise); 
                if(i === 0) ctx.moveTo(Math.cos(angle)*fRadius, Math.sin(angle)*fRadius);
                ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
            }
            ctx.closePath(); ctx.fill();
            ctx.restore();
        }
    }
  };

  // =========================================================================
  // ⚙️ БАЗОВЫЕ НАСТРОЙКИ APP И FIREBASE (ЗАГЛУШКА)
  // =========================================================================
  const App = {
    user: null, 
    previewData: null,
    avatarAnimId: null,
    avatarSettings: { style:'cyber-grid', speed:1, glow:20, color1:'#6366f1', color2:'#a855f7' }
  };
  
  const avatarTimers = new Map();
  const globalImgCache = new Map();

  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  function toast(msg, isErr) {
    const c = $('#toastContainer'), el = document.createElement('div');
    el.className = 'toast-msg' + (isErr ? ' error' : '');
    el.textContent = msg;
    c.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3000);
  }

  // =========================================================================
  // 🖌️ РЕНДЕР АВАТАРКИ (ОТРИСОВКА В CANVAS)
  // =========================================================================
  function renderPremiumAvatar(canvas, settings, avatarImg, fallbackName) {
    if(!canvas) return;
    const rect = canvas.getBoundingClientRect();
    let displayW = rect.width || parseInt(canvas.getAttribute('width')) || 120;
    let displayH = rect.height || parseInt(canvas.getAttribute('height')) || 120;
    
    const dpr = window.devicePixelRatio || 1;
    const targetW = Math.floor(displayW * dpr);
    const targetH = Math.floor(displayH * dpr);
    if (canvas.width !== targetW || canvas.height !== targetH) {
      canvas.width = targetW; canvas.height = targetH;
    }
    
    const ctx = canvas.getContext('2d');
    const trueW = canvas.width, trueH = canvas.height;
    const baseSize = 300, cx = baseSize/2, cy = baseSize/2;
    const avatarRadius = 82, fRadius = avatarRadius + 4;
    
    if(!avatarTimers.has(canvas)) avatarTimers.set(canvas, { tick: 0 });
    const state = avatarTimers.get(canvas);
    const speed = parseFloat(settings?.speed) || 1;
    state.tick += 0.04 * speed;
    
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,trueW,trueH);
    ctx.save();
    ctx.scale(trueW/baseSize, trueH/baseSize);
    
    const color1 = settings?.color1 || '#6366f1', color2 = settings?.color2 || '#a855f7';
    const style = settings?.style || 'off';
    const glow = parseInt(settings?.glow) || 20;

    const effectOpts = { ctx, cx, cy, fRadius, avatarRadius, state, speed, color1, color2, glow };
    
    const drawEffects = (layer) => {
      effectOpts.layer = layer;
      if (EFFECTS_REGISTRY[style]) EFFECTS_REGISTRY[style](effectOpts);
    };

    drawEffects('back');
    
    // Рисуем саму аватарку (заглушка буквами)
    ctx.save(); 
    ctx.beginPath(); ctx.arc(cx, cy, avatarRadius, 0, Math.PI*2); ctx.clip();
    ctx.fillStyle = '#1e1b4b'; ctx.fill(); 
    ctx.fillStyle = '#6366f1'; ctx.font = `bold ${avatarRadius}px sans-serif`; 
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
    ctx.fillText((fallbackName||'?')[0].toUpperCase(), cx, cy+10); 
    ctx.restore();
    
    drawEffects('front');
    ctx.restore();
  }

  function updateAllFrames() {
    if(document.hidden) { App.avatarAnimId = requestAnimationFrame(updateAllFrames); return; }
    
    // Рендер на главном экране
    const mc = document.getElementById('mainAvatarCanvas');
    if(mc && App.user) renderPremiumAvatar(mc, App.avatarSettings, null, App.user.name);
    
    // Рендер в модальном окне превью
    const pm = document.getElementById('avatarPreviewModal');
    if(pm && pm.style.display !== 'none' && App.previewData) {
        const pc = document.getElementById('previewAvatarCanvas');
        renderPremiumAvatar(pc, App.previewData.settings, null, App.previewData.name);
    }
    
    App.avatarAnimId = requestAnimationFrame(updateAllFrames);
  }

  // =========================================================================
  // 🔐 АВТОРИЗАЦИЯ
  // =========================================================================
  let isLoginMode = true;
  function toggleAuth() {
    isLoginMode = !isLoginMode;
    $('#loginFields').style.display = isLoginMode ? 'flex' : 'none';
    $('#registerFields').style.display = isLoginMode ? 'none' : 'flex';
    $('#tabLogin').style.background = isLoginMode ? '#7c3aed' : 'transparent';
    $('#tabLogin').style.color = isLoginMode ? '#fff' : '#6a7a94';
    $('#tabRegister').style.background = isLoginMode ? 'transparent' : '#7c3aed';
    $('#tabRegister').style.color = isLoginMode ? '#6a7a94' : '#fff';
  }

  function mockLogin(name) {
    App.user = { name: name || 'Гость', role: 'manager' };
    $('#loginScreen').style.display = 'none';
    $('#app').style.display = 'flex';
    $('#uname').textContent = App.user.name;
    
    toast('Добро пожаловать, ' + App.user.name + '!');
    
    // Запускаем цикл анимации ТОЛЬКО после входа, чтобы не тратить ресурсы
    if(!App.avatarAnimId) {
        App.avatarAnimId = requestAnimationFrame(updateAllFrames);
    }
  }

  $('#tabLogin').addEventListener('click', () => { if (!isLoginMode) toggleAuth(); });
  $('#tabRegister').addEventListener('click', () => { if (isLoginMode) toggleAuth(); });
  
  $('#loginBtn').addEventListener('click', () => mockLogin($('#loginEmail').value.split('@')[0] || 'Тестер'));
  $('#registerBtn').addEventListener('click', () => mockLogin($('#regName').value || 'Новичок'));

  // =========================================================================
  // 🎮 ЛОГИКА ИНТЕРФЕЙСА (КЛИКИ И МОДАЛЬНЫЕ ОКНА)
  // =========================================================================
  
  // 1. Открытие/закрытие боковой панели
  $('#sidebarToggleBtn').addEventListener('click', () => {
    $('#avatarCarousel').classList.add('open');
  });
  $('#sidebarCloseBtn').addEventListener('click', () => {
    $('#avatarCarousel').classList.remove('open');
  });

  // 2. Открытие окна настроек
  $('#settingsBtn').addEventListener('click', () => {
    $('#settingsPanel').style.display = 'flex';
  });
  
  // Закрытие окна настроек
  $('#settingsCloseBtn').addEventListener('click', () => { $('#settingsPanel').style.display = 'none'; });
  $('#avatarCancelBtn').addEventListener('click', () => { $('#settingsPanel').style.display = 'none'; });
  
  // 3. Переключение вкладок в настройках
  $$('.settings-tab').forEach(btn => {
    btn.addEventListener('click', (e) => {
        $$('.settings-tab').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        
        const tab = e.target.getAttribute('data-tab');
        $('#stab-main').style.display = tab === 'main' ? 'flex' : 'none';
        $('#stab-avatar').style.display = tab === 'avatar' ? 'flex' : 'none';
    });
  });

  // 4. Открытие модального окна превью Аватарки
  $('#avatarTriggerBtn').addEventListener('click', () => {
    App.previewData = {
        settings: App.avatarSettings,
        name: App.user ? App.user.name : 'Гость'
    };
    $('#previewAvatarName').textContent = App.previewData.name;
    $('#avatarPreviewModal').style.display = 'flex';
  });

  // Закрытие превью
  $('#closeAvatarPreview').addEventListener('click', () => {
    $('#avatarPreviewModal').style.display = 'none';
  });

  // 5. Сохранение настроек аватара (пример)
  $('#avatarSaveBtn').addEventListener('click', () => {
    App.avatarSettings.style = $('#setStyleSelector').value;
    App.avatarSettings.speed = $('#setSpeed').value;
    App.avatarSettings.color1 = $('#setColor1').value;
    App.avatarSettings.color2 = $('#setColor2').value;
    
    $('#settingsPanel').style.display = 'none';
    toast('Настройки аватара применены!');
  });

  // 6. Выход из аккаунта
  $('#settingsLogoutBtn').addEventListener('click', () => {
    App.user = null;
    $('#app').style.display = 'none';
    $('#loginScreen').style.display = 'flex';
    $('#settingsPanel').style.display = 'none';
    
    // Останавливаем анимацию для экономии ресурсов
    if(App.avatarAnimId) {
        cancelAnimationFrame(App.avatarAnimId);
        App.avatarAnimId = null;
    }
  });

})();
</script>
</body>
</html>
