<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozon Создатель</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; background: #1a1a2e url('https://raw.githubusercontent.com/painofkili/ozon/main/bg.jpg') center/cover fixed; color: #eee; padding: 10px; max-width: 450px; margin: 0 auto; font-size: 16px; }
body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,26,46,0.7); z-index: -1; }
.card { background: rgba(22,33,62,0.85); padding: 16px; border-radius: 14px; margin: 8px 0; backdrop-filter: blur(10px); }
input, select { width: 100%; padding: 14px; font-size: 16px; margin: 4px 0; border-radius: 10px; border: 1px solid #444; background: rgba(26,26,46,0.8); color: #fff; }
button { width: 100%; padding: 14px; font-size: 16px; margin: 4px 0; border-radius: 10px; border: none; color: #fff; font-weight: bold; cursor: pointer; }
.btn-green { background: #4CAF50; } .btn-blue { background: #2196F3; } .btn-red { background: #e94560; } .btn-gray { background: #555; } .btn-gold { background: linear-gradient(135deg, #f5c518, #ff8c00); color: #000; }
button:disabled { opacity: 0.5; cursor: default; }
.avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 3px solid transparent; }
.avatar-creator { border: 3px solid #f5c518; box-shadow: 0 0 15px rgba(245,197,24,0.6); animation: glow 2s infinite; }
@keyframes glow { 0%, 100% { box-shadow: 0 0 15px rgba(245,197,24,0.6); } 50% { box-shadow: 0 0 30px rgba(245,197,24,1); } }
.avatar-mini { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; margin-right: 6px; vertical-align: middle; cursor: pointer; }
.avatar-mini-creator { border: 2px solid #f5c518; }
.profile-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.creator-badge { font-size: 14px; font-weight: bold; padding: 4px 12px; border-radius: 12px; background: linear-gradient(135deg, #f5c518, #ff8c00); color: #000; animation: glow 2s infinite; }
.progress-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; background: linear-gradient(135deg, #f5c518, #ff8c00); width: 100%; }
.progress-text { font-size: 11px; color: #f5c518; }
.tabs { display: flex; gap: 6px; margin: 10px 0; }
.tabs button { flex: 1; padding: 12px; background: #333; font-size: 13px; color: #aaa; }
.tabs button.active { background: linear-gradient(135deg, #f5c518, #ff8c00); color: #000; }
#chat { max-height: 300px; overflow-y: auto; padding: 8px; border-radius: 10px; margin: 8px 0; background: rgba(26,26,46,0.8); font-size: 13px; }
#chat p { margin: 3px 0; position: relative; }
.chat-msg-creator { background: rgba(245,197,24,0.15); border-left: 3px solid #f5c518; padding: 6px 10px; border-radius: 8px; font-style: italic; }
.chat-msg-creator .author { color: #f5c518; font-weight: bold; }
.chat-msg-creator .crown { font-size: 16px; }
#chat .chat-img { max-width: 100%; border-radius: 8px; margin: 4px 0; cursor: pointer; }
#chat .thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; cursor: pointer; margin: 2px; }
#chat .del-msg { position: absolute; top: 0; right: 0; background: #e94560; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 18px; text-align: center; cursor: pointer; display: none; }
#chat p:hover .del-msg { display: block; }
#chat .pin-msg { position: absolute; top: 0; right: 20px; background: #f5c518; color: #000; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 18px; text-align: center; cursor: pointer; display: none; }
#chat p:hover .pin-msg { display: block; }
.pinned { background: rgba(245,197,24,0.2); border-left: 3px solid #f5c518; padding: 8px; margin: 4px 0; border-radius: 8px; }
.photo-preview { display: flex; gap: 4px; flex-wrap: wrap; }
.photo-preview img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
#photoViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
#photoViewer img { max-width: 95%; max-height: 90%; border-radius: 10px; }
.stat-card { background: rgba(26,26,46,0.8); padding: 8px; border-radius: 10px; margin: 4px 0; font-size: 13px; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 12px; }
.calendar div { padding: 6px; border-radius: 4px; }
.calendar .shift-day { background: #4CAF50; color: #fff; font-weight: bold; }
.calendar .today { border: 2px solid #2196F3; }
.calendar .header { font-weight: bold; background: #333; }
label { font-size: 12px; color: #aaa; display: block; margin-top: 4px; }
.notify-item { padding: 6px; border-bottom: 1px solid #333; font-size: 13px; }
.creator-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.creator-actions button { flex: 1; min-width: 100px; font-size: 12px; padding: 10px; }
</style>
</head>
<body>

<div id="login">
  <h3 style="text-align:center">🌌 Вход Создателя</h3>
  <input id="creatorPass" type="password" placeholder="Пароль Создателя">
  <button class="btn-gold" onclick="creatorLogin()">🌌 Войти</button>
  <div id="msg" style="color:red;text-align:center;margin-top:4px"></div>
</div>

<div id="app" style="display:none">

    <img id="profileAvatar" class="avatar avatar-creator" src="" style="display:none">

      <span class="creator-badge">🌌 Создатель</span><br>

  <div class="tabs">
    <button id="tabShift" class="active" onclick="showTab('shift')">🔵 Смена</button>
    <button id="tabStats" onclick="showTab('stats')">📊 Статистика</button>
    <button id="tabHistory" onclick="showTab('history')">💳 Выплаты</button>
    <button id="tabNotify" onclick="showTab('notify')">🔔</button>
    <button id="tabCreator" onclick="showTab('creator')">🌌</button>
  </div>
  <div id="shiftTab">
    <button id="startBtn" class="btn-green" onclick="startShift()">🔵 НА СМЕНУ</button>
    <button id="onShiftBtn" class="btn-blue" style="display:none" disabled>🟢 НА СМЕНЕ</button>
    <div id="shift" style="display:none">
      <input id="timeFrom" value="9" placeholder="Начало"><input id="timeTo" value="21" placeholder="Конец"><input id="tov" placeholder="Товары">
      <label>📸 Фотоотчёт (до 5)</label><input id="photos" type="file" accept="image/*" multiple onchange="previewPhotos()">
      <div id="photoPreviews" class="photo-preview"></div>
      <button class="btn-red" onclick="endShift()">🔴 СО СМЕНЫ</button>
    </div>
    <button class="btn-gray" onclick="logout()" style="margin-top:8px">↩ Выйти</button>
  </div>
  <div id="statsTab" style="display:none"><h4 style="text-align:center">📅 Календарь смен</h4><div id="calHeader" style="text-align:center;margin-bottom:4px"></div><div class="calendar" id="calendar"></div><div class="stat-card" id="statsSummary"></div><button class="btn-red" onclick="clearMyShifts()">🗑 Очистить мои смены</button></div>
  <div id="historyTab" style="display:none"><h4 style="text-align:center">💳 История выплат</h4><div id="historyContent"></div></div>
  <div id="notifyTab" style="display:none"><h4 style="text-align:center">🔔 Уведомления</h4><div id="notifyContent"></div><button class="btn-red" onclick="clearNotifications()" style="margin-top:8px">🗑 Очистить уведомления</button></div>
  <div id="creatorTab" style="display:none">
    <h4 style="text-align:center">🌌 Сила Создателя</h4>
    <div class="creator-actions">
      <button class="btn-gold" onclick="summonBoss()">👔 Вызвать на ковёр</button>
      <button class="btn-gold" onclick="monkeySomeone()">🐒 Обезьяна дня</button>
      <button class="btn-gold" onclick="clownSomeone()">🤡 Клоун дня</button>
      <button class="btn-gold" onclick="thinkCreator()">💭 О чём думает Создатель?</button>
    </div>
  </div>
  <div id="pinnedMessage" class="pinned" style="display:none"></div>
  <div id="chat"></div>
  <div style="display:flex;gap:4px">
    <input id="msg" placeholder="Чат..." style="flex:1">
    <button class="btn-gray" onclick="document.getElementById('chatPhoto').click()" style="width:auto;padding:14px">📎</button>
    <input id="chatPhoto" type="file" accept="image/*" multiple onchange="sendPhoto()" style="display:none">
    <button class="btn-gold" onclick="send()" style="width:auto;padding:14px 18px">➤</button>
  </div>
</div>

<div id="photoViewer" onclick="this.style.display='none'"><img id="photoViewerImg" src=""></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyA9jEn0r1oTnyx3ngFNCsOUyj4HGfCHAFo",authDomain:"ozon-grafik-4ad9f.firebaseapp.com",databaseURL:"https://ozon-grafik-4ad9f-default-rtdb.europe-west1.firebasedatabase.app",projectId:"ozon-grafik-4ad9f",storageBucket:"ozon-grafik-4ad9f.firebasestorage.app",messagingSenderId:"798009068634",appId:"1:798009068634:web:4b70eea3cce6c96f4f5c63"});
var db=firebase.database(),user=null,onShift=!1,photoBase64=[],newAvatarData=null,allMyShifts=[],allUsers={},CREATOR_PASS='2706';
var VK_TOKEN="vk1.a.1ccqIy8pmM0W_RnIymI9XOMvA6ILX5yxNfZZAiF5HHBdjHK_vOAimgsyljky-TCiReMgJRAlaRvpYEypifmF-iUonUGvldlw5LvDWAOSUpN1WDcnS_7Uit-Yh3BuUF5Ic5NoZ48Qhlmu4ErB87fpTplEI7E3sarTm9LC-Vd8zTbeQp4xgyB1s5yg6oBxTBaNZAFp-ioqBWG25jR8GREmWw";

if('Notification' in window && Notification.permission==='default'){Notification.requestPermission()}
function notifyMe(title,body){if('Notification' in window && Notification.permission==='granted'){try{new Notification(title,{body:body,icon:'https://raw.githubusercontent.com/painofkili/ozon/main/на%20смену.png'})}catch(e){}}}
function sendVkNotify(vkId,msg){if(!vkId)return;fetch('https://api.vk.com/method/messages.send?v=5.131&access_token='+VK_TOKEN+'&user_id='+vkId+'&random_id='+Date.now()+'&message='+encodeURIComponent(msg))}

db.ref('users').on('value',function(s){s.forEach(function(c){allUsers[c.key]=c.val().avatar||''})});

var STATUSES=[{name:'📦 Штрих',color:'#999',min:0,max:3},{name:'🚚 ПВЗюк',color:'#cd7f32',min:4,max:7},{name:'🏭 Пунктовой',color:'#2196F3',min:8,max:12},{name:'🚀 Озонавт',color:'#4CAF50',min:13,max:20},{name:'👑 Озоний',color:'#f5c518',min:21,max:999}];
function getStatus(n){for(var i=STATUSES.length-1;i>=0;i--){if(n>=STATUSES[i].min)return STATUSES[i]}return STATUSES[0]}

function loadPunkts(cb){db.ref('punkts').once('value',function(s){var p=[];s.forEach(function(c){p.push(c.key)});if(cb)cb(p)})}

function creatorLogin(){
  var p=document.getElementById('creatorPass').value.trim();
  if(p===CREATOR_PASS){
    user={name:'Костя',punkt:'49',avatar:'',vkId:'',role:'creator'};
    // Загружаем данные из базы
    db.ref('users/Костя').once('value',function(s){
      if(s.exists()){user=s.val();user.role='creator'}
      localStorage.setItem('creator_user',JSON.stringify(user));
      document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';
      updateProfileUI();loadChat();loadAllData();loadHistory();loadNotifications();loadPinned();
      db.ref('activeShifts/'+user.name).once('value',function(s){if(s.exists()&&s.val().active){onShift=!0;document.getElementById('startBtn').style.display='none';document.getElementById('onShiftBtn').style.display='block';document.getElementById('shift').style.display='block'}});
    });
  }else{alert('Неверный пароль!')}
}

var saved=localStorage.getItem('creator_user');
if(saved){user=JSON.parse(saved);document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';updateProfileUI();loadChat();loadAllData();loadHistory();loadNotifications();loadPinned()}

function updateProfileUI(){document.getElementById('uname').textContent=user.name;document.getElementById('upunkt').textContent=user.punkt||'?';if(user.avatar){var pa=document.getElementById('profileAvatar');pa.src=user.avatar;pa.style.display='inline';pa.onclick=function(){viewPhoto(user.avatar)}}}
function showTab(tab){
  var tabs={shift:'shiftTab',stats:'statsTab',history:'historyTab',notify:'notifyTab',creator:'creatorTab'};
  var active=document.querySelector('.tabs button.active');
  if(active&&active.id==='tab'+tab.charAt(0).toUpperCase()+tab.slice(1)){document.getElementById(tabs[tab]).style.display='none';active.classList.remove('active');return;}
  Object.keys(tabs).forEach(function(t){document.getElementById(tabs[t]).style.display='none'});
  document.getElementById(tabs[tab]).style.display='block';
  ['tabShift','tabStats','tabHistory','tabNotify','tabCreator'].forEach(function(id){document.getElementById(id).classList.remove('active')});
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  if(tab==='stats')renderCalendar();if(tab==='history')loadHistory();if(tab==='notify')loadNotifications();
}
function loadNotifications(){if(!user)return;db.ref('notifications').orderByChild('user').equalTo(user.name).once('value',function(s){var arr=[];s.forEach(function(c){arr.push(c.val())});arr.sort(function(a,b){return b.timestamp-a.timestamp});document.getElementById('notifyContent').innerHTML=arr.length?arr.map(function(x){return'<div class="notify-item">'+x.text+' <small style="color:#999">'+new Date(x.timestamp).toLocaleString('ru-RU')+'</small></div>'}).join(''):'<p>Нет уведомлений</p>'})}
function loadAllData(){if(!user)return;db.ref('shifts').orderByChild('user').equalTo(user.name).on('value',function(s){allMyShifts=[];s.forEach(function(c){var x=c.val();x._id=c.key;allMyShifts.push(x)});allMyShifts.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp)});if(document.getElementById('statsTab').style.display!=='none')renderCalendar()})}
function renderCalendar(){var now=new Date(),y=now.getFullYear(),m=now.getMonth(),dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,0).getDay();document.getElementById('calHeader').innerHTML='<b>'+now.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})+'</b>';var days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'],h='';for(var i=0;i<7;i++)h+='<div class="header">'+days[i]+'</div>';for(var i=0;i<fd;i++)h+='<div></div>';var sd={};allMyShifts.forEach(function(s){sd[s.date]=(sd[s.date]||0)+1});var ts=now.toLocaleDateString('ru-RU');for(var d=1;d<=dim;d++){var ds=new Date(y,m,d).toLocaleDateString('ru-RU'),cl='';if(sd[ds])cl='shift-day';if(ds===ts)cl+=' today';h+='<div class="'+cl+'">'+d+'</div>'}document.getElementById('calendar').innerHTML=h;var tot=allMyShifts.length,th=allMyShifts.reduce(function(s,x){return s+(x.hours||0)},0),tt=allMyShifts.reduce(function(s,x){return s+(x.tovar||0)},0);document.getElementById('statsSummary').innerHTML='📅 Смен: <b>'+tot+'</b><br>⏱ Часов: <b>'+th+'</b><br>📦 Товаров: <b>'+tt+'</b>'}
function loadHistory(){if(!user)return;db.ref('payments').orderByChild('user').equalTo(user.name).once('value',function(s){var a=[];s.forEach(function(c){a.push(c.val())});a.sort(function(x,y){return y.timestamp-x.timestamp});document.getElementById('historyContent').innerHTML=a.length?a.map(function(x){return'<div class="stat-card">📅 '+new Date(x.dateFrom).toLocaleDateString('ru-RU')+' – '+new Date(x.dateTo).toLocaleDateString('ru-RU')+'<br><b>'+x.total+' ₽</b><br><small>'+new Date(x.timestamp).toLocaleString('ru-RU')+'</small></div>'}).join(''):'<p>Нет выплат</p>'})}
function clearMyShifts(){if(!confirm('Удалить все смены?'))return;db.ref('shifts').orderByChild('user').equalTo(user.name).once('value',function(s){s.forEach(function(c){db.ref('shifts/'+c.key).remove()})});alert('✅')}
function openSettings(){document.getElementById('app').style.display='none';document.getElementById('settingsCard').style.display='block';loadPunkts(function(p){var s=document.getElementById('newPunkt');s.innerHTML='<option value="">Не менять</option>';for(var i=0;i<p.length;i++){s.innerHTML+='<option value="'+p[i]+'">'+p[i]+'</option>'}})}
function closeSettings(){document.getElementById('settingsCard').style.display='none';document.getElementById('app').style.display='block'}
function previewPhotos(){photoBase64=[];document.getElementById('photoPreviews').innerHTML='';var files=document.getElementById('photos').files;for(var i=0;i<Math.min(files.length,5);i++){(function(file){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),mw=400,s=mw/img.width;c.width=mw;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);var thumb=c.toDataURL('image/jpeg',0.6);photoBase64.push({full:e.target.result,thumb:thumb});var pv=document.createElement('img');pv.src=thumb;document.getElementById('photoPreviews').appendChild(pv)};img.src=e.target.result};r.readAsDataURL(file)})(files[i])}}
function startShift(){onShift=!0;var t=new Date().toLocaleTimeString('ru-RU');db.ref('activeShifts/'+user.name).set({active:!0,startTime:t});document.getElementById('startBtn').style.display='none';document.getElementById('onShiftBtn').style.display='block';document.getElementById('shift').style.display='block';db.ref('chat').push({user:'🌌 '+user.name,text:'🔵 Пункт '+user.punkt+' на смене! ('+t+')',timestamp:Date.now()})}
function endShift(){var tf=document.getElementById('timeFrom').value||'9',tt=document.getElementById('timeTo').value||'21',tv=parseInt(document.getElementById('tov').value)||0,hh=parseInt(tt)-parseInt(tf),t=new Date().toLocaleTimeString('ru-RU'),ph=photoBase64.slice(0,5);db.ref('shifts/'+user.name+'_'+Date.now()).set({user:user.name,punkt:user.punkt||'49',date:new Date().toLocaleDateString('ru-RU'),timeFrom:tf,timeTo:tt,hours:hh,tovar:tv,photos:ph,paid:!1,timestamp:new Date().toISOString()});db.ref('chat').push({user:'🌌 '+user.name,text:'🔴 Пункт '+user.punkt+' с '+tf+' до '+tt+', товаров: '+tv,timestamp:Date.now(),photos:ph});db.ref('activeShifts/'+user.name).remove();onShift=!1;document.getElementById('shift').style.display='none';document.getElementById('onShiftBtn').style.display='none';document.getElementById('startBtn').style.display='block';document.getElementById('tov').value='';document.getElementById('photos').value='';document.getElementById('photoPreviews').innerHTML='';photoBase64=[]}
function sendPhoto(){var files=document.getElementById('chatPhoto').files;if(!files.length||!user)return;var photos=[],count=Math.min(files.length,5);for(var i=0;i<count;i++){(function(file){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),mw=300,s=mw/img.width;c.width=mw;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);var thumb=c.toDataURL('image/jpeg',0.6);photos.push({full:e.target.result,thumb:thumb});if(photos.length===count){db.ref('chat').push({user:'🌌 '+user.name,text:'📷 '+count+' фото',photos:photos,timestamp:Date.now(),creator:!0})}};img.src=e.target.result};r.readAsDataURL(file)})(files[i])}document.getElementById('chatPhoto').value=''}
function logout(){user=null;onShift=!1;localStorage.removeItem('creator_user');document.getElementById('app').style.display='none';document.getElementById('login').style.display='block'}
function loadChat(){db.ref('chat').limitToLast(30).on('value',function(s){var h='';s.forEach(function(c){var m=c.val(),isCreator=m.user==='🌌 '+user.name,cd=isCreator||(user&&m.user===user.name),sn=(m.user||'').replace('📢 ','').replace('🌌 ',''),av=allUsers[sn]||'',ah=av?'<img class="avatar-mini'+(isCreator?' avatar-mini-creator':'')+'" src="'+av+'">':'';if(isCreator){h+='<div class="chat-msg-creator">'}else{h+='<p>'}
h+=(cd?'<span class="del-msg" onclick="delChatMsg(\''+c.key+'\')">✕</span>':'')+(isCreator?'':'');
h+=(isCreator?'<span class="pin-msg" onclick="pinMsg(\''+c.key+'\')">📌</span>':'');
h+=ah+'<b class="'+(isCreator?'author':'')+'">'+(isCreator?'<span class="crown">👑</span> ':'')+(m.user||'?')+':</b> '+(m.text||'');
if(m.photo){h+='<br><img class="chat-img" src="'+(m.thumb||m.photo)+'" onclick="event.stopPropagation();viewPhoto(\''+m.photo+'\')">'}
if(m.photos&&m.photos.length){var ft=typeof m.photos[0]==='object'?m.photos[0].thumb:m.photos[0],af=[];for(var i=0;i<m.photos.length;i++){af.push(typeof m.photos[i]==='object'?m.photos[i].full:m.photos[i])}var pd=JSON.stringify(af).replace(/'/g,"&#39;").replace(/"/g,'&quot;');h+='<br><img class="thumb" src="'+ft+'" onclick="event.stopPropagation();viewPack(\''+pd+'\')">';if(m.photos.length>1)h+=' <span style="font-size:11px;color:#999">+ ещё '+(m.photos.length-1)+'</span>'}
h+=isCreator?'</div>':'</p>'});document.getElementById('chat').innerHTML=h;document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight})}
function viewPhoto(url){document.getElementById('photoViewerImg').src=url;document.getElementById('photoViewer').style.display='flex'}
function viewPack(pd){var ph=JSON.parse(pd.replace(/&quot;/g,'"').replace(/&#39;/g,"'")),v=document.getElementById('photoViewer'),im=document.getElementById('photoViewerImg'),idx=0;im.src=ph[0];v.style.display='flex';v.onclick=function(e){if(e.target===v){v.style.display='none';v.onclick=null}};im.onclick=function(e){e.stopPropagation();idx++;if(idx<ph.length)im.src=ph[idx];else v.style.display='none'}}
function delChatMsg(key){db.ref('chat/'+key).once('value',function(s){if(s.val()&&s.val().user==='🌌 '+user.name){alert('🚫 Сообщения Создателя нельзя удалить!');return}if(confirm('Удалить?')){db.ref('chat/'+key).remove()}})}
function pinMsg(key){db.ref('chat/'+key).once('value',function(s){if(s.exists()){db.ref('pinned').set(s.val());alert('📌 Закреплено!')}})}
function loadPinned(){db.ref('pinned').on('value',function(s){var b=document.getElementById('pinnedMessage');if(!s.exists()){b.style.display='none';return}var m=s.val();b.style.display='block';b.innerHTML='📌 <b>'+(m.user||'?')+':</b> '+m.text})
function clearPinned(){if(confirm('Открепить?')){db.ref('pinned').remove()}}
function send(){var t=document.getElementById('msg').value.trim();if(!t||!user)return;
  var mentions=t.match(/@(\S+)/g);
  if(mentions){db.ref('users').once('value',function(snap){var vkIds={};snap.forEach(function(c){vkIds[c.val().name]=c.val().vkId||''});for(var i=0;i<mentions.length;i++){var name=mentions[i].replace('@','');var vkId=vkIds[name];if(vkId){sendVkNotify(vkId,'📢 Создатель упомянул вас в чате Ozon:\n'+t)}}})}
  db.ref('chat').push({user:'🌌 '+user.name,text:t,timestamp:Date.now(),creator:!0});document.getElementById('msg').value='';
}

// Функции Создателя
function summonBoss(){var bossVk=prompt('ВК ID начальника:');if(bossVk){sendVkNotify(bossVk,'👔 Создатель хочет тебя видеть. Зайди в чат.');alert('✅ Вызов отправлен!')}}
function monkeySomeone(){var name=prompt('Кого превратить в обезьяну?');if(name){db.ref('users/'+name).once('value',function(s){if(s.exists()){var origAv=s.val().avatar;db.ref('users/'+name+'/avatar').set('https://raw.githubusercontent.com/painofkili/ozon/main/monkey.png');db.ref('chat').push({user:'🌌 '+user.name,text:'🐒 '+name+' теперь обезьяна на 24 часа!',timestamp:Date.now()});setTimeout(function(){db.ref('users/'+name+'/avatar').set(origAv)},86400000);alert('✅ '+name+' — обезьяна!')}else{alert('Не найден!')}})}}
function clownSomeone(){var name=prompt('Кого назначить клоуном дня?');if(name){db.ref('chat').push({user:'🌌 '+user.name,text:'🤡 '+name+' — клоун дня! Все его сообщения станут разноцветными!',timestamp:Date.now()});alert('✅ '+name+' — клоун дня!')}}
function thinkCreator(){var thoughts=['Зачем я это создал?','Где мои деньги?','Надо бы поесть...','А начальник точно не обидится?','Почему я не выбрал карьеру в IT?','Может, сделать тёмную тему ещё темнее?','Сколько смен отработано?','Кто украл мой обед?'];alert('💭 '+thoughts[Math.floor(Math.random()*thoughts.length)])}
document.getElementById('msg').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();send()}});
function clearNotifications(){if(!confirm('Удалить все уведомления?'))return;db.ref('notifications').orderByChild('user').equalTo(user.name).once('value',function(s){s.forEach(function(c){db.ref('notifications/'+c.key).remove()})});alert('✅')}
</script>
