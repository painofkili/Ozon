<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ozon Создатель</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; background: #1a1a2e url('https://raw.githubusercontent.com/painofkili/ozon/main/bg.jpg') center/cover fixed; color: #eee; padding: 0; max-width: 100%; margin: 0 auto; font-size: 16px; }
body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,26,46,0.75); z-index: -1; }

.app-container { display: flex; width: 100%; min-height: 100vh; }
.main-content { flex: 1; padding: 10px; overflow-y: auto; max-height: 100vh; }

.avatar-carousel { width: 65px; min-width: 65px; background: rgba(22,33,62,0.9); border-left: 1px solid rgba(138,43,226,0.3); display: flex; flex-direction: column; align-items: center; padding: 10px 5px; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none; max-height: 100vh; }
.avatar-carousel::-webkit-scrollbar { display: none; }
.avatar-item { width: 46px; height: 46px; min-height: 46px; border-radius: 50%; margin: 5px 0; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); flex-shrink: 0; position: relative; opacity: 0.55; transform: scale(0.82); filter: brightness(0.65); }
.avatar-item.active { opacity: 1; transform: scale(1.12); filter: brightness(1); z-index: 2; box-shadow: 0 0 18px rgba(138,43,226,0.7); }
.avatar-item img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.avatar-item .av-placeholder { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #444, #555); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #ccc; font-weight: bold; }
.avatar-item.active .av-placeholder { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; }
.avatar-item .online-dot { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; background: #4CAF50; border-radius: 50%; border: 2px solid #1a1a2e; animation: pulseDot 1.5s infinite; }
@keyframes pulseDot { 0%,100% { box-shadow: 0 0 3px #4CAF50; } 50% { box-shadow: 0 0 10px #4CAF50; } }

.mini-profile { position: fixed; right: 75px; top: 50%; transform: translateY(-50%); background: rgba(22,33,62,0.97); border: 1px solid rgba(138,43,226,0.5); border-radius: 14px; padding: 14px; width: 240px; z-index: 100; display: none; backdrop-filter: blur(15px); box-shadow: 0 8px 30px rgba(0,0,0,0.6); }
.mini-profile.show { display: block; animation: slideIn 0.2s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-50%) translateX(15px); } to { opacity: 1; transform: translateY(-50%) translateX(0); } }
.mini-profile .mp-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; margin: 0 auto; display: block; }
.mini-profile .mp-placeholder { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #444, #555); display: flex; align-items: center; justify-content: center; font-size: 20px; color: #ccc; margin: 0 auto; }
.mini-profile .mp-name { text-align: center; font-weight: bold; font-size: 15px; margin-top: 6px; }
.mini-profile .mp-status { text-align: center; font-size: 11px; padding: 3px 8px; border-radius: 10px; display: inline-block; margin: 3px auto; width: fit-content; }
.mini-profile .mp-punkt { text-align: center; font-size: 11px; color: #aaa; }
.mini-profile .mp-calendar { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; text-align: center; font-size: 9px; margin-top: 6px; }
.mini-profile .mp-calendar div { padding: 3px; border-radius: 2px; }
.mini-profile .mp-calendar .mp-shift { background: #4CAF50; color: #fff; }
.mini-profile .mp-btn { width: 100%; padding: 8px; margin-top: 6px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; }

.card { background: rgba(22,33,62,0.85); padding: 14px; border-radius: 14px; margin: 6px 0; backdrop-filter: blur(10px); border: 1px solid rgba(138,43,226,0.2); }
input, select, textarea { width: 100%; padding: 12px; font-size: 15px; margin: 3px 0; border-radius: 10px; border: 1px solid #444; background: rgba(26,26,46,0.8); color: #fff; }
button { border: none; font-weight: bold; cursor: pointer; border-radius: 10px; transition: all 0.2s; }
.btn-green { background: #4CAF50; color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
.btn-blue { background: #2196F3; color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
.btn-red { background: #e94560; color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
.btn-gray { background: #555; color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
.btn-gold { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; padding: 12px; font-size: 15px; margin: 3px 0; width: 100%; }
button:disabled { opacity: 0.5; cursor: default; }
.avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; cursor: pointer; }
.avatar-creator { border: 3px solid transparent; background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF, #f5c518); background-size: 400% 400%; animation: galaxyGlow 3s infinite; box-shadow: 0 0 25px rgba(138, 43, 226, 0.7); }
@keyframes galaxyGlow { 0% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(138, 43, 226, 0.7); } 50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(245, 197, 24, 0.9), 0 0 70px rgba(138, 43, 226, 0.6); } 100% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(138, 43, 226, 0.7); } }
.avatar-mini { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; margin-right: 4px; vertical-align: middle; }
.avatar-mini-creator { border: 2px solid #8B00FF; box-shadow: 0 0 8px rgba(138, 43, 226, 0.5); }
.profile-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.creator-badge { font-size: 12px; font-weight: bold; padding: 3px 10px; border-radius: 12px; background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; animation: galaxyGlow 3s infinite; display: inline-block; }
.creator-name { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }

.tabs { display: flex; gap: 3px; margin: 8px 0; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tabs button { width: 40px; height: 40px; display: flex; align-items: center; gap: 0.4rem; overflow: hidden; border-radius: 999px; transition: width .35s cubic-bezier(.22, 1, .36, 1), background .3s ease; background: #333; color: #aaa; border: none; cursor: pointer; padding: 0 8px; font-size: 11px; white-space: nowrap; flex-shrink: 0; }
.tabs button:hover { width: 105px; background: rgba(255,255,255,0.12); color: #fff; }
.tabs button.active { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; width: 105px; }
.tabs button .menu-icon { font-size: 16px; flex-shrink: 0; }
.tabs button .menu-label { opacity: 0; max-width: 0; transform: translateX(-6px); transition: opacity .2s ease, max-width .35s ease, transform .3s ease; }
.tabs button:hover .menu-label, .tabs button.active .menu-label { opacity: 1; max-width: 70px; transform: translateX(0); }

.chat-section { margin: 6px 0; }
.chat-header-bar { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 10px 14px; background: rgba(22,33,62,0.85); border-radius: 14px; border: 1px solid rgba(138,43,226,0.3); backdrop-filter: blur(10px); transition: all 0.3s; font-size: 14px; }
.chat-header-bar .chat-icon { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #f5c518, #8B00FF); display: flex; align-items: center; justify-content: center; font-size: 16px; animation: galaxyGlow 3s infinite; flex-shrink: 0; }
.chat-header-bar .chat-label { flex: 1; font-weight: bold; font-size: 14px; background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.chat-header-bar .chat-arrow { color: #aaa; font-size: 12px; transition: transform 0.3s; }
.chat-header-bar .chat-arrow.open { transform: rotate(180deg); }
.chat-header-bar .chat-badge { background: #e94560; color: #fff; border-radius: 50%; min-width: 20px; height: 20px; font-size: 10px; text-align: center; line-height: 20px; padding: 0 4px; }
.chat-back-btn { background: none; border: 1px solid rgba(138,43,226,0.4); color: #aaa; padding: 6px 10px; border-radius: 8px; font-size: 11px; cursor: pointer; display: none; }

#chat { overflow-y: auto; padding: 6px; border-radius: 10px; margin: 3px 0; background: rgba(22,33,62,0.75); font-size: 12px; transition: max-height 0.4s ease, padding 0.4s ease, margin 0.4s ease; max-height: 250px; border: 1px solid rgba(138,43,226,0.15); }
#chat.hidden { max-height: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important; margin-top: 0 !important; margin-bottom: 0 !important; overflow: hidden; opacity: 0; border: none; }
.chat-bubble-group { margin: 4px 0; display: flex; flex-direction: column; position: relative; }
.chat-bubble-group.mine { align-items: flex-end; }
.chat-bubble-group.other { align-items: flex-start; }
.chat-bubble { background: rgba(30,30,55,0.9); padding: 6px 10px; border-radius: 12px; margin: 1px 0; display: inline-block; max-width: 85%; font-size: 12px; word-break: break-word; border: 1px solid rgba(255,255,255,0.06); }
.chat-bubble.mine { background: rgba(76,175,80,0.25); border: 1px solid rgba(76,175,80,0.3); }
.chat-msg-creator { background: linear-gradient(135deg, rgba(245,197,24,0.2), rgba(138,43,226,0.25)); border: 1px solid rgba(138,43,226,0.5); padding: 7px 10px; border-radius: 10px; margin: 2px 0; animation: creatorBubblePulse 2.5s infinite alternate; display: inline-block; max-width: 85%; }
@keyframes creatorBubblePulse { 0% { box-shadow: 0 0 8px rgba(138,43,226,0.3); } 100% { box-shadow: 0 0 16px rgba(245,197,24,0.4); } }
.chat-msg-creator .author { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
#chat .chat-img { max-width: 200px; max-height: 150px; border-radius: 8px; margin: 4px 0; cursor: pointer; object-fit: cover; }
#chat .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; cursor: pointer; margin: 2px; display: inline-block; }
#chat .photo-pack { display: flex; gap: 3px; flex-wrap: wrap; margin: 4px 0; }
.msg-action-menu { position: absolute; top: -30px; right: 0; background: rgba(30,30,55,0.97); border-radius: 20px; padding: 4px 6px; display: none; gap: 3px; z-index: 5; border: 1px solid rgba(138,43,226,0.5); }
.msg-action-menu.show { display: flex; }
.msg-action-menu button { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; font-size: 13px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); }
.msg-action-menu button:hover { transform: scale(1.15); }
.msg-action-menu .btn-like { color: #ff6b81; }
.msg-action-menu .btn-like.liked { background: rgba(233,69,96,0.5); }
.msg-action-menu .btn-pin { color: #f5c518; }
.msg-action-menu .btn-del { color: #ff4444; }
.like-indicator { font-size: 10px; background: rgba(0,0,0,0.5); border-radius: 8px; padding: 1px 5px; display: none; margin-top: 1px; }
.like-indicator.has-likes { display: inline-block; }
.pinned { background: rgba(138,43,226,0.2); border: 1px solid rgba(138,43,226,0.4); padding: 8px 10px; margin: 3px 0; border-radius: 10px; font-size: 12px; }
.announce-block { background: linear-gradient(135deg, rgba(255,249,196,0.15), rgba(255,224,130,0.1)); border: 1px solid rgba(245,197,24,0.4); color: #FFE082; padding: 10px; border-radius: 12px; margin-bottom: 4px; font-size: 12px; text-align: center; position: relative; }
.announce-del { position: absolute; top: 4px; right: 6px; background: #e94560; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; line-height: 18px; text-align: center; cursor: pointer; border: none; padding: 0; }
.thought-block { background: linear-gradient(135deg, rgba(138,43,226,0.3), rgba(0,191,255,0.2), rgba(245,197,24,0.2)); background-size: 400% 400%; animation: galaxyGlow 3s infinite; color: #fff; padding: 10px; border-radius: 12px; margin-bottom: 4px; font-size: 13px; text-align: center; border: 1px solid rgba(138,43,226,0.5); position: relative; }
.thought-block .thought-text { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; font-size: 14px; }
.thought-del { position: absolute; top: 4px; right: 6px; background: #e94560; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; line-height: 18px; text-align: center; cursor: pointer; border: none; padding: 0; }
.photo-preview { display: flex; gap: 3px; flex-wrap: wrap; }
.photo-preview img { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; }
#photoViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
#photoViewer img { max-width: 95%; max-height: 90%; border-radius: 10px; }
.stat-card { background: rgba(22,33,62,0.7); padding: 8px 10px; border-radius: 10px; margin: 3px 0; font-size: 12px; border: 1px solid rgba(138,43,226,0.15); }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center; font-size: 11px; }
.calendar div { padding: 5px; border-radius: 3px; }
.calendar .shift-day { background: #4CAF50; color: #fff; font-weight: bold; }
.calendar .today { border: 2px solid #2196F3; }
.calendar .header { font-weight: bold; background: #333; }
label { font-size: 11px; color: #aaa; display: block; margin-top: 3px; }
.notify-item { padding: 7px 9px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; background: rgba(22,33,62,0.5); border-radius: 8px; margin: 3px 0; }
.creator-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.creator-actions button { flex: 1; min-width: 80px; font-size: 11px; padding: 8px; }
.hall-item { display: flex; align-items: center; gap: 6px; padding: 7px 9px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
.hall-medal { font-size: 20px; width: 28px; text-align: center; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 999; }
.modal-card { background: rgba(22,33,62,0.95); padding: 18px; border-radius: 14px; width: 90%; max-width: 380px; border: 1px solid rgba(138,43,226,0.3); }
.expiry-row { display: flex; gap: 6px; align-items: center; }
.expiry-row select, .expiry-row input { flex: 1; padding: 8px; font-size: 13px; }
.section-title { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; text-align: center; margin-bottom: 6px; }
.announce-expiry, .thought-expiry { font-size: 9px; color: #aaa; margin-top: 3px; }

@media (max-width: 500px) {
  .avatar-carousel { width: 50px; min-width: 50px; }
  .avatar-item { width: 38px; height: 38px; min-height: 38px; }
  .mini-profile { right: 55px; width: 210px; }
}
@media (min-width: 800px) {
  .main-content { max-width: 500px; margin: 0 auto; }
}
</style>
</head>
<body>

<div id="photoViewer" onclick="this.style.display='none'"><img id="photoViewerImg" src=""></div>

<div id="login" style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;min-height:100vh;max-width:400px;margin:0 auto">
  <h3 class="section-title" style="font-size:18px">🌌 Вход Создателя</h3>
  <input id="creatorPass" type="password" placeholder="Пароль Создателя" style="max-width:300px">
  <button class="btn-gold" onclick="creatorLogin()" style="max-width:300px">🌌 Войти</button>
  <div id="loginMsg" style="color:red;text-align:center;margin-top:4px"></div>
</div>

<div id="app" class="app-container" style="display:none">
  <div class="main-content" id="mainContent">
    <div id="announceBlock" class="announce-block" style="display:none"></div>
    <div id="thoughtBlock" class="thought-block" style="display:none"></div>
    <div class="profile-row">
      <img id="profileAvatar" class="avatar avatar-creator" src="" style="display:none">
      <div style="flex:1"><b class="creator-name" style="font-size:16px"><span id="uname"></span></b> <span class="creator-badge">🌌 Создатель</span><br><span style="font-size:11px;color:#aaa">📍 Пункт <span id="upunkt"></span></span></div>
      <button class="btn-gray" onclick="openSettings()" style="width:auto;padding:6px 10px;font-size:12px">⚙️</button>
    </div>
    <div class="tabs">
      <button id="tabShift" class="active" onclick="showTab('shift')"><span class="menu-icon">🔵</span><span class="menu-label">Смена</span></button>
      <button id="tabStats" onclick="showTab('stats')"><span class="menu-icon">📊</span><span class="menu-label">Стат</span></button>
      <button id="tabHistory" onclick="showTab('history')"><span class="menu-icon">💳</span><span class="menu-label">Выплаты</span></button>
      <button id="tabNotify" onclick="showTab('notify')"><span class="menu-icon">🔔</span><span class="menu-label">Увед</span></button>
      <button id="tabHall" onclick="showTab('hall')"><span class="menu-icon">🏆</span><span class="menu-label">Доска</span></button>
      <button id="tabCreator" onclick="showTab('creator')"><span class="menu-icon">🌌</span><span class="menu-label">Сила</span></button>
    </div>
    <div id="shiftTab"><button id="startBtn" class="btn-green" onclick="startShift()">🔵 НА СМЕНУ</button><button id="onShiftBtn" class="btn-blue" style="display:none" disabled>🟢 НА СМЕНЕ</button><div id="shift" style="display:none"><input id="timeFrom" value="9" placeholder="Начало"><input id="timeTo" value="21" placeholder="Конец"><input id="tov" placeholder="Товары"><label>📸 Фотоотчёт (до 5)</label><input id="photos" type="file" accept="image/*" multiple onchange="previewPhotos()"><div id="photoPreviews" class="photo-preview"></div><button class="btn-red" onclick="endShift()">🔴 СО СМЕНЫ</button></div><button class="btn-gray" onclick="logout()" style="margin-top:6px">↩ Выйти</button></div>
    <div id="statsTab" style="display:none"><h4 class="section-title">📅 Календарь</h4><div id="calHeader"></div><div class="calendar" id="calendar"></div><div class="stat-card" id="statsSummary"></div><button class="btn-red" onclick="clearMyShifts()">🗑 Очистить</button></div>
    <div id="historyTab" style="display:none"><h4 class="section-title">💳 Выплаты</h4><div id="historyContent"></div></div>
    <div id="notifyTab" style="display:none"><h4 class="section-title">🔔 Уведомления</h4><div id="notifyContent"></div><button class="btn-red" onclick="clearNotifications()">🗑 Очистить</button></div>
    <div id="hallTab" style="display:none"><h4 class="section-title">🏆 Доска почёта</h4><div class="stat-card"><b>⏱ Топ по часам</b><div id="hallHours"></div></div><div class="stat-card"><b>📦 Топ по товарам</b><div id="hallTovar"></div></div><div class="stat-card"><b>🌟 Работник месяца</b><div id="hallBest"></div></div><div class="stat-card"><b>💀 Штрафник месяца</b><div id="hallWorst"></div></div><div class="stat-card"><b>🎁 Любимчик бога</b><div id="hallPremium"></div></div></div>
    <div id="creatorTab" style="display:none"><h4 class="section-title">🌌 Сила Создателя</h4><div class="creator-actions"><button class="btn-gold" onclick="summonBoss()">👔 Вызвать</button><button class="btn-gold" onclick="monkeySomeone()">🐒 Обезьяна</button><button class="btn-gold" onclick="clownSomeone()">🤡 Клоун</button><button class="btn-gold" onclick="openThoughtModal()">💭 Мысли</button></div></div>
    <div id="pinnedMessage" class="pinned" style="display:none"></div>
    <div class="chat-section">
      <div class="chat-header-bar" onclick="toggleChat()"><div class="chat-icon">💬</div><span class="chat-label" id="chatLabel">Общий чат</span><span id="chatBadge" class="chat-badge" style="display:none">0</span><button class="chat-back-btn" id="chatBackBtn" onclick="event.stopPropagation();switchToGlobalChat()">↩ Общий</button><span id="chatArrow" class="chat-arrow open">▼</span></div>
      <div id="chat"></div>
    </div>
    <div style="display:flex;gap:3px"><input id="chatMsgInput" placeholder="Сообщение..." style="flex:1"><button class="btn-gray" onclick="document.getElementById('chatPhoto').click()" style="width:auto;padding:12px">📎</button><input id="chatPhoto" type="file" accept="image/*" multiple onchange="sendPhoto()" style="display:none"><button class="btn-gold" onclick="sendMsg()" style="width:auto;padding:12px 16px">➤</button></div>
  </div>
  
  <div class="avatar-carousel" id="avatarCarousel"></div>
  <div class="mini-profile" id="miniProfile">
    <div id="mpAvatarContainer"></div>
    <div class="mp-name" id="mpName"></div>
    <div style="text-align:center"><span class="mp-status" id="mpStatus"></span></div>
    <div class="mp-punkt" id="mpPunkt"></div>
    <div class="mp-calendar" id="mpCalendar"></div>
    <button class="btn-gold mp-btn" id="mpChatBtn" onclick="openPrivateChat()">💬 Личный чат</button>
  </div>
</div>

<div id="settingsCard" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;overflow-y:auto;z-index:200;padding:10px">

        h+='<div class="photo-pack">';
        for(var pi=0;pi<m0.photos.length;pi++){var p=m0.photos[pi];var pt=typeof p==='object'?p.thumb:p;h+='<img class="thumb" src="'+pt+'" onclick="event.stopPropagation();viewPack(\''+JSON.stringify(m0.photos.map(function(x){return typeof x==='object'?x.full:x}).join('|||')).replace(/'/g,"&#39;").replace(/"/g,'&quot;')+'\')">';}
        h+='</div>';
      }
      h+='</div>';
      
      for(var j=1;j<msgs.length;j++){
        var m=msgs[j].msg;
        if(isCreatorMsg){h+='<div class="chat-msg-creator">'}else{var cls2='chat-bubble'+(isMine?' mine':'');h+='<div class="'+cls2+'">'}
        h+=(m.text||'');
        if(m.photo){h+='<br><img class="chat-img" src="'+(m.thumb||m.photo)+'" onclick="event.stopPropagation();viewPhoto(\''+m.photo+'\')">'}
        if(m.photos&&m.photos.length){
          h+='<div class="photo-pack">';
          for(var pi2=0;pi2<m.photos.length;pi2++){var p2=m.photos[pi2];var pt2=typeof p2==='object'?p2.thumb:p2;h+='<img class="thumb" src="'+pt2+'" onclick="event.stopPropagation();viewPack(\''+JSON.stringify(m.photos.map(function(x){return typeof x==='object'?x.full:x}).join('|||')).replace(/'/g,"&#39;").replace(/"/g,'&quot;')+'\')">';}
          h+='</div>';
        }
        h+='</div>';
      }
      
      var likes=firstMsg.msg.likes||{};var likeCount=Object.keys(likes).length;
      if(likeCount>0){var myKey=_user.name;var isLiked=!!likes[myKey];var likeIcon=isLiked?(likes[myKey]==='creator'?'🌌':likes[myKey]==='god'?'👑':'❤️'):'❤️';h+='<div class="like-indicator has-likes">'+likeIcon+' '+likeCount+'</div>'}
      h+='</div>';
    }
    chatEl.innerHTML=h;
    if(wasAtBottom||document.activeElement===document.getElementById('chatMsgInput')){chatEl.scrollTop=chatEl.scrollHeight}
  });
}

function showActionMenu(e,key){e.stopPropagation();if(activeMenu){activeMenu.classList.remove('show');activeMenu=null}var menu=document.querySelector('[data-menu="'+key+'"]');if(!menu)return;if(menu.classList.contains('show')){menu.classList.remove('show');return}menu.classList.add('show');activeMenu=menu;}
function likeMsg(key){if(!_user)return;var ref=privateChatWith?getPrivateChatRef().child(key+'/likes'):db.ref('chat/'+key+'/likes');ref.once('value',function(s){var likes=s.val()||{};var myKey=_user.name;var likeType=_user.role==='creator'?'creator':'user';if(likes[myKey]){delete likes[myKey]}else{likes[myKey]=likeType}ref.set(likes);});}
function viewPhoto(url){document.getElementById('photoViewerImg').src=url;document.getElementById('photoViewer').style.display='flex'}
function viewPack(pd){var parts=pd.split('|||'),v=document.getElementById('photoViewer'),im=document.getElementById('photoViewerImg'),idx=0;im.src=parts[0];v.style.display='flex';v.onclick=function(e){if(e.target===v){v.style.display='none';v.onclick=null}};im.onclick=function(e){e.stopPropagation();idx++;if(idx<parts.length)im.src=parts[idx];else v.style.display='none'}}
function delChatMsg(key,type){if(activeMenu){activeMenu.classList.remove('show');activeMenu=null}var ref=privateChatWith?getPrivateChatRef().child(key):db.ref('chat/'+key);if(_user&&_user.role==='creator'){ref.remove();return}if(type==='creator'){alert('🚫 Знай своё место!');return}ref.remove();}
function pinMsg(key){if(activeMenu){activeMenu.classList.remove('show');activeMenu=null}db.ref('chat/'+key).once('value',function(s){if(s.exists()){db.ref('pinned').set(s.val());alert('📌 Закреплено!')}})}
function loadPinned(){db.ref('pinned').on('value',function(s){var b=document.getElementById('pinnedMessage');if(!s.exists()){b.style.display='none';return}var m=s.val();b.style.display='block';b.innerHTML='📌 <b>'+(m.user||'?').replace('🌌 ','')+':</b> '+m.text})}
function sendMsg(){
  var input=document.getElementById('chatMsgInput');var t=input.value.trim();
  if(!t||!_user)return;
  var mentions=t.match(/@(\S+)/g);
  if(mentions){db.ref('users').once('value',function(snap){var vkIds={};snap.forEach(function(c){vkIds[c.val().name]=c.val().vkId||''});for(var i=0;i<mentions.length;i++){var name=mentions[i].replace('@','');var vkId=vkIds[name];if(vkId){sendVkNotify(vkId,'📢 Создатель упомянул вас в чате Ozon:\n'+t)}}})}
  var ref=privateChatWith?getPrivateChatRef():db.ref('chat');
  ref.push({user:'🌌 '+_user.name,text:t,timestamp:Date.now(),creator:!0,likes:{}});
  input.value='';
}
document.getElementById('chatMsgInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendMsg()}});

var notifiedKeys={};
db.ref('chat').limitToLast(1).on('child_added',function(s){
  if(chatOpened)return;
  var m=s.val();if(!m||!_user)return;
  if(m.timestamp<=lastChatTimestamp)return;
  var isMine=m.user==='🌌 '+_user.name||m.user===_user.name||m.user==='📢 '+_user.name;
  if(isMine)return;
  if(notifiedKeys[s.key])return;
  notifiedKeys[s.key]=!0;
  lastChatTimestamp=Math.max(lastChatTimestamp,m.timestamp||0);
  unreadCount++;updateChatBadge();
  notifyMe('💬 Чат',(m.user||'?').replace('🌌 ','').replace('📢 ','')+': '+(m.text||'📷 Фото'));
});

function summonBoss(){var bossVk=prompt('ВК ID начальника:');if(bossVk){sendVkNotify(bossVk,'👔 Создатель хочет тебя видеть. Зайди в чат.');alert('✅')}}
function monkeySomeone(){var name=prompt('Кого превратить в обезьяну?');if(name){db.ref('users/'+name).once('value',function(s){if(s.exists()){var origAv=s.val().avatar;db.ref('users/'+name+'/avatar').set('https://raw.githubusercontent.com/painofkili/ozon/main/monkey.png');db.ref('chat').push({user:'🌌 '+_user.name,text:'🐒 '+name+' теперь обезьяна на 24 часа!',timestamp:Date.now()});setTimeout(function(){db.ref('users/'+name+'/avatar').set(origAv)},86400000);alert('✅')}else{alert('Не найден!')}})}}
function clownSomeone(){var name=prompt('Кого назначить клоуном дня?');if(name){db.ref('chat').push({user:'🌌 '+_user.name,text:'🤡 '+name+' — клоун дня!',timestamp:Date.now()});alert('✅')}}
function clearNotifications(){db.ref('notifications').orderByChild('user').equalTo(_user.name).once('value',function(s){s.forEach(function(c){db.ref('notifications/'+c.key).remove()})});alert('✅')}
function loadPunkts(cb){db.ref('punkts').once('value',function(s){var p=[];s.forEach(function(c){p.push(c.key)});if(cb)cb(p)})}

// === МЫСЛИ ===
function openThoughtModal(){document.getElementById('thoughtModal').style.display='flex'}
function closeThoughtModal(){document.getElementById('thoughtModal').style.display='none';document.getElementById('thoughtText').value=''}
function toggleExpiryInput(p){document.getElementById(p+'ExpiryValue').style.display=document.getElementById(p+'ExpiryType').value==='forever'?'none':'block'}
function sendThought(){var text=document.getElementById('thoughtText').value.trim();if(!text)return;var type=document.getElementById('thoughtExpiryType').value,val=parseInt(document.getElementById('thoughtExpiryValue').value)||24,expiry=null;if(type==='hours')expiry=Date.now()+val*3600000;else if(type==='days')expiry=Date.now()+val*86400000;db.ref('creatorThought').set({text:text,expiry:expiry,timestamp:Date.now()});document.getElementById('thoughtText').value='';closeThoughtModal();alert('💭 Мысль отправлена!');}
function loadThought(){db.ref('creatorThought').on('value',function(s){var b=document.getElementById('thoughtBlock');if(!s.exists()){b.style.display='none';return}var t=s.val();if(t.expiry&&Date.now()>t.expiry){db.ref('creatorThought').remove();b.style.display='none';return}b.style.display='block';var expText=t.expiry?'Исчезнет: '+new Date(t.expiry).toLocaleString('ru-RU'):'Навсегда';b.innerHTML='<div class="thought-text">💭 '+t.text+'</div><div class="thought-expiry">'+expText+'</div><button class="thought-del" onclick="delThought()">✕</button>';});}
function delThought(){db.ref('creatorThought').remove()}

// === ОБЪЯВЛЕНИЯ ===
function loadAnnounce(){db.ref('announce').limitToLast(1).on('value',function(s){var b=document.getElementById('announceBlock');if(!s.exists()){b.style.display='none';return}var last=null;s.forEach(function(c){last=c.val();last._key=c.key});if(last.expiry&&Date.now()>last.expiry){db.ref('announce/'+last._key).remove();b.style.display='none';return}b.style.display='block';var expText=last.expiry?'Актуально до: '+new Date(last.expiry).toLocaleString('ru-RU'):'Бессрочно';b.innerHTML='<b>📢 '+last.text+'</b><br><small class="announce-expiry">'+expText+' • '+new Date(last.timestamp).toLocaleString('ru-RU')+'</small><button class="announce-del" onclick="delAnnounce(\''+last._key+'\')">✕</button>';});}
function delAnnounce(key){if(_user&&_user.role==='creator'){db.ref('announce/'+key).remove()}else{alert('🚫 Только Создатель может удалять объявления!')}}

// === ДОСКА ПОЧЁТА ===
function loadHall(){
  db.ref('shifts').once('value',function(snap){var users={};snap.forEach(function(c){var s=c.val();if(!users[s.user])users[s.user]={hours:0,tovar:0};users[s.user].hours+=s.hours||0;users[s.user].tovar+=s.tovar||0});var arr=[];for(var n in users)arr.push({name:n,hours:users[n].hours,tovar:users[n].tovar});arr.sort(function(a,b){return b.hours-a.hours});var hh='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';hh+='<div class="hall-item"><span class="hall-medal">'+m+'</span> '+arr[i].name+' — <b>'+arr[i].hours+'ч</b></div>'}document.getElementById('hallHours').innerHTML=hh||'Нет данных';arr.sort(function(a,b){return b.tovar-a.tovar});var ht='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';ht+='<div class="hall-item"><span class="hall-medal">'+m+'</span> '+arr[i].name+' — <b>'+arr[i].tovar+' шт</b></div>'}document.getElementById('hallTovar').innerHTML=ht||'Нет данных';arr.sort(function(a,b){return(b.hours+b.tovar)-(a.hours+a.tovar)});document.getElementById('hallBest').innerHTML=arr.length?'<div class="hall-item"><span class="hall-medal">🌟</span> '+arr[0].name+' — '+arr[0].hours+'ч / '+arr[0].tovar+' шт</div>':'Нет данных';db.ref('punishes').once('value',function(ps){var pusers={};ps.forEach(function(c){var p=c.val();if(!pusers[p.user])pusers[p.user]=0;pusers[p.user]+=p.amount||0});var parr=[];for(var n in pusers)parr.push({name:n,amount:pusers[n]});parr.sort(function(a,b){return b.amount-a.amount});document.getElementById('hallWorst').innerHTML=parr.length?'<div class="hall-item"><span class="hall-medal">💀</span> '+parr[0].name+' — <b>'+parr[0].amount+' ₽</b></div>':'Нет данных'});db.ref('premiums').once('value',function(prs){var prusers={};prs.forEach(function(c){var p=c.val();if(!prusers[p.user])prusers[p.user]=0;prusers[p.user]+=p.amount||0});var prarr=[];for(var n in prusers)prarr.push({name:n,amount:prusers[n]});prarr.sort(function(a,b){return b.amount-a.amount});document.getElementById('hallPremium').innerHTML=prarr.length?'<div class="hall-item"><span class="hall-medal">🎁</span> '+prarr[0].name+' — <b>'+prarr[0].amount+' ₽</b></div>':'Нет данных'})})}
</script>
