<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { 
  overflow: hidden; 
  height: 100vh; 
  width: 100vw;
}
body { 
  font-family: 'Trebuchet MS', Helvetica, sans-serif; 
  color: #eee; 
  font-size: 16px; 
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  transition: background 0.5s ease;
}

/* ====== ТЕМЫ ====== */

/* --- СОТРУДНИК (по умолчанию) --- */
body.theme-manager {
  --bg: #0a0a1a;
  --bg2: rgba(20,20,50,0.85);
  --bg3: rgba(30,30,60,0.7);
  --border: rgba(100,80,220,0.25);
  --accent: #7c3aed;
  --accent2: #a855f7;
  --text: #e8e8ff;
  --muted: #888;
  --green: #22c55e;
  --red: #ef4444;
  --gold: #f5c518;
  background: #0a0a1a;
}
body.theme-manager .bg { display: none; }
body.theme-manager .stars-overlay { display: none; }

/* --- СОЗДАТЕЛЬ (Костя) --- */
body.theme-creator {
  --bg: #060618;
  --bg2: rgba(10,10,40,0.9);
  --bg3: rgba(20,20,50,0.7);
  --border: rgba(100,80,220,0.35);
  --accent: #7c3aed;
  --accent2: #00d4ff;
  --text: #e8e8ff;
  --muted: #888;
  --green: #22c55e;
  --red: #ef4444;
  --gold: #f5c518;
  background: #060618;
  background-image:
    radial-gradient(ellipse at 20% 20%, #1a0050 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, #001a50 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #060618 30%, #020210 100%);
}
body.theme-creator .bg { 
  background: radial-gradient(circle at 50% 20%, #12092b 0%, #060612 70%, #020205 100%); 
  display: block;
}
body.theme-creator .stars-overlay { 
  background-image: radial-gradient(white, rgba(255,255,255,.2) 1.5px, transparent 40px), 
                    radial-gradient(rgba(138,43,226,0.25), rgba(255,255,255,.1) 1px, transparent 30px);
  display: block;
}

/* --- БОГ (Игорь) --- */
body.theme-god {
  --bg: #0f0a00;
  --bg2: rgba(30,20,0,0.85);
  --bg3: rgba(40,25,0,0.7);
  --border: rgba(200,150,0,0.3);
  --accent: #b8860b;
  --accent2: #ffd700;
  --text: #fff0d0;
  --muted: #a08040;
  --green: #22c55e;
  --red: #ef4444;
  --gold: #ffd700;
  background: #0f0a00;
  background-image:
    radial-gradient(ellipse at 50% 0%, #2a1800 0%, #0f0a00 60%),
    radial-gradient(ellipse at 80% 100%, #1a0f00 0%, transparent 60%);
}
body.theme-god .bg { 
  background: radial-gradient(circle at 50% 20%, #3a2202 0%, #170d01 70%, #050200 100%);
  display: block;
}
body.theme-god .stars-overlay { 
  background-image: radial-gradient(white, rgba(255,215,0,.2) 1.5px, transparent 40px), 
                    radial-gradient(rgba(255,69,0,0.25), rgba(255,255,255,.1) 1px, transparent 30px);
  display: block;
}

.bg { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: -1000; pointer-events: none; }
.stars-overlay { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background-size: 450px 450px, 300px 350px; background-position: 0 0, 40px 60px; opacity: 0.3; animation: backgroundStarRotate 300s linear infinite; will-change: transform; }
@keyframes backgroundStarRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.app-container { display: flex; width: 100%; height: 100vh; position: relative; z-index: 1; justify-content: center; overflow: hidden; }
.main-content { width: 100%; max-width: 680px; padding: 12px 16px; display: flex; flex-direction: column; padding-bottom: 70px; height: 100%; }
.profile-row, .tabs, .tab-content, .announce-block, .thought-block, .chat-header-bar { flex-shrink: 0; }

/* ====== АВАТАР С ЭФФЕКТАМИ ====== */
.avatar-wrapper { position: relative; display: inline-block; width: 76px; height: 76px; flex-shrink: 0; perspective: 1000px; transform-style: preserve-3d; }
.avatar { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 10; border: 2px solid #111; display: block; transform: translateZ(0); background: #222; }

/* === Эффект Создателя === */
.avatar-creator { box-shadow: 0 0 15px rgba(138,43,226,0.5); }
.proton-system { position: absolute; inset: -14px; transform-style: preserve-3d; pointer-events: none; z-index: 15; }
.orbit-ring { position: absolute; inset: 0; border: 1px dashed rgba(255, 255, 255, 0.15); border-radius: 50%; transform-style: preserve-3d; }
.ring-1 { transform: rotateX(70deg) rotateY(30deg); animation: rotateRing1 4s linear infinite; border-color: rgba(0, 191, 255, 0.3); }
.ring-2 { transform: rotateX(70deg) rotateY(-30deg); animation: rotateRing2 5s linear infinite; border-color: rgba(245, 197, 24, 0.3); }
.ring-3 { transform: rotateX(20deg) rotateY(80deg); animation: rotateRing3 4.5s linear infinite; border-color: rgba(138, 43, 226, 0.3); }
.electron { position: absolute; width: 8px; height: 8px; border-radius: 50%; top: 0; left: 50%; transform: translate(-50%, -50%); backface-visibility: hidden; }
.el-cyan { background: #00BFFF; box-shadow: 0 0 10px #00BFFF, 0 0 20px #00BFFF; }
.el-gold { background: #f5c518; box-shadow: 0 0 10px #f5c518, 0 0 20px #f5c518; }
.el-purple { background: #8B00FF; box-shadow: 0 0 10px #8B00FF, 0 0 20px #8B00FF; }
@keyframes rotateRing1 { 0% { transform: rotateX(70deg) rotateY(30deg) rotateZ(0deg); } 100% { transform: rotateX(70deg) rotateY(30deg) rotateZ(360deg); } }
@keyframes rotateRing2 { 0% { transform: rotateX(70deg) rotateY(-30deg) rotateZ(360deg); } 100% { transform: rotateX(70deg) rotateY(-30deg) rotateZ(0deg); } }
@keyframes rotateRing3 { 0% { transform: rotateX(20deg) rotateY(80deg) rotateZ(0deg); } 100% { transform: rotateX(20deg) rotateY(80deg) rotateZ(360deg); } }
.quantum-halo { position: absolute; inset: -6px; border-radius: 50%; background: radial-gradient(circle, rgba(138,43,226,0.2) 0%, transparent 70%); z-index: 1; pointer-events: none; animation: corePulse 3s ease-in-out infinite; }
@keyframes corePulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } }

/* === Эффект Бога === */
.avatar-god { border: 2px solid #FFD700; box-shadow: 0 0 20px rgba(255,215,0,0.7); }
.god-system { position: absolute; inset: -15px; pointer-events: none; z-index: 1; }
.god-halo-ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: #FFD700; border-bottom-color: #FF8C00; animation: godSpin 3s linear infinite; box-shadow: 0 0 15px rgba(255,215,0,0.5); }
.god-halo-ring:nth-child(2) { animation: godSpinReverse 4s linear infinite; border-top-color: #FF4500; border-bottom-color: #FFD700; inset: 6px; }
.god-pulse { position: absolute; inset: -8px; border-radius: 50%; background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%); animation: godPulse 2s ease-in-out infinite; z-index: 0; }
@keyframes godSpin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.05); } 100% { transform: rotate(360deg) scale(1); } }
@keyframes godSpinReverse { 0% { transform: rotate(360deg) scale(1.05); } 50% { transform: rotate(180deg) scale(1); } 100% { transform: rotate(0deg) scale(1.05); } }
@keyframes godPulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }

/* ====== ОСТАЛЬНЫЕ СТИЛИ ====== */
.profile-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; padding: 8px 0; }
.creator-badge { font-size: 12px; font-weight: bold; padding: 4px 10px; border-radius: 12px; background: linear-gradient(135deg, var(--gold), var(--accent)); color: #fff; display: inline-block; letter-spacing: 0.5px; }
.god-badge { background: linear-gradient(135deg, #FFD700, #FF4500); }
.manager-badge { background: #2d6a4f; color: #95d5b2; }
.creator-name { background: linear-gradient(135deg, var(--gold), var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
.god-name { background: linear-gradient(135deg, #FFD700, #FF8C00, #FF4500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
.manager-name { color: #eee; font-weight: bold; }

.tab-content { display: none; width: 100%; flex-shrink: 0; }
.tab-content.active-tab { display: block; }

.card, .stat-card, .pinned, .announce-block, .thought-block { 
  background: var(--bg2); 
  padding: 14px; 
  border-radius: 14px; 
  margin: 6px 0; 
  backdrop-filter: blur(10px); 
  border: 1px solid var(--border); 
  overflow: visible; 
}

input, select, textarea { 
  width: 100%; 
  padding: 12px 14px; 
  font-size: 15px; 
  margin: 6px 0; 
  border-radius: 12px; 
  border: 1px solid #444; 
  background: rgba(15,15,30,0.8); 
  color: #fff; 
  outline: none; 
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }

button { border: none; font-weight: bold; cursor: pointer; border-radius: 12px; transition: filter 0.2s; }
button:hover { filter: brightness(1.1); }

.btn-green { background: #4CAF50; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-blue { background: #2196F3; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-red { background: #e94560; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-gray { background: #444; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--accent)); color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-purple { background: #9C27B0; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-orange { background: #FF9800; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
.btn-cyan { background: #00BCD4; color: #fff; padding: 12px; font-size: 15px; margin: 4px 0; width: 100%; }
button:disabled { opacity: 0.5; cursor: default; }

.calendar { 
  display: grid; 
  grid-template-columns: repeat(7, 1fr); 
  gap: 2px; 
  text-align: center; 
  font-size: 12px; 
  background: rgba(22,33,62,0.5); 
  border-radius: 10px; 
  padding: 6px; 
  border: 1px solid var(--border); 
  margin-bottom: 8px; 
  overflow: hidden; 
}
.calendar div { 
  padding: 6px; 
  border-radius: 4px; 
  font-size: 12px; 
  overflow: hidden; 
  text-overflow: ellipsis; 
}
.calendar .shift-day { background: #4CAF50; color: #fff; font-weight: bold; cursor: pointer; }
.calendar .today { border: 2px solid #2196F3; }
.calendar .header { font-weight: bold; background: rgba(51,51,51,0.7); }

.tabs { display: flex; gap: 6px; margin: 10px 0; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tabs button { 
  width: 44px; 
  height: 44px; 
  display: flex; 
  align-items: center; 
  gap: 0.5rem; 
  overflow: hidden; 
  border-radius: 999px; 
  transition: width .3s ease, background .3s ease; 
  background: rgba(255, 255, 255, 0.08); 
  color: #ccc; 
  border: 1px solid transparent; 
  cursor: pointer; 
  padding: 0 12px; 
  font-size: 13px; 
  white-space: nowrap; 
  flex-shrink: 0; 
}
.tabs button:hover { width: 110px; background: rgba(255,255,255,0.15); color: #fff; }
.tabs button.active { 
  background: linear-gradient(135deg, var(--gold), var(--accent)); 
  color: #fff; 
  width: 110px; 
  box-shadow: 0 4px 12px rgba(138,43,226,0.3); 
  border-color: rgba(255,255,255,0.2); 
}
.tabs button .menu-icon { font-size: 16px; flex-shrink: 0; }
.tabs button .menu-label { opacity: 0; max-width: 0; transform: translateX(-6px); transition: all 0.2s ease; }
.tabs button:hover .menu-label, .tabs button.active .menu-label { opacity: 1; max-width: 80px; transform: translateX(0); }

.chat-section { margin: 8px 0 0 0; display: flex; flex-direction: column; flex: 1; min-height: 0; }
.chat-header-bar { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  cursor: pointer; 
  padding: 10px 14px; 
  background: var(--bg2); 
  border-radius: 12px; 
  border: 1px solid var(--border); 
  margin-bottom: 6px; 
  font-size: 14px; 
  transition: background 0.2s; 
}
.chat-header-bar:hover { background: var(--bg3); }
.chat-icon { 
  width: 34px; 
  height: 34px; 
  border-radius: 50%; 
  background: linear-gradient(135deg, var(--gold), var(--accent)); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 16px; 
  flex-shrink: 0; 
  box-shadow: 0 0 10px rgba(138,43,226,0.4); 
}
.chat-label { 
  flex: 1; 
  font-weight: bold; 
  background: linear-gradient(135deg, var(--gold), var(--accent), var(--accent2)); 
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent; 
}
.chat-arrow { color: #aaa; font-size: 12px; transition: transform 0.3s; }
.chat-arrow.open { transform: rotate(180deg); }
.chat-badge { background: #e94560; color: #fff; border-radius: 10px; font-size: 11px; padding: 2px 6px; font-weight: bold; }
.chat-back-btn { background: none; border: 1px solid var(--border); color: #ccc; padding: 4px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; display: none; }

#chat { 
  flex: 1; 
  overflow-y: auto; 
  padding: 10px; 
  border-radius: 14px; 
  background: rgba(15, 15, 30, 0.6); 
  font-size: 13px; 
  border: 1px solid var(--border); 
  transition: padding 0.3s ease, flex 0.3s ease; 
  margin-bottom: 0; 
  scrollbar-width: thin; 
  scrollbar-color: rgba(138, 43, 226, 0.5) transparent; 
}
#chat.hidden { flex: 0; padding: 0 !important; margin-bottom: 0 !important; overflow: hidden; opacity: 0; border: none; min-height: 0; }
#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-thumb { background: rgba(138, 43, 226, 0.5); border-radius: 4px; }

.chat-bubble-group { margin: 6px 0; display: flex; flex-direction: column; position: relative; overflow: visible; }
.chat-bubble-group.mine { align-items: flex-end; } 
.chat-bubble-group.other { align-items: flex-start; }
.chat-bubble { 
  background: rgba(30, 30, 50, 0.9); 
  padding: 8px 12px; 
  border-radius: 14px; 
  margin: 2px 0; 
  display: inline-block; 
  max-width: 82%; 
  word-break: break-word; 
  border: 1px solid rgba(255,255,255,0.05); 
  position: relative; 
}
.chat-bubble.mine { background: rgba(76, 175, 80, 0.15); border: 1px solid rgba(76, 175, 80, 0.3); }
.chat-msg-creator { 
  background: linear-gradient(135deg, rgba(245, 197, 24, 0.15), rgba(138, 43, 226, 0.2)); 
  border: 1px solid rgba(138, 43, 226, 0.4); 
  padding: 8px 12px; 
  border-radius: 14px; 
  margin: 2px 0; 
  display: inline-block; 
  max-width: 82%; 
  position: relative; 
}
.chat-msg-god { 
  background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 69, 0, 0.2)); 
  border: 1px solid rgba(255, 215, 0, 0.4); 
  padding: 8px 12px; 
  border-radius: 14px; 
  margin: 2px 0; 
  display: inline-block; 
  max-width: 82%; 
  position: relative; 
}
.chat-msg-creator .author { 
  background: linear-gradient(135deg, var(--gold), var(--accent), var(--accent2)); 
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent; 
  font-weight: bold; 
}
.chat-msg-god .author { 
  background: linear-gradient(135deg, #FFD700, #FF8C00, #FF4500); 
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent; 
  font-weight: bold; 
}
.avatar-mini { 
  width: 32px !important; 
  height: 32px !important; 
  border-radius: 50%; 
  object-fit: cover; 
  margin-right: 6px; 
  vertical-align: middle; 
  cursor: pointer; 
}
.avatar-mini-creator { border: 2px solid var(--accent); }
.avatar-mini-god { border: 2px solid #FFD700; }

.toast-container { 
  position: fixed; 
  top: 20px; 
  left: 50%; 
  transform: translateX(-50%); 
  z-index: 10000; 
  pointer-events: none; 
  display: flex; 
  flex-direction: column; 
  gap: 8px; 
}
.toast-msg { 
  padding: 12px 20px; 
  border-radius: 12px; 
  background: rgba(20, 20, 35, 0.95); 
  border: 1px solid var(--accent); 
  color: #fff; 
  font-size: 14px; 
  font-weight: bold; 
  box-shadow: 0 5px 20px rgba(0,0,0,0.6); 
  transform: translateY(-20px); 
  opacity: 0; 
  transition: all 0.3s; 
  text-align: center; 
  backdrop-filter: blur(5px); 
}
.toast-msg.error { border-color: #ff1744; }
.toast-msg.show { transform: translateY(0); opacity: 1; }

.msg-menu-btn { 
  position: absolute; 
  top: 4px; 
  right: 4px; 
  width: 22px; 
  height: 22px; 
  border-radius: 50%; 
  background: rgba(0,0,0,0.5); 
  color: #ccc; 
  border: none; 
  cursor: pointer; 
  font-size: 12px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  opacity: 0; 
  transition: opacity 0.2s; 
  z-index: 3; 
}
.chat-bubble:hover .msg-menu-btn, 
.chat-msg-creator:hover .msg-menu-btn, 
.chat-msg-god:hover .msg-menu-btn { opacity: 1; }
.msg-menu-btn:hover { background: rgba(138,43,226,0.7); color: #fff; }
.msg-dropdown { 
  position: absolute; 
  top: 28px; 
  right: 0; 
  background: rgba(15, 15, 30, 0.98); 
  border-radius: 12px; 
  padding: 4px 6px; 
  display: none; 
  gap: 4px; 
  z-index: 10; 
  border: 1px solid var(--border); 
  box-shadow: 0 6px 20px rgba(0,0,0,0.8); 
}
.msg-dropdown.show { display: flex; }
.msg-dropdown button { 
  width: 32px; 
  height: 32px; 
  border-radius: 50%; 
  border: none; 
  cursor: pointer; 
  font-size: 14px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  background: rgba(255,255,255,0.06); 
  color: #fff; 
}
.msg-dropdown button:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); }

#chat .chat-img { 
  max-width: 220px; 
  max-height: 160px; 
  border-radius: 10px; 
  margin: 5px 0; 
  cursor: pointer; 
  object-fit: cover; 
}
#chat .thumb { 
  width: 75px; 
  height: 75px; 
  object-fit: cover; 
  border-radius: 8px; 
  cursor: pointer; 
  margin: 3px; 
  display: inline-block; 
}
#chat .photo-pack { display: flex; gap: 4px; flex-wrap: wrap; margin: 5px 0; }
.like-indicator { 
  font-size: 11px; 
  background: rgba(0,0,0,0.5); 
  border-radius: 10px; 
  padding: 2px 7px; 
  display: none; 
  margin-top: 3px; 
}
.like-indicator.has-likes { display: inline-block; }
.photo-preview { display: flex; gap: 4px; flex-wrap: wrap; }
.photo-preview img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }

#photoViewer { 
  position: fixed; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%; 
  background: rgba(0,0,0,0.95); 
  display: none; 
  align-items: center; 
  justify-content: center; 
  z-index: 10000; 
}
#photoViewer img { max-width: 95%; max-height: 90%; border-radius: 12px; }

/* ====== СТИКЕРЫ ====== */
.input-wrapper { position: relative; flex: 1; display: flex; }
.sticker-toggle { 
  position: absolute; 
  right: 10px; 
  top: 50%; 
  transform: translateY(-50%); 
  background: none; 
  border: none; 
  font-size: 20px; 
  cursor: pointer; 
  color: #aaa; 
  transition: color 0.2s; 
  padding: 5px; 
}
.sticker-toggle:hover { filter: brightness(1.2); }
.sticker-panel { 
  position: absolute; 
  bottom: 55px; 
  right: 0; 
  width: 300px; 
  height: 350px; 
  background: rgba(15, 15, 30, 0.98); 
  border: 1px solid var(--border); 
  border-radius: 16px; 
  display: none; 
  flex-direction: column; 
  z-index: 1000; 
  box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
  backdrop-filter: blur(20px); 
  overflow: hidden; 
}
.sticker-panel.show { display: flex; animation: fadeIn 0.2s; }
.sticker-content { 
  flex: 1; 
  overflow-y: auto; 
  padding: 10px; 
  display: flex; 
  flex-wrap: wrap; 
  gap: 8px; 
  align-content: flex-start; 
  scrollbar-width: none; 
}
.sticker-tabs { 
  display: flex; 
  background: rgba(22,33,62,0.9); 
  padding: 5px; 
  gap: 5px; 
  overflow-x: auto; 
  scrollbar-width: none; 
  border-top: 1px solid var(--border); 
}
.st-tab { 
  width: 36px; 
  height: 36px; 
  border-radius: 8px; 
  border: none; 
  background: transparent; 
  cursor: pointer; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 18px; 
  opacity: 0.6; 
  transition: 0.2s; 
  flex-shrink: 0; 
}
.st-tab.active, .st-tab:hover { opacity: 1; background: rgba(138,43,226,0.3); }
.st-tab img { width: 24px; height: 24px; object-fit: contain; }
.st-item { 
  width: 70px; 
  height: 70px; 
  cursor: pointer; 
  transition: transform 0.1s; 
  border-radius: 8px;

// ====== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ======
function showToast(text, isError) {
  isError = isError || false;
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast-msg ' + (isError ? 'error' : '');
  toast.innerHTML = text;
  container.appendChild(toast);
  setTimeout(function(){ toast.classList.add('show'); }, 10);
  setTimeout(function(){ toast.classList.remove('show'); setTimeout(function(){ toast.remove(); }, 300); }, 3000);
}

function sendVkNotify(vkId, msg) {
  if (!vkId) return;
  fetch('https://api.vk.com/method/messages.send?v=5.131&access_token='+VK_TOKEN+'&user_id='+vkId+'&random_id='+Date.now()+'&message='+encodeURIComponent(msg));
}

function randomText(arr, sum) {
  return arr[Math.floor(Math.random() * arr.length)].replace('{sum}', sum);
}

function getGodStatus(n) {
  for (var i = GOD_STATUSES.length - 1; i >= 0; i--) {
    if (n >= GOD_STATUSES[i].min) return GOD_STATUSES[i];
  }
  return GOD_STATUSES[0];
}

function fmtDate(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  return d.getDate() + '.' + (d.getMonth() + 1) + '.' + d.getFullYear();
}

function fmtTime(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function secToHMS(sec) {
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = sec % 60;
  return h.toString().padStart(2,'0') + ':' + m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0');
}

function avaHtml(user, size) {
  size = size || 54;
  if (user && user.avatar) {
    return '<img src="'+user.avatar+'" style="width:'+size+'px;height:'+size+'px;object-fit:cover;border-radius:50%">';
  }
  var initial = (user && user.name) ? user.name[0].toUpperCase() : '?';
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:'+Math.floor(size*0.4)+'px;font-weight:700;color:#fff;flex-shrink:0">'+initial+'</div>';
}

async function loginUser() {
  var name = document.getElementById('loginName').value.trim();
  var password = document.getElementById('loginPass').value.trim();
  if (!name || !password) { showToast('❌ Введите имя и пароль', true); return; }

  // Хардкод для Кости
  if (name === 'Костя' && password === '2706') {
    var snap = await db.ref('users/Костя').once('value');
    _user = snap.exists() ? snap.val() : { name: 'Костя' };
    _user.role = 'creator';
    localStorage.setItem('creator_user', JSON.stringify(_user));
    finishLogin();
    return;
  }

  // Хардкод для Игоря
  if (name === 'Игорь' && password === '789987') {
    var snap2 = await db.ref('users/Игорь').once('value');
    _user = snap2.exists() ? snap2.val() : { name: 'Игорь' };
    _user.role = 'god';
    localStorage.setItem('creator_user', JSON.stringify(_user));
    finishLogin();
    return;
  }

  // Проверка сотрудников
  var userSnap = await db.ref('users').orderByChild('name').equalTo(name).once('value');
  if (userSnap.exists()) {
    var userData = null, userKey = null;
    userSnap.forEach(function(c){ userData = c.val(); userKey = c.key; });
    if (userData.password && userData.password === password) {
      _user = userData;
      _user.key = userKey;
      _user.role = userData.role || 'manager';
      localStorage.setItem('creator_user', JSON.stringify(_user));
      finishLogin();
      return;
    }
  }

  showToast('❌ Неверный пароль', true);
}

  container.innerHTML = tabsConfig.map(function(t, i) {
    return '<button id="tab_' + t.id + '" class="' + (i === 0 ? 'active' : '') + '" onclick="switchTab(\'' + t.id + '\')"><span class="menu-icon">' + t.icon + '</span><span class="menu-label">' + t.label + '</span></button>';
  }).join('');

  // Контент
  var contentContainer = document.getElementById('tabContentContainer');
  contentContainer.innerHTML = tabsConfig.map(function(t, i) {
    return '<div id="panel_' + t.id + '" class="tab-content' + (i === 0 ? ' active-tab' : '') + '"></div>';
  }).join('');

function switchTab(id) {
  var activeBtn = document.getElementById('tab_' + id);
  var panel = document.getElementById('panel_' + id);
  
  // Если вкладка уже активна — сворачиваем её
  if (activeBtn && activeBtn.classList.contains('active')) {
    activeBtn.classList.remove('active');
    if (panel) panel.classList.remove('active-tab');
    return;
  }
  
  // Обновляем активную кнопку
  document.querySelectorAll('#tabsContainer button').forEach(function(btn) {
    btn.classList.remove('active');
  });
  if (activeBtn) activeBtn.classList.add('active');
  
  // Обновляем панели
  document.querySelectorAll('#tabContentContainer .tab-content').forEach(function(p) {
    p.classList.remove('active-tab');
  });
  if (panel) {
    panel.classList.add('active-tab');
    // Всегда перерисовываем контент при переключении
    renderTabContent(id);
  }
}

function renderTabContent(id) {
  var panel = document.getElementById('panel_' + id);
  if (!panel) return;
  
  // Очищаем и перерисовываем
  panel.innerHTML = '';
  
  switch(id) {
    case 'shift': renderShiftTab(panel); break;
    case 'stats': renderStatsTab(panel); break;
    case 'history': renderHistoryTab(panel); break;
    case 'notify': renderNotifyTab(panel); break;
    case 'board': renderBoardTab(panel); break;
    case 'power': renderPowerTab(panel); break;
    case 'announce': renderAnnounceTab(panel); break;
    case 'punkts': renderPunktsTab(panel); break;
    case 'workers': renderWorkersTab(panel); break;
    case 'salary': renderSalaryTab(panel); break;
  }
  
  panel.dataset.loaded = '1';
}

function startShiftTimer() {
  if (window.shiftTimer) clearInterval(window.shiftTimer);
  var startTime = Date.now();
  var display = document.getElementById('shiftTimerDisplay');
  window.shiftTimer = setInterval(function() {
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    if (display) display.textContent = secToHMS(elapsed);
  }, 1000);
}

function startShift() {
  var t = new Date().toLocaleTimeString('ru-RU');
  db.ref('activeShifts/' + _user.name).set({ active: true, startTime: Date.now(), punct: _user.punkt });
  db.ref('chat').push({
    user: (_user.role === 'god' ? '👑 ' : '🌌 ') + _user.name,
    text: '🔵 Пункт ' + _user.punkt + ' на смене! (' + t + ')',
    timestamp: Date.now()
  });
  loadShiftState();
  showToast('✅ Смена начата!');
}

function endShift() {
  var tovar = parseInt(document.getElementById('tovarCount')?.value) || 0;
  db.ref('activeShifts/' + _user.name).once('value', function(snap) {
    if (!snap.exists()) return;
    var start = snap.val().startTime;
    var hours = Math.round((Date.now() - start) / 3600000 * 100) / 100;
    var shiftId = _user.name + '_' + Date.now();
    db.ref('shifts/' + shiftId).set({
      user: _user.name,
      punkt: _user.punkt || '49',
      date: new Date().toLocaleDateString('ru-RU'),
      timeFrom: new Date(start).toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'}),
      timeTo: new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'}),
      hours: hours,
      tovar: tovar,
      paid: false,
      timestamp: Date.now()
    });
    db.ref('chat').push({
      user: (_user.role === 'god' ? '👑 ' : '🌌 ') + _user.name,
      text: '🔴 Пункт ' + _user.punkt + ' с ' + new Date(start).toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'}) + ' до ' + new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'}) + ', товаров: ' + tovar,
      timestamp: Date.now()
    });
    db.ref('activeShifts/' + _user.name).remove();
    if (window.shiftTimer) clearInterval(window.shiftTimer);
    loadShiftState();
    showToast('✅ Смена закрыта! ' + hours + 'ч, ' + tovar + ' товаров');
  });
}

function renderCalendar() {
  var months = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
  document.getElementById('calTitle').textContent = '📅 Календарь — ' + months[calMonth] + ' ' + calYear + ' г.';
  
  db.ref('shifts').once('value', function(snap) {
    var shifts = {};
    if (snap.exists()) {
      snap.forEach(function(c) {
        var s = c.val();
        if (s.user === _user.name) {
          var d = new Date(s.date || s.timestamp);
          if (d.getFullYear() === calYear && d.getMonth() === calMonth) {
            var day = d.getDate();
            if (!shifts[day]) shifts[day] = {count:0,hours:0,tovar:0};
            shifts[day].count++;
            shifts[day].hours += s.hours || 0;
            shifts[day].tovar += s.tovar || 0;
          }
        }
      });
    }
    
    var totalShifts = 0, totalHours = 0, totalTovar = 0;
    for (var key in shifts) {
      totalShifts += shifts[key].count;
      totalHours += shifts[key].hours;
      totalTovar += shifts[key].tovar;
    }
    document.getElementById('statShifts').textContent = totalShifts;
    document.getElementById('statHours').textContent = totalHours.toFixed(1);
    document.getElementById('statTovar').textContent = totalTovar;
    
    var firstDay = new Date(calYear, calMonth, 1).getDay();
    var offset = (firstDay + 6) % 7;
    var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    var today = new Date();
    var grid = document.getElementById('calGrid');
    var days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    grid.innerHTML = days.map(function(d) { return '<div class="cal-day-name" style="text-align:center;font-size:10px;color:var(--muted);padding:4px 0;font-weight:600;">'+d+'</div>'; }).join('');
    for (var i = 0; i < offset; i++) grid.innerHTML += '<div class="cal-day empty" style="opacity:0;"></div>';
    for (var d = 1; d <= daysInMonth; d++) {
      var isToday = today.getDate() === d && today.getMonth() === calMonth && today.getFullYear() === calYear;
      var hasShift = !!shifts[d];
      grid.innerHTML += '<div class="cal-day ' + (isToday ? 'today' : '') + ' ' + (hasShift ? 'has-shift' : '') + '" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;transition:all .15s;' + (isToday ? 'border:1.5px solid var(--accent);color:var(--accent);font-weight:700;' : '') + (hasShift ? 'background:rgba(34,197,94,0.2);color:var(--green);font-weight:700;' : '') + '">' + d + '</div>';
    }
  });
}

function changeCalMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function loadAnnouncements() {

              '<button class="btn-gold" onclick="openPremium(\'' + item.data.name + '\')" style="width:auto;padding:6px 10px;font-size:11px;background:var(--gold);color:#000;border:none;border-radius:10px;cursor:pointer;">🎁</button>' +
              '<button class="btn-purple" onclick="openPunish(\'' + item.data.name + '\')" style="width:auto;padding:6px 10px;font-size:11px;background:#9C27B0;color:#fff;border:none;border-radius:10px;cursor:pointer;">⚠️</button>') +
             '    <button class="btn-red" onclick="deleteWorker(\'' + item.key + '\',\'' + item.data.name + '\')" style="width:auto;padding:6px 10px;font-size:11px;background:var(--red);color:#fff;border:none;border-radius:10px;cursor:pointer;">✕</button>' +
             '  </span>' +

    }).join('');
  });

function setBonus(key, name, cur) {
  var b = prompt('Надбавка для ' + name + ':', cur);
  if (b !== null && !isNaN(parseInt(b))) {
    db.ref('users/' + key + '/bonus').set(parseInt(b));
    loadWorkersList();
  }
}

function deleteWorker(key, name) {
  if (name === 'Костя') { showToast('🚫 Создателя нельзя удалить!', true); return; }
  if (!confirm('Удалить ' + name + '?')) return;
  db.ref('shifts').orderByChild('user').equalTo(name).once('value', function(snap) {
    snap.forEach(function(c) { db.ref('shifts/' + c.key).remove(); });
  });
  db.ref('users/' + key).remove();
  loadWorkersList();
  showToast('🗑 Удалён');
}

function loadCalcUsers() {

    var sel = document.getElementById('calcUser');
    sel.innerHTML = '<option value="">— Выбери —</option>';
    snap.forEach(function(c) {

        sel.innerHTML += '<option value="' + u.name + '">' + u.name + '</option>';
      }
    });
  });
}

function onCalcSelect() {
  var u = document.getElementById('calcUser').value;
  var block = document.getElementById('calcBlock');
  block.style.display = u ? 'block' : 'none';
  if (u) {
    var now = new Date();
    var from = new Date(now);
    from.setDate(now.getDate() - 14);
    document.getElementById('calcFrom').value = from.toISOString().split('T')[0];
    document.getElementById('calcTo').value = now.toISOString().split('T')[0];
    document.getElementById('zpResult').style.display = 'none';
    loadShiftsForCalc(u);
  }
}

function loadShiftsForCalc(user) {
  db.ref('shifts').orderByChild('user').equalTo(user).once('value', function(snap) {
    allShifts = [];
    snap.forEach(function(c) {
      var x = c.val();
      x._id = c.key;
      allShifts.push(x);
    });
    allShifts.sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });
    renderCalendarForCalc();
  });
}

function renderCalendarForCalc() {
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth();
  var dim = new Date(y, m + 1, 0).getDate();
  var fd = new Date(y, m, 0).getDay();
  document.getElementById('calHeader').innerHTML = '<b>' + now.toLocaleDateString('ru-RU', {month:'long', year:'numeric'}) + '</b>';
  var days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  var h = '';
  for (var i = 0; i < 7; i++) h += '<div class="header" style="font-weight:bold;background:rgba(51,51,51,0.7);padding:6px;border-radius:4px;">' + days[i] + '</div>';
  for (var i = 0; i < fd; i++) h += '<div style="padding:6px;border-radius:4px;"></div>';
  var sd = {};
  allShifts.forEach(function(s) { sd[s.date] = s; });
  var ts = now.toLocaleDateString('ru-RU');
  for (var d = 1; d <= dim; d++) {
    var ds = new Date(y, m, d).toLocaleDateString('ru-RU');
    var cl = '';
    if (sd[ds]) cl = 'shift-day';
    if (ds === ts) cl += ' today';
    h += '<div class="' + cl + '" onclick="showShiftDetail(\'' + ds + '\')" style="padding:6px;border-radius:4px;cursor:pointer;' + (cl.indexOf('shift-day') >= 0 ? 'background:#4CAF50;color:#fff;font-weight:bold;' : '') + (cl.indexOf('today') >= 0 ? 'border:2px solid #2196F3;' : '') + '">' + d + '</div>';
  }
  document.getElementById('calendar').innerHTML = h;
}

function showShiftDetail(dateStr) {
  var shifts = allShifts.filter(function(s) { return s.date === dateStr; });
  var h = '<b>' + dateStr + '</b><br>';
  shifts.forEach(function(s) {
    h += '<div class="shift-edit-row" style="display:flex;gap:4px;align-items:center;margin:4px 0;flex-wrap:wrap;">';
    h += '<input id="ed_' + s._id + '_tf" value="' + s.timeFrom + '" style="flex:1;padding:8px;font-size:13px;min-width:40px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:var(--text);">–';
    h += '<input id="ed_' + s._id + '_tt" value="' + s.timeTo + '" style="flex:1;padding:8px;font-size:13px;min-width:40px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:var(--text);">';
    h += 'Товаров: <input id="ed_' + s._id + '_tv" type="number" value="' + s.tovar + '" style="flex:1;padding:8px;font-size:13px;min-width:60px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:var(--text);">';
    h += '<button class="btn-blue" onclick="editShiftForCalc(\'' + s._id + '\')" style="width:auto;padding:8px 12px;font-size:12px;background:#2196F3;color:#fff;border:none;border-radius:8px;cursor:pointer;">💾</button>';
    h += '<button class="btn-red" onclick="delShiftForCalc(\'' + s._id + '\')" style="width:auto;padding:8px 12px;font-size:12px;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;">✕</button>';
    h += '</div>';
  });
  document.getElementById('shiftDetail').innerHTML = h;
}

function editShiftForCalc(id) {
  var tf = document.getElementById('ed_' + id + '_tf').value;
  var tt = document.getElementById('ed_' + id + '_tt').value;
  var tv = parseInt(document.getElementById('ed_' + id + '_tv').value) || 0;
  db.ref('shifts/' + id).update({ timeFrom: tf, timeTo: tt, hours: parseInt(tt) - parseInt(tf), tovar: tv });
  showToast('✅ Обновлено');
  loadShiftsForCalc(document.getElementById('calcUser').value);
}

function delShiftForCalc(id) {
  if (!confirm('Удалить смену?')) return;
  db.ref('shifts/' + id).remove();
  loadShiftsForCalc(document.getElementById('calcUser').value);
}

function addShiftForSalary() {
  var u = document.getElementById('calcUser').value;
  if (!u) { showToast('❌ Выбери сотрудника!', true); return; }
  currentAddUser = u;
  var d = prompt('Дата (ДД.ММ.ГГГГ):', new Date().toLocaleDateString('ru-RU'));
  if (!d) return;
  var tf = prompt('Время начала (ч):', '9');
  var tt = prompt('Время окончания (ч):', '21');
  var tv = parseInt(prompt('Товаров:', '0')) || 0;
  if (!d || !tf || !tt) return;
  var parts = d.split('.');
  var dateObj = new Date(parts[2], parts[1] - 1, parts[0]);
  if (isNaN(dateObj)) { showToast('❌ Неверный формат даты!', true); return; }
  db.ref('shifts/' + u + '_' + Date.now()).set({
    user: u,
    punkt: '49',
    date: d,
    timeFrom: tf,
    timeTo: tt,
    hours: parseInt(tt) - parseInt(tf),
    tovar: tv,
    paid: false,
    timestamp: dateObj.toISOString()
  });
  showToast('✅ Смена добавлена!');
  loadShiftsForCalc(u);
}

function calcZP() {
  var u = document.getElementById('calcUser').value;
  var from = new Date(document.getElementById('calcFrom').value);
  var to = new Date(document.getElementById('calcTo').value);
  to.setHours(23, 59, 59);
  if (!u || isNaN(from) || isNaN(to)) { showToast('❌ Заполни период!', true); return; }
  
  db.ref('punkts').once('value', function(pkSnap) {
    var rates = {};
    pkSnap.forEach(function(c) { rates[c.key] = c.val().rate || 0; });
    
    db.ref('users/' + u).once('value', function(uSnap) {
      var bonus = uSnap.exists() ? uSnap.val().bonus || 0 : 0;
      
      db.ref('punishes').orderByChild('user').equalTo(u).once('value', function(pnSnap) {
        var totalPunish = 0;
        pnSnap.forEach(function(c) {
          var p = c.val();
          if (new Date(p.timestamp) >= from && new Date(p.timestamp) <= to) {
            totalPunish += p.amount || 0;
          }
        });
        
        db.ref('premiums').orderByChild('user').equalTo(u).once('value', function(prSnap) {
          var totalPremium = 0;
          prSnap.forEach(function(c) {
            var p = c.val();
            if (new Date(p.timestamp) >= from && new Date(p.timestamp) <= to) {
              totalPremium += p.amount || 0;
            }
          });
          
          var shifts = allShifts.filter(function(s) {
            var t = new Date(s.timestamp);
            return t >= from && t <= to && !s.paid;
          });
          
          var th = 0, tt = 0, tz = 0;
          shifts.forEach(function(s) {
            var h = s.hours || 0;
            var tv = s.tovar || 0;
            th += h;
            tt += tv;
            var rate = rates[s.punkt] || 0;
            tz += h * rate + tv + bonus;
          });
          tz += totalPremium;
          
          var result = document.getElementById('zpResult');
          result.style.display = 'block';
          result.innerHTML = '📊 <b>' + u + '</b>\n' +
            from.toLocaleDateString('ru-RU') + ' – ' + to.toLocaleDateString('ru-RU') + '\n\n' +
            'Часов: ' + th + '\n' +
            'Товаров: ' + tt + '\n' +
            'ЗП: ' + (tz - totalPremium) + ' ₽\n' +
            'Премии: +' + totalPremium + ' ₽\n' +
            'Штрафы: -' + totalPunish + ' ₽\n' +
            '<b>Итого: ' + (tz - totalPunish) + ' ₽</b>';
          
          lastCalc = {
            user: u,
            from: from.toISOString(),
            to: to.toISOString(),
            shifts: shifts.map(function(s) { return s._id; }),
            total: tz - totalPunish
          };
        });
      });
    });
  });
}

function markPaid() {
  if (!lastCalc || !lastCalc.shifts || !lastCalc.shifts.length) {
    showToast('❌ Сначала нажми "Посчитать"!', true);
    return;
  }
  if (!confirm('Оплачено?\n' + lastCalc.total + ' ₽')) return;
  db.ref('payments').push({
    user: lastCalc.user,
    dateFrom: lastCalc.from,
    dateTo: lastCalc.to,
    total: lastCalc.total,
    timestamp: Date.now()
  });
  lastCalc.shifts.forEach(function(id) {
    db.ref('shifts/' + id + '/paid').set(true);
  });
  showToast('✅ Оплачено ' + lastCalc.total + '₽');
  document.getElementById('zpResult').style.display = 'none';
  lastCalc = null;
}

function saveSettings() {
  var nn = document.getElementById('newName').value.trim();
  var np = document.getElementById('newPass').value.trim();
  var npu = document.getElementById('newPunkt').value;
  var nvk = document.getElementById('newVkId').value.trim();
  var ok = _user.name;
  var up = {};
  var cf = document.getElementById('chatFont').value;
  localStorage.setItem('chatFont', cf);
  document.getElementById('chat').style.fontSize = cf + 'px';
  
  if (nn && nn !== _user.name) {
    up['users/' + nn] = {
      name: nn,
      punkt: npu || _user.punkt,
      password: _user.password,
      bonus: 0,
      avatar: newAvatarData || _user.avatar || '',
      vkId: nvk || _user.vkId || ''
    };
    if (np) up['users/' + nn + '/password'] = np;
    up['users/' + ok] = null;
    _user.name = nn;
    if (npu) _user.punkt = npu;
    if (nvk) _user.vkId = nvk;
  } else {
    var uu = {
      name: _user.name,
      punkt: _user.punkt,
      avatar: _user.avatar || '',
      vkId: _user.vkId || ''
    };
    if (np) uu.password = np;
    if (newAvatarData) uu.avatar = newAvatarData;
    if (nvk) uu.vkId = nvk;
    if (npu) uu.punkt = npu;
    up['users/' + ok] = uu;
    if (npu) _user.punkt = npu;
    if (nvk) _user.vkId = nvk;
  }
  
  if (Object.keys(up).length === 0) { closeSettings(); return; }
  
  db.ref().update(up, function(err) {
    if (err) { showToast('❌ Ошибка сохранения', true); return; }
    if (np) _user.password = np;
    if (newAvatarData) _user.avatar = newAvatarData;
    else if (!_user.avatar && uu) _user.avatar = uu.avatar || '';
    if (nvk) _user.vkId = nvk;
    localStorage.setItem('creator_user', JSON.stringify(_user));
    updateProfileUI();
    closeSettings();
    buildCarousel();
    showToast('✅ Настройки сохранены');
  });
}

  else { b.style.display = 'none'; }
}

function loadChat() {
  var cf = localStorage.getItem('chatFont') || '13';
  var chatEl = document.getElementById('chat');
  var wasAtBottom = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 60;
  chatEl.style.fontSize = cf + 'px';
  
  var ref = privateChatWith ? getPrivateChatRef() : db.ref('chat');
  ref.limitToLast(50).on('value', function(s) {
    var groups = {}, order = [];
    s.forEach(function(c) {
      var m = c.val();
      var curUser = m.user || '';
      if (!groups[curUser]) { groups[curUser] = []; order.push(curUser); }
      groups[curUser].push({ key: c.key, msg: m, isCreator: m.user && m.user.indexOf('🌌') === 0, isGod: m.user && m.user.indexOf('👑') === 0 || m.role === 'god' });
    });
    var h = '';
    var isAdmin = _user && (_user.role === 'creator' || _user.role === 'god');
    
    for (var u = 0; u < order.length; u++) {
      var curUser = order[u];
      var msgs = groups[curUser];
      var firstMsg = msgs[0];
      var isCreatorMsg = firstMsg.isCreator;
      var isGodMsg = firstMsg.isGod;
      var isMine = _user && (curUser === '🌌 ' + _user.name || curUser === '👑 ' + _user.name || curUser === _user.name || curUser === '📢 ' + _user.name);
      var alignClass = isMine ? 'mine' : 'other';
      h += '<div class="chat-bubble-group ' + alignClass + '">';
      var m0 = msgs[0].msg;
      var sn = (m0.user || '').replace('📢 ', '').replace('🌌 ', '').replace('👑 ', '');
      var av = allUsers[sn] || '';
      
      var renderMsgContent = function(m) {
        var c = '';
        if (m.text) c += m.text;
        if (m.photo) c += '<br><img class="chat-img" src="' + (m.thumb || m.photo) + '" onclick="event.stopPropagation();viewPhoto(\'' + m.photo + '\')">';
        if (m.sticker) c += '<img class="chat-sticker" src="' + m.sticker + '">';
        if (m.photos && m.photos.length) {
          c += '<div class="photo-pack">';
          for (var pi = 0; pi < m.photos.length; pi++) {
            var p = m.photos[pi];
            var pt = typeof p === 'object' ? p.thumb : p;
            c += '<img class="thumb" src="' + pt + '" onclick="event.stopPropagation();viewPack(\'' + JSON.stringify(m.photos.map(function(x) { return typeof x === 'object' ? x.full : x; }).join('|||')).replace(/'/g, "&#39;").replace(/"/g, '&quot;') + '\')">';
          }
          c += '</div>';
        }
        return c;
      };
      
      var msgClass = isGodMsg ? 'chat-msg-god' : (isCreatorMsg ? 'chat-msg-creator' : 'chat-bubble' + (isMine ? ' mine' : ''));
      var avClass = isGodMsg ? 'avatar-mini avatar-mini-god' : (isCreatorMsg ? 'avatar-mini avatar-mini-creator' : 'avatar-mini');
      var btnType = isGodMsg ? 'god' : (isCreatorMsg ? 'creator' : 'normal');
      
      var canDelete = isAdmin || isMine;
      var pinBtnHtml = isAdmin ? '<button class="btn-pin" onclick="event.stopPropagation();pinMsg(\'' + firstMsg.key + '\')">📌</button>' : '';
      var delBtnHtml = canDelete ? '<button class="btn-del" onclick="event.stopPropagation();delChatMsg(\'' + firstMsg.key + '\',\'' + btnType + '\')">✕</button>' : '';
      
      h += '<div class="' + msgClass + '">';
      h += '<button class="msg-menu-btn" onclick="event.stopPropagation();toggleMsgDropdown(event,\'' + firstMsg.key + '\',\'' + btnType + '\')">⋮</button>';
      h += '<div class="msg-dropdown" data-dropdown="' + firstMsg.key + '"><button class="btn-like" onclick="event.stopPropagation();likeMsg(\'' + firstMsg.key + '\')">❤️</button>' + pinBtnHtml + delBtnHtml + '</div>';
      if (av) h += '<img class="' + avClass + '" src="' + av + '" onclick="event.stopPropagation(); selectProfile(\'' + sn + '\'); toggleSidebar();">';
      h += '<b class="' + (isGodMsg || isCreatorMsg ? 'author' : '') + '" onclick="event.stopPropagation(); selectProfile(\'' + sn + '\'); toggleSidebar();" style="cursor:pointer">' + sn + '</b> ';
      h += renderMsgContent(m0);
      h += '</div>';
      
      for (var j = 1; j < msgs.length; j++) {
        var m = msgs[j].msg;
        var subPinBtn = isAdmin ? '<button class="btn-pin" onclick="event.stopPropagation();pinMsg(\'' + msgs[j].key + '\')">📌</button>' : '';
        var subDelBtn = canDelete ? '<button class="btn-del" onclick="event.stopPropagation();delChatMsg(\'' + msgs[j].key + '\',\'' + btnType + '\')">✕</button>' : '';
        h += '<div class="' + msgClass + '">';
        h += '<button class="msg-menu-btn" onclick="event.stopPropagation();toggleMsgDropdown(event,\'' + msgs[j].key + '\',\'' + btnType + '\')">⋮</button>';
        h += '<div class="msg-dropdown" data-dropdown="' + msgs[j].key + '"><button class="btn-like" onclick="event.stopPropagation();likeMsg(\'' + msgs[j].key + '\')">❤️</button>' + subPinBtn + subDelBtn + '</div>';
        h += renderMsgContent(m);
        h += '</div>';
      }
      
      var likes = firstMsg.msg.likes || {};
      var likeCount = Object.keys(likes).length;
      if (likeCount > 0) {
        var myKey = _user.name;
        var isLiked = !!likes[myKey];
        var likeIcon = isLiked ? (likes[myKey] === 'god' ? '👑' : likes[myKey] === 'creator' ? '🌌' : '❤️') : '❤️';
        h += '<div class="like-indicator has-likes">' + likeIcon + ' ' + likeCount + '</div>';
      }
      h += '</div>';
    }
    chatEl.innerHTML = h;
    if (wasAtBottom || document.activeElement === document.getElementById('chatMsgInput')) {
      chatEl.scrollTop = chatEl.scrollHeight;
    }
  });
}

function toggleMsgDropdown(e, key, type) {
  e.stopPropagation();
  if (openDropdown) openDropdown.classList.remove('show');
  var dd = document.querySelector('[data-dropdown="' + key + '"]');
  if (!dd) return;
  if (dd === openDropdown) { dd.classList.remove('show'); openDropdown = null; return; }
  dd.classList.add('show');
  openDropdown = dd;
}

function likeMsg(key) {
  if (!_user) return;
  var ref = privateChatWith ? getPrivateChatRef().child(key + '/likes') : db.ref('chat/' + key + '/likes');
  ref.once('value', function(s) {
    var likes = s.val() || {};
    var myKey = _user.name;
    var likeType = _user.role === 'god' ? 'god' : (_user.role === 'creator' ? 'creator' : 'user');
    if (likes[myKey]) delete likes[myKey];
    else likes[myKey] = likeType;
    ref.set(likes);
  });
  if (openDropdown) { openDropdown.classList.remove('show'); openDropdown = null; }
}

function viewPhoto(url) {
  document.getElementById('photoViewerImg').src = url;
  document.getElementById('photoViewer').style.display = 'flex';
}

function viewPack(pd) {
  var parts = pd.split('|||');
  var v = document.getElementById('photoViewer');
  var im = document.getElementById('photoViewerImg');
  var idx = 0;
  im.src = parts[0];
  v.style.display = 'flex';
  v.onclick = function(e) {
    if (e.target === v) { v.style.display = 'none'; v.onclick = null; }
  };
  im.onclick = function(e) {
    e.stopPropagation();
    idx++;

function delChatMsg(key, type) {
  if (openDropdown) { openDropdown.classList.remove('show'); openDropdown = null; }

function pinMsg(key) {

function sendMsg(textOverride) {
  var input = document.getElementById('chatMsgInput');
  var t = textOverride || input.value.trim();
  if (!t || !_user) return;
  
  var mentions = t.match(/@(\S+)/g);
  if (mentions) {
    db.ref('users').once('value', function(snap) {
      var vkIds = {};
      snap.forEach(function(c) { vkIds[c.val().name] = c.val().vkId || ''; });
      for (var i = 0; i < mentions.length; i++) {
        var name = mentions[i].replace('@', '');
        var vkId = vkIds[name];
        if (vkId) sendVkNotify(vkId, '📢 Упоминание в чате Ozon:\n' + t);
      }
    });
  }
  
  var ref = privateChatWith ? getPrivateChatRef() : db.ref('chat');
  ref.push({
    user: (_user.role === 'god' ? '👑 ' : '🌌 ') + _user.name,
    text: t,
    timestamp: Date.now(),
    role: _user.role,
    likes: {}
  });
  input.value = '';
}

document.getElementById('chatMsgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); sendMsg(); }
});

function sendPhoto() {
  var files = document.getElementById('chatPhoto').files;
  if (!files.length || !_user) return;
  var photos = [];
  var count = Math.min(files.length, 5);
  for (var i = 0; i < count; i++) {
    (function(file) {
      var r = new FileReader();
      r.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var c = document.createElement('canvas');
          var mw = 300;
          var s = mw / img.width;
          c.width = mw;
          c.height = img.height * s;
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          var thumb = c.toDataURL('image/jpeg', 0.6);
          photos.push({ full: e.target.result, thumb: thumb });
          if (photos.length === count) {
            var ref = privateChatWith ? getPrivateChatRef() : db.ref('chat');
            ref.push({
              user: (_user.role === 'god' ? '👑 ' : '🌌 ') + _user.name,
              text: '📷 ' + count + ' фото',
              photos: photos,
              timestamp: Date.now(),
              role: _user.role,
              likes: {}
            });
          }
        };
        img.src = e.target.result;
      };
      r.readAsDataURL(file);
    })(files[i]);
  }
  document.getElementById('chatPhoto').value = '';
}

function getAccessiblePacks() {
  if (!_user) return [];
  var accessible = [];
  for (var id in globalStickerPacks) {
    var p = globalStickerPacks[id];
    if (p.creator === _user.name || _user.role === 'creator' || _user.role === 'god' || (p.allowed_users && p.allowed_users[_user.name])) {
      accessible.push({ id: id, pack: p });
    }
  }
  return accessible;
}

function renderStickerUI() {
  var tabsContainer = document.getElementById('stickerTabs');
  var contentContainer = document.getElementById('stickerContent');
  if (!tabsContainer || !contentContainer) return;
  var packs = getAccessiblePacks();
  var tabsHtml = '<button class="st-tab ' + (currentStickerTab === 'emoji' ? 'active' : '') + '" onclick="event.stopPropagation(); setStickerTab(\'emoji\')">😀</button>';
  packs.forEach(function(p) {
    tabsHtml += '<button class="st-tab ' + (currentStickerTab === p.id ? 'active' : '') + '" onclick="event.stopPropagation(); setStickerTab(\'' + p.id + '\')"><img src="' + (p.pack.icon || '') + '"></button>';
  });
  tabsContainer.innerHTML = tabsHtml;
  
  var contentHtml = '';
  if (currentStickerTab === 'emoji') {
    BASE_EMOJIS.forEach(function(e) {
      contentHtml += '<div class="emoji-item" onclick="event.stopPropagation(); insertEmoji(\'' + e + '\')">' + e + '</div>';
    });
  } else {
    var selectedPack = packs.find(function(p) { return p.id === currentStickerTab; });
    if (selectedPack && selectedPack.pack.stickers) {
      for (var sId in selectedPack.pack.stickers) {
        var st = selectedPack.pack.stickers[sId];
        contentHtml += '<div class="st-item" onclick="event.stopPropagation(); sendSticker(\'' + st.img + '\')" title="' + st.emoji + '"><img src="' + st.img + '"></div>';
      }
    } else {
      contentHtml += '<div style="color:#aaa; text-align:center; width:100%; margin-top:20px;">Нет стикеров</div>';
    }
  }
  contentContainer.innerHTML = contentHtml;
}

function setStickerTab(tabId) {

function toggleSidebar() {
  document.getElementById('avatarCarousel').classList.toggle('open');
}

function buildCarousel() {
  var carouselUsers = [];
  var shown = {};
  for (var name in allUserData) {
    if (shown[name]) continue;
    if (name === 'Костя' && _user && _user.role === 'creator') continue;
    shown[name] = true;
    carouselUsers.push(name);
  }
  if (godData && godData.name && !shown[godData.name]) {
    shown[godData.name] = true;
    carouselUsers.push(godData.name);
    if (!allUserData[godData.name]) {
      allUserData[godData.name] = { name: godData.name, avatar: godData.avatar || '', punkt: '', vkId: godData.vkId || '' };
    }
  }
  carouselUsers.sort();
  var carouselInner = document.getElementById('carouselInner');
  renderCarousel(carouselUsers, carouselInner);
}

function renderCarousel(carouselUsers, carouselInner) {
  if (!carouselInner || carouselUsers.length === 0) return;
  var h = '';
  for (var i = 0; i < carouselUsers.length; i++) {
    var name = carouselUsers[i];
    var d = allUserData[name] || {};
    var av = d.avatar || '';
    var isOnline = !!activeShifts[name];
    if (name === godData?.name) isOnline = false;
    var isActive = (selectedProfile === name);
    h += '<div class="avatar-item' + (isActive ? ' active' : '') + (isOnline ? ' online' : '') + '" data-user="' + name.replace(/"/g, '&quot;') + '" onclick="selectProfile(\'' + name.replace(/'/g, "\\'") + '\')">';
    if (av) {
      h += '<img src="' + av + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">';
      h += '<div class="av-placeholder" style="display:none">' + name.charAt(0).toUpperCase() + '</div>';
    } else {
      h += '<div class="av-placeholder">' + name.charAt(0).toUpperCase() + '</div>';
    }
    if (isOnline) h += '<div class="online-dot"></div>';
    h += '</div>';
  }
  carouselInner.innerHTML = h;
}

function selectProfile(name, silent) {
  if (!name) return;
  if (name === _user.name && !silent) return;
  selectedProfile = name;
  var items = document.querySelectorAll('#carouselInner .avatar-item');
  items.forEach(function(item) {
    if (item.getAttribute('data-user') === name) item.classList.add('active');
    else item.classList.remove('active');
  });
  if (name !== _user.name) showMiniProfile(name);
  else closeMiniProfile();
}

function showMiniProfile(name) {
  var d = allUserData[name];
  if (!d) return;
  var mp = document.getElementById('miniProfile');
  var avc = document.getElementById('mpAvatarContainer');
  var isGod = (name === godData?.name);
  
  if (d.avatar) {
    avc.innerHTML = '<img class="mp-avatar ' + (isGod ? 'avatar-god' : '') + '" src="' + d.avatar + '" style="position:relative; z-index:10;width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto;display:block;" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="mp-placeholder" style="display:none;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#444,#555);display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc;margin:0 auto;">' + name.charAt(0).toUpperCase() + '</div>';
  } else {
    avc.innerHTML = '<div class="mp-placeholder" style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#444,#555);display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc;margin:0 auto;">' + name.charAt(0).toUpperCase() + '</div>';
  }
  if (isGod) applyAvatarEffects(avc, 'god');
  
  document.getElementById('mpName').textContent = name;
  if (isGod) {
    document.getElementById('mpStatus').textContent = '👑 Начальник';
    document.getElementById('mpPunkt').textContent = '🔴 Не на смене';
    document.getElementById('mpCalendar').innerHTML = '';
  } else {
    var sc = 0;
    allMyShifts.forEach(function(s) { if (s.user === name) sc++; });
    var st = ['📦 Штрих','🚚 ПВЗюк','🏭 Пунктовой','🚀 Озонавт','👑 Озоний'][sc >= 21 ? 4 : sc >= 13 ? 3 : sc >= 8 ? 2 : sc >= 4 ? 1 : 0];
    document.getElementById('mpStatus').textContent = st;
    var isOnline = !!activeShifts[name];
    document.getElementById('mpPunkt').textContent = isOnline ? '🟢 На смене (Пункт ' + (d.punkt || '?') + ')' : '🔴 Выходной';
    
    var now = new Date();
    var calH = '';
    var startD = new Date(now.getTime() - 13 * 86400000);
    for (var i = 0; i < 14; i++) {
      var dd = new Date(startD.getTime() + i * 86400000);
      var ds = dd.toLocaleDateString('ru-RU');
      var isShift = false;
      allMyShifts.forEach(function(s) { if (s.user === name && s.date === ds) isShift = true; });
      calH += '<div class="' + (isShift ? 'mp-shift' : '') + '">' + dd.getDate() + '</div>';
    }
    document.getElementById('mpCalendar').innerHTML = calH;
  }
  document.getElementById('mpChatBtn').style.display = 'block';
  mp.classList.add('show');
}

function closeMiniProfile() {
  var mp = document.getElementById('miniProfile');
  if (mp) mp.classList.remove('show');
}

function openPrivateChat() {
  if (!selectedProfile || selectedProfile === _user.name) return;
  privateChatWith = selectedProfile;
  document.getElementById('chatLabel').textContent = '💬 ' + selectedProfile;
  document.getElementById('chatBackBtn').style.display = 'inline-block';
  closeMiniProfile();
  document.getElementById('avatarCarousel').classList.remove('open');
  loadChat();
}

function switchToGlobalChat() {
  privateChatWith = null;
  document.getElementById('chatLabel').textContent = 'Общий чат';
  document.getElementById('chatBackBtn').style.display = 'none';
  loadChat();
}

function getPrivateChatRef() {
  if (!privateChatWith) return db.ref('chat');
  var users = [_user.name, privateChatWith].sort();
  return db.ref('privateChats/' + users[0] + '_' + users[1]);
}

// ====== ОБЪЯВЛЕНИЯ И МЫСЛИ ======
function loadAnnounce() {
  db.ref('announce').limitToLast(1).on('value', function(s) {
    var b = document.getElementById('announceBlock');
    if (!s.exists()) { b.style.display = 'none'; return; }
    var last = null;
    s.forEach(function(c) { last = c.val(); last._key = c.key; });
    if (last.expiry && Date.now() > last.expiry) {
      db.ref('announce/' + last._key).remove();
      b.style.display = 'none';
      return;
    }
    b.style.display = 'block';
    var expText = last.expiry ? 'Актуально до: ' + new Date(last.expiry).toLocaleString('ru-RU') : 'Бессрочно';
    var isAdmin = _user && (_user.role === 'creator' || _user.role === 'god');
    var delBtn = isAdmin ? '<button class="announce-del" onclick="delAnnounce(\'' + last._key + '\')" style="position:absolute; right:10px; top:10px; background:none; border:none; color:#ccc; cursor:pointer;">✕</button>' : '';
    b.innerHTML = '<b>📢 ' + last.text + '</b><br><small class="announce-expiry" style="color:#aaa;">' + expText + ' • ' + new Date(last.timestamp).toLocaleString('ru-RU') + '</small>' + delBtn;
  });
}

function loadThought() {
  db.ref('creatorThought').on('value', function(s) {
    var b = document.getElementById('thoughtBlock');
    if (!s.exists()) { b.style.display = 'none'; return; }
    var t = s.val();
    if (t.expiry && Date.now() > t.expiry) {
      db.ref('creatorThought').remove();
      b.style.display = 'none';
      return;
    }
    b.style.display = 'block';
    var expText = t.expiry ? 'До: ' + new Date(t.expiry).toLocaleString('ru-RU') : 'Навсегда';
    var isAdmin = _user && (_user.role === 'creator' || _user.role === 'god');
    var delBtn = isAdmin ? '<button class="thought-del" onclick="delThought()" style="position:absolute; right:10px; top:10px; background:none; border:none; color:#ccc; cursor:pointer;">✕</button>' : '';
    b.innerHTML = '<span class="thought-emoji">💭</span> <span class="thought-text">' + t.text + '</span><br><div class="thought-expiry" style="font-size:12px; color:#aaa;">' + expText + '</div>' + delBtn;
  });
}

function delThought() {
  db.ref('creatorThought').remove();
}

// ====== СЛУШАТЕЛИ FIREBASE ======
db.ref('godSettings').on('value', function(s) {
  godData = s.exists() ? s.val() : null;
  if (_user) buildCarousel();
});

db.ref('users').on('value', function(s) {
  allUsers = {};
  allUserData = {};
  s.forEach(function(c) {
    allUsers[c.key] = c.val().avatar || '';
    allUserData[c.key] = c.val();
  });
  if (_user) buildCarousel();
});

db.ref('activeShifts').on('value', function(s) {
  activeShifts = {};
  s.forEach(function(c) {
    if (c.val() && c.val().active) activeShifts[c.key] = true;
  });
  if (_user) buildCarousel();
});

db.ref('shifts').on('value', function(s) {
  allMyShifts = [];
  s.forEach(function(c) {
    var x = c.val();
    x._id = c.key;
    allMyShifts.push(x);
  });
});

db.ref('sticker_packs').on('value', function(s) {
  globalStickerPacks = s.val() || {};
  if (_user) renderStickerUI();
});

// Уведомления о новых сообщениях
var notifiedKeys = {};
db.ref('chat').limitToLast(1).on('child_added', function(s) {
  if (chatOpened) return;
  var m = s.val();
  if (!m || !_user) return;
  if (m.timestamp <= lastChatTimestamp) return;
  var isMine = m.user === '🌌 ' + _user.name || m.user === '👑 ' + _user.name || m.user === _user.name || m.user === '📢 ' + _user.name;
  if (isMine) return;
  if (notifiedKeys[s.key]) return;
  notifiedKeys[s.key] = true;
  lastChatTimestamp = Math.max(lastChatTimestamp, m.timestamp || 0);
  unreadCount++;
  updateChatBadge();
  notifyMe('💬 Чат', (m.user || '?').replace('🌌 ', '').replace('👑 ', '').replace('📢 ', '') + ': ' + (m.text || (m.sticker ? '📦 Стикер' : '📷 Фото')));
});

function notifyMe(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      new Notification(title, { body: body, icon: 'https://raw.githubusercontent.com/painofkili/ozon/main/на%20смену.png' });
    } catch(e) {}
  }
}

// ====== БОГ: РЕЙТИНГ ======
function recountRating() {
  godRating = 0;
  db.ref('premiums').once('value', function(s) {
    godRating += s.numChildren() * 2;
    db.ref('punishes').once('value', function(p) {
      godRating -= p.numChildren();
      if (godRating < 0) godRating = 0;
      updateGodStatusUI();
    });
  });
}

function updateGodStatusUI() {
  var st = getGodStatus(godRating);
  var badge = document.getElementById('godStatusBadge');
  if (!badge) {
    var profileSub = document.getElementById('profileSub');
    if (profileSub && _user.role === 'god') {
      profileSub.innerHTML = '<span class="status-badge" id="godStatusBadge" style="background:' + st.color + ';color:#fff;padding:4px 12px;border-radius:12px;font-size:13px;">' + st.name + '</span>';
    }
    return;
  }
  badge.textContent = st.name;
  badge.style.background = st.color;
  badge.style.color = '#fff';
}

function loadGodData() {
  if (_user.role === 'god') {
    recountRating();
    var st = getGodStatus(godRating);
    var profileSub = document.getElementById('profileSub');
    if (profileSub) {
      profileSub.innerHTML = '<span class="status-badge" id="godStatusBadge" style="background:' + st.color + ';color:#fff;padding:4px 12px;border-radius:12px;font-size:13px;">' + st.name + '</span>';
    }
  }
}

// ====== ВЫХОД ======
function logout() {
  _user = null;
  onShift = false;
  chatOpened = false;
  localStorage.removeItem('creator_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.body.className = '';
}

// ====== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ======
function backFromCards() {
  renderTabs();
  var activeBtn = document.querySelector('#tabsContainer .active');
  if (activeBtn) {
    var id = activeBtn.id.replace('tab_', '');
    renderTabContent(id);
  }
}

// ====== ЗАПУСК ======
console.log('🚀 Ozon Hub запущен!');
console.log('👤 Роль:', _user ? _user.role : 'не авторизован');
</script>
