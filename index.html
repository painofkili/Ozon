<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ozon Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden;height:100vh;width:100vw}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#eee;font-size:16px;background:#0a0a1a;display:flex;flex-direction:column}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1000;display:block}
:root{--accent:#7c3aed;--accent2:#a855f7;--gold:#f5c518;--bg2:rgba(20,20,50,0.85);--bg3:rgba(30,30,60,0.7);--border:rgba(100,80,220,0.25);--text:#e8e8ff;--muted:#888;--green:#22c55e;--red:#ef4444}
body.theme-creator{--accent:#7c3aed;--accent2:#00d4ff;--gold:#f5c518}
body.theme-god{--accent:#b8860b;--accent2:#ffd700;--gold:#ffd700}
.card,.stat-card,.pinned,.announce-block,.thought-block,.calendar,.chat-section,.settings-card,.auth-wrap,.profile-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.4);padding:16px;position:relative;overflow:hidden}
.app-container{display:flex;width:100%;height:100vh;position:relative;z-index:1;justify-content:center;overflow:hidden}
.main-content{width:100%;max-width:720px;padding:12px 16px;display:flex;flex-direction:column;padding-bottom:80px;height:100%;gap:8px}
.profile-card{display:flex;align-items:center;gap:14px;margin-bottom:4px;padding:12px 16px;border-radius:20px;flex-shrink:0}
.badge{font-size:12px;font-weight:bold;padding:4px 12px;border-radius:20px;display:inline-block}
.badge-creator{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff}
.badge-god{background:linear-gradient(135deg,#FFD700,#FF4500);color:#fff}
.badge-manager{background:#2d6a4f;color:#95d5b2}
.name-creator{background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-god{background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold}
.name-manager{color:#eee;font-weight:bold}
input,select,textarea{width:100%;padding:12px 16px;font-size:15px;border-radius:16px;border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,25,0.6);color:#fff;outline:none;backdrop-filter:blur(4px);transition:0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,0.15);background:rgba(10,10,25,0.8)}
button{border:none;font-weight:bold;cursor:pointer;border-radius:14px;transition:all .2s}
button:hover{transform:scale(1.02);filter:brightness(1.1)}button:active{transform:scale(0.95)}
.btn-green{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;padding:12px;font-size:15px;width:100%}
.btn-red{background:linear-gradient(135deg,#e94560,#c62828);color:#fff;padding:12px;font-size:15px;width:100%}
.btn-gray{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1);padding:12px;font-size:15px;width:100%}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;padding:12px;font-size:15px;width:100%}
.btn-blue{background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff;padding:12px;font-size:15px;width:100%}
.tabs{display:flex;gap:6px;margin:0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tabs button{height:44px;display:flex;align-items:center;gap:8px;border-radius:99px;background:rgba(255,255,255,0.06);color:#aaa;border:1px solid transparent;padding:0 16px;font-size:13px;white-space:nowrap;flex-shrink:0;transition:width 0.3s,background 0.3s;min-width:44px;overflow:hidden}
.tabs button .tab-label{opacity:0;max-width:0;transition:all 0.3s}
.tabs button:hover .tab-label,.tabs button.active .tab-label{opacity:1;max-width:80px}
.tabs button.active{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;box-shadow:0 4px 15px rgba(138,43,226,0.3)}
.tab-content{display:none;width:100%;flex-shrink:0;animation:fadeIn 0.3s ease}
.tab-content.active-tab{display:block}
.chat-section{background:var(--bg2);padding:0;display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;border-radius:20px;margin:0;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.chat-header-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);cursor:pointer;flex-shrink:0;border-radius:20px 20px 0 0}
#chat{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--accent) transparent;background:transparent;display:flex;flex-direction:column;gap:2px}
#chat.hidden{display:none}
.chat-bubble-group{display:flex;flex-direction:column;max-width:85%;position:relative;margin:1px 0}
.chat-bubble-group.mine{align-self:flex-end;align-items:flex-end}
.chat-bubble-group.other{align-self:flex-start;align-items:flex-start}
.chat-bubble-group .msg-author{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:1px;display:flex;align-items:center;gap:6px;cursor:pointer}
.chat-bubble-group .msg-author .auth-avatar{width:20px;height:20px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.2)}
.chat-bubble{background:rgba(255,255,255,0.04);padding:8px 14px;word-break:break-word;line-height:1.4;font-size:14px;border:1px solid rgba(255,255,255,0.03);position:relative}
.chat-bubble-group.mine .chat-bubble:first-child{border-radius:16px 16px 4px 16px}
.chat-bubble-group.mine .chat-bubble:not(:first-child):not(:last-child){border-radius:16px 4px 4px 16px}
.chat-bubble-group.mine .chat-bubble:last-child{border-radius:16px 4px 16px 16px}
.chat-bubble-group.other .chat-bubble:first-child{border-radius:16px 16px 16px 4px}
.chat-bubble-group.other .chat-bubble:not(:first-child):not(:last-child){border-radius:4px 16px 16px 4px}
.chat-bubble-group.other .chat-bubble:last-child{border-radius:4px 16px 16px 16px}
.chat-bubble.mine{background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.1)}
.chat-bubble.creator{border-left:2px solid var(--gold);background:rgba(245,197,24,0.06)}
.chat-bubble.god{border-left:2px solid #FFD700;background:rgba(255,215,0,0.06)}
.chat-input-bar{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:720px;background:var(--bg2);backdrop-filter:blur(16px);padding:10px 14px;display:flex;gap:10px;align-items:center;z-index:100;border-top:1px solid var(--border);border-radius:20px 20px 0 0;box-shadow:0 -8px 32px rgba(0,0,0,0.4)}
.input-wrapper{position:relative;flex:1;display:flex;align-items:center;background:rgba(0,0,0,0.3);border-radius:20px;border:1px solid rgba(255,255,255,0.05)}
.input-wrapper input{background:transparent;border:none;padding:12px 40px 12px 18px;font-size:15px;width:100%}
.sticker-toggle{position:absolute;right:8px;background:transparent;border:none;font-size:20px;cursor:pointer;color:#aaa;padding:0}
#sendMsgBtn,#chatPhotoBtn{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.05);color:#aaa}
#sendMsgBtn{background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;border:none}
.sticker-panel{position:absolute;bottom:70px;right:0;width:320px;height:360px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;display:none;flex-direction:column;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,0.6);backdrop-filter:blur(20px);overflow:hidden}
.sticker-content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}
.emoji-item{width:40px;height:40px;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:10px;transition:0.1s}
.emoji-item:hover{transform:scale(1.2);background:rgba(255,255,255,0.08)}
.avatar-carousel{width:110px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:-130px;height:100vh;padding:50px 0 20px;z-index:1000;backdrop-filter:blur(20px);transition:right 0.3s;box-shadow:-10px 0 30px rgba(0,0,0,0.5)}
.avatar-carousel.open{right:0}
.avatar-carousel-inner{display:flex;flex-direction:column;align-items:center;width:100%;gap:12px;overflow-y:auto;height:100%;padding:10px 0}
.avatar-item{width:60px;height:60px;border-radius:50%;cursor:pointer;position:relative;transition:0.2s}
.avatar-item:hover{transform:scale(1.05)}.avatar-item img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid transparent}
.avatar-item.active img{border-color:var(--gold);box-shadow:0 0 15px rgba(245,197,24,0.3)}
.avatar-item .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#4CAF50;border-radius:50%;border:2px solid #111}
.btn-sidebar-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);width:36px;height:50px;background:var(--bg2);border:1px solid var(--border);border-right:none;border-radius:14px 0 0 14px;color:#fff;font-size:14px;cursor:pointer;z-index:999}
.sidebar-close-btn{position:absolute;top:12px;left:12px;background:rgba(255,255,255,0.05);border:none;color:#aaa;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer}
.sidebar-close-btn:hover{background:#e94560;color:#fff}
.mini-profile{position:fixed;right:130px;top:50%;transform:translateY(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:20px;width:220px;z-index:1100;display:none;backdrop-filter:blur(20px);box-shadow:0 10px 40px rgba(0,0,0,0.6)}
.mini-profile.show{display:block;animation:slideIn 0.2s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-50%) translateX(20px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;pointer-events:none;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:12px 20px;border-radius:16px;background:var(--bg2);border:1px solid var(--accent);color:#fff;font-size:14px;box-shadow:0 5px 20px rgba(0,0,0,0.6);transform:translateY(-20px);opacity:0;transition:all 0.3s;text-align:center;backdrop-filter:blur(10px)}
.toast-msg.show{transform:translateY(0);opacity:1}
#toastDivine{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:9999;transition:all 0.5s;pointer-events:none;opacity:0;width:90%;max-width:400px}
#toastDivine.show{transform:translateX(-50%) translateY(0);opacity:1}
#toastDivine .divine-paper{background:linear-gradient(135deg,#fdf6e3,#f5e6ca);border:3px solid #d4a574;padding:20px 24px;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,0.6)}
@media(max-width:600px){.main-content{padding:8px;padding-bottom:70px}.chat-input-bar{padding:8px 10px}.mini-profile{right:10px;width:190px}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="toastContainer" class="toast-container"></div>
<div id="toastDivine"><div class="divine-paper"><p id="divineMsg" style="font-family:Georgia,serif;color:#3d2b1a;font-size:14px;text-align:center;"></p></div></div>
<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;">
  <div class="auth-wrap" style="max-width:380px;width:100%;display:flex;flex-direction:column;gap:14px;padding:32px;">
    <div style="text-align:center;font-size:24px;font-weight:800;background:linear-gradient(135deg,#f5c518,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Ozon Hub</div>
    <div style="display:flex;background:rgba(0,0,0,0.3);border-radius:14px;padding:4px;"><button id="tabLogin" style="flex:1;padding:10px;border:none;border-radius:12px;background:transparent;font-size:15px;font-weight:600;color:#fff;">Вход</button><button id="tabRegister" style="flex:1;padding:10px;border:none;border-radius:12px;background:transparent;font-size:15px;font-weight:600;color:#6a7a94;">Регистрация</button></div>
    <div id="loginFields2" style="display:flex;flex-direction:column;gap:14px;"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Пароль"><button class="btn-gold" id="loginBtn" style="padding:14px;font-size:16px;">Войти</button></div>
    <div id="registerFields2" style="display:none;flex-direction:column;gap:14px;"><input type="text" id="regName" placeholder="Имя"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPassword" placeholder="Пароль"><button class="btn-gold" id="registerBtn" style="padding:14px;font-size:16px;">Зарегистрироваться</button></div>
    <div id="authError" style="color:var(--red);font-size:13px;text-align:center;display:none;"></div>
  </div>
</div>
<div id="app" class="app-container" style="display:none">
  <button class="btn-sidebar-toggle" id="sidebarToggleBtn">👥</button>
  <div class="main-content" id="mainContent">
    <div id="announceBlock" style="display:none;background:rgba(200,150,0,0.1);border:1px solid rgba(200,150,0,0.3);padding:12px 16px;border-radius:16px;text-align:center;font-size:14px;color:#ffd700;margin-bottom:4px;position:relative;"></div>
    <div id="thoughtBlock" style="display:none;background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(0,212,255,0.05));border:1px solid rgba(124,58,237,0.3);padding:14px 16px;border-radius:16px;text-align:center;font-size:14px;color:#e0e0ff;margin-bottom:4px;position:relative;"></div>
    <div class="profile-card">
      <div style="position:relative;width:76px;height:76px;"><canvas id="profileAvatarCanvas" width="76" height="76" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:1;"></canvas><canvas id="profileFrameCanvas" width="76" height="76" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:2;pointer-events:none;"></canvas></div>
      <div style="flex:1"><b id="creatorNameWrapper" class="name-creator" style="font-size:18px;"><span id="uname"></span></b> <span id="roleBadge" class="badge badge-creator">Создатель</span><br><span style="font-size:12px;color:#aaa;">Пункт <span id="upunkt"></span></span></div>
      <button class="btn-gray" id="settingsBtn" style="width:auto;padding:8px 16px;font-size:13px;">⚙️</button>
    </div>
    <div class="tabs" id="tabsContainer"></div>
    <div id="tabContentContainer" style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding-bottom:10px;"></div>
    <div id="pinnedMessage" class="pinned" style="display:none;padding:10px 16px;margin-bottom:4px;border-radius:16px;background:rgba(245,197,24,0.05);border:1px solid rgba(245,197,24,0.2);font-size:13px;"></div>
    <div class="chat-section"><div class="chat-header-bar" id="chatHeader"><span style="font-size:18px;">💬</span><span id="chatLabel" style="flex:1;font-weight:bold;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Общий чат</span><span id="chatBadge" style="display:none;background:var(--red);color:#fff;border-radius:10px;font-size:11px;padding:2px 6px;font-weight:bold;">0</span><button class="btn-gray" id="chatBackBtn" style="display:none;width:auto;padding:4px 12px;font-size:12px;">Назад</button></div><div id="chat"></div></div>
  </div>
  <div class="chat-input-bar" id="chatInputBar"><div class="input-wrapper"><input id="chatMsgInput" placeholder="Сообщение..."><button class="sticker-toggle" id="stickerToggleBtn">😀</button></div><button id="chatPhotoBtn">📎</button><input id="chatPhotoInput" type="file" accept="image/*" multiple style="display:none;"><button id="sendMsgBtn">➤</button></div>
  <div class="avatar-carousel" id="avatarCarousel"><button class="sidebar-close-btn" id="sidebarCloseBtn">✕</button><div class="avatar-carousel-inner" id="carouselInner"></div></div>
  <div class="mini-profile" id="miniProfile"><button class="btn-gray" id="mpCloseBtn" style="position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;font-size:12px;padding:0;">✕</button><div style="position:relative;width:64px;height:64px;margin:0 auto;"><canvas id="mpAvatarCanvas" width="64" height="64" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:1;"></canvas><canvas id="mpFrameCanvas" width="64" height="64" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;z-index:2;pointer-events:none;"></canvas></div><div id="mpName" style="text-align:center;font-weight:bold;font-size:16px;margin-top:8px;"></div><div id="mpStatus" style="text-align:center;font-size:12px;margin:4px 0;"></div><div id="mpPunkt" style="text-align:center;font-size:12px;color:var(--muted);"></div><div id="mpCalendar" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:10px;margin-top:8px;"></div><button class="btn-gold" id="mpChatBtn" style="width:100%;padding:10px;margin-top:12px;font-size:13px;">Личный чат</button></div>
</div>
<div id="settingsPanel" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;">
  <div class="settings-card" style="max-width:500px;width:100%;max-height:90vh;overflow-y:auto;">
    <h3 style="text-align:center;margin-bottom:16px;">Настройки</h3>
    <div style="display:flex;gap:4px;margin-bottom:16px;"><button class="settings-tab active" data-stab="main" style="flex:1;padding:8px;border-radius:10px;background:var(--accent);color:#fff;font-size:13px;">Основное</button><button class="settings-tab" data-stab="avatar" style="flex:1;padding:8px;border-radius:10px;background:transparent;color:var(--muted);font-size:13px;">Аватар</button></div>
    <div id="stab-main" style="display:flex;flex-direction:column;gap:12px;"><div><label style="font-size:12px;color:var(--muted);">Новое имя</label><input id="setName" placeholder="Оставьте пустым"></div><div><label style="font-size:12px;color:var(--muted);">Пункт</label><select id="setPunkt"></select></div><div><label style="font-size:12px;color:var(--muted);">ВК ID</label><input id="setVk" placeholder="265035511"></div><button class="btn-green" id="settingsSaveBtn">Сохранить</button><button class="btn-red" id="settingsLogoutBtn">Выйти</button><button class="btn-gray" id="settingsCloseBtn">Отмена</button></div>
    <div id="stab-avatar" style="display:none;flex-direction:column;gap:12px;"><div><label style="font-size:12px;color:var(--muted);">Загрузить фото</label><input type="file" id="setAvatarFile" accept="image/*"></div><div id="avatarAdvanced" style="display:none;"><label style="font-size:12px;color:var(--muted);">Стиль рамки</label><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px;"><button class="style-btn active" data-style="neutron" style="padding:10px 6px;border-radius:10px;border:2px solid var(--accent);background:rgba(124,58,237,0.2);color:#fff;font-size:11px;">Нейтрон</button><button class="style-btn" data-style="blackhole" style="padding:10px 6px;border-radius:10px;border:2px solid #444;background:rgba(0,0,0,0.3);color:#ccc;font-size:11px;">Дыра</button><button class="style-btn" data-style="divine" style="padding:10px 6px;border-radius:10px;border:2px solid #444;background:rgba(0,0,0,0.3);color:#ccc;font-size:11px;">Нимб</button><button class="style-btn" data-style="kitsune" style="padding:10px 6px;border-radius:10px;border:2px solid #444;background:rgba(0,0,0,0.3);color:#ccc;font-size:11px;">Кицунэ</button><button class="style-btn" data-style="wasteland" style="padding:10px 6px;border-radius:10px;border:2px solid #444;background:rgba(0,0,0,0.3);color:#ccc;font-size:11px;">Пустошь</button><button class="style-btn" data-style="enigma" style="padding:10px 6px;border-radius:10px;border:2px solid #444;background:rgba(0,0,0,0.3);color:#ccc;font-size:11px;">Энигма</button></div><div style="margin-top:8px;"><label style="font-size:12px;color:var(--muted);">Скорость <span id="setSpeedVal">1x</span></label><input type="range" id="setSpeed" min="0.1" max="3" step="0.1" value="1"></div><div><label style="font-size:12px;color:var(--muted);">Свечение <span id="setGlowVal">20px</span></label><input type="range" id="setGlow" min="0" max="50" step="1" value="20"></div><div><label style="font-size:12px;color:var(--muted);">Цвет 1</label><input type="color" id="setColor1" value="#6366f1"></div><div><label style="font-size:12px;color:var(--muted);">Цвет 2</label><input type="color" id="setColor2" value="#a855f7"></div></div><div id="avatarSimple" style="display:none;"><div><label style="font-size:12px;color:var(--muted);">Цвет кольца</label><input type="color" id="setRingColor" value="#7c3aed"></div><div><label style="font-size:12px;color:var(--muted);">Толщина</label><select id="setRingThickness"><option value="thin">Тонкая</option><option value="medium" selected>Средняя</option><option value="thick">Толстая</option></select></div></div><button class="btn-green" id="avatarSaveBtn">Сохранить аватар</button><button class="btn-gray" id="avatarCloseBtn">Отмена</button></div>

function renderShift(p){p.innerHTML='<div class="card"><div id="shiftContent">Загрузка...</div></div><button class="btn-gray" id="shiftLogoutBtn" style="margin-top:8px;width:100%;padding:12px;">Выйти</button>';$('#shiftLogoutBtn').addEventListener('click',()=>{if(confirm('Выйти?'))logout()});loadShift()}

function renderStats(p){const n=new Date();App.calYear=n.getFullYear();App.calMonth=n.getMonth();p.innerHTML='<div class="calendar"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><button class="btn-gray" id="calPrev" style="width:auto;padding:6px 12px;">◀</button><div id="calTitle" style="font-size:14px;font-weight:700;"></div><button class="btn-gray" id="calNext" style="width:auto;padding:6px 12px;">▶</button></div><div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;"></div></div><div class="card" style="margin-top:12px;"><div>Смен: <b id="statShifts">0</b></div><div>Часов: <b id="statHours">0</b></div><div>Товаров: <b id="statTovar">0</b></div></div><button class="btn-red" id="clearShiftsBtn" style="width:100%;padding:12px;margin-top:10px;">Очистить мои смены</button>';$('#calPrev').addEventListener('click',()=>changeCal(-1));$('#calNext').addEventListener('click',()=>changeCal(1));$('#clearShiftsBtn').addEventListener('click',clearShifts);renderCal()}
function renderCal(){const months=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];$('#calTitle').textContent=months[App.calMonth]+' '+App.calYear;DB.ref('shifts').once('value').then(s=>{const shifts={};s.forEach(c=>{const x=c.val();if(x.user===App.user.uid){const d=new Date(x.date||x.timestamp);if(d.getFullYear()===App.calYear&&d.getMonth()===App.calMonth){const day=d.getDate();if(!shifts[day])shifts[day]={count:0,hours:0,tovar:0};shifts[day].count++;shifts[day].hours+=x.hours||0;shifts[day].tovar+=x.tovar||0}}});let ts=0,th=0,tt=0;for(const k in shifts){ts+=shifts[k].count;th+=shifts[k].hours;tt+=shifts[k].tovar}$('#statShifts').textContent=ts;$('#statHours').textContent=th.toFixed(1);$('#statTovar').textContent=tt;const fd=new Date(App.calYear,App.calMonth,1).getDay(),off=(fd+6)%7,dim=new Date(App.calYear,App.calMonth+1,0).getDate(),today=new Date(),grid=$('#calGrid');grid.innerHTML=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>'<div style="text-align:center;font-size:11px;color:var(--muted);padding-bottom:6px;">'+d+'</div>').join('');for(let i=0;i<off;i++)grid.innerHTML+='<div></div>';for(let d=1;d<=dim;d++){const isToday=today.getDate()===d&&today.getMonth()===App.calMonth&&today.getFullYear()===App.calYear,has=!!shifts[d];grid.innerHTML+='<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13px;'+(isToday?'border:2px solid var(--accent);color:var(--accent);font-weight:700;background:rgba(124,58,237,0.1);':'')+(has?'background:rgba(34,197,94,0.2);color:#4ade80;font-weight:700;':'')+'">'+d+'</div>'}})}
function changeCal(dir){App.calMonth+=dir;if(App.calMonth<0){App.calMonth=11;App.calYear--}if(App.calMonth>11){App.calMonth=0;App.calYear++}renderCal()}

function loadPowerUsers(){DB.ref('users').once('value').then(s=>{const el=$('#powerUsersList');if(!el)return;let h='';s.forEach(c=>{const u=c.val();if(u.uid===App.user.uid)return;const rl=u.role==='god'?'Бог':(u.role==='creator'?'Создатель':'Сотрудник');h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);"><span><b>'+esc(u.name)+'</b> <span style="font-size:11px;color:var(--muted);">'+rl+'</span></span><button class="'+(u.role==='god'?'btn-gray':'btn-gold')+'" data-uid="'+c.key+'" data-role="'+u.role+'" style="width:auto;padding:6px 14px;font-size:12px;">'+(u.role==='god'?'Снять бога':'Сделать богом')+'</button></div>'});el.innerHTML=h||'<p style="color:var(--muted);">Нет пользователей</p>';el.querySelectorAll('button').forEach(b=>b.addEventListener('click',function(){const uid=this.dataset.uid,role=this.dataset.role,nr=role==='god'?'manager':'god';DB.ref('users/'+uid+'/role').set(nr).then(()=>{toast(nr==='god'?'Сила дарована':'Сила снята');if(nr==='god')divine(App.allUserData[uid]?.name+' возведён в ранг бога!');loadPowerUsers();buildCarousel()})}))})}
function renderAnnounce(p){p.innerHTML='<div class="card"><h4>Новое объявление</h4><textarea id="announceText" placeholder="Текст..." rows="3" style="resize:vertical;margin-bottom:8px;"></textarea><div style="display:flex;gap:8px;margin-bottom:8px;"><select id="announceExpiry" style="flex:1;"><option value="0">Навсегда</option><option value="1">1 час</option><option value="24" selected>24 часа</option><option value="72">3 дня</option><option value="168">7 дней</option></select></div><button class="btn-gold" id="addAnnounceBtn">Опубликовать</button></div><div id="announceList" style="margin-top:12px;">Загрузка...</div>';$('#addAnnounceBtn').addEventListener('click',()=>{const t=$('#announceText').value.trim();if(!t)return;const h=parseInt($('#announceExpiry').value),exp=h>0?Date.now()+h*3600000:null;DB.ref('announce').push({text:t,timestamp:Date.now(),expiry:exp}).then(()=>{$('#announceText').value='';loadAnnouncements();divine(t);toast('Послание свыше!')})});loadAnnouncements()}
function loadAnnouncements(){const el=$('#announceList');if(!el)return;DB.ref('announce').once('value').then(s=>{if(!s.exists()){el.innerHTML='<p style="color:var(--muted);">Нет объявлений</p>';return}const items=[];s.forEach(c=>{const a=c.val();if(!a.expiry||Date.now()<a.expiry)items.push({id:c.key,data:a})});items.sort((a,b)=>b.data.timestamp-a.data.timestamp);el.innerHTML=items.length?items.map(i=>'<div class="card" style="margin-bottom:8px;background:rgba(200,150,0,0.1);border:1px solid rgba(200,150,0,0.3);">'+esc(i.data.text)+'<br><small style="color:var(--muted);">'+new Date(i.data.timestamp).toLocaleString('ru-RU')+'</small>'+(App.isGod?'<button class="btn-red" style="width:auto;padding:4px 10px;font-size:11px;margin-top:4px;" data-id="'+i.id+'">✕</button>':'')+'</div>').join(''):'<p style="color:var(--muted);">Нет объявлений</p>';el.querySelectorAll('button').forEach(b=>b.addEventListener('click',function(){DB.ref('announce/'+this.dataset.id).remove();loadAnnouncements()}))})}
function renderPunkts(p){p.innerHTML='<div class="card"><h4>📍 Пункты</h4><div id="punktsContent">Загрузка...</div></div>';DB.ref('punkts').once('value').then(s=>{if(!s.exists()){$('#punktsContent').innerHTML='<p style="color:var(--muted);">Нет пунктов</p>';return}let h='';s.forEach(c=>{const v=c.val();h+='<div style="padding:8px 0;border-bottom:1px solid var(--border);"><b>'+esc(c.key)+'</b> — '+(v.rate||0)+'₽/ч</div>'});$('#punktsContent').innerHTML=h})}
function renderWorkers(p){p.innerHTML='<div class="card"><h4>👥 Сотрудники</h4><div id="workersContent">Загрузка...</div></div>';DB.ref('users').once('value').then(s=>{if(!s.exists()){$('#workersContent').innerHTML='<p style="color:var(--muted);">Нет сотрудников</p>';return}let h='';s.forEach(c=>{const u=c.val();if(u.uid===App.user.uid)return;const isC=u.name==='Костя';h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);"><span><b>'+esc(u.name)+'</b> '+(isC?'<span style="font-size:10px;background:var(--gold);color:#000;padding:2px 6px;border-radius:8px;">Создатель</span>':'')+'<br><span style="font-size:11px;color:var(--muted);">Пункт '+(u.punkt||'?')+' | Надбавка: '+(u.bonus||0)+'₽</span></span></div>'});$('#workersContent').innerHTML=h||'<p style="color:var(--muted);">Нет сотрудников</p>'})}
function renderSalary(p){p.innerHTML='<div class="card"><h4>💰 Расчёт ЗП</h4><div id="salaryContent"><select id="calcUser" style="margin-bottom:8px;"><option value="">— Выбери сотрудника —</option></select><div id="calcBlock" style="display:none;"><div style="display:flex;gap:8px;margin-bottom:8px;"><input type="date" id="calcFrom" style="flex:1;"><input type="date" id="calcTo" style="flex:1;"></div><button class="btn-blue" id="calcZPBtn" style="width:100%;">🧮 Посчитать</button><div id="zpResult" style="margin-top:12px;white-space:pre-line;"></div></div></div></div>';DB.ref('users').once('value').then(s=>{const sel=$('#calcUser');s.forEach(c=>{const u=c.val();if(u.name&&u.name!=='Костя'&&u.name!=='Игорь')sel.innerHTML+='<option value="'+u.uid+'">'+esc(u.name)+'</option>'})});$('#calcUser').addEventListener('change',function(){const v=this.value;$('#calcBlock').style.display=v?'block':'none';if(v){const n=new Date(),f=new Date(n);f.setDate(n.getDate()-14);$('#calcFrom').value=f.toISOString().split('T')[0];$('#calcTo').value=n.toISOString().split('T')[0]}});$('#calcZPBtn').addEventListener('click',calcZP)}
function calcZP(){const u=$('#calcUser').value,from=new Date($('#calcFrom').value),to=new Date($('#calcTo').value);to.setHours(23,59,59);if(!u||isNaN(from)||isNaN(to))return;DB.ref('shifts').orderByChild('user').equalTo(u).once('value').then(s=>{const shifts=[];s.forEach(c=>{const x=c.val();x._id=c.key;shifts.push(x)});DB.ref('punkts').once('value').then(pk=>{const rates={};pk.forEach(c=>{rates[c.key]=c.val().rate||0});DB.ref('users/'+u).once('value').then(us=>{const bonus=us.exists()?us.val().bonus||0:0;DB.ref('punishes').orderByChild('user').equalTo(u).once('value').then(pn=>{let tp=0;pn.forEach(c=>{const p=c.val();if(new Date(p.timestamp)>=from&&new Date(p.timestamp)<=to)tp+=p.amount||0});DB.ref('premiums').orderByChild('user').equalTo(u).once('value').then(pr=>{let tpr=0;pr.forEach(c=>{const p=c.val();if(new Date(p.timestamp)>=from&&new Date(p.timestamp)<=to)tpr+=p.amount||0});const filtered=shifts.filter(s=>{const t=new Date(s.timestamp);return t>=from&&t<=to&&!s.paid});let th=0,tt=0,tz=0;filtered.forEach(s=>{const h=s.hours||0,tv=s.tovar||0;th+=h;tt+=tv;tz+=h*(rates[s.punkt]||0)+tv+bonus});tz+=tpr;const total=tz-tp;App.lastCalc={user:u,from:from.toISOString(),to:to.toISOString(),shifts:filtered.map(s=>s._id),total};$('#zpResult').innerHTML='📊 <b>'+esc(App.allUserData[u]?.name||'')+'</b>\n'+from.toLocaleDateString('ru-RU')+' – '+to.toLocaleDateString('ru-RU')+'\n\nЧасов: '+th+'\nТоваров: '+tt+'\nЗП: '+(tz-tpr)+' ₽\nПремии: +'+tpr+' ₽\nШтрафы: -'+tp+' ₽\n<b>Итого: '+total+' ₽</b>'})})})})})}
function loadChat(){const ref=App.privateChatWith?getPrivRef():DB.ref('chat');if(App.chatListener){App.chatListener.off();App.chatListener=null}App.chatListener=ref.limitToLast(50);App.chatListener.on('value',s=>{const msgs=[];s.forEach(c=>{const m=c.val();if(m)msgs.push({key:c.key,msg:m})});msgs.sort((a,b)=>a.msg.timestamp-b.msg.timestamp);let h='',group=[];const renderMsg=m=>{let c='';if(m.text)c+=esc(m.text);if(m.photo)c+='<br><img class="chat-img" src="'+esc(m.thumb||m.photo)+'" onclick="viewPhoto(\''+esc(m.photo)+'\')">';if(m.sticker)c+='<img class="chat-sticker" src="'+esc(m.sticker)+'">';if(m.photos&&m.photos.length){c+='<div class="photo-pack">';m.photos.forEach(p=>{const pt=typeof p==='object'?p.thumb:p;c+='<img src="'+esc(pt)+'" onclick="viewPhoto(\''+esc(typeof p==='object'?p.full:p)+'\')">'});c+='</div>'}return c};for(let i=0;i<msgs.length;i++){const item=msgs[i],m=item.msg,userName=(m.user||'?').replace(/^[🌌👑📢]\s/,''),isMine=App.user&&(m.user==='🌌 '+App.user.name||m.user==='👑 '+App.user.name||m.user===App.user.name);if(group.length===0||group[0].userName!==userName||group[0].isMine!==isMine){if(group.length>0)h+=renderGroup(group,renderMsg);group=[{item,userName,isMine,m}]}else{group.push({item,userName,isMine,m})}}if(group.length>0)h+=renderGroup(group,renderMsg);const el=$('#chat'),was=el.scrollHeight-el.scrollTop-el.clientHeight<60;el.innerHTML=h;if(was||document.activeElement===$('#chatMsgInput'))el.scrollTop=el.scrollHeight;el.querySelectorAll('.msg-author').forEach(a=>a.addEventListener('click',function(){const n=this.querySelector('span').textContent.trim();if(n&&n!==App.user.name)openMiniFromChat(n)}))})}
function renderGroup(group,renderMsg){const first=group[0],userName=first.userName,isMine=first.isMine,isCreator=first.m.user&&first.m.user.indexOf('🌌')===0,isGod=first.m.user&&first.m.user.indexOf('👑')===0;let u=null;for(const uid in App.allUserData){if(App.allUserData[uid].name===userName){u=App.allUserData[uid];break}}const av=u?u.avatar:'';let h='<div class="chat-bubble-group '+(isMine?'mine':'other')+'">';if(!isMine){h+='<div class="msg-author">';if(av)h+='<img class="auth-avatar" src="'+esc(av)+'" onerror="this.style.display=\'none\'">';else h+='<div style="width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#444,#555);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#ccc;">'+esc(userName.charAt(0))+'</div>';h+='<span style="'+(isCreator||isGod?'background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;':'')+'">'+esc(userName)+'</span></div>'}group.forEach(g=>{const m=g.m;let cls='chat-bubble';if(isMine)cls+=' mine';else if(isCreator)cls+=' creator';else if(isGod)cls+=' god';h+='<div class="'+cls+'">'+renderMsg(m)+'</div>'});h+='</div>';return h}
function openMiniFromChat(name){for(const uid in App.allUserData){if(App.allUserData[uid].name===name){App.selectedProfile=uid;showMini(uid);return}}}
function viewPhoto(url){const v=document.createElement('div');v.style='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:10000;';v.innerHTML='<img src="'+esc(url)+'" style="max-width:95%;max-height:90%;border-radius:12px;">';v.addEventListener('click',()=>v.remove());document.body.appendChild(v)}
function toggleChat(){const el=$('#chat'),bar=$('#chatInputBar');if(el.classList.contains('hidden')){el.classList.remove('hidden');App.chatOpened=true;bar.style.display='flex';App.lastChatTimestamp=Date.now();App.unreadCount=0;updateBadge();setTimeout(()=>el.scrollTop=el.scrollHeight,100)}else{el.classList.add('hidden');App.chatOpened=false;bar.style.display='none'}}

function sendMsg(){const input=$('#chatMsgInput'),t=input.value.trim();if(!t||!App.user)return;const ref=App.privateChatWith?getPrivRef():DB.ref('chat');ref.push({user:(App.isGod?'👑 ':'🌌 ')+App.user.name,text:t,timestamp:Date.now(),role:App.user.role,likes:{}}).then(()=>input.value='')}
function sendPhoto(){const input=$('#chatPhotoInput'),files=input.files;if(!files.length||!App.user||files.length>5)return;const photos=[];let loaded=0;for(let i=0;i<files.length;i++){(function(f){const r=new FileReader();r.onload=function(e){const img=new Image();img.onload=function(){const c=document.createElement('canvas'),mw=300,s=mw/img.width;c.width=mw;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);photos.push({full:e.target.result,thumb:c.toDataURL('image/jpeg',0.6)});loaded++;if(loaded===files.length){const ref=App.privateChatWith?getPrivRef():DB.ref('chat');ref.push({user:(App.isGod?'👑 ':'🌌 ')+App.user.name,text:'📷 '+files.length+' фото',photos,timestamp:Date.now(),role:App.user.role,likes:{}})}};img.src=e.target.result};r.readAsDataURL(f)})(files[i])}input.value=''}
function getPrivRef(){if(!App.privateChatWith)return DB.ref('chat');const users=[App.user.uid,App.privateChatWith].sort();return DB.ref('privateChats/'+users[0]+'_'+users[1])}
function openPriv(){if(!App.selectedProfile||App.selectedProfile===App.user.uid)return;App.privateChatWith=App.selectedProfile;const d=App.allUserData[App.selectedProfile];$('#chatLabel').textContent=(d?d.name:'...');$('#chatBackBtn').style.display='inline-block';closeMini();$('#avatarCarousel').classList.remove('open');loadChat()}

function buildCarousel(){const el=$('#carouselInner');if(!el)return;el.innerHTML='';const added=new Set();for(const uid in App.allUserData){if(uid===App.user.uid)continue;const d=App.allUserData[uid];if(added.has(d.name))continue;added.add(d.name);const on=!!App.activeShifts[uid];el.innerHTML+='<div class="avatar-item'+(App.selectedProfile===uid?' active':'')+'" data-uid="'+uid+'">'+(d.avatar?'<img src="'+esc(d.avatar)+'">':'<div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#222,#444);display:flex;align-items:center;justify-content:center;font-size:20px;color:#ccc;">'+esc(d.name.charAt(0))+'</div>')+(on?'<div class="online-dot"></div>':'')+'</div>'}el.querySelectorAll('.avatar-item').forEach(b=>b.addEventListener('click',function(){const uid=this.dataset.uid;App.selectedProfile=uid;el.querySelectorAll('.avatar-item').forEach(x=>x.classList.toggle('active',x.dataset.uid===uid));showMini(uid)}))}
function showMini(uid){const d=App.allUserData[uid];if(!d)return;$('#mpName').textContent=d.name;const ac=$('#mpAvatarCanvas'),actx=ac.getContext('2d');actx.clearRect(0,0,64,64);if(d.avatar){const img=new Image();img.onload=function(){actx.save();actx.beginPath();actx.arc(32,32,30,0,Math.PI*2);actx.clip();actx.drawImage(img,0,0,64,64);actx.restore();drawFrame($('#mpFrameCanvas').getContext('2d'),64,64,App.avatarSettings,true)};img.src=d.avatar}else{actx.fillStyle='#1e1b4b';actx.beginPath();actx.arc(32,32,30,0,Math.PI*2);actx.fill()}$('#mpStatus').textContent=d.role==='god'?'Начальник':(d.role==='creator'?'Создатель':'Сотрудник');$('#mpPunkt').textContent=App.activeShifts[uid]?'На смене':'Выходной';const now=new Date();let cal='';const start=new Date(now.getTime()-13*86400000);for(let i=0;i<14;i++){const dd=new Date(start.getTime()+i*86400000);let shift=false;App.allShifts.forEach(s=>{if(s.user===uid&&s.date===dd.toLocaleDateString('ru-RU'))shift=true});cal+='<div style="padding:2px;border-radius:2px;'+(shift?'background:#4CAF50;color:#fff;':'background:rgba(255,255,255,0.05);')+'">'+dd.getDate()+'</div>'}$('#mpCalendar').innerHTML=cal;$('#miniProfile').classList.add('show')}
function closeMini(){$('#miniProfile').classList.remove('show');App.selectedProfile=null}
function drawFrame(ctx,w,h,settings,skipClear){if(!skipClear)ctx.clearRect(0,0,w,h);const cx=w/2,cy=h/2,t=Date.now()/1000*(settings.speed||1);ctx.shadowBlur=settings.glow||20;ctx.shadowColor=settings.color1||'#7c3aed';if(settings.style==='neutron'){for(let i=0;i<3;i++){ctx.save();ctx.rotate(i*Math.PI*2/3+t);ctx.strokeStyle=i===0?settings.color1:settings.color2;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,w*0.65,h*0.25,0,0,Math.PI*2);ctx.stroke();ctx.restore()}}else if(settings.style==='blackhole'){const grad=ctx.createRadialGradient(cx,cy,w*0.3,cx,cy,w*0.75);grad.addColorStop(0,'transparent');grad.addColorStop(0.3,'rgba(0,0,0,0.5)');grad.addColorStop(0.6,settings.color1);grad.addColorStop(1,'transparent');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,w*0.75,0,Math.PI*2);ctx.fill()}else if(settings.style==='divine'){ctx.strokeStyle=settings.color1;ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,cy,w*0.5,0,Math.PI*2);ctx.stroke();for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,d=w*0.45+Math.sin(t*5+i)*8;ctx.fillStyle=settings.color2;ctx.beginPath();ctx.arc(cx+d*Math.cos(a),cy+d*Math.sin(a),1.5,0,Math.PI*2);ctx.fill()}}else if(settings.style==='kitsune'){for(let i=0;i<5;i++){ctx.fillStyle='rgba(255,69,0,0.25)';ctx.beginPath();ctx.arc(cx+Math.cos(t*2+i)*w*0.2,cy+Math.sin(t*2+i)*h*0.2,w*0.12+Math.sin(t*3+i)*8,0,Math.PI*2);ctx.fill()}}else if(settings.style==='wasteland'){ctx.fillStyle=settings.color1+'30';ctx.beginPath();ctx.arc(cx,cy,w*0.5*(1+Math.sin(t*5)*0.05),0,Math.PI*2);ctx.fill()}else if(settings.style==='enigma'){ctx.strokeStyle=settings.color1;ctx.lineWidth=w*0.06;ctx.beginPath();ctx.arc(cx,cy,w*0.5,0,Math.PI*2);ctx.stroke();ctx.strokeStyle=settings.color2;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,w*0.5,0,Math.PI*2);ctx.stroke()}ctx.shadowBlur=0}
function updateAllFrames(){const pc=$('#profileFrameCanvas');if(pc){const ctx=pc.getContext('2d');ctx.clearRect(0,0,76,76);ctx.save();ctx.translate(38,38);drawFrame(ctx,76,76,App.avatarSettings,true);ctx.restore()}const mc=$('#mpFrameCanvas');if(mc){const ctx=mc.getContext('2d');ctx.clearRect(0,0,64,64);ctx.save();ctx.translate(32,32);drawFrame(ctx,64,64,App.avatarSettings,true);ctx.restore()}}(function anim(){if(App.user){updateAllFrames();requestAnimationFrame(anim)}})()
function loadAvatar(){DB.ref('users/'+App.user.uid+'/avatarSettings').once('value').then(s=>{if(s.exists()){const d=s.val();Object.assign(App.avatarSettings,d);if(d.photo){const img=new Image();img.onload=()=>{App.avatarImageData=img;drawProfileAvatar()};img.src=d.photo}}drawProfileAvatar();updateAllFrames()})}
function drawProfileAvatar(){const c=$('#profileAvatarCanvas');if(!c)return;const ctx=c.getContext('2d');ctx.clearRect(0,0,76,76);if(App.avatarImageData){ctx.save();ctx.beginPath();ctx.arc(38,38,36,0,Math.PI*2);ctx.clip();const r=Math.max(76/App.avatarImageData.width,76/App.avatarImageData.height),dw=App.avatarImageData.width*r,dh=App.avatarImageData.height*r;ctx.drawImage(App.avatarImageData,(76-dw)/2,(76-dh)/2,dw,dh);ctx.restore()}else{ctx.fillStyle='#1e1b4b';ctx.beginPath();ctx.arc(38,38,36,0,Math.PI*2);ctx.fill()}}

function loadPinned(){DB.ref('pinned').on('value',s=>{const b=$('#pinnedMessage');if(!s.exists()){b.style.display='none';return}const m=s.val();b.style.display='block';b.innerHTML='<b>'+esc((m.user||'?').replace(/^[🌌👑📢]\s/,''))+':</b> '+esc(m.text)})}
function loadAnnounce(){DB.ref('announce').limitToLast(1).on('value',s=>{const b=$('#announceBlock');if(!s.exists()){b.style.display='none';return}let last=null;s.forEach(c=>{last=c.val();last._key=c.key});if(last.expiry&&Date.now()>last.expiry){DB.ref('announce/'+last._key).remove();b.style.display='none';return}b.style.display='block';b.innerHTML=esc(last.text);if(App.isCreator||App.isGod){const del=document.createElement('button');del.textContent='✕';del.style='position:absolute;right:8px;top:8px;background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;';del.addEventListener('click',()=>DB.ref('announce/'+last._key).remove());b.appendChild(del)}})}
function loadThought(){DB.ref('creatorThought').on('value',s=>{const b=$('#thoughtBlock');if(!s.exists()){b.style.display='none';return}const t=s.val();if(t.expiry&&Date.now()>t.expiry){DB.ref('creatorThought').remove();b.style.display='none';return}b.style.display='block';b.innerHTML=esc(t.text)+'<br><small style="color:var(--muted);">'+(t.expiry?'До: '+new Date(t.expiry).toLocaleString('ru-RU'):'Навсегда')+'</small>';if(App.isCreator){const del=document.createElement('button');del.textContent='✕';del.style='position:absolute;right:8px;top:8px;background:none;border:none;color:var(--red);cursor:pointer;';del.addEventListener('click',()=>DB.ref('creatorThought').remove());b.appendChild(del)}})}
function setupListeners(){DB.ref('users').on('value',s=>{App.allUsers={};App.allUserData={};s.forEach(c=>{App.allUsers[c.key]=c.val().avatar||'';App.allUserData[c.key]=c.val()});if(App.user)buildCarousel()});DB.ref('activeShifts').on('value',s=>{App.activeShifts={};s.forEach(c=>{if(c.val()&&c.val().active)App.activeShifts[c.key]=true});if(App.user)buildCarousel()});DB.ref('shifts').on('value',s=>{App.allShifts=[];s.forEach(c=>{const x=c.val();x._id=c.key;App.allShifts.push(x)})});DB.ref('chat').limitToLast(1).on('child_added',s=>{if(App.chatOpened)return;const m=s.val();if(!m||!App.user)return;if(m.timestamp<=App.lastChatTimestamp)return;const isMine=m.user==='🌌 '+App.user.name||m.user==='👑 '+App.user.name||m.user===App.user.name;if(isMine)return;if(App.notifiedKeys[s.key])return;App.notifiedKeys[s.key]=true;App.lastChatTimestamp=Math.max(App.lastChatTimestamp,m.timestamp||0);App.unreadCount++;updateBadge()})}
function logout(){if(!confirm('Выйти?'))return;if(App.chatListener){App.chatListener.off();App.chatListener=null}if(App.shiftTimer)clearInterval(App.shiftTimer);AUTH.signOut().then(()=>{App.user=null;App.chatOpened=false;$('#app').style.display='none';$('#loginScreen').style.display='flex';document.body.className=''})}
document.addEventListener('DOMContentLoaded',()=>{
$('#tabLogin').addEventListener('click',toggleAuth);$('#tabRegister').addEventListener('click',toggleAuth);
$('#loginBtn').addEventListener('click',login);$('#registerBtn').addEventListener('click',register);
$('#loginPassword').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
$('#regPassword').addEventListener('keydown',e=>{if(e.key==='Enter')register()});
$('#chatHeader').addEventListener('click',toggleChat);$('#chatBackBtn').addEventListener('click',switchGlobal);
$('#chatMsgInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendMsg()}});
$('#sendMsgBtn').addEventListener('click',sendMsg);$('#chatPhotoBtn').addEventListener('click',()=>$('#chatPhotoInput').click());
$('#chatPhotoInput').addEventListener('change',sendPhoto);
$('#stickerToggleBtn').addEventListener('click',function(e){e.stopPropagation();let p=document.getElementById('stickerPanel');if(!p){p=document.createElement('div');p.id='stickerPanel';p.className='sticker-panel';p.innerHTML='<div class="sticker-content" id="stickerContent"></div>';this.parentElement.appendChild(p)}p.style.display=p.style.display==='flex'?'none':'flex';if(p.style.display==='flex'){$('#stickerContent').innerHTML=BASE_EMOJIS.map(e=>'<div class="emoji-item" data-emoji="'+e+'">'+e+'</div>').join('');$('#stickerContent').querySelectorAll('.emoji-item').forEach(b=>b.addEventListener('click',function(ev){ev.stopPropagation();$('#chatMsgInput').value+=this.dataset.emoji;$('#chatMsgInput').focus()}))}});
document.addEventListener('click',e=>{const sp=document.getElementById('stickerPanel');if(sp&&sp.style.display==='flex'&&!e.target.closest('#stickerPanel')&&!e.target.closest('.sticker-toggle'))sp.style.display='none'});
$('#sidebarToggleBtn').addEventListener('click',toggleSidebar);$('#sidebarCloseBtn').addEventListener('click',()=>$('#avatarCarousel').classList.remove('open'));
$('#mpCloseBtn').addEventListener('click',closeMini);$('#mpChatBtn').addEventListener('click',openPriv);
document.addEventListener('click',e=>{const mp=$('#miniProfile');if(mp&&mp.classList.contains('show')&&!e.target.closest('#miniProfile')&&!e.target.closest('.avatar-item')&&!e.target.closest('#sidebarToggleBtn')&&!e.target.closest('.msg-author'))closeMini()});
$('#settingsBtn').addEventListener('click',openSettings);$('#settingsCloseBtn').addEventListener('click',closeSettings);
$('#settingsSaveBtn').addEventListener('click',saveSettings);$('#settingsLogoutBtn').addEventListener('click',()=>{closeSettings();logout()});
$('#avatarCloseBtn').addEventListener('click',closeSettings);$('#avatarSaveBtn').addEventListener('click',saveAvatar);
$('#setAvatarFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{App.avatarImageData=img;drawProfileAvatar()};img.src=ev.target.result};r.readAsDataURL(f)});
$('#settingsPanel').querySelectorAll('.settings-tab').forEach(b=>b.addEventListener('click',function(){const tab=this.dataset.stab;$('#settingsPanel').querySelectorAll('.settings-tab').forEach(x=>{x.style.background='transparent';x.style.color='var(--muted)'});this.style.background='var(--accent)';this.style.color='#fff';$('#stab-main,#stab-avatar').forEach(x=>x.style.display='none');$('#stab-'+tab).style.display='flex'}));
$('#settingsPanel').querySelectorAll('.style-btn').forEach(b=>b.addEventListener('click',function(){App.avatarSettings.style=this.dataset.style;$('#settingsPanel').querySelectorAll('.style-btn').forEach(x=>{x.style.borderColor='#444';x.style.background='rgba(0,0,0,0.3)';x.style.color='#ccc'});this.style.borderColor='var(--accent)';this.style.background='rgba(124,58,237,0.2)';this.style.color='#fff';updateAllFrames()}));
['setSpeed','setGlow'].forEach(id=>{const el=$('#'+id);if(!el)return;el.addEventListener('input',function(){const v=parseFloat(this.value);const key=id.replace('set','').toLowerCase();App.avatarSettings[key]=v;$('#'+id+'Val').textContent=v+(id.includes('Speed')?'x':'px');updateAllFrames()})});
$('#setColor1').addEventListener('input',function(){App.avatarSettings.color1=this.value;updateAllFrames()});
$('#setColor2').addEventListener('input',function(){App.avatarSettings.color2=this.value;updateAllFrames()});
$('#setRingColor').addEventListener('input',function(){App.avatarSettings.ringColor=this.value});
$('#setRingThickness').addEventListener('change',function(){App.avatarSettings.ringThickness=this.value});
AUTH.onAuthStateChanged(user=>{if(user)DB.ref('users/'+user.uid).once('value').then(s=>{if(s.exists()){App.user=s.val();App.user.uid=user.uid;finish()}})});
});
setupListeners();
})();
</script>
</body>
</html>
