<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ozon Создатель</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; background: #1a1a2e url('https://raw.githubusercontent.com/painofkili/ozon/main/bg.jpg') center/cover fixed; color: #eee; padding: 10px; max-width: 450px; margin: 0 auto; font-size: 16px; }
body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,26,46,0.7); z-index: -1; }
.card { background: rgba(22,33,62,0.85); padding: 16px; border-radius: 14px; margin: 8px 0; backdrop-filter: blur(10px); }
input, select, textarea { width: 100%; padding: 14px; font-size: 16px; margin: 4px 0; border-radius: 10px; border: 1px solid #444; background: rgba(26,26,46,0.8); color: #fff; }
button { border: none; font-weight: bold; cursor: pointer; border-radius: 10px; }
button:active { animation: electricPulse 0.4s ease-out; }
@keyframes electricPulse { 0% { box-shadow: 0 0 0 0 rgba(138, 43, 226, 0.8); } 40% { box-shadow: 0 0 0 12px rgba(245, 197, 24, 0.5), 0 0 0 25px rgba(138, 43, 226, 0.2); } 100% { box-shadow: 0 0 0 0 transparent; } }
.btn-green { background: #4CAF50; color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
.btn-blue { background: #2196F3; color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
.btn-red { background: #e94560; color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
.btn-gray { background: #555; color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
.btn-gold { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; padding: 14px; font-size: 16px; margin: 4px 0; width: 100%; }
button:disabled { opacity: 0.5; cursor: default; }
.avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; cursor: pointer; }
.avatar-creator { border: 3px solid transparent; background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF, #f5c518); background-size: 400% 400%; animation: galaxyGlow 3s infinite; box-shadow: 0 0 25px rgba(138, 43, 226, 0.7), 0 0 50px rgba(0, 191, 255, 0.4); }
@keyframes galaxyGlow { 0% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(138, 43, 226, 0.7); } 50% { background-position: 100% 50%; box-shadow: 0 0 40px rgba(245, 197, 24, 0.9), 0 0 70px rgba(138, 43, 226, 0.6); } 100% { background-position: 0% 50%; box-shadow: 0 0 25px rgba(138, 43, 226, 0.7); } }
.avatar-mini { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; margin-right: 6px; vertical-align: middle; cursor: pointer; }
.avatar-mini-creator { border: 2px solid #8B00FF; box-shadow: 0 0 10px rgba(138, 43, 226, 0.6); }
.profile-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.creator-badge { font-size: 14px; font-weight: bold; padding: 4px 12px; border-radius: 12px; background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; animation: galaxyGlow 3s infinite; display: inline-block; }
.creator-name { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
.progress-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(135deg, #f5c518, #8B00FF); width: 100%; }
.tabs { display: flex; gap: 8px; margin: 10px 0; justify-content: center; flex-wrap: wrap; }
.tabs button { width: 48px; height: 48px; display: flex; align-items: center; gap: 0.75rem; overflow: hidden; border-radius: 999px; transition: width .45s cubic-bezier(.22, 1, .36, 1), background .3s ease, box-shadow .3s ease; background: #333; color: #aaa; border: none; cursor: pointer; padding: 0 12px; font-size: 13px; white-space: nowrap; }
.tabs button:hover { width: 130px; background: rgba(255, 255, 255, 0.12); box-shadow: 0 0 28px rgba(138, 43, 226, 0.22); color: #fff; }
.tabs button.active { background: linear-gradient(135deg, #f5c518, #8B00FF); color: #fff; width: 130px; }
.tabs button .menu-icon { font-size: 20px; flex-shrink: 0; }
.tabs button .menu-label { opacity: 0; max-width: 0; transform: translateX(-8px); transition: opacity .25s ease, max-width .45s ease, transform .35s ease; }
.tabs button:hover .menu-label, .tabs button.active .menu-label { opacity: 1; max-width: 100px; transform: translateX(0); }
.chat-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 8px; margin: 8px 0; }
.chat-header .chat-badge { background: #e94560; color: #fff; border-radius: 50%; width: 22px; height: 22px; font-size: 11px; text-align: center; line-height: 22px; }
#chat { overflow: hidden; padding: 8px; border-radius: 10px; margin: 8px 0; background: rgba(0,0,0,0.2); font-size: 13px; transition: max-height 0.4s ease, padding 0.4s ease, margin 0.4s ease; max-height: 300px; overflow-y: auto; }
#chat.hidden { max-height: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important; margin-top: 0 !important; margin-bottom: 0 !important; overflow: hidden; }
.chat-bubble-group { margin: 4px 0; position: relative; }
.chat-bubble { background: rgba(30,30,50,0.9); padding: 6px 10px; border-radius: 12px; margin: 1px 0; display: inline-block; max-width: 90%; font-size: 13px; word-break: break-word; }
.chat-bubble.mine { background: rgba(76,175,80,0.25); }
.chat-msg-creator { background: linear-gradient(135deg, rgba(245,197,24,0.2), rgba(138,43,226,0.2)); border-left: 3px solid #8B00FF; padding: 8px 12px; border-radius: 8px; margin: 2px 0; }
.chat-msg-creator .author { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
#chat .chat-img { max-width: 100%; border-radius: 8px; margin: 4px 0; cursor: pointer; }
#chat .thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; cursor: pointer; margin: 2px; }
.del-msg-btn { position: absolute; top: 2px; right: 2px; background: #e94560; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 18px; text-align: center; cursor: pointer; display: none; z-index: 2; border: none; padding: 0; }
.chat-bubble-group:hover .del-msg-btn { display: block; }
.pin-msg-btn { position: absolute; top: 2px; right: 22px; background: #f5c518; color: #000; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 18px; text-align: center; cursor: pointer; display: none; z-index: 2; border: none; padding: 0; }
.chat-bubble-group:hover .pin-msg-btn { display: block; }
.pinned { background: rgba(138,43,226,0.2); border-left: 3px solid #8B00FF; padding: 8px; margin: 4px 0; border-radius: 8px; }
.announce-block { background: linear-gradient(135deg, #FFF9C4, #FFE082); color: #333; padding: 10px; border-radius: 10px; margin-bottom: 6px; font-size: 13px; text-align: center; border: 1px solid #f5c518; }
.announce-block .announce-expiry { font-size: 10px; color: #888; margin-top: 4px; }
.thought-block { background: linear-gradient(135deg, rgba(138,43,226,0.3), rgba(0,191,255,0.2), rgba(245,197,24,0.2)); background-size: 400% 400%; animation: galaxyGlow 3s infinite; color: #fff; padding: 10px; border-radius: 10px; margin-bottom: 6px; font-size: 14px; text-align: center; border: 1px solid #8B00FF; font-style: italic; }
.thought-block .thought-text { background: linear-gradient(135deg, #f5c518, #8B00FF, #00BFFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; font-size: 15px; }
.thought-block .thought-expiry { font-size: 10px; color: #aaa; margin-top: 4px; }
.photo-preview { display: flex; gap: 4px; flex-wrap: wrap; }
.photo-preview img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
#photoViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
#photoViewer img { max-width: 95%; max-height: 90%; border-radius: 10px; }
.stat-card { background: rgba(26,26,46,0.8); padding: 8px; border-radius: 10px; margin: 4px 0; font-size: 13px; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 12px; }
.calendar div { padding: 6px; border-radius: 4px; }
.calendar .shift-day { background: #4CAF50; color: #fff; font-weight: bold; }
.calendar .today { border: 2px solid #2196F3; }
.calendar .header { font-weight: bold; background: #333; }
label { font-size: 12px; color: #aaa; display: block; margin-top: 4px; }
.notify-item { padding: 6px; border-bottom: 1px solid #333; font-size: 13px; }
.creator-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.creator-actions button { flex: 1; min-width: 100px; font-size: 12px; padding: 10px; }
.hall-item { display: flex; align-items: center; gap: 8px; padding: 6px; border-bottom: 1px solid #333; font-size: 13px; }
.hall-medal { font-size: 20px; width: 30px; text-align: center; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 999; }
.modal-card { background: rgba(22,33,62,0.95); padding: 20px; border-radius: 14px; width: 90%; max-width: 400px; }
.expiry-row { display: flex; gap: 8px; align-items: center; }
.expiry-row select, .expiry-row input { flex: 1; padding: 10px; font-size: 14px; }
</style>
</head>
<body>

<div id="login">
  <h3 style="text-align:center">🌌 Вход Создателя</h3>
  <input id="creatorPass" type="password" placeholder="Пароль Создателя">
  <button class="btn-gold" onclick="creatorLogin()">🌌 Войти</button>
  <div id="loginMsg" style="color:red;text-align:center;margin-top:4px"></div>
</div>

<div id="settingsCard" style="display:none">
  <div class="card"><h3 style="text-align:center">⚙️ Настройки</h3>
    <input id="newName" placeholder="Новое имя"><input id="newPass" type="password" placeholder="Новый пароль"><select id="newPunkt"></select>
    <input id="newVkId" placeholder="ВК ID (цифры)">
    <label>Аватарка</label><input id="newAvatar" type="file" accept="image/*" onchange="previewNewAvatar()">
    <div id="newAvatarPreview" style="text-align:center;margin:4px 0"></div>
    <label>Размер чата</label><select id="chatSize"><option value="200">Маленький</option><option value="300" selected>Средний</option><option value="450">Большой</option></select>
    <label>Шрифт чата</label><select id="chatFont"><option value="12">Мелкий</option><option value="13" selected>Средний</option><option value="16">Крупный</option></select>
    <button class="btn-green" onclick="saveSettings()">💾 Сохранить</button>
    <button class="btn-gray" onclick="closeSettings()">↩ Назад</button>
  </div>
</div>

<div id="thoughtModal" class="modal-overlay">
  <div class="modal-card">
    <h4 style="text-align:center;color:#f5c518">💭 Мысль Создателя</h4>
    <textarea id="thoughtText" placeholder="О чём думаешь?" rows="3" style="resize:vertical"></textarea>
    <label>Срок действия</label>
    <div class="expiry-row">
      <select id="thoughtExpiryType" onchange="toggleExpiryInput('thought')">
        <option value="forever">Навсегда</option>
        <option value="hours">Часы</option>
        <option value="days">Дни</option>
      </select>
      <input id="thoughtExpiryValue" type="number" placeholder="Кол-во" value="24" style="display:none">
    </div>
    <button class="btn-gold" onclick="sendThought()">🚀 Отправить</button>
    <button class="btn-gray" onclick="closeThoughtModal()">↩ Отмена</button>
  </div>
</div>

<div id="app" style="display:none">
  <div id="announceBlock" class="announce-block" style="display:none"></div>
  <div id="thoughtBlock" class="thought-block" style="display:none"></div>
  <div class="profile-row">
    <img id="profileAvatar" class="avatar avatar-creator" src="" style="display:none">
    <div style="flex:1">
      <b class="creator-name" style="font-size:17px"><span id="uname"></span></b> 
      <span class="creator-badge">🌌 Создатель</span><br>
      <span style="font-size:12px;color:#aaa">📍 Пункт <span id="upunkt"></span></span>
      <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
    <button class="btn-gray" onclick="openSettings()" style="width:auto;padding:8px 12px">⚙️</button>
  </div>
  <div class="tabs">
    <button id="tabShift" class="active" onclick="showTab('shift')"><span class="menu-icon">🔵</span><span class="menu-label">Смена</span></button>
    <button id="tabStats" onclick="showTab('stats')"><span class="menu-icon">📊</span><span class="menu-label">Стат</span></button>
    <button id="tabHistory" onclick="showTab('history')"><span class="menu-icon">💳</span><span class="menu-label">Выплаты</span></button>
    <button id="tabNotify" onclick="showTab('notify')"><span class="menu-icon">🔔</span><span class="menu-label">Увед</span></button>
    <button id="tabHall" onclick="showTab('hall')"><span class="menu-icon">🏆</span><span class="menu-label">Доска</span></button>
    <button id="tabCreator" onclick="showTab('creator')"><span class="menu-icon">🌌</span><span class="menu-label">Сила</span></button>
  </div>
  <div id="shiftTab">
    <button id="startBtn" class="btn-green" onclick="startShift()">🔵 НА СМЕНУ</button>
    <button id="onShiftBtn" class="btn-blue" style="display:none" disabled>🟢 НА СМЕНЕ</button>
    <div id="shift" style="display:none">
      <input id="timeFrom" value="9" placeholder="Начало"><input id="timeTo" value="21" placeholder="Конец"><input id="tov" placeholder="Товары">
      <label>📸 Фотоотчёт (до 5)</label><input id="photos" type="file" accept="image/*" multiple onchange="previewPhotos()">
      <div id="photoPreviews" class="photo-preview"></div>
      <button class="btn-red" onclick="endShift()">🔴 СО СМЕНЫ</button>
    </div>
    <button class="btn-gray" onclick="logout()" style="margin-top:8px">↩ Выйти</button>
  </div>
  <div id="statsTab" style="display:none"><h4>📅 Календарь</h4><div id="calHeader"></div><div class="calendar" id="calendar"></div><div class="stat-card" id="statsSummary"></div><button class="btn-red" onclick="clearMyShifts()">🗑 Очистить</button></div>
  <div id="historyTab" style="display:none"><h4>💳 Выплаты</h4><div id="historyContent"></div></div>
  <div id="notifyTab" style="display:none"><h4>🔔 Уведомления</h4><div id="notifyContent"></div><button class="btn-red" onclick="clearNotifications()">🗑 Очистить</button></div>
  <div id="hallTab" style="display:none">
    <h4 style="text-align:center">🏆 Доска почёта</h4>
    <div class="stat-card"><b>⏱ Топ по часам</b><div id="hallHours"></div></div>
    <div class="stat-card"><b>📦 Топ по товарам</b><div id="hallTovar"></div></div>
    <div class="stat-card"><b>🌟 Работник месяца</b><div id="hallBest"></div></div>
    <div class="stat-card"><b>💀 Штрафник месяца</b><div id="hallWorst"></div></div>
    <div class="stat-card"><b>🎁 Любимчик бога</b><div id="hallPremium"></div></div>
  </div>
  <div id="creatorTab" style="display:none">
    <h4>🌌 Сила Создателя</h4>
    <div class="creator-actions">
      <button class="btn-gold" onclick="summonBoss()">👔 Вызвать</button>
      <button class="btn-gold" onclick="monkeySomeone()">🐒 Обезьяна</button>
      <button class="btn-gold" onclick="clownSomeone()">🤡 Клоун</button>
      <button class="btn-gold" onclick="openThoughtModal()">💭 Мысли</button>
    </div>
  </div>
  <div id="pinnedMessage" class="pinned" style="display:none"></div>
  <div class="chat-header" onclick="toggleChat()">💬 Чат <span id="chatBadge" class="chat-badge" style="display:none">0</span></div>
  <div id="chat"></div>
  <div style="display:flex;gap:4px">
    <input id="chatMsgInput" placeholder="Чат..." style="flex:1">
    <button class="btn-gray" onclick="document.getElementById('chatPhoto').click()" style="width:auto;padding:14px">📎</button>
    <input id="chatPhoto" type="file" accept="image/*" multiple onchange="sendPhoto()" style="display:none">
    <button class="btn-gold" onclick="sendMsg()" style="width:auto;padding:14px 18px">➤</button>
  </div>
</div>

<div id="photoViewer" onclick="this.style.display='none'"><img id="photoViewerImg" src=""></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyA9jEn0r1oTnyx3ngFNCsOUyj4HGfCHAFo",authDomain:"ozon-grafik-4ad9f.firebaseapp.com",databaseURL:"https://ozon-grafik-4ad9f-default-rtdb.europe-west1.firebasedatabase.app",projectId:"ozon-grafik-4ad9f",storageBucket:"ozon-grafik-4ad9f.firebasestorage.app",messagingSenderId:"798009068634",appId:"1:798009068634:web:4b70eea3cce6c96f4f5c63"});
var db=firebase.database(),_user=null,onShift=!1,photoBase64=[],newAvatarData=null,allMyShifts=[],allUsers={},CREATOR_PASS='2706',unreadCount=0;
var VK_TOKEN="vk1.a.1ccqIy8pmM0W_RnIymI9XOMvA6ILX5yxNfZZAiF5HHBdjHK_vOAimgsyljky-TCiReMgJRAlaRvpYEypifmF-iUonUGvldlw5LvDWAOSUpN1WDcnS_7Uit-Yh3BuUF5Ic5NoZ48Qhlmu4ErB87fpTplEI7E3sarTm9LC-Vd8zTbeQp4xgyB1s5yg6oBxTBaNZAFp-ioqBWG25jR8GREmWw";

if('Notification' in window && Notification.permission==='default'){Notification.requestPermission()}
function notifyMe(title,body){if('Notification' in window && Notification.permission==='granted'){try{new Notification(title,{body:body,icon:'https://raw.githubusercontent.com/painofkili/ozon/main/на%20смену.png'})}catch(e){}}}
function sendVkNotify(vkId,msg){if(!vkId)return;fetch('https://api.vk.com/method/messages.send?v=5.131&access_token='+VK_TOKEN+'&user_id='+vkId+'&random_id='+Date.now()+'&message='+encodeURIComponent(msg))}

function toggleChat(){
  var chat=document.getElementById('chat');
  if(chat.classList.contains('hidden')){chat.classList.remove('hidden')}else{chat.classList.add('hidden')}
  unreadCount=0;updateChatBadge();
}
function updateChatBadge(){var badge=document.getElementById('chatBadge');if(unreadCount>0){badge.style.display='inline';badge.textContent=unreadCount}else{badge.style.display='none'}}

db.ref('users').on('value',function(s){s.forEach(function(c){allUsers[c.key]=c.val().avatar||''})});
function loadPunkts(cb){db.ref('punkts').once('value',function(s){var p=[];s.forEach(function(c){p.push(c.key)});if(cb)cb(p)})}

function creatorLogin(){
  var p=document.getElementById('creatorPass').value.trim();
  if(p===CREATOR_PASS){
    db.ref('users/Костя').once('value',function(s){
      if(s.exists()){_user=s.val();_user.role='creator'}else{_user={name:'Костя',punkt:'49',avatar:'',vkId:'',role:'creator'}}
      localStorage.setItem('creator_user',JSON.stringify(_user));
      document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';
      updateProfileUI();loadChat();loadAllData();loadHistory();loadNotifications();loadPinned();loadAnnounce();loadThought();
      db.ref('activeShifts/'+_user.name).once('value',function(s){if(s.exists()&&s.val().active){onShift=!0;document.getElementById('startBtn').style.display='none';document.getElementById('onShiftBtn').style.display='block';document.getElementById('shift').style.display='block'}});
    });
  }else{alert('Неверный пароль!')}
}

var saved=localStorage.getItem('creator_user');
if(saved){_user=JSON.parse(saved);document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';updateProfileUI();loadChat();loadAllData();loadHistory();loadNotifications();loadPinned();loadAnnounce();loadThought()}

function updateProfileUI(){document.getElementById('uname').textContent=_user.name;document.getElementById('upunkt').textContent=_user.punkt||'?';if(_user.avatar){var pa=document.getElementById('profileAvatar');pa.src=_user.avatar;pa.style.display='inline';pa.onclick=function(){viewPhoto(_user.avatar)}}}
function showTab(tab){
  var tabs={shift:'shiftTab',stats:'statsTab',history:'historyTab',notify:'notifyTab',hall:'hallTab',creator:'creatorTab'};
  var active=document.querySelector('.tabs button.active');
  if(active&&active.id==='tab'+tab.charAt(0).toUpperCase()+tab.slice(1)){document.getElementById(tabs[tab]).style.display='none';active.classList.remove('active');return;}
  Object.keys(tabs).forEach(function(t){document.getElementById(tabs[t]).style.display='none'});
  document.getElementById(tabs[tab]).style.display='block';
  ['tabShift','tabStats','tabHistory','tabNotify','tabHall','tabCreator'].forEach(function(id){document.getElementById(id).classList.remove('active')});
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  if(tab==='stats')renderCalendar();if(tab==='history')loadHistory();if(tab==='notify')loadNotifications();if(tab==='hall')loadHall();
}
function loadNotifications(){if(!_user)return;db.ref('notifications').orderByChild('user').equalTo(_user.name).once('value',function(s){var arr=[];s.forEach(function(c){arr.push(c.val())});arr.sort(function(a,b){return b.timestamp-a.timestamp});document.getElementById('notifyContent').innerHTML=arr.length?arr.map(function(x){return'<div class="notify-item">'+x.text+' <small style="color:#999">'+new Date(x.timestamp).toLocaleString('ru-RU')+'</small></div>'}).join(''):'<p>Нет уведомлений</p>'})}
function loadAllData(){if(!_user)return;db.ref('shifts').orderByChild('user').equalTo(_user.name).on('value',function(s){allMyShifts=[];s.forEach(function(c){var x=c.val();x._id=c.key;allMyShifts.push(x)});allMyShifts.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp)});if(document.getElementById('statsTab').style.display!=='none')renderCalendar()})}
function renderCalendar(){var now=new Date(),y=now.getFullYear(),m=now.getMonth(),dim=new Date(y,m+1,0).getDate(),fd=new Date(y,m,0).getDay();document.getElementById('calHeader').innerHTML='<b>'+now.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})+'</b>';var days=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'],h='';for(var i=0;i<7;i++)h+='<div class="header">'+days[i]+'</div>';for(var i=0;i<fd;i++)h+='<div></div>';var sd={};allMyShifts.forEach(function(s){sd[s.date]=(sd[s.date]||0)+1});var ts=now.toLocaleDateString('ru-RU');for(var d=1;d<=dim;d++){var ds=new Date(y,m,d).toLocaleDateString('ru-RU'),cl='';if(sd[ds])cl='shift-day';if(ds===ts)cl+=' today';h+='<div class="'+cl+'">'+d+'</div>'}document.getElementById('calendar').innerHTML=h;var tot=allMyShifts.length,th=allMyShifts.reduce(function(s,x){return s+(x.hours||0)},0),tt=allMyShifts.reduce(function(s,x){return s+(x.tovar||0)},0);document.getElementById('statsSummary').innerHTML='📅 Смен: <b>'+tot+'</b><br>⏱ Часов: <b>'+th+'</b><br>📦 Товаров: <b>'+tt+'</b>'}
function loadHistory(){if(!_user)return;db.ref('payments').orderByChild('user').equalTo(_user.name).once('value',function(s){var a=[];s.forEach(function(c){a.push(c.val())});a.sort(function(x,y){return y.timestamp-x.timestamp});document.getElementById('historyContent').innerHTML=a.length?a.map(function(x){return'<div class="stat-card">📅 '+new Date(x.dateFrom).toLocaleDateString('ru-RU')+' – '+new Date(x.dateTo).toLocaleDateString('ru-RU')+'<br><b>'+x.total+' ₽</b><br><small>'+new Date(x.timestamp).toLocaleString('ru-RU')+'</small></div>'}).join(''):'<p>Нет выплат</p>'})}

function openSettings(){document.getElementById('app').style.display='none';document.getElementById('settingsCard').style.display='block';document.getElementById('newVkId').value=_user.vkId||'';document.getElementById('chatSize').value=localStorage.getItem('chatSize')||'300';document.getElementById('chatFont').value=localStorage.getItem('chatFont')||'13';loadPunkts(function(p){var s=document.getElementById('newPunkt');s.innerHTML='<option value="">Не менять</option>';for(var i=0;i<p.length;i++){s.innerHTML+='<option value="'+p[i]+'">'+p[i]+'</option>'}})}

function previewNewAvatar(){var f=document.getElementById('newAvatar').files[0];if(!f)return;var r=new FileReader();r.onload=function(e){newAvatarData=e.target.result;document.getElementById('newAvatarPreview').innerHTML='<img class="avatar" src="'+newAvatarData+'">'};r.readAsDataURL(f)}
function previewPhotos(){photoBase64=[];document.getElementById('photoPreviews').innerHTML='';var files=document.getElementById('photos').files;for(var i=0;i<Math.min(files.length,5);i++){(function(file){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),mw=400,s=mw/img.width;c.width=mw;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);var thumb=c.toDataURL('image/jpeg',0.6);photoBase64.push({full:e.target.result,thumb:thumb});var pv=document.createElement('img');pv.src=thumb;document.getElementById('photoPreviews').appendChild(pv)};img.src=e.target.result};r.readAsDataURL(file)})(files[i])}}
function startShift(){onShift=!0;var t=new Date().toLocaleTimeString('ru-RU');db.ref('activeShifts/'+_user.name).set({active:!0,startTime:t});document.getElementById('startBtn').style.display='none';document.getElementById('onShiftBtn').style.display='block';document.getElementById('shift').style.display='block';db.ref('chat').push({user:'🌌 '+_user.name,text:'🔵 Пункт '+_user.punkt+' на смене! ('+t+')',timestamp:Date.now()})}
function endShift(){var tf=document.getElementById('timeFrom').value||'9',tt=document.getElementById('timeTo').value||'21',tv=parseInt(document.getElementById('tov').value)||0,hh=parseInt(tt)-parseInt(tf),t=new Date().toLocaleTimeString('ru-RU'),ph=photoBase64.slice(0,5);db.ref('shifts/'+_user.name+'_'+Date.now()).set({user:_user.name,punkt:_user.punkt||'49',date:new Date().toLocaleDateString('ru-RU'),timeFrom:tf,timeTo:tt,hours:hh,tovar:tv,photos:ph,paid:!1,timestamp:new Date().toISOString()});db.ref('chat').push({user:'🌌 '+_user.name,text:'🔴 Пункт '+_user.punkt+' с '+tf+' до '+tt+', товаров: '+tv,timestamp:Date.now(),photos:ph});db.ref('activeShifts/'+_user.name).remove();onShift=!1;document.getElementById('shift').style.display='none';document.getElementById('onShiftBtn').style.display='none';document.getElementById('startBtn').style.display='block';document.getElementById('tov').value='';document.getElementById('photos').value='';document.getElementById('photoPreviews').innerHTML='';photoBase64=[]}
function sendPhoto(){var files=document.getElementById('chatPhoto').files;if(!files.length||!_user)return;var photos=[],count=Math.min(files.length,5);for(var i=0;i<count;i++){(function(file){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),mw=300,s=mw/img.width;c.width=mw;c.height=img.height*s;c.getContext('2d').drawImage(img,0,0,c.width,c.height);var thumb=c.toDataURL('image/jpeg',0.6);photos.push({full:e.target.result,thumb:thumb});if(photos.length===count){db.ref('chat').push({user:'🌌 '+_user.name,text:'📷 '+count+' фото',photos:photos,timestamp:Date.now(),creator:!0})}};img.src=e.target.result};r.readAsDataURL(file)})(files[i])}document.getElementById('chatPhoto').value=''}
function logout(){_user=null;onShift=!1;localStorage.removeItem('creator_user');document.getElementById('app').style.display='none';document.getElementById('login').style.display='block'}
function loadChat(){
  var cs=localStorage.getItem('chatSize')||'300';var cf=localStorage.getItem('chatFont')||'13';
  document.getElementById('chat').style.maxHeight=cs+'px';document.getElementById('chat').style.fontSize=cf+'px';
  db.ref('chat').limitToLast(50).on('value',function(s){
    var h='',lastUser='';
    s.forEach(function(c){
      var m=c.val(),isCreatorMsg=m.user&&m.user.indexOf('🌌')===0,curUser=m.user||'';
      if(curUser!==lastUser&&lastUser!==''){h+='</div>'}
      if(curUser!==lastUser){h+='<div class="chat-bubble-group">';lastUser=curUser}
      var sn=(m.user||'').replace('📢 ','').replace('🌌 ',''),av=allUsers[sn]||'';
      // Кнопка удаления — всегда показываем, но проверка внутри delChatMsg
      h+='<button class="del-msg-btn" onclick="delChatMsg(\''+c.key+'\',\''+(isCreatorMsg?'creator':'normal')+'\')">✕</button>';
      if(isCreatorMsg){h+='<button class="pin-msg-btn" onclick="pinMsg(\''+c.key+'\')">📌</button>'}
      if(isCreatorMsg){h+='<div class="chat-msg-creator">'}else{var cls='chat-bubble';h+='<div class="'+cls+'">'}
      if(av)h+='<img class="avatar-mini'+(isCreatorMsg?' avatar-mini-creator':'')+'" src="'+av+'">';
      h+='<b class="'+(isCreatorMsg?'author':'')+'">'+(isCreatorMsg?'🌌 ':'')+(m.user||'?')+':</b> '+(m.text||'');
      if(m.photo){h+='<br><img class="chat-img" src="'+(m.thumb||m.photo)+'" onclick="event.stopPropagation();viewPhoto(\''+m.photo+'\')">'}
      if(m.photos&&m.photos.length){var ft=typeof m.photos[0]==='object'?m.photos[0].thumb:m.photos[0];h+='<br><img class="thumb" src="'+ft+'" onclick="event.stopPropagation();viewPack(\''+JSON.stringify(m.photos.map(function(p){return typeof p==='object'?p.full:p}).join('|||')).replace(/'/g,"&#39;").replace(/"/g,'&quot;')+'\')">';if(m.photos.length>1)h+=' <span style="font-size:11px;color:#999">+ ещё '+(m.photos.length-1)+'</span>'}h+='</div>'});
    if(lastUser!==''){h+='</div>'}
    document.getElementById('chat').innerHTML=h;document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
  });
}
function viewPhoto(url){document.getElementById('photoViewerImg').src=url;document.getElementById('photoViewer').style.display='flex'}
function viewPack(pd){var parts=pd.split('|||'),v=document.getElementById('photoViewer'),im=document.getElementById('photoViewerImg'),idx=0;im.src=parts[0];v.style.display='flex';v.onclick=function(e){if(e.target===v){v.style.display='none';v.onclick=null}};im.onclick=function(e){e.stopPropagation();idx++;if(idx<parts.length)im.src=parts[idx];else v.style.display='none'}}
// === УДАЛЕНИЕ: Создатель может удалять всё, остальные не могут удалять сообщения Создателя ===
function delChatMsg(key, type){
  // Создатель может удалять любые сообщения
  if(_user && _user.role==='creator'){
    if(confirm('Удалить сообщение?')){
      db.ref('chat/'+key).remove();
    }
    return;
  }
  // Для не-Создателей: нельзя удалять сообщения Создателя
  if(type==='creator'){
    alert('🚫 Знай своё место!');
    return;
  }
  if(confirm('Удалить сообщение?')){
    db.ref('chat/'+key).remove();
  }
}
function pinMsg(key){db.ref('chat/'+key).once('value',function(s){if(s.exists()){db.ref('pinned').set(s.val());alert('📌 Закреплено!')}})}
function loadPinned(){db.ref('pinned').on('value',function(s){var b=document.getElementById('pinnedMessage');if(!s.exists()){b.style.display='none';return}var m=s.val();b.style.display='block';b.innerHTML='📌 <b>'+(m.user||'?')+':</b> '+m.text})}
function sendMsg(){
  var input=document.getElementById('chatMsgInput');
  var t=input.value.trim();
  if(!t||!_user)return;
  var mentions=t.match(/@(\S+)/g);
  if(mentions){db.ref('users').once('value',function(snap){var vkIds={};snap.forEach(function(c){vkIds[c.val().name]=c.val().vkId||''});for(var i=0;i<mentions.length;i++){var name=mentions[i].replace('@','');var vkId=vkIds[name];if(vkId){sendVkNotify(vkId,'📢 Создатель упомянул вас в чате Ozon:\n'+t)}}})}
  db.ref('chat').push({user:'🌌 '+_user.name,text:t,timestamp:Date.now(),creator:!0});
  input.value='';
}
document.getElementById('chatMsgInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendMsg()}});

function clearNotifications(){if(!confirm('Удалить уведомления?'))return;db.ref('notifications').orderByChild('user').equalTo(_user.name).once('value',function(s){s.forEach(function(c){db.ref('notifications/'+c.key).remove()})});alert('✅')}

// === МЫСЛИ СОЗДАТЕЛЯ ===
function openThoughtModal(){document.getElementById('thoughtModal').style.display='flex'}
function closeThoughtModal(){document.getElementById('thoughtModal').style.display='none';document.getElementById('thoughtText').value=''}
function toggleExpiryInput(prefix){
  var type=document.getElementById(prefix+'ExpiryType').value;
  var val=document.getElementById(prefix+'ExpiryValue');
  val.style.display=type==='forever'?'none':'block';
}
function sendThought(){
  var text=document.getElementById('thoughtText').value.trim();
  if(!text)return;
  var type=document.getElementById('thoughtExpiryType').value;
  var val=parseInt(document.getElementById('thoughtExpiryValue').value)||24;
  var expiry=null;
  if(type==='hours'){expiry=Date.now()+val*3600000}
  else if(type==='days'){expiry=Date.now()+val*86400000}
  db.ref('creatorThought').set({text:text,expiry:expiry,timestamp:Date.now()});
  document.getElementById('thoughtText').value='';
  closeThoughtModal();
  alert('💭 Мысль отправлена!');
}
function loadThought(){
  db.ref('creatorThought').on('value',function(s){
    var b=document.getElementById('thoughtBlock');
    if(!s.exists()){b.style.display='none';return}
    var t=s.val();
    if(t.expiry&&Date.now()>t.expiry){db.ref('creatorThought').remove();b.style.display='none';return}
    b.style.display='block';
    var expText=t.expiry?'Исчезнет: '+new Date(t.expiry).toLocaleString('ru-RU'):'Навсегда';
    b.innerHTML='<div class="thought-text">💭 '+t.text+'</div><div class="thought-expiry">'+expText+'</div>';
  });
}

// === ОБЪЯВЛЕНИЯ ===
function loadAnnounce(){
  db.ref('announce').limitToLast(1).on('value',function(s){
    var b=document.getElementById('announceBlock');
    if(!s.exists()){b.style.display='none';return}
    var last=null;s.forEach(function(c){last=c.val();last._key=c.key});
    if(last.expiry&&Date.now()>last.expiry){db.ref('announce/'+last._key).remove();b.style.display='none';return}
    b.style.display='block';
    var expText=last.expiry?'Актуально до: '+new Date(last.expiry).toLocaleString('ru-RU'):'Бессрочно';
    b.innerHTML='<b>📢 '+last.text+'</b><br><small class="announce-expiry">'+expText+' • '+new Date(last.timestamp).toLocaleString('ru-RU')+'</small>';
  });
}

// === ДОСКА ПОЧЁТА ===
function loadHall(){
  db.ref('shifts').once('value',function(snap){var users={};snap.forEach(function(c){var s=c.val();if(!users[s.user])users[s.user]={hours:0,tovar:0};users[s.user].hours+=s.hours||0;users[s.user].tovar+=s.tovar||0});var arr=[];for(var n in users)arr.push({name:n,hours:users[n].hours,tovar:users[n].tovar});arr.sort(function(a,b){return b.hours-a.hours});var hh='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';hh+='<div class="hall-item"><span class="hall-medal">'+m+'</span> '+arr[i].name+' — <b>'+arr[i].hours+'ч</b></div>'}document.getElementById('hallHours').innerHTML=hh||'Нет данных';arr.sort(function(a,b){return b.tovar-a.tovar});var ht='';for(var i=0;i<Math.min(arr.length,5);i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'📌';ht+='<div class="hall-item"><span class="hall-medal">'+m+'</span> '+arr[i].name+' — <b>'+arr[i].tovar+' шт</b></div>'}document.getElementById('hallTovar').innerHTML=ht||'Нет данных';arr.sort(function(a,b){return(b.hours+b.tovar)-(a.hours+a.tovar)});document.getElementById('hallBest').innerHTML=arr.length?'<div class="hall-item"><span class="hall-medal">🌟</span> '+arr[0].name+' — '+arr[0].hours+'ч / '+arr[0].tovar+' шт</div>':'Нет данных';db.ref('punishes').once('value',function(ps){var pusers={};ps.forEach(function(c){var p=c.val();if(!pusers[p.user])pusers[p.user]=0;pusers[p.user]+=p.amount||0});var parr=[];for(var n in pusers)parr.push({name:n,amount:pusers[n]});parr.sort(function(a,b){return b.amount-a.amount});document.getElementById('hallWorst').innerHTML=parr.length?'<div class="hall-item"><span class="hall-medal">💀</span> '+parr[0].name+' — <b>'+parr[0].amount+' ₽</b></div>':'Нет данных'});db.ref('premiums').once('value',function(prs){var prusers={};prs.forEach(function(c){var p=c.val();if(!prusers[p.user])prusers[p.user]=0;prusers[p.user]+=p.amount||0});var prarr=[];for(var n in prusers)prarr.push({name:n,amount:prusers[n]});prarr.sort(function(a,b){return b.amount-a.amount});document.getElementById('hallPremium').innerHTML=prarr.length?'<div class="hall-item"><span class="hall-medal">🎁</span> '+prarr[0].name+' — <b>'+prarr[0].amount+' ₽</b></div>':'Нет данных'})})}
</script>
