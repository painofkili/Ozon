<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Озон Создатель | Управление</title>
    <style>
        /* Базовые стили */
        body { margin: 0; font-family: sans-serif; transition: 0.3s; padding: 15px; }
        
        /* Киберпанк */
        .theme-cyberpunk { background: #1a1a2e; color: #00d2ff; }
        .theme-cyberpunk .card { background: #16213e; border: 1px solid #00d2ff; }
        
        /* Минимализм */
        .theme-minimal { background: #ffffff; color: #333; }
        .theme-minimal .card { background: #f4f4f4; border: 1px solid #ddd; }

        .card { padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .btn { padding: 8px 16px; cursor: pointer; border-radius: 5px; border: none; background: #ff00ff; color: white; }
        
        /* Скролл сотрудников */
        .staff-container { display: flex; overflow-x: auto; gap: 10px; padding: 10px; white-space: nowrap; }
        .staff-card { min-width: 80px; padding: 10px; background: rgba(0,0,0,0.1); border-radius: 8px; text-align: center; font-size: 14px; }
    </style>
</head>
<body class="theme-cyberpunk" id="app">

    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Создатель</h1>
        <button id="theme-toggle" class="btn">Сменить тему</button>
    </header>

    <!-- Панель управления (твоя новая фича) -->
    <div class="card">
        <h3>Инструменты Создателя</h3>
        <input type="file" id="sticker-input" accept="image/png">
        <button id="upload-btn" class="btn">Загрузить стикер</button>
    </div>

    <!-- Список сотрудников (твой стандартный интерфейс) -->
    <div class="card">
        <h3>Сотрудники на смене</h3>
        <div class="staff-container">
            <div class="staff-card">Георгий</div>
            <div class="staff-card">Коллега 1</div>
            <div class="staff-card">Коллега 2</div>
            <div class="staff-card">Коллега 3</div>
        </div>
    </div>

    <!-- Окно чата -->
    <div class="card" id="chat-window">
        <h3>Чат</h3>
        <p>Рабочие сообщения...</p>
    </div>

    <script>
        const app = document.getElementById('app');
        const toggleBtn = document.getElementById('theme-toggle');

        // Управление темой
        const savedTheme = localStorage.getItem('theme') || 'theme-cyberpunk';
        app.className = savedTheme;

        toggleBtn.addEventListener('click', () => {
            const newTheme = app.className === 'theme-cyberpunk' ? 'theme-minimal' : 'theme-cyberpunk';
            app.className = newTheme;
            localStorage.setItem('theme', newTheme);
        });

        document.getElementById('upload-btn').addEventListener('click', () => {
            alert("Функция загрузки стикера готова!");
        });
    </script>
</body>
</html>
